<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Duration — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; text-align: center; }
    .hero-val { font-size: 3rem; font-weight: 900; color: var(--accent); letter-spacing: -.04em; }
    .hero-sub { font-size: .8rem; color: var(--muted); margin-top: .4rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.1rem; }
    /* Outcome colors */
    .oc-booked    { color: #34d399; }
    .oc-info      { color: #a78bfa; }
    .oc-canceled  { color: #fbbf24; }
    .oc-voicemail { color: #666; }
    .oc-escalated { color: #f87171; }
    /* Horizontal bars */
    .hbar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .hbar-row:last-child { margin-bottom: 0; }
    .hbar-label { font-size: .78rem; font-weight: 700; width: 80px; flex-shrink: 0; text-transform: capitalize; }
    .hbar-track { flex: 1; background: var(--surface2); border-radius: 5px; height: 16px; overflow: hidden; }
    .hbar-fill { height: 100%; border-radius: 5px; }
    .hbar-meta { font-size: .7rem; color: var(--muted); width: 80px; text-align: right; flex-shrink: 0; }
    /* Distribution bars */
    .dist-bars { display: flex; align-items: flex-end; gap: .5rem; height: 100px; }
    .dist-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: .3rem; }
    .dist-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); opacity: .75; min-height: 3px; }
    .dist-lbl { font-size: .62rem; color: var(--muted); text-align: center; }
    .dist-cnt { font-size: .65rem; font-weight: 800; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Duration</div>
  <p class="page-sub">Average AI call length by outcome, distribution, and 14-day trend.</p>
  <div class="hero">
    <div class="hero-val" id="h-avg">—</div>
    <div class="hero-sub">average call duration</div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">By Outcome</div>
      <div id="outcome-bars"></div>
    </div>
    <div class="card">
      <div class="card-title">Duration Distribution</div>
      <div class="dist-bars" id="dist-bars"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">14-Day Trend</div>
    <svg id="trend" width="100%" style="display:block;overflow:visible"></svg>
  </div>
</div>
<script>
  const OC_COLORS = {booked:'#34d399',info:'#a78bfa',canceled:'#fbbf24',voicemail:'#666',escalated:'#f87171'};

  function fmtSec(s) {
    const m = Math.floor(s/60), sec = s%60;
    return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
  }

  async function load() {
    const r = await fetch('/api/analytics/call-duration');
    const d = await r.json();

    document.getElementById('h-avg').textContent = fmtSec(d.avg_duration_sec);

    const outcomes = d.by_outcome || [];
    const maxSec = Math.max(...outcomes.map(o => o.avg_sec), 1);
    document.getElementById('outcome-bars').innerHTML = outcomes.map(o => `
      <div class="hbar-row">
        <div class="hbar-label" style="color:${OC_COLORS[o.outcome]||'var(--muted)'}">${o.outcome}</div>
        <div class="hbar-track"><div class="hbar-fill" style="width:${(o.avg_sec/maxSec*100).toFixed(1)}%;background:${OC_COLORS[o.outcome]||'#666'};opacity:.75"></div></div>
        <div class="hbar-meta">${fmtSec(o.avg_sec)} · ${o.count}</div>
      </div>`).join('');

    const dist = d.distribution || [];
    const maxCnt = Math.max(...dist.map(b => b.count), 1);
    document.getElementById('dist-bars').innerHTML = dist.map(b => {
      const h = Math.max(4, Math.round(b.count / maxCnt * 88));
      return `<div class="dist-col"><div class="dist-cnt">${b.count}</div><div class="dist-bar" style="height:${h}px"></div><div class="dist-lbl">${b.bucket_label}</div></div>`;
    }).join('');

    const trend = d.trend || [];
    const W = 800, H = 80, PL = 6, PR = 6, PT = 14, PB = 22;
    const cW = W-PL-PR, cH = H-PT-PB;
    const minS = Math.min(...trend.map(t => t.avg_sec))-10;
    const maxS = Math.max(...trend.map(t => t.avg_sec))+10;
    const pts = trend.map((t,i) => {
      const x = PL + i*cW/(trend.length-1);
      const y = PT + cH - ((t.avg_sec-minS)/(maxS-minS))*cH;
      return {x, y, label: t.date.slice(5), val: t.avg_sec};
    });
    const line = `M${pts[0].x},${pts[0].y}` + pts.slice(1).map(p=>`L${p.x},${p.y}`).join('');
    const area = line + ` L${pts[pts.length-1].x},${H-PB} L${pts[0].x},${H-PB} Z`;
    const labels = pts.filter((_,i)=>i%2===0).map(p=>`<text x="${p.x}" y="${H-4}" text-anchor="middle" font-size="9" fill="#444">${p.label}</text>`).join('');
    const svg = document.getElementById('trend');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('height', H);
    svg.innerHTML = `<defs><linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity=".2"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/></linearGradient></defs>
      <path d="${area}" fill="url(#dg)"/>
      <path d="${line}" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round"/>
      ${labels}`;
  }
  load();
</script>
</body>
</html>
