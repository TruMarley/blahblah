<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>In-Chair Wait — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .prov-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; }
    .prov-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .45rem; }
    .prov-name { font-size: .85rem; font-weight: 700; }
    .prov-wait { font-size: .88rem; font-weight: 900; }
    .prov-bar-track { background: #1a1a1a; border-radius: 3px; height: 7px; overflow: hidden; margin-bottom: .3rem; }
    .prov-bar-fill { height: 100%; border-radius: 3px; }
    .prov-sub { font-size: .66rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">In-Chair Wait Time</div>
  <p class="page-sub">How long clients wait between arriving and getting seated. Chronic waits above 10 minutes drive churn — use this to identify which providers run late and why.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--yellow)">—</div><div class="stat-lbl">Shop Avg Wait</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-over" style="color:var(--red)">—</div><div class="stat-lbl">Over 10 Min</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-appts" style="color:var(--muted)">—</div><div class="stat-lbl">Appts Analyzed (30d)</div></div>
  </div>
  <div class="card">
    <div class="card-title">Per-Provider Wait Analysis</div>
    <div id="prov-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/in-chair-wait-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.shop_avg_wait_min.toFixed(1) + ' min';
    document.getElementById('h-over').textContent = d.over_10min_pct.toFixed(1) + '%';
    document.getElementById('h-appts').textContent = d.total_appointments_30d;
    const pl = document.getElementById('prov-list');
    const maxW = Math.max(...d.providers.map(p => p.avg_wait_min), 1);
    d.providers.forEach(p => {
      const w = (p.avg_wait_min / maxW * 100).toFixed(1);
      const color = p.avg_wait_min <= 5 ? 'var(--green)' : p.avg_wait_min <= 10 ? 'var(--yellow)' : 'var(--red)';
      pl.innerHTML += '<div class="prov-row"><div class="prov-top"><div class="prov-name">' + p.name + '</div><div class="prov-wait" style="color:' + color + '">' + p.avg_wait_min.toFixed(1) + ' min</div></div><div class="prov-bar-track"><div class="prov-bar-fill" style="width:' + w + '%;background:' + color + '"></div></div><div class="prov-sub">Over 10 min: ' + p.over_10min_pct.toFixed(0) + '% &nbsp;·&nbsp; ' + p.appointments + ' appts</div></div>';
    });
  }
  load();
</script>
</body>
</html>
