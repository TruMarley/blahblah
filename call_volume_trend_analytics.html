<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Volume Trend — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .week-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .week-label { font-size: .78rem; color: var(--muted); width: 38px; flex-shrink: 0; }
    .week-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .week-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .week-val { font-size: .75rem; font-weight: 700; color: var(--accent); width: 40px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Volume Trend</div>
  <p class="page-sub">Track inbound call volume over the past 30 days by week. Rising call volume signals growing demand; sudden drops can flag routing issues or seasonal slowdowns.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Calls (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--muted)">—</div><div class="stat-lbl">Avg Daily Calls</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak" style="color:var(--yellow)">—</div><div class="stat-lbl">Peak Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-wow" style="color:var(--green)">—</div><div class="stat-lbl">WoW Change</div></div>
  </div>
  <div class="card">
    <div class="card-title">Weekly Call Volume</div>
    <div id="week-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/call-volume-trend-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_calls_30d;
    document.getElementById('h-avg').textContent = d.avg_daily_calls.toFixed(1);
    document.getElementById('h-peak').textContent = d.peak_day;
    const wow = d.wow_change_pct;
    document.getElementById('h-wow').textContent = (wow >= 0 ? '+' : '') + wow.toFixed(1) + '%';
    document.getElementById('h-wow').style.color = wow >= 0 ? 'var(--green)' : 'var(--red)';
    const wl = document.getElementById('week-list');
    const maxC = Math.max(...d.weekly.map(w => w.calls));
    d.weekly.forEach(w => {
      const pct = (w.calls / maxC * 100).toFixed(1);
      wl.innerHTML += '<div class="week-row"><div class="week-label">' + w.week + '</div><div class="week-track"><div class="week-fill" style="width:' + pct + '%"></div></div><div class="week-val">' + w.calls + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
