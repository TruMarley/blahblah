<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audit Log — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 1.5rem; }
    .filter-row { display: flex; gap: .5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: .78rem; font-weight: 700; padding: .4rem .85rem; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(167,139,250,.08); }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .71rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .7rem 1.25rem; border-bottom: 1px solid var(--border); text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .75rem 1.25rem; font-size: .82rem; vertical-align: middle; }
    .time-cell { color: var(--muted); font-size: .75rem; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .actor-chip { display: inline-block; padding: .18rem .55rem; border-radius: 6px; font-size: .7rem; font-weight: 800; }
    .actor-ai    { background: rgba(167,139,250,.12); color: var(--accent); border: 1px solid rgba(167,139,250,.2); }
    .actor-owner { background: rgba(52,211,153,.1);  color: var(--green);  border: 1px solid rgba(52,211,153,.2); }
    .actor-staff { background: rgba(251,191,36,.1);  color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .action-cell { font-weight: 700; font-size: .8rem; }
    .detail-cell { color: var(--muted); font-size: .78rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Audit Log</div>
  <p class="page-sub">Every action taken in your account — by the AI, owner, or staff.</p>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('AI',this)">🤖 AI</button>
    <button class="filter-btn" onclick="setFilter('Owner',this)">👤 Owner</button>
    <button class="filter-btn" onclick="setFilter('Staff',this)">✂️ Staff</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Detail</th></tr></thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>
</div>
<script>
  let entries = [], currentFilter = 'all';

  async function load() {
    const r = await fetch('/api/audit-log');
    const d = await r.json();
    entries = d.entries || [];
    render();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const filtered = currentFilter === 'all' ? entries : entries.filter(e => e.actor === currentFilter);
    document.getElementById('log-body').innerHTML = filtered.map(e => {
      const chipClass = e.actor === 'AI' ? 'actor-ai' : e.actor === 'Owner' ? 'actor-owner' : 'actor-staff';
      return `<tr>
        <td class="time-cell">${fmtTime(e.timestamp)}</td>
        <td><span class="actor-chip ${chipClass}">${e.actor}</span></td>
        <td class="action-cell">${esc(e.action)}</td>
        <td class="detail-cell">${esc(e.detail)}</td>
      </tr>`;
    }).join('');
  }

  function fmtTime(iso) {
    const d = new Date(iso);
    const diff = Math.floor((new Date() - d) / 60000);
    const timeStr = d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    if (diff < 60) return diff + 'm ago · ' + timeStr;
    if (diff < 1440) return Math.floor(diff/60) + 'h ago · ' + timeStr;
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' · ' + timeStr;
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  load();
</script>
</body>
</html>
