<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Schedule Gaps — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .staff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .staff-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .staff-name { font-size: 1rem; font-weight: 900; margin-bottom: .25rem; }
    .staff-sub { font-size: .72rem; color: var(--muted); margin-bottom: 1rem; }
    .gap-list { display: flex; flex-direction: column; gap: .6rem; }
    .gap-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: .7rem .9rem; display: flex; align-items: center; justify-content: space-between; }
    .gap-slot { font-size: .82rem; font-weight: 700; }
    .gap-day { font-size: .7rem; color: var(--muted); margin-top: .1rem; }
    .util-bar-wrap { width: 80px; }
    .util-label { font-size: .65rem; color: var(--muted); text-align: right; margin-bottom: .2rem; }
    .util-bar { height: 5px; background: #1e1e1e; border-radius: 3px; overflow: hidden; }
    .util-fill { height: 100%; border-radius: 3px; background: var(--yellow); }
    @media (max-width: 600px) { .staff-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Schedule Gaps</div>
  <p class="page-sub">Underutilized time slots by staff member — fill gaps with targeted promotions or walk-in availability.</p>
  <div class="staff-grid" id="staff-grid">
    <div style="color:var(--muted);font-size:.85rem;grid-column:1/-1;text-align:center;padding:2rem;">Loading...</div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/staff-schedule-gaps');
    const d = await r.json();
    const staffGaps = d.staff_gaps || [];
    const grid = document.getElementById('staff-grid');
    if (!staffGaps.length) { grid.innerHTML = '<div style="color:var(--muted);font-size:.85rem;grid-column:1/-1;text-align:center;padding:2rem;">No data.</div>'; return; }
    grid.innerHTML = staffGaps.map(s => `
      <div class="staff-card">
        <div class="staff-name">${esc(s.staff)}</div>
        <div class="staff-sub">${s.gaps.length} underutilized slots this week</div>
        <div class="gap-list">
          ${s.gaps.map(g => `
            <div class="gap-row">
              <div>
                <div class="gap-slot">${esc(g.slot)}</div>
                <div class="gap-day">${esc(g.day)}</div>
              </div>
              <div class="util-bar-wrap">
                <div class="util-label">${g.utilization_pct}% booked</div>
                <div class="util-bar"><div class="util-fill" style="width:${g.utilization_pct}%"></div></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
