<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weekly Revenue Summary — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 280px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Weekly Revenue Summary</div>
  <p class="page-sub">8-week revenue overview with appointment counts and average ticket value trend.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Latest Week Revenue</div>
      <div class="hero-val" id="h-rev" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Appointments</div>
      <div class="hero-val" id="h-appts" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Ticket</div>
      <div class="hero-val" id="h-avg" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Revenue &amp; Avg Ticket by Week</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,.7)"></div>Total Revenue</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow);border-radius:50%"></div>Avg Ticket ($)</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 280" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/weekly-revenue-summary');
    const d = await r.json();
    const weeks = d.weeks || [];
    const last = weeks[weeks.length-1] || {};
    document.getElementById('h-rev').textContent = '$' + (last.total_revenue||0).toLocaleString();
    document.getElementById('h-appts').textContent = (last.appointment_count||0);
    document.getElementById('h-avg').textContent = '$' + (last.avg_ticket||0).toFixed(0);

    const svg = document.getElementById('chart');
    const W=700, H=280, pL=50, pR=54, pT=14, pB=30;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=weeks.length;
    const barW=cW/n*0.55;
    const xStep=cW/n;
    const maxRev=Math.max(...weeks.map(w=>w.total_revenue))*1.15;
    const maxAvg=Math.max(...weeks.map(w=>w.avg_ticket))*1.15;
    const xOf=i=>pL+i*xStep+xStep/2;
    const yOfRev=v=>pT+cH-v/maxRev*cH;
    const yOfAvg=v=>pT+cH-v/maxAvg*cH;

    // Left axis (revenue)
    [500,1000,1500,2000,2500].filter(v=>v<maxRev).forEach(v=>{
      const y=yOfRev(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">$${v}</text>`;
    });
    // Right axis (avg ticket)
    [20,30,40,50,60,70].filter(v=>v<maxAvg).forEach(v=>{
      const y=yOfAvg(v);
      svg.innerHTML+=`<text x="${W-pR+4}" y="${y+3.5}" font-size="8" fill="#666">$${v}</text>`;
    });

    // Bars
    weeks.forEach((w,i)=>{
      const cx=xOf(i);
      const bh=cH*w.total_revenue/maxRev;
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${pT+cH-bh}" width="${barW}" height="${bh}" rx="4" fill="rgba(167,139,250,.5)"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="8.5" fill="#555" text-anchor="middle">${esc(w.week_label)}</text>`;
    });

    // Avg ticket line
    const pts=weeks.map((w,i)=>`${xOf(i)},${yOfAvg(w.avg_ticket)}`).join(' ');
    svg.innerHTML+=`<polyline points="${pts}" fill="none" stroke="rgba(251,191,36,.85)" stroke-width="2.5"/>`;
    weeks.forEach((w,i)=>{
      svg.innerHTML+=`<circle cx="${xOf(i)}" cy="${yOfAvg(w.avg_ticket)}" r="3.5" fill="var(--yellow)"/>`;
      svg.innerHTML+=`<text x="${xOf(i)}" y="${yOfAvg(w.avg_ticket)-8}" font-size="8" fill="rgba(251,191,36,.85)" text-anchor="middle">$${w.avg_ticket.toFixed(0)}</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
