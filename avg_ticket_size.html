<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avg Ticket Size — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .hero-sub { font-size: .72rem; color: var(--muted); margin-top: .25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 200px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Avg Ticket Size</div>
  <p class="page-sub">Average revenue per transaction — track upsell effectiveness and pricing trends.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Current Avg Ticket</div>
      <div class="hero-val" id="h-avg" style="color:var(--green)">—</div>
      <div class="hero-sub" id="h-change">vs prev month</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Highest Month</div>
      <div class="hero-val" id="h-hi" style="font-size:1.1rem;padding-top:.4rem">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Lowest Month</div>
      <div class="hero-val" id="h-lo" style="font-size:1.1rem;padding-top:.4rem">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Avg Ticket — 8-Month Trend</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 200" preserveAspectRatio="none">
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#a78bfa" stop-opacity=".4"/>
            <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/avg-ticket-size');
    const d = await r.json();
    document.getElementById('h-avg').textContent = '$' + d.avg_ticket.toFixed(2);
    const chg = d.change_pct;
    document.getElementById('h-change').textContent = (chg >= 0 ? '+' : '') + chg + '% vs prev month';
    document.getElementById('h-change').style.color = chg >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('h-hi').textContent = d.highest_month;
    document.getElementById('h-lo').textContent = d.lowest_month;

    const trend = d.trend || [];
    const svg = document.getElementById('chart');
    const W=700,H=200,pL=44,pR=16,pT=16,pB=36;
    const cW=W-pL-pR, cH=H-pT-pB;
    const vals = trend.map(t=>t.avg_ticket);
    const minV = Math.min(...vals)*0.9, maxV = Math.max(...vals)*1.05;
    const range = maxV - minV;
    const n = trend.length;
    const xStep = cW/(n-1);
    const yOf = v => pT + cH - (v - minV)/range * cH;

    [0,.25,.5,.75,1].forEach(f=>{
      const v = minV + range*f;
      const y = yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3}" font-size="9" fill="#666" text-anchor="end">$${v.toFixed(0)}</text>`;
    });

    const pts = trend.map((t,i)=>[pL+i*xStep, yOf(t.avg_ticket)]);
    const area = `M ${pts[0][0]} ${pT+cH} L ${pts.map(p=>p.join(',')).join(' L ')} L ${pts[pts.length-1][0]} ${pT+cH} Z`;
    svg.innerHTML+=`<path d="${area}" fill="url(#grad)"/>`;
    svg.innerHTML+=`<polyline fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linejoin="round" points="${pts.map(p=>p.join(',')).join(' ')}"/>`;
    pts.forEach((p,i)=>{
      svg.innerHTML+=`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#a78bfa"/>`;
      svg.innerHTML+=`<text x="${p[0]}" y="${H-4}" font-size="9" fill="#666" text-anchor="middle">${trend[i].month.split(' ')[0]}</text>`;
    });
  }
  load();
</script>
</body>
</html>
