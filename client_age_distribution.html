<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Age Distribution — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .8rem; }
    .bar-row:last-child { margin-bottom: 0; }
    .age-label { font-size: .78rem; font-weight: 700; width: 46px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; opacity: .8; }
    .pct-lbl { font-size: .75rem; font-weight: 800; width: 38px; text-align: right; flex-shrink: 0; }
    .cnt-lbl { font-size: .7rem; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Age Distribution</div>
  <p class="page-sub">Age group breakdown of your client base — helps tailor services and marketing.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Clients</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Largest Group</div>
      <div class="hero-val" id="h-top" style="font-size:1.3rem;padding-top:.3rem;color:var(--green)">—</div>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="card-title">Donut</div>
      <div style="display:flex;justify-content:center">
        <svg id="donut" viewBox="0 0 120 120" width="160" height="160"></svg>
      </div>
    </div>
    <div class="card">
      <div class="card-title">By Age Group</div>
      <div id="bar-list"></div>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/client-age-distribution');
    const d = await r.json();
    document.getElementById('h-total').textContent = d.total_clients;
    document.getElementById('h-top').textContent = d.largest_group;

    const buckets = d.buckets || [];
    const svg = document.getElementById('donut');
    const cx=60, cy=60, R=46, r=28, circ=2*Math.PI*R;
    svg.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1e1e1e" stroke-width="${R-r}"/>`;
    let off = circ*0.25;
    buckets.forEach(b => {
      const arc = (b.pct/100)*circ;
      svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${b.color}" stroke-width="${R-r}" stroke-dasharray="${arc} ${circ-arc}" stroke-dashoffset="${off}" opacity=".85"/>`;
      off -= arc;
    });
    svg.innerHTML += `<text x="${cx}" y="${cy-4}" font-size="9" fill="#888" text-anchor="middle">Clients</text><text x="${cx}" y="${cy+9}" font-size="13" font-weight="900" fill="#e8e8e8" text-anchor="middle">${d.total_clients}</text>`;

    const maxCount = Math.max(...buckets.map(b => b.count));
    document.getElementById('bar-list').innerHTML = buckets.map(b => `
      <div class="bar-row">
        <div class="age-label">${esc(b.group)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(b.count/maxCount*100).toFixed(1)}%;background:${b.color}"></div></div>
        <div class="pct-lbl" style="color:${b.color}">${b.pct}%</div>
        <div class="cnt-lbl">${b.count}</div>
      </div>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
