<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Performance — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem .9rem; text-align: center; }
    .hero-label { font-size: .6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .staff-grid { display: flex; flex-direction: column; gap: .85rem; }
    .staff-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; display: flex; align-items: center; gap: 1rem; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; flex-shrink: 0; }
    .staff-info { flex: 1; min-width: 0; }
    .staff-name { font-size: .9rem; font-weight: 800; margin-bottom: .25rem; }
    .staff-rev-bar-wrap { height: 6px; background: rgba(255,255,255,.06); border-radius: 6px; margin-bottom: .35rem; }
    .staff-rev-bar { height: 6px; border-radius: 6px; }
    .staff-meta { display: flex; gap: .75rem; flex-wrap: wrap; }
    .meta-item { font-size: .72rem; }
    .meta-label { color: var(--muted); }
    .meta-val { font-weight: 700; }
    .staff-right { display: flex; flex-direction: column; align-items: flex-end; gap: .3rem; flex-shrink: 0; }
    .ns-badge { font-size: .65rem; font-weight: 700; padding: .18rem .5rem; border-radius: 5px; }
    .stars { font-size: .78rem; color: var(--yellow); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Performance</div>
  <p class="page-sub">Compare how each team member performs on bookings, revenue, and client retention. High no-show rates by stylist may indicate scheduling or client communication gaps worth addressing.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Top Earner</div>
      <div class="hero-val" id="h-earner" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Most Bookings</div>
      <div class="hero-val" id="h-bookings" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Staff Breakdown</div>
    <div class="staff-grid" id="staff-grid"></div>
  </div>
</div>
<script>
  const AVATAR_COLORS = ['#a78bfa','#34d399','#60a5fa','#fbbf24'];
  function stars(rating) {
    const full = Math.floor(rating);
    const half = rating - full >= 0.5 ? 1 : 0;
    return '★'.repeat(full) + (half ? '½' : '') + ' ' + rating.toFixed(1);
  }
  async function load() {
    const d = await fetch('/api/analytics/staff-performance-stats').then(r => r.json());
    const topByAppts = (d.staff||[]).reduce((b, s) => s.appointments > (b ? b.appointments : 0) ? s : b, null);
    document.getElementById('h-earner').textContent = d.top_performer || '—';
    document.getElementById('h-bookings').textContent = topByAppts ? topByAppts.name : '—';

    const maxRev = Math.max(...(d.staff||[]).map(s => s.revenue), 1);
    const el = document.getElementById('staff-grid');
    (d.staff || []).forEach((s) => {
      const color = s.color || '#a78bfa';
      const barW = (s.revenue / maxRev * 100).toFixed(0);
      const retColor = s.repeat_rate_pct >= 70 ? 'rgba(52,211,153,.1)' : 'rgba(251,191,36,.1)';
      const retText = s.repeat_rate_pct >= 70 ? 'var(--green)' : 'var(--yellow)';
      el.innerHTML += `<div class="staff-card">
        <div class="avatar" style="background:${color}22;color:${color}">${esc(s.name[0])}</div>
        <div class="staff-info">
          <div class="staff-name" style="color:${color}">${esc(s.name)}</div>
          <div class="staff-rev-bar-wrap"><div class="staff-rev-bar" style="width:${barW}%;background:${color}"></div></div>
          <div class="staff-meta">
            <div class="meta-item"><span class="meta-label">Revenue </span><span class="meta-val" style="color:${color}">$${(s.revenue||0).toLocaleString()}</span></div>
            <div class="meta-item"><span class="meta-label">Appts </span><span class="meta-val">${s.appointments}</span></div>
            <div class="meta-item"><span class="meta-label">Avg Ticket </span><span class="meta-val">$${s.avg_ticket}</span></div>
          </div>
        </div>
        <div class="staff-right">
          <span class="ns-badge" style="background:${retColor};color:${retText}">${s.repeat_rate_pct}% repeat</span>
          <span class="stars">${stars(s.avg_rating)}</span>
        </div>
      </div>`;
    });
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
