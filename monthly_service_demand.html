<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monthly Service Demand — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.8rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 270px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Monthly Service Demand</div>
  <p class="page-sub">Booking volume by service category each month — spot seasonal trends and staff accordingly.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Top Service</div>
      <div class="hero-val" id="h-top" style="color:var(--accent); font-size:1.2rem">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Bookings (latest)</div>
      <div class="hero-val" id="h-total" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Bookings by Service &amp; Month</div>
    <div class="legend" id="legend"></div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 270" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/monthly-service-demand');
    const d = await r.json();
    const months = d.months || [];
    const services = d.services || [];
    const colors = d.colors || [];

    // hero
    const last = months[months.length-1] || {};
    const total = services.reduce((s,svc)=>s+(last[svc]||0),0);
    document.getElementById('h-total').textContent = total;
    const topSvc = services.reduce((a,b)=>(last[b]||0)>(last[a]||0)?b:a, services[0]||'');
    document.getElementById('h-top').textContent = topSvc;

    // legend
    const leg = document.getElementById('legend');
    services.forEach((svc,i) => {
      leg.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${colors[i]}"></div>${esc(svc)}</div>`;
    });

    const svg = document.getElementById('chart');
    const W=700, H=270, pL=42, pR=16, pT=14, pB=28;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=months.length;
    const groupW=cW/n;
    const barW=groupW/services.length*0.72;
    const maxVal=Math.max(...months.flatMap(m=>services.map(s=>m[s]||0)))*1.2;
    const xOf=(i,j)=>pL+i*groupW+j*(groupW/services.length)+groupW/(services.length*2);
    const yOf=v=>pT+cH-v/maxVal*cH;

    // gridlines
    [20,40,60].filter(v=>v<maxVal).forEach(v=>{
      const y=yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">${v}</text>`;
    });

    months.forEach((m,i)=>{
      services.forEach((svc,j)=>{
        const v=m[svc]||0;
        const bh=cH*v/maxVal;
        const cx=xOf(i,j);
        svg.innerHTML+=`<rect x="${cx-barW/2}" y="${yOf(v)}" width="${barW}" height="${bh}" rx="3" fill="${colors[j]}"/>`;
      });
      svg.innerHTML+=`<text x="${pL+i*groupW+groupW/2}" y="${H-4}" font-size="9" fill="#555" text-anchor="middle">${esc(m.month)}</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
