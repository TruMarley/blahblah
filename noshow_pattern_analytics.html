<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>No-Show Patterns — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .day-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .day-lbl { font-size: .75rem; color: var(--muted); width: 34px; flex-shrink: 0; }
    .day-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .day-fill { height: 100%; border-radius: 4px; }
    .day-val { font-size: .72rem; font-weight: 700; width: 42px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">No-Show Patterns</div>
  <p class="page-sub">See which days have the highest no-show rates. Use this to tighten reminder cadence or deposit requirements on high-risk days.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-rate" style="color:var(--red)">—</div><div class="stat-lbl">No-Show Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-count" style="color:var(--red)">—</div><div class="stat-lbl">No-Shows (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-lost" style="color:var(--yellow)">—</div><div class="stat-lbl">Revenue Lost</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-repeat" style="color:var(--muted)">—</div><div class="stat-lbl">Repeat Offenders</div></div>
  </div>
  <div class="card">
    <div class="card-title">No-Show Rate by Day</div>
    <div id="day-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/noshow-pattern-stats').then(r => r.json());
    document.getElementById('h-rate').textContent = d.noshow_rate_30d_pct.toFixed(1) + '%';
    document.getElementById('h-count').textContent = d.noshows_30d;
    document.getElementById('h-lost').textContent = '$' + d.revenue_lost_30d.toLocaleString();
    document.getElementById('h-repeat').textContent = d.repeat_offenders;
    const dl = document.getElementById('day-list');
    const max = Math.max(...d.by_day.map(x => x.noshow_rate_pct));
    d.by_day.forEach(x => {
      const pct = (x.noshow_rate_pct / max * 100).toFixed(1);
      const color = x.noshow_rate_pct > 12 ? 'var(--red)' : x.noshow_rate_pct > 7 ? 'var(--yellow)' : 'var(--green)';
      dl.innerHTML += '<div class="day-row"><div class="day-lbl">' + x.day + '</div><div class="day-track"><div class="day-fill" style="width:' + pct + '%;background:' + color + '"></div></div><div class="day-val" style="color:' + color + '">' + x.noshow_rate_pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
