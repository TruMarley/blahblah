<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Tags — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .tag-list { display: flex; flex-direction: column; gap: .55rem; margin-bottom: 1rem; }
    .tag-row { display: flex; align-items: center; gap: .7rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .5rem .9rem; }
    .tag-swatch { width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; border: 1px solid rgba(255,255,255,.1); }
    .tag-badge { flex: 1; font-size: .8rem; font-weight: 800; letter-spacing: .02em; }
    .tag-del { background: none; border: none; color: #444; font-size: .8rem; cursor: pointer; padding: .1rem .3rem; }
    .tag-del:hover { color: var(--red); }
    .add-row { display: flex; gap: .5rem; align-items: center; }
    .add-row input[type=text] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .8rem; padding: .42rem .75rem; outline: none; }
    .add-row input[type=text]:focus { border-color: var(--accent); }
    .add-row input[type=color] { width: 40px; height: 34px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); cursor: pointer; padding: 2px; }
    .btn-add { background: rgba(167,139,250,.15); border: 1px solid rgba(167,139,250,.3); color: var(--accent); font-size: .78rem; font-weight: 700; border-radius: 8px; padding: .42rem .85rem; cursor: pointer; white-space: nowrap; }
    .btn-add:hover { background: rgba(167,139,250,.25); }
    .save-btn { width: 100%; background: var(--accent); color: #fff; font-size: .88rem; font-weight: 800; border: none; border-radius: 10px; padding: .8rem; cursor: pointer; margin-top: 1.25rem; }
    .save-btn:hover { opacity: .88; }
    .preview-row { display: flex; flex-wrap: wrap; gap: .4rem; margin: .75rem 0 .25rem; }
    .preview-tag { display: inline-flex; align-items: center; gap: .3rem; border-radius: 20px; padding: .22rem .7rem; font-size: .72rem; font-weight: 800; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a2a1a; border: 1px solid var(--green); color: var(--green); font-size: .8rem; font-weight: 700; padding: .6rem 1.4rem; border-radius: 8px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Tags</div>
  <p class="page-sub">Create labels to segment your clients — VIP, At-Risk, New, Loyal. Tags are displayed on client profiles and used for targeted campaigns.</p>

  <div class="card">
    <div class="card-title">Tags</div>
    <div class="tag-list" id="tag-list"></div>
    <div class="add-row">
      <input type="text" id="new-name" placeholder="Tag name…" maxlength="20">
      <input type="color" id="new-color" value="#a78bfa">
      <button class="btn-add" onclick="addTag()">+ Add</button>
    </div>
    <div class="card-title" style="margin-top:1rem;margin-bottom:.4rem">Preview</div>
    <div class="preview-row" id="preview-row"></div>
    <button class="save-btn" onclick="save()">Save Tags</button>
  </div>
</div>
<div class="toast" id="toast">Saved!</div>
<script>
  let settings = { tags: [] };

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},.15)`;
  }

  function renderList() {
    document.getElementById('tag-list').innerHTML = settings.tags.map((t, i) => `
      <div class="tag-row">
        <div class="tag-swatch" style="background:${esc(t.color)}"></div>
        <span class="tag-badge" style="color:${esc(t.color)}">${esc(t.name)}</span>
        <button class="tag-del" onclick="removeTag(${i})">✕</button>
      </div>`).join('');

    document.getElementById('preview-row').innerHTML = settings.tags.map(t =>
      `<span class="preview-tag" style="background:${hexToRgb(t.color)};color:${esc(t.color)}">${esc(t.name)}</span>`
    ).join('');
  }

  function addTag() {
    const name = document.getElementById('new-name').value.trim();
    if (!name) return;
    settings.tags.push({ name, color: document.getElementById('new-color').value });
    document.getElementById('new-name').value = '';
    renderList();
  }

  function removeTag(i) { settings.tags.splice(i, 1); renderList(); }

  async function load() {
    const d = await fetch('/api/settings/client-tag-cfg').then(r => r.json());
    settings = d;
    renderList();
  }

  async function save() {
    await fetch('/api/settings/client-tag-cfg', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(settings) });
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
