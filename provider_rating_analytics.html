<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Provider Ratings — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .provider-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; margin-bottom: .5rem; }
    .prov-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .prov-name { font-size: .9rem; font-weight: 800; }
    .prov-rating { font-size: 1rem; font-weight: 900; color: var(--yellow); }
    .prov-bars { display: flex; flex-direction: column; gap: .3rem; }
    .mini-bar-row { display: flex; align-items: center; gap: .5rem; font-size: .65rem; color: var(--muted); }
    .mini-track { flex: 1; background: #1a1a1a; border-radius: 2px; height: 5px; overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 2px; }
    .mini-val { width: 36px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Provider Ratings</div>
  <p class="page-sub">Compare provider performance on client satisfaction, five-star rate, and repeat request rate. High repeat requests signal brand loyalty that justifies premium pricing.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-shop" style="color:var(--yellow)">—</div><div class="stat-lbl">Shop Avg Rating</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-reviews" style="color:var(--muted)">—</div><div class="stat-lbl">Total Reviews (30d)</div></div>
  </div>
  <div class="card">
    <div class="card-title">Provider Breakdown</div>
    <div id="provider-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/provider-rating-stats').then(r => r.json());
    document.getElementById('h-shop').textContent = d.shop_avg_rating.toFixed(2) + ' ★';
    document.getElementById('h-reviews').textContent = d.total_reviews_30d;
    const pl = document.getElementById('provider-list');
    d.providers.forEach(p => {
      pl.innerHTML += '<div class="provider-card"><div class="prov-top"><div class="prov-name">' + p.name + '</div><div class="prov-rating">' + p.avg_rating.toFixed(1) + ' ★</div></div><div class="prov-bars"><div class="mini-bar-row"><span style="width:90px">5-star rate</span><div class="mini-track"><div class="mini-fill" style="width:' + p.five_star_pct + '%;background:var(--yellow)"></div></div><div class="mini-val">' + p.five_star_pct.toFixed(0) + '%</div></div><div class="mini-bar-row"><span style="width:90px">Repeat requests</span><div class="mini-track"><div class="mini-fill" style="width:' + p.repeat_request_pct + '%;background:var(--accent)"></div></div><div class="mini-val">' + p.repeat_request_pct.toFixed(0) + '%</div></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
