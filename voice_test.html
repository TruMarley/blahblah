<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Test — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .chat-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 1rem; min-height: 380px; max-height: 560px; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: .75rem; }
    .empty-chat { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--muted); text-align: center; padding: 3rem; gap: .75rem; min-height: 280px; }
    .empty-icon { font-size: 2.5rem; opacity: .4; }
    .empty-title { font-size: .9rem; font-weight: 700; }
    .empty-sub { font-size: .78rem; opacity: .7; }
    /* Bubbles */
    .bubble-row { display: flex; }
    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.ai { justify-content: flex-start; }
    .bubble { max-width: 75%; border-radius: 14px; padding: .75rem 1rem; font-size: .85rem; line-height: 1.55; }
    .bubble-row.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .bubble-row.ai .bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
    .bubble-meta { font-size: .62rem; margin-top: .3rem; }
    .bubble-row.user .bubble-meta { text-align: right; color: rgba(255,255,255,.5); }
    .bubble-row.ai .bubble-meta { color: var(--muted); }
    .ai-label { display: flex; align-items: center; gap: .4rem; font-size: .68rem; color: var(--accent); font-weight: 700; margin-bottom: .2rem; }
    .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    /* Compose */
    .compose-wrap { display: flex; gap: .75rem; align-items: flex-end; }
    .compose-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: .88rem; padding: .75rem 1rem; border-radius: 10px; font-family: inherit; outline: none; resize: none; min-height: 52px; max-height: 120px; line-height: 1.5; }
    .compose-input:focus { border-color: var(--accent); }
    .compose-input::placeholder { color: var(--muted); }
    .send-btn { background: var(--accent); color: #fff; border: none; font-size: .85rem; font-weight: 800; padding: .75rem 1.25rem; border-radius: 10px; cursor: pointer; font-family: inherit; transition: opacity .15s; flex-shrink: 0; height: 52px; }
    .send-btn:hover:not(:disabled) { opacity: .85; }
    .send-btn:disabled { opacity: .4; cursor: default; }
    .hint { font-size: .72rem; color: var(--muted); margin-top: .6rem; text-align: center; }
    .hint kbd { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: .1rem .35rem; font-size: .65rem; }
    .typing-bubble { display: flex; gap: 4px; align-items: center; padding: .6rem .9rem; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: typing .8s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes typing { 0%,80%,100%{transform:scale(0.7);opacity:.4} 40%{transform:scale(1);opacity:1} }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/voice/settings" class="back">← Voice Settings</a>
</nav>
<div class="main">
  <div class="page-title">AI Voice Tester</div>
  <p class="page-sub">Type what a caller might say — see exactly how your AI responds.</p>

  <div class="chat-wrap" id="chat">
    <div class="empty-chat" id="empty-state">
      <div class="empty-icon">🤖</div>
      <div class="empty-title">Your AI receptionist is ready</div>
      <div class="empty-sub">Type a caller message below to test the response.</div>
    </div>
  </div>

  <div class="compose-wrap">
    <textarea class="compose-input" id="compose" placeholder="e.g. I'd like to book a haircut for Saturday..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="send-btn" onclick="send()">Send</button>
  </div>
  <div class="hint">Press <kbd>Enter</kbd> to send &middot; <kbd>Shift+Enter</kbd> for new line</div>
</div>

<script>
  const history = [];
  const MAX_HISTORY = 10;

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  async function send() {
    const input = document.getElementById('compose');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    input.style.height = '';

    // Clear empty state
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    // Add user bubble
    addBubble('user', msg, null);

    // Typing indicator
    const typingId = 'typing-' + Date.now();
    const chat = document.getElementById('chat');
    const typingRow = document.createElement('div');
    typingRow.className = 'bubble-row ai';
    typingRow.id = typingId;
    typingRow.innerHTML = '<div class="bubble"><div class="ai-label"><div class="ai-dot"></div> RingDesk AI</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    chat.appendChild(typingRow);
    chat.scrollTop = chat.scrollHeight;

    document.getElementById('send-btn').disabled = true;

    const t0 = Date.now();
    const r = await fetch('/api/voice/test', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({message: msg}) });
    const d = await r.json();
    const elapsed = Date.now() - t0;

    // Remove typing
    typingRow.remove();
    document.getElementById('send-btn').disabled = false;

    addBubble('ai', d.response, d.latency_ms || elapsed);
    history.unshift({user: msg, ai: d.response, latency: d.latency_ms || elapsed});
    if (history.length > MAX_HISTORY) history.pop();
  }

  function addBubble(role, text, latency) {
    const chat = document.getElementById('chat');
    const row = document.createElement('div');
    row.className = 'bubble-row ' + role;
    const time = new Date().toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
    if (role === 'user') {
      row.innerHTML = '<div><div class="bubble">' + esc(text) + '</div><div class="bubble-meta">' + time + '</div></div>';
    } else {
      const latencyStr = latency ? ' &middot; ' + latency + 'ms' : '';
      row.innerHTML = '<div><div class="ai-label"><div class="ai-dot"></div> RingDesk AI</div><div class="bubble">' + esc(text) + '</div><div class="bubble-meta">' + time + latencyStr + '</div></div>';
    }
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // Auto-resize textarea
  document.getElementById('compose').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
