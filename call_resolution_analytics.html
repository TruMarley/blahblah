<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Resolution — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .outcome-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .7rem; }
    .outcome-label { font-size: .78rem; color: var(--text); width: 110px; flex-shrink: 0; }
    .outcome-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .outcome-fill { height: 100%; border-radius: 4px; }
    .outcome-pct { font-size: .75rem; font-weight: 700; width: 40px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Resolution</div>
  <p class="page-sub">See how every call ends. High booking rates validate AI effectiveness; high abandonment or voicemail rates signal routing or capacity issues.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-calls" style="color:var(--accent)">—</div><div class="stat-lbl">Calls (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-res" style="color:var(--green)">—</div><div class="stat-lbl">Resolution Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-handle" style="color:var(--muted)">—</div><div class="stat-lbl">Avg Handle Time</div></div>
  </div>
  <div class="card">
    <div class="card-title">Outcome Distribution</div>
    <div id="outcome-list"></div>
  </div>
</div>
<script>
  const COLOR_MAP = {green:'var(--green)', accent:'var(--accent)', yellow:'var(--yellow)', muted:'var(--muted)', red:'var(--red)'};
  async function load() {
    const d = await fetch('/api/analytics/call-resolution-stats').then(r => r.json());
    document.getElementById('h-calls').textContent = d.calls_30d.toLocaleString();
    document.getElementById('h-res').textContent = d.resolution_rate_pct.toFixed(1) + '%';
    document.getElementById('h-handle').textContent = d.avg_handle_time_sec + 's';
    const ol = document.getElementById('outcome-list');
    const max = Math.max(...d.outcomes.map(o => o.pct));
    d.outcomes.forEach(o => {
      const w = (o.pct / max * 100).toFixed(1);
      const c = COLOR_MAP[o.color] || 'var(--muted)';
      ol.innerHTML += '<div class="outcome-row"><div class="outcome-label">' + o.label + '</div><div class="outcome-track"><div class="outcome-fill" style="width:' + w + '%;background:' + c + '"></div></div><div class="outcome-pct" style="color:' + c + '">' + o.pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
