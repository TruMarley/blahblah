<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hourly Revenue Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { display: flex; align-items: flex-end; gap: 5px; height: 120px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar-body { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; transition: opacity .2s; }
    .bar-body:hover { opacity: .75; }
    .bar-label { font-size: .55rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Hourly Revenue Rate</div>
  <p class="page-sub">See which hours of the day generate the most revenue. Use this to optimise staffing levels, opening hours, and promotional timing for low-traffic windows.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak" style="color:var(--yellow)">—</div><div class="stat-lbl">Peak Hour</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Avg / Hour</div></div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Hour of Day (avg day)</div>
    <div class="chart-wrap" id="chart"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/hourly-revenue-rate-stats').then(r => r.json());
    document.getElementById('h-total').textContent = '$' + d.total_revenue_30d.toLocaleString();
    document.getElementById('h-peak').textContent = d.peak_hour;
    document.getElementById('h-avg').textContent = '$' + d.avg_hourly_revenue.toLocaleString();
    const chart = document.getElementById('chart');
    const maxR = Math.max(...d.hours.map(h => h.revenue));
    d.hours.forEach(h => {
      const heightPct = (h.revenue / maxR * 100).toFixed(1);
      const isPeak = h.hour === d.peak_hour;
      const color = isPeak ? 'var(--yellow)' : 'var(--accent)';
      chart.innerHTML += '<div class="bar-col"><div class="bar-body" style="height:' + heightPct + '%;background:' + color + ';opacity:' + (isPeak ? 1 : 0.5) + '" title="' + h.hour + ': $' + h.revenue + '"></div><div class="bar-label">' + h.hour.replace(':00','') + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
