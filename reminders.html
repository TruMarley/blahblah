<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reminders — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    nav a.back:hover { color: var(--text); }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }

    .reminder-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .block-title { font-size: .95rem; font-weight: 800; }
    .block-sub { font-size: .75rem; color: var(--muted); margin-top: .1rem; }
    .toggle { width: 40px; height: 23px; border-radius: 99px; background: var(--border); border: none; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
    .toggle.on { background: var(--green); }
    .toggle::after { content:''; position:absolute; width:17px; height:17px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left .2s; }
    .toggle.on::after { left:20px; }

    .msg-wrap { position: relative; }
    .msg-area { width: 100%; background: #0d0d0d; border: 1px solid var(--border); color: var(--text); font-size: .85rem; padding: .7rem .9rem; border-radius: 9px; resize: vertical; min-height: 72px; font-family: inherit; outline: none; line-height: 1.6; }
    .msg-area:focus { border-color: var(--accent); }
    .msg-area:disabled { opacity: .4; }
    .char-count { font-size: .7rem; color: var(--muted); text-align: right; margin-top: .3rem; }
    .char-count.warn { color: var(--red); }

    .chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .65rem; }
    .chip { padding: .22rem .6rem; border-radius: 6px; background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.25); color: var(--accent); font-size: .72rem; font-weight: 700; cursor: pointer; transition: background .15s; }
    .chip:hover { background: rgba(167,139,250,.22); }
    .chip:disabled { opacity: .4; cursor: default; }

    .preview-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; margin-top: .85rem; }
    .preview-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .preview-text { font-size: .82rem; color: var(--text); line-height: 1.55; }
    .preview-text .var { color: var(--accent); }

    .from-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .from-label { font-size: .8rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .from-input { flex: 1; background: #0d0d0d; border: 1px solid var(--border); color: var(--text); font-size: .85rem; padding: .55rem .85rem; border-radius: 8px; outline: none; font-family: inherit; }
    .from-input:focus { border-color: var(--accent); }

    .btn { padding: .55rem 1.1rem; border-radius: 9px; font-size: .82rem; font-weight: 700; border: none; cursor: pointer; font-family: inherit; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { opacity: .85; }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { color: var(--text); }
    .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(8,8,8,.96); border-top: 1px solid var(--border); padding: 1rem 2rem; display: none; align-items: center; justify-content: flex-end; gap: .75rem; z-index: 200; }
    .save-bar.show { display: flex; }
    .save-ok { font-size: .8rem; color: var(--green); opacity: 0; transition: opacity .3s; }
    .save-ok.show { opacity: 1; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">SMS Reminders</div>
  <p class="page-sub">Configure automated appointment reminders. Variables are replaced with real client info before sending.</p>

  <div class="reminder-block">
    <div class="block-header">
      <div>
        <div class="block-title">Sender Name</div>
        <div class="block-sub">Shown as the SMS sender where supported</div>
      </div>
    </div>
    <div class="from-row">
      <label class="from-label">From name</label>
      <input class="from-input" id="sms-from" maxlength="11" placeholder="YourShop" oninput="dirty()">
    </div>
  </div>

  <div id="blocks"></div>
</div>

<div class="save-bar" id="save-bar">
  <span class="save-ok" id="save-ok">Saved!</span>
  <button class="btn btn-ghost" onclick="load()">Discard</button>
  <button class="btn btn-accent" onclick="save()">Save reminders</button>
</div>

<script>
  const REMINDERS = [
    { key: '24h', label: '24-Hour Reminder', sub: 'Sent the day before the appointment', enabledKey: 'enabled_24h', msgKey: 'message_24h' },
    { key: '2h',  label: '2-Hour Reminder',  sub: 'Sent 2 hours before the appointment', enabledKey: 'enabled_2h',  msgKey: 'message_2h'  },
    { key: '1h',  label: '1-Hour Reminder',  sub: 'Sent 1 hour before the appointment',  enabledKey: 'enabled_1h',  msgKey: 'message_1h'  },
  ];
  const VARS = ['{client_name}', '{service}', '{time}', '{date}'];
  const SAMPLE = { '{client_name}': 'Marcus', '{service}': 'Fade', '{time}': '2:00 PM', '{date}': 'Friday, Apr 18' };
  let cfg = {};

  async function load() {
    const r = await fetch('/api/reminders/config');
    cfg = await r.json();
    document.getElementById('sms-from').value = cfg.sms_from_name || '';
    renderBlocks();
    hideSave();
  }

  function renderBlocks() {
    document.getElementById('blocks').innerHTML = REMINDERS.map(rem => {
      const on = cfg[rem.enabledKey];
      const msg = cfg[rem.msgKey] || '';
      return `
      <div class="reminder-block" id="block-${rem.key}">
        <div class="block-header">
          <div>
            <div class="block-title">${rem.label}</div>
            <div class="block-sub">${rem.sub}</div>
          </div>
          <button class="toggle ${on ? 'on' : ''}" id="tog-${rem.key}" onclick="toggleReminder('${rem.key}','${rem.enabledKey}')"></button>
        </div>
        <div class="msg-wrap">
          <textarea class="msg-area" id="msg-${rem.key}" maxlength="160" ${on ? '' : 'disabled'}
            oninput="updateMsg('${rem.key}','${rem.msgKey}');updatePreview('${rem.key}');dirty()">${msg}</textarea>
          <div class="char-count" id="cc-${rem.key}">${msg.length}/160</div>
        </div>
        <div class="chips">
          ${VARS.map(v => `<button class="chip" onclick="insertVar('${rem.key}','${v}')" ${on ? '' : 'disabled'}>${v}</button>`).join('')}
        </div>
        <div class="preview-box">
          <div class="preview-label">Preview</div>
          <div class="preview-text" id="prev-${rem.key}">${renderPreview(msg)}</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderPreview(msg) {
    let s = msg;
    for (const [k, v] of Object.entries(SAMPLE)) {
      s = s.split(k).join(`<span class="var">${v}</span>`);
    }
    return s || '<span style="color:var(--muted)">No message set.</span>';
  }

  function updatePreview(key) {
    const rem = REMINDERS.find(r => r.key === key);
    const msg = document.getElementById(`msg-${key}`).value;
    document.getElementById(`prev-${key}`).innerHTML = renderPreview(msg);
    const cc = document.getElementById(`cc-${key}`);
    cc.textContent = `${msg.length}/160`;
    cc.classList.toggle('warn', msg.length > 140);
  }

  function updateMsg(key, msgKey) {
    cfg[msgKey] = document.getElementById(`msg-${key}`).value;
  }

  function toggleReminder(key, enabledKey) {
    cfg[enabledKey] = !cfg[enabledKey];
    const on = cfg[enabledKey];
    document.getElementById(`tog-${key}`).classList.toggle('on', on);
    document.getElementById(`msg-${key}`).disabled = !on;
    document.querySelectorAll(`#block-${key} .chip`).forEach(c => c.disabled = !on);
    dirty();
  }

  function insertVar(key, variable) {
    const ta = document.getElementById(`msg-${key}`);
    const start = ta.selectionStart, end = ta.selectionEnd;
    const val = ta.value;
    ta.value = val.slice(0, start) + variable + val.slice(end);
    ta.selectionStart = ta.selectionEnd = start + variable.length;
    ta.focus();
    const rem = REMINDERS.find(r => r.key === key);
    cfg[rem.msgKey] = ta.value;
    updatePreview(key);
    dirty();
  }

  async function save() {
    cfg.sms_from_name = document.getElementById('sms-from').value.trim();
    await fetch('/api/reminders/config', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(cfg) });
    const ok = document.getElementById('save-ok');
    ok.classList.add('show');
    setTimeout(() => ok.classList.remove('show'), 2000);
    hideSave();
  }

  function dirty() { document.getElementById('save-bar').classList.add('show'); }
  function hideSave() { document.getElementById('save-bar').classList.remove('show'); }

  load();
</script>
</body>
</html>
