<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gift Cards — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .new-btn { background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.3); color: var(--accent); font-size: .8rem; font-weight: 700; padding: .45rem 1rem; border-radius: 9px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .new-btn:hover { background: rgba(167,139,250,.18); }
    /* Summary strip */
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1.5rem; }
    .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
    .sum-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .3rem; }
    .sum-val { font-size: 1.5rem; font-weight: 900; }
    /* Inline form */
    .new-form { background: var(--surface); border: 1px solid rgba(167,139,250,.2); border-radius: 14px; padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
    .new-form.open { display: block; }
    .form-title { font-size: .85rem; font-weight: 800; color: var(--accent); margin-bottom: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }
    .form-group { display: flex; flex-direction: column; gap: .3rem; }
    label { font-size: .72rem; color: var(--muted); font-weight: 700; }
    input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: .82rem; font-family: inherit; padding: .5rem .75rem; border-radius: 8px; outline: none; transition: border-color .15s; }
    input:focus { border-color: rgba(167,139,250,.5); }
    .form-actions { display: flex; gap: .75rem; margin-top: .25rem; }
    .btn-save { background: var(--accent); border: none; color: #000; font-size: .8rem; font-weight: 900; padding: .5rem 1.25rem; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: .8rem; font-weight: 700; padding: .5rem 1rem; border-radius: 8px; cursor: pointer; font-family: inherit; }
    /* Cards grid */
    .gc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .gc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; }
    .gc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
    .gc-code { font-size: .7rem; font-weight: 900; font-family: 'Courier New', monospace; background: var(--surface2); border: 1px solid var(--border); padding: .2rem .55rem; border-radius: 6px; color: var(--accent); letter-spacing: .08em; }
    .gc-status { font-size: .65rem; font-weight: 800; padding: .15rem .5rem; border-radius: 99px; }
    .s-active   { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .s-used     { background: rgba(102,102,102,.1); color: var(--muted); border: 1px solid rgba(102,102,102,.2); }
    .s-expired  { background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
    .gc-names { font-size: .78rem; color: var(--muted); margin-bottom: .85rem; }
    .gc-names strong { color: var(--text); }
    .balance-track { background: var(--surface2); border-radius: 6px; height: 6px; overflow: hidden; margin-bottom: .4rem; }
    .balance-fill { height: 100%; border-radius: 6px; background: var(--accent); }
    .balance-label { display: flex; justify-content: space-between; font-size: .7rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-header">
    <div class="page-title">Gift Cards</div>
    <button class="new-btn" onclick="toggleForm()">+ New Gift Card</button>
  </div>

  <div class="new-form" id="new-form">
    <div class="form-title">Issue Gift Card</div>
    <div class="form-row">
      <div class="form-group"><label>Purchaser Name</label><input id="f-purchaser" placeholder="Linda M." /></div>
      <div class="form-group"><label>Recipient Name</label><input id="f-recipient" placeholder="Mom" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Amount ($)</label><input id="f-amount" type="number" min="5" step="5" placeholder="50" /></div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="createCard()">Issue Card</button>
      <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
    </div>
  </div>

  <div class="summary" id="summary"></div>
  <div class="gc-grid" id="gc-grid"></div>
</div>
<script>
  let cards = [];

  async function load() {
    const r = await fetch('/api/gift-cards');
    const d = await r.json();
    cards = d.gift_cards || [];
    render();
  }

  function render() {
    const active = cards.filter(c => c.status === 'active');
    const totalVal = cards.reduce((s,c) => s + c.initial_value, 0);
    const avgRem = active.length ? Math.round(active.reduce((s,c) => s + c.remaining_value, 0) / active.length) : 0;

    document.getElementById('summary').innerHTML = [
      { label: 'Total Issued', val: cards.length, color: 'var(--text)' },
      { label: 'Total Value', val: '$' + totalVal, color: 'var(--accent)' },
      { label: 'Avg Remaining', val: '$' + avgRem, color: 'var(--green)' },
    ].map(c => `<div class="sum-card"><div class="sum-label">${c.label}</div><div class="sum-val" style="color:${c.color}">${c.val}</div></div>`).join('');

    document.getElementById('gc-grid').innerHTML = cards.map(c => {
      const pct = c.initial_value > 0 ? Math.round(c.remaining_value / c.initial_value * 100) : 0;
      return `<div class="gc-card">
        <div class="gc-top">
          <span class="gc-code">${esc(c.code)}</span>
          <span class="gc-status s-${c.status}">${c.status}</span>
        </div>
        <div class="gc-names">From <strong>${esc(c.purchaser_name)}</strong> → <strong>${esc(c.recipient_name)}</strong></div>
        <div class="balance-track"><div class="balance-fill" style="width:${pct}%"></div></div>
        <div class="balance-label"><span>$${c.remaining_value} remaining</span><span>of $${c.initial_value}</span></div>
      </div>`;
    }).join('');
  }

  function toggleForm() {
    document.getElementById('new-form').classList.toggle('open');
  }

  async function createCard() {
    const purchaser_name = document.getElementById('f-purchaser').value.trim();
    const recipient_name = document.getElementById('f-recipient').value.trim();
    const initial_value = parseFloat(document.getElementById('f-amount').value) || 50;
    if (!purchaser_name) return;
    await fetch('/api/gift-cards', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({purchaser_name, recipient_name, initial_value}) });
    document.getElementById('f-purchaser').value = '';
    document.getElementById('f-recipient').value = '';
    document.getElementById('f-amount').value = '';
    document.getElementById('new-form').classList.remove('open');
    load();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
