<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New vs Returning — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .month-row { display: grid; grid-template-columns: 36px 1fr 1fr; gap: .75rem; align-items: center; margin-bottom: .65rem; }
    .month-lbl { font-size: .78rem; color: var(--muted); }
    .split-bar { display: flex; flex-direction: column; gap: .18rem; }
    .bar-label { font-size: .6rem; color: var(--muted); }
    .bar-wrap { background: var(--surface2); border-radius: 3px; height: 6px; overflow: hidden; }
    .bar-new  { height: 100%; border-radius: 3px; background: var(--green); }
    .bar-ret  { height: 100%; border-radius: 3px; background: var(--accent); }
    .split-pct { font-size: .72rem; font-weight: 800; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">New vs Returning</div>
  <p class="page-sub">Track the balance between new and returning clients over time. A healthy mix is 25-35% new — enough growth without over-relying on acquisition at the expense of retention.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-new-pct" style="color:var(--green)">—</div><div class="stat-lbl">New % (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ret-pct" style="color:var(--accent)">—</div><div class="stat-lbl">Returning % (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-new-n" style="color:var(--green)">—</div><div class="stat-lbl">New Clients</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ret-n" style="color:var(--accent)">—</div><div class="stat-lbl">Returning Clients</div></div>
  </div>
  <div class="card">
    <div class="card-title">Monthly Mix</div>
    <div id="month-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/new-client-ratio-stats').then(r => r.json());
    document.getElementById('h-new-pct').textContent = d.new_pct_30d.toFixed(1) + '%';
    document.getElementById('h-ret-pct').textContent = d.returning_pct_30d.toFixed(1) + '%';
    document.getElementById('h-new-n').textContent = d.new_clients_30d;
    document.getElementById('h-ret-n').textContent = d.returning_clients_30d;
    const ml = document.getElementById('month-list');
    d.months.forEach(m => {
      ml.innerHTML += '<div class="month-row"><div class="month-lbl">' + m.month + '</div><div class="split-bar"><div class="bar-label">New <span style="color:var(--green);font-weight:700">' + m.new_pct.toFixed(1) + '%</span></div><div class="bar-wrap"><div class="bar-new" style="width:' + m.new_pct + '%"></div></div></div><div class="split-bar"><div class="bar-label">Returning <span style="color:var(--accent);font-weight:700">' + m.returning_pct.toFixed(1) + '%</span></div><div class="bar-wrap"><div class="bar-ret" style="width:' + m.returning_pct + '%"></div></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
