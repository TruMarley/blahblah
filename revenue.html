<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    nav a.back:hover { color: var(--text); }

    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }

    .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1.75rem; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
    .kpi-label { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .35rem; }
    .kpi-val { font-size: 1.75rem; font-weight: 900; letter-spacing: -.04em; }
    .kpi-val.green { color: var(--green); }
    .kpi-sub { font-size: .72rem; color: var(--muted); margin-top: .2rem; }

    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; overflow: hidden; }
    .chart-title { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { width: 100%; overflow-x: auto; }
    svg.chart { display: block; width: 100%; min-width: 600px; }

    /* Tooltip */
    .tooltip { position: fixed; background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px; padding: .5rem .75rem; font-size: .78rem; pointer-events: none; z-index: 999; display: none; white-space: nowrap; }
    .tooltip strong { color: var(--accent); display: block; margin-bottom: .1rem; }

    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .65rem 1.25rem; border-bottom: 1px solid var(--border); text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .65rem 1.25rem; font-size: .82rem; }
    .pos { color: var(--green); }
    @media (max-width: 600px) { .kpi-row { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue Trends</div>
  <p class="page-sub">Last 30 days — estimated from bookings × avg ticket price.</p>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">30-Day Revenue</div><div class="kpi-val green" id="k-total">—</div><div class="kpi-sub" id="k-sub1">loading...</div></div>
    <div class="kpi"><div class="kpi-label">Daily Average</div><div class="kpi-val" id="k-avg">—</div><div class="kpi-sub">per day</div></div>
    <div class="kpi"><div class="kpi-label">Best Day</div><div class="kpi-val" id="k-best">—</div><div class="kpi-sub" id="k-best-date">—</div></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Daily Revenue — Last 30 Days</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 900 220" preserveAspectRatio="none"></svg>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead><tr><th>Date</th><th>Bookings</th><th>Revenue</th></tr></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
</div>
<div class="tooltip" id="tip"></div>

<script>
  const PAD = { t: 16, r: 20, b: 36, l: 56 };
  const W = 900, H = 220;
  const CW = W - PAD.l - PAD.r;
  const CH = H - PAD.t - PAD.b;

  async function load() {
    const r = await fetch('/api/revenue/daily');
    const d = await r.json();
    const days = d.days || [];

    const total = days.reduce((s, d) => s + d.amount, 0);
    const avg   = Math.round(total / days.length);
    const best  = days.reduce((m, d) => d.amount > m.amount ? d : m, days[0]);

    document.getElementById('k-total').textContent = '$' + total.toLocaleString();
    document.getElementById('k-sub1').textContent  = days.length + ' days tracked';
    document.getElementById('k-avg').textContent   = '$' + avg.toLocaleString();
    document.getElementById('k-best').textContent  = '$' + best.amount.toLocaleString();
    document.getElementById('k-best-date').textContent = fmtDate(best.date);

    drawChart(days);
    drawTable(days);
  }

  function drawChart(days) {
    const amounts = days.map(d => d.amount);
    const maxA = Math.max(...amounts, 1);
    const minA = 0;

    const xStep = CW / (days.length - 1);
    const yScale = val => CH - ((val - minA) / (maxA - minA)) * CH;

    const pts = days.map((d, i) => {
      const x = PAD.l + i * xStep;
      const y = PAD.t + yScale(d.amount);
      return { x, y, d };
    });

    // Y axis gridlines
    let svg = '';
    const yTicks = [0, 0.25, 0.5, 0.75, 1.0];
    yTicks.forEach(t => {
      const y = PAD.t + CH - t * CH;
      const val = Math.round(minA + t * (maxA - minA));
      svg += `<line x1="${PAD.l}" y1="${y}" x2="${W - PAD.r}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg += `<text x="${PAD.l - 6}" y="${y + 4}" text-anchor="end" font-size="10" fill="#555">$${val >= 1000 ? (val/1000).toFixed(1)+'k' : val}</text>`;
    });

    // Area fill
    const ptsStr = pts.map(p => `${p.x},${p.y}`).join(' ');
    const areaStr = `${pts[0].x},${PAD.t + CH} ${ptsStr} ${pts[pts.length-1].x},${PAD.t + CH}`;
    svg += `<defs>
      <linearGradient id="agrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
      </linearGradient>
    </defs>`;
    svg += `<polygon points="${areaStr}" fill="url(#agrad)"/>`;

    // Line
    svg += `<polyline points="${ptsStr}" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;

    // X axis labels — every 5 days
    days.forEach((d, i) => {
      if (i % 5 === 0 || i === days.length - 1) {
        const x = PAD.l + i * xStep;
        const label = new Date(d.date + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
        svg += `<text x="${x}" y="${H - 6}" text-anchor="middle" font-size="10" fill="#555">${label}</text>`;
      }
    });

    // Hit dots (invisible, for hover)
    pts.forEach((p, i) => {
      svg += `<circle cx="${p.x}" cy="${p.y}" r="14" fill="transparent" data-i="${i}" class="hit"/>`;
      svg += `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#a78bfa" pointer-events="none" class="dot dot-${i}" style="opacity:${amounts[i]>0?1:0.3}"/>`;
    });

    document.getElementById('chart').innerHTML = svg;

    // Hover tooltip
    const tip = document.getElementById('tip');
    document.querySelectorAll('.hit').forEach(el => {
      el.addEventListener('mousemove', e => {
        const i = +el.dataset.i;
        const p = pts[i];
        tip.style.display = 'block';
        tip.style.left = (e.clientX + 12) + 'px';
        tip.style.top  = (e.clientY - 36) + 'px';
        tip.innerHTML  = `<strong>$${days[i].amount.toLocaleString()}</strong>${fmtDate(days[i].date)}<br>${days[i].bookings} bookings`;
      });
      el.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });
  }

  function drawTable(days) {
    const sorted = [...days].sort((a,b) => b.amount - a.amount).slice(0, 10);
    document.getElementById('tbl-body').innerHTML = sorted.map(d => `
      <tr>
        <td>${fmtDate(d.date)}</td>
        <td>${d.bookings}</td>
        <td class="pos">$${d.amount.toLocaleString()}</td>
      </tr>`).join('');
  }

  function fmtDate(iso) {
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  }

  load();
</script>
</body>
</html>
