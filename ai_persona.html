<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Persona — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.4rem; }
    .field-group { margin-bottom: 1.1rem; }
    .field-label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem; display: block; }
    .f-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .85rem; padding: .5rem .75rem; font-family: inherit; width: 100%; outline: none; }
    .f-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .85rem; padding: .5rem .75rem; font-family: inherit; width: 100%; outline: none; cursor: pointer; }
    .f-textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .85rem; padding: .55rem .75rem; font-family: inherit; width: 100%; outline: none; resize: vertical; min-height: 72px; line-height: 1.5; }
    .traits-wrap { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem; }
    .trait-chip { background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.3); border-radius: 8px; padding: .25rem .6rem; font-size: .78rem; font-weight: 700; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: .35rem; }
    .trait-chip .rm { opacity: .5; font-size: .7rem; }
    .trait-chip:hover .rm { opacity: 1; }
    .add-trait-row { display: flex; gap: .5rem; margin-top: .5rem; }
    .add-trait-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .82rem; padding: .4rem .65rem; font-family: inherit; flex: 1; outline: none; }
    .add-trait-btn { font-size: .78rem; font-weight: 800; padding: .4rem .9rem; border-radius: 7px; border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.1); color: var(--accent); cursor: pointer; font-family: inherit; }
    .preview-box { background: var(--surface2); border: 1px solid rgba(167,139,250,.2); border-radius: 10px; padding: .9rem 1rem; margin-top: 1.2rem; }
    .preview-label { font-size: .65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .preview-text { font-size: .84rem; color: var(--accent); font-style: italic; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }
    .save-row { display: flex; align-items: center; gap: 1rem; margin-top: 1.4rem; }
    .save-btn { font-size: .82rem; font-weight: 800; padding: .55rem 1.5rem; border-radius: 9px; border: 1px solid rgba(52,211,153,.4); background: rgba(52,211,153,.1); color: var(--green); cursor: pointer; font-family: inherit; }
    .save-btn:hover { background: rgba(52,211,153,.2); }
    .saved-msg { font-size: .78rem; color: var(--green); font-weight: 700; opacity: 0; transition: opacity .3s; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">AI Persona</div>
  <p class="page-sub">Give your AI receptionist a name and personality — make it feel like a natural extension of your shop's culture.</p>
  <div class="card">
    <div class="card-title">Persona Configuration</div>
    <div class="field-group">
      <label class="field-label" for="pname">AI Name</label>
      <input class="f-input" type="text" id="pname" placeholder="Alex">
    </div>
    <div class="field-group">
      <label class="field-label" for="voice">Voice Gender</label>
      <select class="f-select" id="voice">
        <option value="neutral">Neutral</option>
        <option value="female">Female</option>
        <option value="male">Male</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label" for="tagline">Tagline</label>
      <input class="f-input" type="text" id="tagline" placeholder="Your shop, always answered.">
    </div>
    <hr class="divider">
    <div class="field-group">
      <label class="field-label">Personality Traits</label>
      <div class="traits-wrap" id="traits-wrap"></div>
      <div class="add-trait-row">
        <input class="add-trait-input" type="text" id="new-trait" placeholder="Add trait (e.g. friendly)">
        <button class="add-trait-btn" onclick="addTrait()">Add</button>
      </div>
    </div>
    <hr class="divider">
    <div class="field-group">
      <label class="field-label" for="backstory">Backstory</label>
      <textarea class="f-textarea" id="backstory" placeholder="Tell us about your AI..."></textarea>
    </div>
    <div class="preview-box">
      <div class="preview-label">Preview — How AI introduces itself</div>
      <div class="preview-text" id="preview-text">Loading...</div>
    </div>
    <div class="save-row">
      <button class="save-btn" onclick="save()">Save Persona</button>
      <span class="saved-msg" id="saved-msg">✓ Saved</span>
    </div>
  </div>
</div>
<script>
  let config = {};
  async function load() {
    const r = await fetch('/api/ai-persona');
    config = await r.json();
    document.getElementById('pname').value = config.name || '';
    document.getElementById('voice').value = config.gender_voice || 'neutral';
    document.getElementById('tagline').value = config.tagline || '';
    document.getElementById('backstory').value = config.backstory || '';
    renderTraits();
    updatePreview();
  }
  function renderTraits() {
    document.getElementById('traits-wrap').innerHTML = (config.personality_traits || []).map(t =>
      `<div class="trait-chip" onclick="removeTrait('${esc(t)}')">${esc(t)} <span class="rm">✕</span></div>`
    ).join('');
  }
  function addTrait() {
    const inp = document.getElementById('new-trait');
    const val = inp.value.trim();
    if (!val) return;
    if (!config.personality_traits) config.personality_traits = [];
    if (!config.personality_traits.includes(val)) config.personality_traits.push(val);
    inp.value = '';
    renderTraits();
  }
  function removeTrait(t) {
    config.personality_traits = (config.personality_traits || []).filter(x => x !== t);
    renderTraits();
  }
  function updatePreview() {
    const name = document.getElementById('pname')?.value || config.name || 'Alex';
    document.getElementById('preview-text').textContent = `"Hi, this is ${name} — how can I help you today?"`;
  }
  document.addEventListener('input', updatePreview);
  async function save() {
    config.name = document.getElementById('pname').value;
    config.gender_voice = document.getElementById('voice').value;
    config.tagline = document.getElementById('tagline').value;
    config.backstory = document.getElementById('backstory').value;
    await fetch('/api/ai-persona', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config)});
    const msg = document.getElementById('saved-msg');
    msg.style.opacity = '1';
    setTimeout(() => { msg.style.opacity = '0'; }, 2000);
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  load();
</script>
</body>
</html>
