<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop Score — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --orange: #fb923c; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }

    .score-hero { display: flex; align-items: center; justify-content: center; gap: 3rem; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem 2.5rem; margin-bottom: 2rem; }
    .ring-wrap { position: relative; width: 160px; height: 160px; flex-shrink: 0; }
    .ring-wrap svg { width: 160px; height: 160px; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 12; }
    .ring-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset .8s ease; }
    .ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-score { font-size: 2.6rem; font-weight: 900; letter-spacing: -.05em; }
    .ring-grade { font-size: 1rem; font-weight: 800; margin-top: -.2rem; }
    .score-meta { flex: 1; min-width: 200px; }
    .score-meta-title { font-size: 1.1rem; font-weight: 900; margin-bottom: .3rem; }
    .score-meta-desc { font-size: .82rem; color: var(--muted); line-height: 1.6; }

    .breakdown-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 1.25rem; }
    .score-row { display: flex; align-items: center; gap: 1rem; margin-bottom: .9rem; }
    .score-row:last-child { margin-bottom: 0; }
    .score-label { font-size: .82rem; font-weight: 600; width: 190px; flex-shrink: 0; }
    .score-bar-wrap { flex: 1; background: var(--surface2); border-radius: 99px; height: 8px; overflow: hidden; }
    .score-bar { height: 8px; border-radius: 99px; transition: width .7s ease; }
    .score-num { font-size: .82rem; font-weight: 800; width: 38px; text-align: right; flex-shrink: 0; }

    .tips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: .85rem; }
    .tip-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; display: flex; gap: .75rem; }
    .tip-icon { font-size: 1.3rem; flex-shrink: 0; }
    .tip-text { font-size: .8rem; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Shop Health Score</div>
  <p class="page-sub">A composite score across call answering, bookings, retention, reviews, and response time.</p>

  <div class="score-hero">
    <div class="ring-wrap">
      <svg viewBox="0 0 160 160">
        <circle class="ring-bg" cx="80" cy="80" r="66"/>
        <circle class="ring-fill" id="ring-fill" cx="80" cy="80" r="66"/>
      </svg>
      <div class="ring-label">
        <div class="ring-score" id="ring-score">—</div>
        <div class="ring-grade" id="ring-grade"></div>
      </div>
    </div>
    <div class="score-meta">
      <div class="score-meta-title" id="grade-title">Loading…</div>
      <div class="score-meta-desc" id="grade-desc"></div>
    </div>
  </div>

  <div class="breakdown-card">
    <div class="card-title">Score Breakdown</div>
    <div id="breakdown"></div>
  </div>

  <div class="card-title" style="margin-bottom:.75rem">💡 Improvement Tips</div>
  <div class="tips-grid" id="tips-grid"></div>
</div>
<script>
  const LABELS = {
    call_answer_rate: 'Call Answer Rate',
    booking_conversion: 'Booking Conversion',
    retention_score: 'Retention Score',
    review_average: 'Review Average',
    response_time_score: 'Response Time',
  };

  function gradeColor(g) {
    return g === 'A' ? '#34d399' : g === 'B' ? '#fbbf24' : g === 'C' ? '#fb923c' : '#f87171';
  }
  function gradeTitle(g, s) {
    if (g === 'A') return `Excellent — ${s}/100`;
    if (g === 'B') return `Good — ${s}/100`;
    if (g === 'C') return `Needs Work — ${s}/100`;
    return `Critical — ${s}/100`;
  }
  function gradeDesc(g) {
    if (g === 'A') return 'Your shop is performing at the top of its class. Keep your systems running and watch your retention compound.';
    if (g === 'B') return 'Solid performance across most categories. A few targeted improvements can push you into the A tier this month.';
    if (g === 'C') return 'There are meaningful gaps in how your shop handles calls and retains clients. The tips below are your fastest path forward.';
    return 'Several key metrics are below healthy thresholds. Prioritize the tips below before issues compound.';
  }

  async function load() {
    const r = await fetch('/api/shop-score');
    const d = await r.json();
    const color = gradeColor(d.grade);
    const CIRC = 2 * Math.PI * 66;

    document.getElementById('ring-score').textContent = d.overall;
    document.getElementById('ring-score').style.color = color;
    document.getElementById('ring-grade').textContent = 'Grade ' + d.grade;
    document.getElementById('ring-grade').style.color = color;
    const fill = document.getElementById('ring-fill');
    fill.style.stroke = color;
    fill.style.strokeDasharray = CIRC;
    fill.style.strokeDashoffset = CIRC * (1 - d.overall / 100);

    document.getElementById('grade-title').textContent = gradeTitle(d.grade, d.overall);
    document.getElementById('grade-desc').textContent = gradeDesc(d.grade);

    document.getElementById('breakdown').innerHTML = Object.entries(d.breakdown).map(([k, v]) => {
      const c = v >= 85 ? '#34d399' : v >= 70 ? '#fbbf24' : '#f87171';
      return `<div class="score-row">
        <div class="score-label">${LABELS[k] || k}</div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${v}%;background:${c}"></div></div>
        <div class="score-num" style="color:${c}">${v}</div>
      </div>`;
    }).join('');

    document.getElementById('tips-grid').innerHTML = (d.tips || []).map(t =>
      `<div class="tip-card"><span class="tip-icon">💡</span><div class="tip-text">${esc(t)}</div></div>`
    ).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
