<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Modification Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .month-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .65rem; }
    .month-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .month-label { font-size: .9rem; font-weight: 800; }
    .month-right { text-align: right; }
    .month-rate { font-size: 1.05rem; font-weight: 900; color: var(--accent); }
    .month-meta { font-size: .7rem; color: var(--muted); }
    .bar-bg { width: 100%; height: 7px; background: var(--border); border-radius: 4px; }
    .bar-fill { height: 7px; border-radius: 4px; background: var(--accent); }
    .reason-badge { font-size: .62rem; font-weight: 800; padding: .08rem .32rem; border-radius: 4px; background: rgba(167,139,250,.12); color: var(--accent); margin-top: .3rem; display: inline-block; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Booking Modification Rate</div>
  <p class="page-sub">How often clients change their booking after it's created — rising rates may indicate scheduling friction or unclear AI confirmations.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Modification Rate</div>
      <div class="hero-val" id="h-avg" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Modified</div>
      <div class="hero-val" id="h-total" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Reason</div>
      <div class="hero-val" id="h-reason" style="color:var(--green); font-size:1rem">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Modifications by Month</div>
    <div id="month-list"></div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/booking-modification-rate');
    const d = await r.json();
    const months = d.months || [];
    const avg = (months.reduce((s,m)=>s+m.modification_rate_pct,0)/months.length).toFixed(1);
    const totalMod = months.reduce((s,m)=>s+m.modified_bookings,0);
    // find most common reason
    const reasonCounts = {};
    months.forEach(m=>{ reasonCounts[m.common_reason]=(reasonCounts[m.common_reason]||0)+1; });
    const topReason = Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—';
    document.getElementById('h-avg').textContent = avg + '%';
    document.getElementById('h-total').textContent = totalMod;
    document.getElementById('h-reason').textContent = topReason;
    const maxRate = Math.max(...months.map(m=>m.modification_rate_pct));
    const list = document.getElementById('month-list');
    months.forEach(m => {
      const pct = (m.modification_rate_pct / maxRate * 100).toFixed(0);
      list.innerHTML += `
        <div class="month-row">
          <div class="month-top">
            <div>
              <div class="month-label">${esc(m.month)}</div>
              <div class="month-meta">${m.modified_bookings} modified / ${m.total_bookings} total</div>
              <span class="reason-badge">${esc(m.common_reason)}</span>
            </div>
            <div class="month-right">
              <div class="month-rate">${m.modification_rate_pct}%</div>
            </div>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
