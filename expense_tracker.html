<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Tracker — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .total-label { font-size: .78rem; color: var(--muted); }
    .total-val { font-size: 1.1rem; font-weight: 900; color: var(--red); }
    .add-btn { font-size: .8rem; font-weight: 800; padding: .45rem 1.1rem; border-radius: 8px; border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.1); color: var(--accent); cursor: pointer; font-family: inherit; }
    .add-btn:hover { background: rgba(167,139,250,.2); }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    td { font-size: .84rem; padding: .7rem 1rem; border-bottom: 1px solid rgba(30,30,30,.6); }
    tr:last-child td { border-bottom: none; }
    .cat-badge { font-size: .65rem; font-weight: 800; padding: .15rem .45rem; border-radius: 5px; background: rgba(167,139,250,.12); color: var(--accent); }
    .del-btn { font-size: .62rem; font-weight: 800; padding: .15rem .42rem; border-radius: 5px; border: 1px solid rgba(248,113,113,.3); background: rgba(248,113,113,.07); color: var(--red); cursor: pointer; font-family: inherit; }
    .del-btn:hover { background: rgba(248,113,113,.18); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Expense Tracker</div>
  <p class="page-sub">Log and track business expenses — supplies, rent, marketing, and more.</p>
  <div class="top-bar">
    <div><span class="total-label">Total Logged: </span><span class="total-val" id="total-val">—</span></div>
    <button class="add-btn" onclick="showAdd()">+ Add Expense</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Description</th><th>Category</th><th>Amount</th><th>Date</th><th></th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script>
  let data = {expenses:[], total:0};
  async function load() {
    const r = await fetch('/api/expense-tracker');
    data = await r.json();
    render();
  }
  function render() {
    document.getElementById('total-val').textContent = '$' + (data.total||0).toFixed(2);
    document.getElementById('tbody').innerHTML = (data.expenses||[]).map(e => `
      <tr>
        <td style="font-weight:700">${esc(e.description||'—')}</td>
        <td><span class="cat-badge">${esc(e.category||'—')}</span></td>
        <td style="color:var(--red);font-weight:800">$${parseFloat(e.amount||0).toFixed(2)}</td>
        <td style="color:var(--muted);font-size:.78rem">${esc(e.date||'—')}</td>
        <td><button class="del-btn" onclick="del('${e.expense_id}')">Remove</button></td>
      </tr>`).join('');
  }
  async function del(id) {
    await fetch(`/api/expense-tracker/${id}`, {method:'DELETE'});
    load();
  }
  function showAdd() {
    const desc = prompt('Description:');
    if (!desc) return;
    const cat = prompt('Category (Supplies/Rent/Marketing/Equipment/Utilities):', 'Supplies');
    const amount = parseFloat(prompt('Amount ($):', '50')) || 50;
    const date = prompt('Date (YYYY-MM-DD):', new Date().toISOString().slice(0,10));
    fetch('/api/expense-tracker', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({description: desc, category: cat||'Supplies', amount, date: date||new Date().toISOString().slice(0,10)})
    }).then(() => load());
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
