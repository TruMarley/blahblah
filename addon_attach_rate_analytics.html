<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add-On Attach Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .addon-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .8rem; }
    .addon-label { font-size: .78rem; color: var(--text); width: 130px; flex-shrink: 0; }
    .addon-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .addon-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .addon-rate { font-size: .75rem; font-weight: 700; color: var(--accent); width: 42px; text-align: right; }
    .addon-rev { font-size: .68rem; color: var(--green); width: 52px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Add-On Attach Rate</div>
  <p class="page-sub">See how often clients book add-on services and how much extra revenue each generates. The AI actively upsells these during appointment booking calls.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-overall" style="color:var(--accent)">—</div><div class="stat-lbl">Overall Attach Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rev" style="color:var(--green)">—</div><div class="stat-lbl">Add-On Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ai" style="color:var(--yellow)">—</div><div class="stat-lbl">AI Upsell Share</div></div>
  </div>
  <div class="card">
    <div class="card-title">Add-On Breakdown</div>
    <div id="addon-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/addon-attach-rate-stats').then(r => r.json());
    document.getElementById('h-overall').textContent = d.overall_attach_rate.toFixed(1) + '%';
    document.getElementById('h-rev').textContent = '$' + d.addon_revenue_30d.toLocaleString();
    document.getElementById('h-ai').textContent = d.ai_upsell_contribution_pct.toFixed(1) + '%';
    const al = document.getElementById('addon-list');
    const maxRate = Math.max(...d.addons.map(a => a.attach_rate));
    d.addons.forEach(a => {
      const w = (a.attach_rate / maxRate * 100).toFixed(1);
      al.innerHTML += '<div class="addon-row"><div class="addon-label">' + a.name + '</div><div class="addon-track"><div class="addon-fill" style="width:' + w + '%"></div></div><div class="addon-rate">' + a.attach_rate.toFixed(1) + '%</div><div class="addon-rev">$' + a.revenue_30d + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
