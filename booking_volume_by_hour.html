<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Volume by Hour — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 240px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Booking Volume by Hour</div>
  <p class="page-sub">When clients are booking throughout the day — identify rush hours to staff up and quiet hours to push promos.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Peak Hour</div>
      <div class="hero-val" id="h-peak" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Peak Bookings</div>
      <div class="hero-val" id="h-count" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Avg Bookings per Hour</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 240" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/booking-volume-by-hour');
    const d = await r.json();
    document.getElementById('h-peak').textContent = d.peak_hour || '—';
    document.getElementById('h-count').textContent = (d.peak_count || 0) + ' bookings';

    const hours = d.hours || [];
    const svg = document.getElementById('chart');
    const W=700, H=240, pL=36, pR=16, pT=14, pB=34;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=hours.length;
    const barW=cW/n*0.62;
    const xStep=cW/n;
    const maxV=Math.max(...hours.map(h=>h.booking_count))*1.18;
    const yOf=v=>pT+cH-v/maxV*cH;

    [5,10,15,20].filter(v=>v<maxV).forEach(v=>{
      const y=yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8.5" fill="#555" text-anchor="end">${v}</text>`;
    });

    hours.forEach((h,i)=>{
      const cx=pL+i*xStep+xStep/2;
      const bh=cH*h.booking_count/maxV;
      const by=pT+cH-bh;
      const isPeak=h.hour===d.peak_hour;
      const fill=isPeak?'rgba(52,211,153,.9)':'rgba(167,139,250,.45)';
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${by}" width="${barW}" height="${bh}" rx="4" fill="${fill}"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${by-5}" font-size="8.5" fill="${isPeak?'rgba(52,211,153,.9)':'#555'}" text-anchor="middle" font-weight="${isPeak?'800':'400'}">${h.booking_count}</text>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="8.5" fill="${isPeak?'#bbb':'#555'}" text-anchor="middle" font-weight="${isPeak?'700':'400'}">${esc(h.hour)}</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
