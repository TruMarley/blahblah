<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Intake Forms — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .q-row { display: flex; align-items: center; gap: .75rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }
    .q-row:last-child { border-bottom: none; padding-bottom: 0; }
    .q-num { font-size: .72rem; font-weight: 900; color: var(--muted); width: 22px; flex-shrink: 0; text-align: right; }
    .q-text { flex: 1; font-size: .84rem; font-weight: 600; }
    .type-badge { font-size: .62rem; font-weight: 800; padding: .15rem .45rem; border-radius: 5px; flex-shrink: 0; }
    .t-text     { background: rgba(96,165,250,.1); color: #60a5fa; border: 1px solid rgba(96,165,250,.25); }
    .t-yesno    { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
    .t-choice   { background: rgba(167,139,250,.1); color: var(--accent); border: 1px solid rgba(167,139,250,.25); }
    .req-badge  { font-size: .6rem; font-weight: 800; padding: .12rem .4rem; border-radius: 5px; background: rgba(251,191,36,.08); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); flex-shrink: 0; }
    .del-btn { background: none; border: none; cursor: pointer; font-size: .85rem; color: var(--red); padding: .2rem .35rem; border-radius: 5px; flex-shrink: 0; }
    .del-btn:hover { background: rgba(248,113,113,.1); }
    .add-form { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
    .add-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .83rem; padding: .45rem .75rem; font-family: inherit; }
    .add-input.q-in { flex: 1; min-width: 220px; }
    .add-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .83rem; padding: .45rem .75rem; font-family: inherit; cursor: pointer; }
    .req-check { display: flex; align-items: center; gap: .35rem; font-size: .8rem; color: var(--muted); cursor: pointer; }
    .add-btn { font-size: .78rem; font-weight: 800; padding: .45rem 1rem; border-radius: 8px; border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.1); color: var(--accent); cursor: pointer; font-family: inherit; white-space: nowrap; }
    .add-btn:hover { background: rgba(167,139,250,.2); }
    .empty-msg { font-size: .82rem; color: var(--muted); text-align: center; padding: 1.5rem; font-style: italic; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Intake Forms</div>
  <p class="page-sub">Questions the AI asks new callers before booking — customize to match your intake process.</p>

  <div class="card">
    <div class="card-title">Active Questions</div>
    <div id="q-list"></div>
  </div>

  <div class="card">
    <div class="card-title">Add Question</div>
    <div class="add-form">
      <input class="add-input q-in" id="q-text" type="text" placeholder="Question text…" maxlength="120">
      <select class="add-select" id="q-type">
        <option value="text">Text answer</option>
        <option value="yesno">Yes / No</option>
        <option value="choice">Multiple choice</option>
      </select>
      <label class="req-check"><input type="checkbox" id="q-req"> Required</label>
      <button class="add-btn" onclick="addQuestion()">+ Add</button>
    </div>
  </div>
</div>
<script>
  let questions = [];
  const TYPE_CLASS = {text: 't-text', yesno: 't-yesno', choice: 't-choice'};
  const TYPE_LABEL = {text: 'Text', yesno: 'Yes/No', choice: 'Choice'};

  async function load() {
    const r = await fetch('/api/intake-forms');
    const d = await r.json();
    questions = d.questions || [];
    render();
  }

  function render() {
    const list = document.getElementById('q-list');
    if (!questions.length) {
      list.innerHTML = '<div class="empty-msg">No questions yet — add your first intake question below.</div>';
      return;
    }
    list.innerHTML = questions.map((q, i) => `
      <div class="q-row">
        <div class="q-num">${i+1}</div>
        <div class="q-text">${esc(q.question_text)}</div>
        <span class="type-badge ${TYPE_CLASS[q.field_type] || 't-text'}">${TYPE_LABEL[q.field_type] || q.field_type}</span>
        ${q.required ? '<span class="req-badge">Required</span>' : ''}
        <button class="del-btn" onclick="del('${q.id}')">✕</button>
      </div>`).join('');
  }

  async function del(id) {
    await fetch(`/api/intake-forms/${id}`, {method:'DELETE'});
    questions = questions.filter(q => q.id !== id);
    render();
  }

  async function addQuestion() {
    const text = document.getElementById('q-text').value.trim();
    const type = document.getElementById('q-type').value;
    const req  = document.getElementById('q-req').checked;
    if (!text) return;
    const r = await fetch('/api/intake-forms', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({question_text: text, field_type: type, required: req})});
    const d = await r.json();
    questions.push(d.question);
    document.getElementById('q-text').value = '';
    document.getElementById('q-req').checked = false;
    render();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
