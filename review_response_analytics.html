<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Response — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .sentiment-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .7rem; }
    .s-label { font-size: .78rem; width: 70px; flex-shrink: 0; }
    .s-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .s-fill { height: 100%; border-radius: 4px; }
    .s-pct { font-size: .75rem; font-weight: 700; width: 40px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Review Response</div>
  <p class="page-sub">Track how quickly you respond to client reviews and the sentiment split. Rapid responses to negative reviews are shown to reduce churn and improve star ratings over time.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Reviews (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-responded" style="color:var(--green)">—</div><div class="stat-lbl">Response Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-speed" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Response Time</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rating" style="color:var(--accent)">—</div><div class="stat-lbl">Avg Rating</div></div>
  </div>
  <div class="card">
    <div class="card-title">Sentiment Breakdown</div>
    <div id="sent-list"></div>
    <div style="font-size:.72rem;color:var(--muted);margin-top:.9rem" id="h-unresponded"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/review-response-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.reviews_30d;
    document.getElementById('h-responded').textContent = d.responded_pct.toFixed(1) + '%';
    document.getElementById('h-speed').textContent = d.avg_response_hours + 'h';
    document.getElementById('h-rating').textContent = d.avg_rating + '★';
    document.getElementById('h-unresponded').textContent = d.reviews_without_response + ' reviews still awaiting a response';
    const sl = document.getElementById('sent-list');
    const rows = [
      { label: 'Positive', pct: d.positive_pct, color: 'var(--green)' },
      { label: 'Neutral', pct: d.neutral_pct, color: 'var(--yellow)' },
      { label: 'Negative', pct: d.negative_pct, color: 'var(--red)' },
    ];
    rows.forEach(r => {
      sl.innerHTML += '<div class="sentiment-row"><div class="s-label" style="color:' + r.color + '">' + r.label + '</div><div class="s-track"><div class="s-fill" style="width:' + r.pct + '%;background:' + r.color + '"></div></div><div class="s-pct" style="color:' + r.color + '">' + r.pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
