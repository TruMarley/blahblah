<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Revenue Split — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; text-align: left; padding-bottom: .6rem; border-bottom: 1px solid var(--border); }
    td { font-size: .8rem; padding: .55rem 0; border-bottom: 1px solid var(--border); }
    td:not(:first-child), th:not(:first-child) { text-align: right; }
    tr:last-child td { border-bottom: none; }
    .bar-cell { width: 120px; }
    .mini-track { background: var(--surface2); border-radius: 3px; height: 6px; overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 3px; background: var(--accent); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Revenue Split</div>
  <p class="page-sub">See which services drive the most revenue. Use this to prioritise training, marketing, and AI booking recommendations.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--green)">—</div><div class="stat-lbl">Total Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--accent)">—</div><div class="stat-lbl">Top Service</div></div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Service</div>
    <table>
      <thead><tr><th>Service</th><th>Revenue</th><th>Share</th><th class="bar-cell"></th><th>Appts</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/service-revenue-split-stats').then(r => r.json());
    document.getElementById('h-total').textContent = '$' + d.total_revenue_30d.toLocaleString();
    document.getElementById('h-top').textContent = d.top_service;
    const tb = document.getElementById('tbl');
    const maxPct = Math.max(...d.services.map(s => s.pct));
    d.services.forEach(s => {
      const w = (s.pct / maxPct * 100).toFixed(1);
      const appts = s.appts > 0 ? s.appts : '—';
      tb.innerHTML += '<tr><td style="font-weight:700">' + s.name + '</td><td>$' + s.revenue_30d.toLocaleString() + '</td><td style="color:var(--accent)">' + s.pct.toFixed(1) + '%</td><td class="bar-cell"><div class="mini-track"><div class="mini-fill" style="width:' + w + '%"></div></div></td><td style="color:var(--muted)">' + appts + '</td></tr>';
    });
  }
  load();
</script>
</body>
</html>
