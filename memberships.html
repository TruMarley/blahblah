<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memberships — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .top-bar { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
    .add-btn { font-size: .8rem; font-weight: 800; padding: .45rem 1.1rem; border-radius: 8px; border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.1); color: var(--accent); cursor: pointer; font-family: inherit; }
    .add-btn:hover { background: rgba(167,139,250,.2); }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
    td { font-size: .84rem; padding: .7rem 1rem; border-bottom: 1px solid rgba(30,30,30,.6); }
    tr:last-child td { border-bottom: none; }
    .tier-badge { font-size: .65rem; font-weight: 800; padding: .15rem .45rem; border-radius: 5px; }
    .tier-silver { background: rgba(150,150,150,.15); color: #aaa; }
    .tier-gold { background: rgba(251,191,36,.12); color: var(--yellow); }
    .tier-platinum { background: rgba(167,139,250,.15); color: var(--accent); }
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: .35rem; }
    .action-btn { font-size: .62rem; font-weight: 800; padding: .15rem .42rem; border-radius: 5px; border: none; cursor: pointer; font-family: inherit; margin-right: .3rem; }
    .btn-pause { background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid rgba(251,191,36,.3); }
    .btn-del { background: rgba(248,113,113,.07); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Memberships</div>
  <p class="page-sub">Manage recurring membership plans — Silver, Gold, and Platinum tiers.</p>
  <div class="top-bar">
    <button class="add-btn" onclick="showAdd()">+ Add Member</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Member</th><th>Tier</th><th>Plan</th><th>Value</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script>
  let data = {memberships:[]};
  async function load() {
    const r = await fetch('/api/memberships');
    data = await r.json();
    render();
  }
  function render() {
    document.getElementById('tbody').innerHTML = (data.memberships||[]).map(m => {
      const tc = m.tier === 'Platinum' ? 'tier-platinum' : m.tier === 'Gold' ? 'tier-gold' : 'tier-silver';
      const color = m.active ? '#34d399' : '#666';
      return `<tr>
        <td style="font-weight:800">${esc(m.name||'—')}</td>
        <td><span class="tier-badge ${tc}">${esc(m.tier)}</span></td>
        <td style="color:var(--muted)">${esc(m.plan)}</td>
        <td style="color:var(--green)">$${m.monthly_value}/mo</td>
        <td style="color:var(--muted);font-size:.78rem">${esc(m.joined||'—')}</td>
        <td><span class="status-dot" style="background:${color}"></span><span style="color:${color};font-size:.78rem">${m.active ? 'Active' : 'Paused'}</span></td>
        <td>
          <button class="action-btn btn-pause" onclick="toggle('${m.member_id}')">${m.active ? 'Pause' : 'Resume'}</button>
          <button class="action-btn btn-del" onclick="del('${m.member_id}')">Remove</button>
        </td>
      </tr>`;
    }).join('');
  }
  async function toggle(id) {
    await fetch(`/api/memberships/${id}/toggle`, {method:'POST'});
    load();
  }
  async function del(id) {
    await fetch(`/api/memberships/${id}`, {method:'DELETE'});
    load();
  }
  function showAdd() {
    const name = prompt('Member name:');
    if (!name) return;
    const tier = prompt('Tier (Silver/Gold/Platinum):', 'Silver');
    const plan = prompt('Plan (Monthly/Annual):', 'Monthly');
    const val = parseInt(prompt('Monthly value ($):', '29')) || 29;
    fetch('/api/memberships', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, tier: tier||'Silver', plan: plan||'Monthly', monthly_value: val, joined: new Date().toISOString().slice(0,10)})
    }).then(() => load());
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
