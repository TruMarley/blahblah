<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Quality — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .issue-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .6rem; }
    .sev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .issue-name { font-size: .82rem; font-weight: 600; flex: 1; }
    .issue-bar-wrap { width: 130px; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; flex-shrink: 0; }
    .issue-bar { height: 100%; border-radius: 4px; }
    .issue-count { font-size: .78rem; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; color: var(--muted); }
    .monthly-row { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
    .monthly-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .m-bar { width: 100%; border-radius: 3px 3px 0 0; }
    .m-lbl { font-size: .5rem; color: var(--muted); margin-top: 3px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Quality</div>
  <p class="page-sub">Monitor the quality of AI-handled calls. Track issue types, perfect call rate, and quality score trends to identify areas for AI improvement.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-score" style="color:var(--green)">—</div><div class="stat-lbl">Avg Quality Score</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rated" style="color:var(--accent)">—</div><div class="stat-lbl">Calls Rated (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-perfect" style="color:var(--green)">—</div><div class="stat-lbl">Perfect Calls</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-issues" style="color:var(--red)">—</div><div class="stat-lbl">Issue Rate</div></div>
  </div>
  <div class="card">
    <div class="card-title">Top Issues</div>
    <div id="issues-list"></div>
  </div>
  <div class="card">
    <div class="card-title">Monthly Quality Score Trend</div>
    <div class="monthly-row" id="monthly-bars"></div>
  </div>
</div>
<script>
  const SEV_COLORS = { high: 'var(--red)', medium: 'var(--yellow)', low: 'var(--muted)' };
  async function load() {
    const data = await fetch('/api/analytics/call-quality-stats').then(r => r.json());
    document.getElementById('h-score').textContent = '★ ' + data.avg_quality_score.toFixed(2);
    document.getElementById('h-rated').textContent = data.calls_rated_30d;
    document.getElementById('h-perfect').textContent = data.perfect_calls_pct.toFixed(1) + '%';
    document.getElementById('h-issues').textContent = data.issue_rate_pct.toFixed(1) + '%';
    const issues = data.top_issues || [];
    const maxCount = Math.max(...issues.map(i => i.count), 1);
    const list = document.getElementById('issues-list');
    issues.forEach(issue => {
      const color = SEV_COLORS[issue.severity] || 'var(--muted)';
      list.innerHTML += '<div class="issue-row"><div class="sev-dot" style="background:' + color + '"></div><div class="issue-name">' + issue.type + '</div><div class="issue-bar-wrap"><div class="issue-bar" style="width:' + (issue.count/maxCount*100).toFixed(1) + '%;background:' + color + '"></div></div><div class="issue-count">' + issue.count + '</div></div>';
    });
    const monthly = data.monthly || [];
    const maxScore = 5;
    const bars = document.getElementById('monthly-bars');
    monthly.forEach(m => {
      const h = Math.max((m.avg_score / maxScore * 72).toFixed(0), 2);
      const color = m.avg_score >= 4.5 ? 'var(--green)' : m.avg_score >= 4.0 ? 'var(--accent)' : 'var(--yellow)';
      bars.innerHTML += '<div class="monthly-col"><div class="m-bar" style="height:' + h + 'px;background:' + color + ';opacity:.75" title="' + m.month + ': score ' + m.avg_score + ', ' + m.total_calls + ' calls, ' + m.issues + ' issues"></div><div class="m-lbl">' + m.month.slice(0,3) + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
