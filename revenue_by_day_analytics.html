<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue by Day — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .day-chart { display: flex; align-items: flex-end; gap: .5rem; height: 130px; }
    .day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .28rem; }
    .day-bar { width: 100%; border-radius: 4px 4px 0 0; }
    .day-lbl { font-size: .62rem; color: var(--muted); }
    .day-val { font-size: .63rem; font-weight: 700; }
    .table { width: 100%; border-collapse: collapse; }
    .table th { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; padding: .4rem .6rem; text-align: left; border-bottom: 1px solid var(--border); }
    .table td { font-size: .78rem; padding: .55rem .6rem; border-bottom: 1px solid var(--border); }
    .table tr:last-child td { border-bottom: none; }
    .best-row td { color: var(--yellow); font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue by Day</div>
  <p class="page-sub">See which days of the week generate the most revenue and appointments. Use this to optimize staffing, promotions, and AI booking priority.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--green)">—</div><div class="stat-lbl">Total Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-best" style="color:var(--yellow)">—</div><div class="stat-lbl">Best Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-best-rev" style="color:var(--yellow)">—</div><div class="stat-lbl">Best Day Revenue</div></div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Day of Week</div>
    <div class="day-chart" id="day-chart"></div>
  </div>
  <div class="card">
    <div class="card-title">Day Breakdown</div>
    <table class="table">
      <thead><tr><th>Day</th><th>Revenue</th><th>Appointments</th><th>Avg Ticket</th></tr></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/revenue-by-day-stats').then(r => r.json());
    document.getElementById('h-total').textContent = '$' + d.total_revenue_30d.toLocaleString();
    document.getElementById('h-best').textContent = d.best_day;
    document.getElementById('h-best-rev').textContent = '$' + d.best_day_revenue.toLocaleString();
    const dc = document.getElementById('day-chart');
    const maxR = Math.max(...d.days.map(x => x.revenue));
    d.days.forEach(day => {
      const h = Math.round((day.revenue / maxR) * 100) + 10;
      const isBest = day.day === d.best_day;
      const color = isBest ? 'var(--yellow)' : 'var(--accent)';
      dc.innerHTML += '<div class="day-col"><div class="day-val" style="color:' + color + '">$' + (day.revenue/1000).toFixed(1) + 'k</div><div class="day-bar" style="height:' + h + 'px;background:' + color + '"></div><div class="day-lbl">' + day.day.slice(0,3) + '</div></div>';
    });
    const tb = document.getElementById('tbl-body');
    d.days.forEach(day => {
      const cls = day.day === d.best_day ? ' class="best-row"' : '';
      tb.innerHTML += '<tr' + cls + '><td>' + day.day + '</td><td>$' + day.revenue.toLocaleString() + '</td><td>' + day.appointments + '</td><td>$' + day.avg_ticket.toFixed(0) + '</td></tr>';
    });
  }
  load();
</script>
</body>
</html>
