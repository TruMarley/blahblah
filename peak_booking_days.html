<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peak Booking Days — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.5rem; }
    .bar-row { display: flex; align-items: center; gap: .9rem; margin-bottom: 1.15rem; }
    .bar-row:last-child { margin-bottom: 0; }
    .rank { font-size: .78rem; font-weight: 900; color: var(--muted); width: 20px; text-align: center; flex-shrink: 0; }
    .rank-1 { color: var(--yellow); }
    .day-label { font-size: .84rem; font-weight: 800; width: 110px; flex-shrink: 0; }
    .bar-wrap { flex: 1; }
    .bar-track { background: var(--surface2); border-radius: 5px; height: 12px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; }
    .count-val { font-size: .88rem; font-weight: 900; width: 40px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Peak Booking Days</div>
  <p class="page-sub">Your 5 busiest days over the past 30 days — great for spotting seasonal patterns.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Busiest Day</div>
      <div class="hero-val" id="h-day" style="font-size:1rem;padding-top:.5rem;color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Peak Bookings</div>
      <div class="hero-val" id="h-count" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Top 5 Days — Last 30 Days</div>
    <div id="bar-list"></div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/peak-booking-days');
    const d = await r.json();
    const top = d.top_days || [];
    if (top.length) {
      document.getElementById('h-day').textContent = top[0].day_label;
      document.getElementById('h-count').textContent = top[0].bookings + ' appts';
    }
    const maxB = d.max_bookings || 1;
    const colors = ['#fbbf24','#a78bfa','#34d399','#60a5fa','#f87171'];
    document.getElementById('bar-list').innerHTML = top.map((day, i) => `
      <div class="bar-row">
        <div class="rank ${i===0?'rank-1':''}">#${i+1}</div>
        <div class="day-label">${esc(day.day_label)}</div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill" style="width:${(day.bookings/maxB*100).toFixed(1)}%;background:${colors[i]};opacity:.75"></div></div>
        </div>
        <div class="count-val" style="color:${colors[i]}">${day.bookings}</div>
      </div>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
