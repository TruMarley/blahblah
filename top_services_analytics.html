<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Services — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .svc-rank { font-size: .7rem; font-weight: 900; color: var(--muted); width: 18px; flex-shrink: 0; text-align: right; }
    .svc-name { font-size: .82rem; font-weight: 700; width: 140px; flex-shrink: 0; }
    .svc-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .svc-bar { height: 100%; border-radius: 4px; }
    .svc-booked { font-size: .72rem; font-weight: 700; color: var(--accent); width: 38px; text-align: right; flex-shrink: 0; }
    .svc-rev { font-size: .68rem; color: var(--green); width: 60px; text-align: right; flex-shrink: 0; }
    .svc-conv { font-size: .65rem; color: var(--muted); width: 38px; text-align: right; flex-shrink: 0; }
    .monthly-row { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
    .monthly-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .m-bar { width: 100%; background: var(--accent); opacity: .7; border-radius: 3px 3px 0 0; }
    .m-lbl { font-size: .5rem; color: var(--muted); margin-top: 3px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Top Services</div>
  <p class="page-sub">See which services generate the most bookings and revenue from AI-handled calls. Track conversion rates and identify growth opportunities.</p>

  <div class="stats-row">
    <div class="stat-pill">
      <div class="stat-val" id="h-top" style="color:var(--accent)">—</div>
      <div class="stat-lbl">Top Service</div>
    </div>
    <div class="stat-pill">
      <div class="stat-val" id="h-bookings" style="color:var(--green)">—</div>
      <div class="stat-lbl">Top Bookings (30d)</div>
    </div>
    <div class="stat-pill">
      <div class="stat-val" id="h-tracked" style="color:var(--muted)">—</div>
      <div class="stat-lbl">Services Tracked</div>
    </div>
    <div class="stat-pill">
      <div class="stat-val" id="h-conv" style="color:var(--yellow)">—</div>
      <div class="stat-lbl">Avg Conversion</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Service Ranking — Bookings</div>
    <div id="svc-list"></div>
  </div>

  <div class="card">
    <div class="card-title">Monthly Total Bookings</div>
    <div class="monthly-row" id="monthly-bars"></div>
  </div>
</div>
<script>
  const PALETTE = ['#a78bfa','#818cf8','#6366f1','#34d399','#10b981','#fbbf24','#f59e0b','#f87171','#fb923c','#e879f9'];
  async function load() {
    const data = await fetch('/api/analytics/top-services-stats').then(r => r.json());
    document.getElementById('h-top').textContent = data.top_service;
    document.getElementById('h-bookings').textContent = data.top_service_bookings_30d;
    document.getElementById('h-tracked').textContent = data.total_services_tracked;
    document.getElementById('h-conv').textContent = data.avg_conversion_pct.toFixed(1) + '%';

    const services = data.services || [];
    const maxBooked = Math.max(...services.map(s => s.booked), 1);
    const list = document.getElementById('svc-list');
    services.forEach((s, i) => {
      const w = (s.booked / maxBooked * 100).toFixed(1);
      list.innerHTML += `<div class="svc-row">
        <div class="svc-rank">#${i+1}</div>
        <div class="svc-name">${s.service}</div>
        <div class="svc-bar-wrap"><div class="svc-bar" style="width:${w}%;background:${PALETTE[i % PALETTE.length]}"></div></div>
        <div class="svc-booked">${s.booked}</div>
        <div class="svc-rev">$${s.revenue.toFixed(0)}</div>
        <div class="svc-conv">${s.conversion_pct}%</div>
      </div>`;
    });

    const monthly = data.monthly || [];
    const maxM = Math.max(...monthly.map(m => m.total_bookings), 1);
    const mbars = document.getElementById('monthly-bars');
    monthly.forEach(m => {
      const mh = Math.max((m.total_bookings / maxM * 72).toFixed(0), 2);
      mbars.innerHTML += `<div class="monthly-col">
        <div class="m-bar" style="height:${mh}px" title="${m.month}: ${m.total_bookings} bookings, top: ${m.top_service}"></div>
        <div class="m-lbl">${m.month.slice(0,3)}</div>
      </div>`;
    });
  }
  load();
</script>
</body>
</html>
