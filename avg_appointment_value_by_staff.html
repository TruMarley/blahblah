<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avg Appointment Value by Staff — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 200px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Avg Appointment Value by Staff</div>
  <p class="page-sub">Average dollar value of appointments per team member — identifies who upsells most effectively.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Team Average</div>
      <div class="hero-val" id="h-avg" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Performer</div>
      <div class="hero-val" id="h-top" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Avg Value per Appointment — by Staff</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 640 200" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/avg-appointment-value-by-staff');
    const d = await r.json();
    document.getElementById('h-avg').textContent = '$' + d.overall_avg.toFixed(2);
    const top = [...(d.staff||[])].sort((a,b) => b.avg_value - a.avg_value)[0];
    document.getElementById('h-top').textContent = top ? top.name + ' $' + top.avg_value.toFixed(0) : '—';

    const svg = document.getElementById('chart');
    const W=640, H=200, pL=90, pR=60, pT=14, pB=10;
    const cW=W-pL-pR, cH=H-pT-pB;
    const staff = d.staff || [];
    const n = staff.length;
    const rowH = cH / n;
    const barH = Math.min(rowH * 0.55, 30);
    const maxV = 110;

    const avgX = pL + cW * d.overall_avg / maxV;
    svg.innerHTML += `<line x1="${avgX}" y1="${pT}" x2="${avgX}" y2="${pT+cH}" stroke="rgba(52,211,153,.4)" stroke-width="1.5" stroke-dasharray="4 3"/>`;
    svg.innerHTML += `<text x="${avgX}" y="${pT-3}" font-size="8" fill="rgba(52,211,153,.7)" text-anchor="middle">avg</text>`;

    staff.forEach((s, i) => {
      const y = pT + i * rowH + rowH / 2;
      const t = s.avg_value / maxV;
      const alpha = 0.25 + t * 0.6;
      const bw = cW * t;
      svg.innerHTML += `<text x="${pL-8}" y="${y+4}" font-size="11" fill="#ccc" text-anchor="end" font-weight="700">${esc(s.name)}</text>`;
      svg.innerHTML += `<rect x="${pL}" y="${y - barH/2}" width="${bw}" height="${barH}" rx="5" fill="rgba(167,139,250,${alpha.toFixed(2)})"/>`;
      svg.innerHTML += `<text x="${pL + bw + 7}" y="${y+4}" font-size="11" fill="rgba(167,139,250,.95)" font-weight="800">$${s.avg_value.toFixed(0)}</text>`;
    });
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
