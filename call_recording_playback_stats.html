<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Recording Playback Stats — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Recording Playback Stats</div>
  <p class="page-sub">How often your team reviews call recordings — high playback rates correlate with faster AI quality improvements.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Playback Rate</div>
      <div class="hero-val" id="h-rate" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Plays (6 wk)</div>
      <div class="hero-val" id="h-plays" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Listen Time</div>
      <div class="hero-val" id="h-dur" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Recordings &amp; Playbacks by Week</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,.35)"></div>Available</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(52,211,153,.65)"></div>Played</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow);border-radius:50%"></div>Playback Rate %</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/call-recording-playback-stats');
    const d = await r.json();
    const weeks = d.weeks || [];
    const avgRate = (weeks.reduce((s,w)=>s+w.playback_rate_pct,0)/weeks.length).toFixed(1);
    const totalPlays = weeks.reduce((s,w)=>s+w.playback_count,0);
    const avgDur = Math.round(weeks.reduce((s,w)=>s+w.avg_listen_duration_seconds,0)/weeks.length);
    document.getElementById('h-rate').textContent = avgRate + '%';
    document.getElementById('h-plays').textContent = totalPlays;
    document.getElementById('h-dur').textContent = avgDur >= 60 ? `${Math.floor(avgDur/60)}m ${avgDur%60}s` : `${avgDur}s`;

    const svg = document.getElementById('chart');
    const W=700,H=260,pL=44,pR=50,pT=14,pB=28;
    const cW=W-pL-pR,cH=H-pT-pB;
    const n=weeks.length,xStep=cW/n,barW=xStep*0.3;
    const maxR=Math.max(...weeks.map(w=>w.recordings_available))*1.2;
    const xOf=i=>pL+i*xStep+xStep/2;
    const yOfC=v=>pT+cH-v/maxR*cH;
    const yOfP=v=>pT+cH-v/100*cH;

    [10,20,30,40,50].filter(v=>v<maxR).forEach(v=>{
      const y=yOfC(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">${v}</text>`;
    });
    [25,50,75].forEach(v=>{
      svg.innerHTML+=`<text x="${W-pR+4}" y="${yOfP(v)+3.5}" font-size="8" fill="#666">${v}%</text>`;
    });

    weeks.forEach((w,i)=>{
      const cx=xOf(i);
      const avH=cH*w.recordings_available/maxR;
      const plH=cH*w.playback_count/maxR;
      svg.innerHTML+=`<rect x="${cx-barW}" y="${pT+cH-avH}" width="${barW}" height="${avH}" rx="3" fill="rgba(167,139,250,.35)"/>`;
      svg.innerHTML+=`<rect x="${cx}" y="${pT+cH-plH}" width="${barW}" height="${plH}" rx="3" fill="rgba(52,211,153,.65)"/>`;
      svg.innerHTML+=`<text x="${cx-barW/2}" y="${H-4}" font-size="8.5" fill="#555" text-anchor="middle">${esc(w.week)}</text>`;
    });

    const pts=weeks.map((w,i)=>`${xOf(i)},${yOfP(w.playback_rate_pct)}`).join(' ');
    svg.innerHTML+=`<polyline points="${pts}" fill="none" stroke="rgba(251,191,36,.85)" stroke-width="2.5"/>`;
    weeks.forEach((w,i)=>{
      svg.innerHTML+=`<circle cx="${xOf(i)}" cy="${yOfP(w.playback_rate_pct)}" r="3.5" fill="var(--yellow)"/>`;
      svg.innerHTML+=`<text x="${xOf(i)}" y="${yOfP(w.playback_rate_pct)-7}" font-size="8" fill="#fbbf24" text-anchor="middle">${w.playback_rate_pct}%</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
