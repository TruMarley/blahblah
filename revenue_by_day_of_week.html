<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue by Day of Week — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.5rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue by Day of Week</div>
  <p class="page-sub">Identify your highest-earning days and optimize staffing and promotions to maximize weekday revenue.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Best Day</div>
      <div class="hero-val" id="h-best" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Slowest Day</div>
      <div class="hero-val" id="h-worst" style="color:var(--red)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Revenue &amp; Bookings by Day</div>
    <svg id="chart" viewBox="0 0 680 260" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block"></svg>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/weekday-revenue-breakdown').then(r => r.json());
    const days = d.days || [];
    if (!days.length) return;

    document.getElementById('h-best').textContent = d.best_day || '—';
    document.getElementById('h-worst').textContent = d.worst_day || '—';

    const W=680, H=260, padL=52, padR=12, padT=16, padB=36;
    const chartW=W-padL-padR, chartH=H-padT-padB;
    const n=days.length, groupW=chartW/n, barW=Math.floor(groupW*0.55);
    const maxRev=Math.max(...days.map(d=>d.revenue),1);
    const maxBook=Math.max(...days.map(d=>d.bookings),1);

    let bars='', lines='', labels='', dots='';
    const pts=[];
    days.forEach((day,i)=>{
      const cx=padL+i*groupW+groupW/2;
      const bh=(day.revenue/maxRev)*chartH*0.85;
      bars+=`<rect x="${cx-barW/2}" y="${padT+chartH-bh}" width="${barW}" height="${bh}" fill="rgba(167,139,250,.35)" rx="3"/>`;
      const py=padT+chartH-(day.bookings/maxBook)*chartH;
      pts.push({x:cx,y:py});
      dots+=`<circle cx="${cx}" cy="${py}" r="3.5" fill="var(--green)" stroke="var(--bg)" stroke-width="1.5"/>`;
      labels+=`<text x="${cx}" y="${H-padB+14}" text-anchor="middle" fill="#555" font-size="10">${esc(day.day)}</text>`;
      labels+=`<text x="${cx}" y="${padT+chartH-bh-5}" text-anchor="middle" fill="#888" font-size="8">$${Math.round(day.revenue)}</text>`;
    });
    if(pts.length>1){
      const linePath='M'+pts[0].x+','+pts[0].y+' '+pts.slice(1).map(p=>`L${p.x},${p.y}`).join(' ');
      lines=`<path d="${linePath}" fill="none" stroke="var(--green)" stroke-width="2" stroke-linejoin="round" opacity=".8"/>`;
    }

    let yAxis='';
    for(let t=0;t<=4;t++){
      const yv='$'+Math.round(maxRev*t/4);
      const yp=padT+chartH-(t/4)*chartH;
      yAxis+=`<line x1="${padL}" x2="${W-padR}" y1="${yp}" y2="${yp}" stroke="#1e1e1e" stroke-width="1"/>`;
      yAxis+=`<text x="${padL-5}" y="${yp+4}" text-anchor="end" fill="#444" font-size="8">${yv}</text>`;
    }

    document.getElementById('chart').innerHTML=yAxis+bars+lines+dots+labels;
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
