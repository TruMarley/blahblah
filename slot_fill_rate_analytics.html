<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slot Fill Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: .4rem; }
    .day-cell { background: var(--surface2); border-radius: 8px; padding: .65rem .4rem; text-align: center; }
    .day-name { font-size: .62rem; color: var(--muted); margin-bottom: .3rem; }
    .day-rate { font-size: .9rem; font-weight: 900; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Slot Fill Rate</div>
  <p class="page-sub">What percentage of available appointment slots are filled each day? Low-fill days represent direct revenue loss — target them with same-day promos or waitlist activation.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-overall" style="color:var(--accent)">—</div><div class="stat-lbl">Overall Fill Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-best" style="color:var(--green)">—</div><div class="stat-lbl">Best Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-worst" style="color:var(--red)">—</div><div class="stat-lbl">Worst Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-lost" style="color:var(--yellow)">—</div><div class="stat-lbl">Revenue Lost (30d)</div></div>
  </div>
  <div class="card">
    <div class="card-title">Fill Rate by Day</div>
    <div class="day-grid" id="day-grid"></div>
  </div>
</div>
<script>
  function rateColor(r) {
    if (r >= 85) return 'var(--green)';
    if (r >= 65) return 'var(--yellow)';
    return 'var(--red)';
  }
  async function load() {
    const d = await fetch('/api/analytics/slot-fill-rate-stats').then(r => r.json());
    document.getElementById('h-overall').textContent = d.overall_fill_rate_pct.toFixed(1) + '%';
    document.getElementById('h-best').textContent = d.best_day;
    document.getElementById('h-worst').textContent = d.worst_day;
    document.getElementById('h-lost').textContent = '$' + d.revenue_lost_30d.toLocaleString();
    const dg = document.getElementById('day-grid');
    d.days.forEach((day, i) => {
      const r = d.fill_rates[i];
      const c = rateColor(r);
      dg.innerHTML += '<div class="day-cell"><div class="day-name">' + day + '</div><div class="day-rate" style="color:' + c + '">' + r.toFixed(0) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
