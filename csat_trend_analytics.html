<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSAT Trend — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .week-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .week-label { font-size: .78rem; color: var(--muted); width: 38px; flex-shrink: 0; }
    .week-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .week-fill { height: 100%; border-radius: 4px; background: var(--green); }
    .week-score { font-size: .75rem; font-weight: 700; color: var(--green); width: 40px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">CSAT Trend</div>
  <p class="page-sub">Client satisfaction scores over time. Track whether your service quality is improving, declining, or holding steady — and act on dips before they become patterns.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-score" style="color:var(--green)">—</div><div class="stat-lbl">Avg CSAT (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-prev" style="color:var(--muted)">—</div><div class="stat-lbl">Prev Period</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-responses" style="color:var(--accent)">—</div><div class="stat-lbl">Responses (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rate" style="color:var(--yellow)">—</div><div class="stat-lbl">Response Rate</div></div>
  </div>
  <div class="card">
    <div class="card-title">Weekly Score Trend</div>
    <div id="week-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/csat-trend-stats').then(r => r.json());
    document.getElementById('h-score').textContent = d.avg_csat_30d.toFixed(2) + ' / 5';
    document.getElementById('h-prev').textContent = d.avg_csat_prev_30d.toFixed(2) + ' / 5';
    document.getElementById('h-responses').textContent = d.responses_30d;
    document.getElementById('h-rate').textContent = d.response_rate_pct.toFixed(1) + '%';
    const wl = document.getElementById('week-list');
    d.weekly.forEach(w => {
      const pct = (w.score / 5 * 100).toFixed(1);
      const color = w.score >= 4.5 ? 'var(--green)' : w.score >= 3.8 ? 'var(--yellow)' : 'var(--red)';
      wl.innerHTML += '<div class="week-row"><div class="week-label">' + w.week + '</div><div class="week-track"><div class="week-fill" style="width:' + pct + '%;background:' + color + '"></div></div><div class="week-score" style="color:' + color + '">' + w.score.toFixed(2) + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
