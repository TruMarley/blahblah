<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Provider Tips — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .prov-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .55rem; display: flex; align-items: center; gap: .85rem; }
    .prov-name { font-size: .88rem; font-weight: 800; flex: 1; }
    .tip-count { font-size: .72rem; color: var(--muted); }
    .avg-tip { font-size: .85rem; font-weight: 700; color: var(--green); width: 52px; text-align: right; }
    .tip-rate { font-size: .72rem; color: var(--yellow); width: 48px; text-align: right; flex-shrink: 0; }
    .top-badge { font-size: .58rem; font-weight: 700; background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); border-radius: 4px; padding: .1rem .3rem; margin-left: .3rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Provider Tips</div>
  <p class="page-sub">Track tip frequency and average tip amount per provider. Tip rates correlate strongly with client satisfaction and provider rapport — a meaningful proxy for service quality.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Tips (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Avg Tip (All)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--yellow)">—</div><div class="stat-lbl">Top Provider</div></div>
  </div>
  <div class="card">
    <div class="card-title">Tips by Provider (30d)</div>
    <div id="prov-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/provider-tip-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_tips_30d;
    document.getElementById('h-avg').textContent = '$' + d.avg_tip_all.toFixed(2);
    document.getElementById('h-top').textContent = d.top_provider;
    const pl = document.getElementById('prov-list');
    d.providers.forEach(p => {
      const badge = p.name === d.top_provider ? '<span class="top-badge">Top</span>' : '';
      pl.innerHTML += '<div class="prov-row"><div class="prov-name">' + p.name + badge + '</div><div class="tip-count">' + p.tips_received + ' tips</div><div class="avg-tip">$' + p.avg_tip.toFixed(2) + ' avg</div><div class="tip-rate">' + p.tip_rate_pct.toFixed(0) + '% rate</div></div>';
    });
  }
  load();
</script>
</body>
</html>
