<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Clients by Spend — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.5rem; }
    .client-row { display: flex; align-items: center; gap: .9rem; margin-bottom: 1.1rem; }
    .client-row:last-child { margin-bottom: 0; }
    .rank { font-size: .78rem; font-weight: 900; color: var(--muted); width: 22px; text-align: center; flex-shrink: 0; }
    .rank-gold { color: var(--yellow); }
    .client-info { width: 130px; flex-shrink: 0; }
    .client-name { font-size: .86rem; font-weight: 800; }
    .client-sub { font-size: .7rem; color: var(--muted); }
    .bar-wrap { flex: 1; }
    .bar-track { background: var(--surface2); border-radius: 5px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; background: #a78bfa; opacity: .75; }
    .spend-val { font-size: .88rem; font-weight: 900; color: var(--accent); width: 64px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Top Clients by Spend</div>
  <p class="page-sub">Your highest-value clients — candidates for VIP perks, loyalty rewards, and referral asks.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">#1 Client</div>
      <div class="hero-val" id="h-top" style="font-size:1rem;padding-top:.5rem;color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Combined Top-8 Spend</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Top 8 Clients by Total Spend</div>
    <div id="client-list"></div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/top-clients-by-spend');
    const d = await r.json();
    const clients = d.clients || [];
    document.getElementById('h-top').textContent = clients[0]?.name || '—';
    document.getElementById('h-total').textContent = '$' + Math.round(d.total_combined).toLocaleString();
    const maxSpend = clients[0]?.total_spend || 1;
    document.getElementById('client-list').innerHTML = clients.map((c,i) => `
      <div class="client-row">
        <div class="rank ${i===0?'rank-gold':''}">#${i+1}</div>
        <div class="client-info">
          <div class="client-name">${esc(c.name)}</div>
          <div class="client-sub">${c.visits} visits · $${c.avg_per_visit.toFixed(0)}/visit</div>
        </div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill" style="width:${(c.total_spend/maxSpend*100).toFixed(1)}%"></div></div>
        </div>
        <div class="spend-val">$${Math.round(c.total_spend).toLocaleString()}</div>
      </div>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
