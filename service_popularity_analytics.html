<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Popularity — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem .9rem; text-align: center; }
    .hero-label { font-size: .6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.15rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .svc-list { display: flex; flex-direction: column; gap: .8rem; }
    .svc-row { display: flex; align-items: center; gap: .75rem; }
    .svc-rank { font-size: .7rem; font-weight: 900; color: var(--muted); min-width: 18px; text-align: right; }
    .svc-name { font-size: .85rem; font-weight: 700; min-width: 110px; }
    .svc-bar-wrap { flex: 1; height: 8px; background: var(--surface2); border-radius: 8px; }
    .svc-bar { height: 8px; border-radius: 8px; }
    .svc-meta { font-size: .72rem; min-width: 130px; text-align: right; display: flex; flex-direction: column; gap: .1rem; align-items: flex-end; }
    .svc-bookings { font-weight: 700; }
    .svc-rev { color: var(--muted); }
    .trend-up { color: var(--green); font-size: .75rem; font-weight: 700; }
    .trend-down { color: var(--red); font-size: .75rem; font-weight: 700; }
    .trend-flat { color: var(--muted); font-size: .75rem; }
    .svc-right { display: flex; align-items: center; gap: .5rem; min-width: 140px; justify-content: flex-end; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Popularity</div>
  <p class="page-sub">See which services your clients book most and which generate the most revenue. Use this data to promote slow movers, adjust pricing, and brief your AI on what to upsell during calls.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Top Service</div>
      <div class="hero-val" id="h-top" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Bookings</div>
      <div class="hero-val" id="h-total" style="color:var(--text)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Revenue Service</div>
      <div class="hero-val" id="h-rev" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Service Rankings</div>
    <div class="svc-list" id="svc-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/service-popularity-stats').then(r => r.json());
    document.getElementById('h-top').textContent = d.top_service || '—';
    document.getElementById('h-total').textContent = d.total_bookings_30d != null ? d.total_bookings_30d.toLocaleString() : '—';
    document.getElementById('h-rev').textContent = d.top_revenue_service || '—';

    const el = document.getElementById('svc-list');
    const services = d.services || [];
    const maxBook = Math.max(...services.map(s => s.bookings_30d), 1);
    el.innerHTML = services.map((s, i) => {
      const color = s.color || 'var(--accent)';
      const barW = (s.bookings_30d / maxBook * 100).toFixed(0);
      return `<div class="svc-row">
        <span class="svc-rank">#${i+1}</span>
        <span class="svc-name" style="color:${esc(color)}">${esc(s.service)}</span>
        <div class="svc-bar-wrap"><div class="svc-bar" style="width:${barW}%;background:${esc(color)}"></div></div>
        <div class="svc-right">
          <div class="svc-meta">
            <span class="svc-bookings" style="color:${esc(color)}">${s.bookings_30d} <span style="color:var(--muted);font-weight:400">(${s.pct}%)</span></span>
            <span class="svc-rev">$${(s.revenue_30d||0).toLocaleString()}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
