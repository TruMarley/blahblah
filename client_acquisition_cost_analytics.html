<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Acquisition Cost — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .ch-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; display: flex; align-items: center; justify-content: space-between; }
    .ch-name { font-size: .85rem; font-weight: 700; }
    .ch-stats { display: flex; gap: 1.2rem; }
    .ch-stat { text-align: right; }
    .ch-stat-val { font-size: .82rem; font-weight: 800; }
    .ch-stat-lbl { font-size: .6rem; color: var(--muted); }
    .best-badge { font-size: .6rem; font-weight: 700; background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); border-radius: 4px; padding: .1rem .35rem; margin-left: .4rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Acquisition Cost</div>
  <p class="page-sub">Track how much you spend to acquire each new client by channel. Lower CAC channels with high retention are your best growth levers.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-clients" style="color:var(--accent)">—</div><div class="stat-lbl">New Clients (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-spend" style="color:var(--yellow)">—</div><div class="stat-lbl">Total Acq Spend</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-cac" style="color:var(--green)">—</div><div class="stat-lbl">Blended CAC</div></div>
  </div>
  <div class="card">
    <div class="card-title">By Acquisition Channel</div>
    <div id="ch-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/client-acquisition-cost-stats').then(r => r.json());
    document.getElementById('h-clients').textContent = d.total_new_clients_30d;
    document.getElementById('h-spend').textContent = '$' + d.total_acq_spend_30d.toLocaleString();
    document.getElementById('h-cac').textContent = '$' + d.blended_cac.toFixed(2);
    const cl = document.getElementById('ch-list');
    d.channels.forEach(c => {
      const best = c.channel === d.best_channel ? '<span class="best-badge">Best CAC</span>' : '';
      const cac = c.cac > 0 ? '$' + c.cac.toFixed(2) : 'Free';
      cl.innerHTML += '<div class="ch-row"><div><div class="ch-name">' + c.channel + best + '</div></div><div class="ch-stats"><div class="ch-stat"><div class="ch-stat-val" style="color:var(--accent)">' + c.new_clients + '</div><div class="ch-stat-lbl">Clients</div></div><div class="ch-stat"><div class="ch-stat-val" style="color:var(--yellow)">$' + c.spend.toFixed(0) + '</div><div class="ch-stat-lbl">Spend</div></div><div class="ch-stat"><div class="ch-stat-val" style="color:var(--green)">' + cac + '</div><div class="ch-stat-lbl">CAC</div></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
