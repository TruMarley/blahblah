<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Traffic — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: .35rem; height: 110px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .25rem; }
    .bar-fill { width: 100%; border-radius: 3px 3px 0 0; }
    .bar-lbl { font-size: .58rem; color: var(--muted); }
    .bar-val { font-size: .6rem; font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Traffic</div>
  <p class="page-sub">Understand when your callers reach out. See hourly and daily call distribution to optimize staffing, AI coverage windows, and after-hours settings.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Calls (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Avg Per Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak-h" style="color:var(--yellow)">—</div><div class="stat-lbl">Peak Hour</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak-d" style="color:var(--yellow)">—</div><div class="stat-lbl">Peak Day</div></div>
  </div>
  <div class="card">
    <div class="card-title">Calls by Hour of Day</div>
    <div class="bar-chart" id="hour-chart"></div>
  </div>
  <div class="card">
    <div class="card-title">Calls by Day of Week</div>
    <div class="bar-chart" id="day-chart" style="height:110px"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/call-traffic-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_calls_30d.toLocaleString();
    document.getElementById('h-avg').textContent = d.avg_calls_per_day.toFixed(1);
    document.getElementById('h-peak-h').textContent = d.peak_hour;
    document.getElementById('h-peak-d').textContent = d.peak_day;
    function renderBars(containerId, data, key, labelKey, color) {
      const el = document.getElementById(containerId);
      const maxV = Math.max(...data.map(x => x[key]));
      data.forEach(item => {
        const h = Math.round((item[key] / maxV) * 85) + 8;
        el.innerHTML += '<div class="bar-col"><div class="bar-val">' + item[key] + '</div><div class="bar-fill" style="height:' + h + 'px;background:' + color + '"></div><div class="bar-lbl">' + item[labelKey] + '</div></div>';
      });
    }
    renderBars('hour-chart', d.hours, 'calls', 'hour', 'var(--accent)');
    renderBars('day-chart', d.days, 'calls', 'day', 'var(--green)');
  }
  load();
</script>
</body>
</html>
