<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Duration — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .8rem 1rem; margin-bottom: .5rem; }
    .svc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .45rem; }
    .svc-name { font-size: .88rem; font-weight: 800; }
    .over-badge { font-size: .65rem; font-weight: 700; background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.2); border-radius: 4px; padding: .1rem .35rem; }
    .dur-bars { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }
    .dur-bar { display: flex; flex-direction: column; gap: .18rem; }
    .dur-label { font-size: .6rem; color: var(--muted); }
    .dur-track { background: #1a1a1a; border-radius: 3px; height: 5px; overflow: hidden; }
    .dur-fill-actual { height: 100%; border-radius: 3px; background: var(--accent); }
    .dur-fill-booked { height: 100%; border-radius: 3px; background: #333; }
    .dur-val { font-size: .7rem; font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Duration</div>
  <p class="page-sub">Compare actual average service duration against booked time. Services that consistently overrun inflate the schedule and push downstream appointments late.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-overrun" style="color:var(--red)">—</div><div class="stat-lbl">Biggest Overrunner</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg-over" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Overrun</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ontime" style="color:var(--green)">—</div><div class="stat-lbl">On-Time Rate</div></div>
  </div>
  <div class="card">
    <div class="card-title">Actual vs Booked Duration</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/appointment-type-duration-stats').then(r => r.json());
    document.getElementById('h-overrun').textContent = d.most_overrun;
    document.getElementById('h-avg-over').textContent = d.avg_overrun_min.toFixed(1) + 'm';
    document.getElementById('h-ontime').textContent = d.on_time_pct.toFixed(1) + '%';
    const sl = document.getElementById('svc-list');
    const maxMin = Math.max(...d.types.map(t => Math.max(t.avg_min, t.booked_min)));
    d.types.forEach(t => {
      const wa = (t.avg_min / maxMin * 100).toFixed(1);
      const wb = (t.booked_min / maxMin * 100).toFixed(1);
      const badge = t.avg_min > t.booked_min ? '<span class="over-badge">+' + (t.avg_min - t.booked_min) + 'm over</span>' : '';
      sl.innerHTML += '<div class="svc-row"><div class="svc-top"><div class="svc-name">' + t.name + '</div>' + badge + '</div><div class="dur-bars"><div class="dur-bar"><div class="dur-label">Actual <span class="dur-val" style="color:var(--accent)">' + t.avg_min + 'm</span></div><div class="dur-track"><div class="dur-fill-actual" style="width:' + wa + '%"></div></div></div><div class="dur-bar"><div class="dur-label">Booked <span class="dur-val" style="color:var(--muted)">' + t.booked_min + 'm</span></div><div class="dur-track"><div class="dur-fill-booked" style="width:' + wb + '%"></div></div></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
