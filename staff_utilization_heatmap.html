<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Utilization Heatmap — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; align-items: center; gap: .5rem; margin-bottom: 1.25rem; font-size: .72rem; color: var(--muted); }
    .legend-grad { width: 120px; height: 10px; border-radius: 5px; background: linear-gradient(to right, rgba(52,211,153,.08), rgba(52,211,153,1)); }
    .chart-wrap { overflow-x: auto; }
    svg.chart { overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Utilization Heatmap</div>
  <p class="page-sub">See how fully booked each staff member is by day — spot gaps and overscheduling at a glance.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Utilization</div>
      <div class="hero-val" id="h-avg" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Performer</div>
      <div class="hero-val" id="h-top" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Weekly Utilization by Staff Member (%)</div>
    <div class="legend"><span>Low</span><div class="legend-grad"></div><span>High</span></div>
    <div class="chart-wrap">
      <svg class="chart" id="chart"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/staff-utilization-heatmap');
    const d = await r.json();
    const grid = d.grid || [];
    const days = d.days || [];
    const allVals = grid.flatMap(row => row.days.map(c => c.utilization_pct));
    const avg = allVals.length ? Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length) : 0;
    document.getElementById('h-avg').textContent = avg + '%';
    const staffAvgs = grid.map(row => ({ name: row.staff, avg: Math.round(row.days.reduce((a,c)=>a+c.utilization_pct,0)/row.days.length) }));
    const top = staffAvgs.reduce((a,b)=>a.avg>b.avg?a:b, staffAvgs[0]||{});
    document.getElementById('h-top').textContent = top.name || '—';

    const cellW = 80, cellH = 44, pL = 72, pT = 28;
    const W = pL + days.length * cellW + 10;
    const H = pT + grid.length * cellH + 10;
    const svg = document.getElementById('chart');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);

    days.forEach((day, j) => {
      svg.innerHTML += `<text x="${pL + j*cellW + cellW/2}" y="${pT-10}" font-size="10" fill="#777" text-anchor="middle" font-weight="700">${day}</text>`;
    });

    grid.forEach((row, i) => {
      svg.innerHTML += `<text x="${pL-6}" y="${pT + i*cellH + cellH/2 + 4}" font-size="10.5" fill="#aaa" text-anchor="end" font-weight="800">${row.staff}</text>`;
      row.days.forEach((cell, j) => {
        const t = (cell.utilization_pct - 30) / 70;
        const alpha = Math.max(0.05, Math.min(1, t * 0.9 + 0.08));
        const fill = `rgba(52,211,153,${alpha.toFixed(2)})`;
        const textCol = t > 0.55 ? '#fff' : '#888';
        const x = pL + j*cellW + 2, y = pT + i*cellH + 2;
        svg.innerHTML += `<rect x="${x}" y="${y}" width="${cellW-4}" height="${cellH-4}" rx="6" fill="${fill}"/>`;
        svg.innerHTML += `<text x="${x+(cellW-4)/2}" y="${y+(cellH-4)/2+4.5}" font-size="11" fill="${textCol}" text-anchor="middle" font-weight="800">${cell.utilization_pct}%</text>`;
      });
    });
  }
  load();
</script>
</body>
</html>
