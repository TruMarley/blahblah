<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seasonal Booking Trend — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart { display: flex; align-items: flex-end; gap: .35rem; height: 120px; margin-bottom: .75rem; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .3rem; }
    .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 4px; }
    .bar-month { font-size: .58rem; color: var(--muted); }
    .bar-val { font-size: .6rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Seasonal Booking Trend</div>
  <p class="page-sub">Full-year booking volume by month. Identify your peak and trough seasons to plan staffing, promotions, and cash flow in advance.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-peak" style="color:var(--green)">—</div><div class="stat-lbl">Peak Month</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-trough" style="color:var(--red)">—</div><div class="stat-lbl">Trough Month</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-yoy" style="color:var(--accent)">—</div><div class="stat-lbl">YoY Growth</div></div>
  </div>
  <div class="card">
    <div class="card-title">Monthly Bookings</div>
    <div class="chart" id="chart"></div>
  </div>
  <div class="card">
    <div class="card-title">Monthly Revenue</div>
    <div class="chart" id="rev-chart"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/seasonal-booking-trend-stats').then(r => r.json());
    document.getElementById('h-peak').textContent = d.peak_month;
    document.getElementById('h-trough').textContent = d.trough_month;
    document.getElementById('h-yoy').textContent = '+' + d.yoy_growth_pct.toFixed(1) + '%';
    const maxB = Math.max(...d.months.map(m => m.bookings));
    const maxR = Math.max(...d.months.map(m => m.revenue));
    const chart = document.getElementById('chart');
    const rchart = document.getElementById('rev-chart');
    d.months.forEach(m => {
      const hB = Math.max(4, (m.bookings / maxB * 108)).toFixed(0);
      const isPeak = m.month === d.peak_month;
      const col = isPeak ? 'var(--green)' : 'var(--accent)';
      chart.innerHTML += '<div class="bar-col"><div class="bar-val">' + m.bookings + '</div><div class="bar" style="height:' + hB + 'px;background:' + col + '"></div><div class="bar-month">' + m.month + '</div></div>';
      const hR = Math.max(4, (m.revenue / maxR * 108)).toFixed(0);
      rchart.innerHTML += '<div class="bar-col"><div class="bar-val">$' + (m.revenue/1000).toFixed(1) + 'k</div><div class="bar" style="height:' + hR + 'px;background:var(--yellow)"></div><div class="bar-month">' + m.month + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
