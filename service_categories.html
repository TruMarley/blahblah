<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Categories — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .5rem 1rem; border-bottom: 1px solid var(--border); text-align: left; }
    thead th:not(:first-child) { text-align: center; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .65rem 1rem; font-size: .82rem; text-align: center; }
    tbody td:first-child { text-align: left; }
    .cat-name-cell { display: flex; align-items: center; gap: .5rem; }
    .cat-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-badge { font-size: .65rem; font-weight: 800; padding: .15rem .5rem; border-radius: 99px; }
    .s-active   { background: rgba(52,211,153,.12); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
    .s-inactive { background: rgba(255,255,255,.05); color: var(--muted); border: 1px solid var(--border); }
    .icon-btn { background: none; border: none; cursor: pointer; font-size: .88rem; padding: .2rem .4rem; border-radius: 5px; transition: background .15s; }
    .icon-btn:hover { background: var(--surface2); }
    .add-form { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
    .add-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .83rem; padding: .45rem .75rem; font-family: inherit; flex: 1; min-width: 130px; }
    .color-input { width: 38px; height: 34px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); padding: 2px; cursor: pointer; }
    .add-btn { font-size: .78rem; font-weight: 800; padding: .45rem 1rem; border-radius: 8px; border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.1); color: var(--accent); cursor: pointer; font-family: inherit; white-space: nowrap; }
    .add-btn:hover { background: rgba(167,139,250,.2); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Categories</div>
  <p class="page-sub">Organize your services into categories — helps the AI route client requests accurately.</p>

  <div class="card">
    <div class="card-title">Categories</div>
    <table>
      <thead><tr><th>Category</th><th>Services</th><th>Status</th><th>Toggle</th><th>Delete</th></tr></thead>
      <tbody id="cat-tbody"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-title">Add Category</div>
    <div class="add-form">
      <input class="add-input" id="cat-name" type="text" placeholder="Category name…" maxlength="32">
      <input class="color-input" id="cat-color" type="color" value="#a78bfa">
      <button class="add-btn" onclick="addCat()">+ Add</button>
    </div>
  </div>
</div>
<script>
  let cats = [];

  async function load() {
    const r = await fetch('/api/service-categories');
    const d = await r.json();
    cats = d.categories || [];
    render();
  }

  function render() {
    document.getElementById('cat-tbody').innerHTML = cats.map(c => `
      <tr>
        <td>
          <div class="cat-name-cell">
            <div class="cat-swatch" style="background:${esc(c.color)}"></div>
            <span style="font-weight:800">${esc(c.name)}</span>
          </div>
        </td>
        <td style="color:var(--muted)">${c.service_count}</td>
        <td><span class="status-badge ${c.active ? 's-active' : 's-inactive'}">${c.active ? 'Active' : 'Inactive'}</span></td>
        <td><button class="icon-btn" onclick="toggle('${c.id}')" title="Toggle">${c.active ? '⏸' : '▶'}</button></td>
        <td><button class="icon-btn" onclick="del('${c.id}')" title="Delete" style="color:var(--red)">✕</button></td>
      </tr>`).join('');
  }

  async function toggle(id) {
    const r = await fetch(`/api/service-categories/${id}/toggle`, {method:'POST'});
    const d = await r.json();
    const idx = cats.findIndex(c => c.id === id);
    if (idx >= 0) cats[idx] = d.category;
    render();
  }

  async function del(id) {
    await fetch(`/api/service-categories/${id}`, {method:'DELETE'});
    cats = cats.filter(c => c.id !== id);
    render();
  }

  async function addCat() {
    const name = document.getElementById('cat-name').value.trim();
    const color = document.getElementById('cat-color').value;
    if (!name) return;
    const r = await fetch('/api/service-categories', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, color})});
    const d = await r.json();
    cats.push(d.category);
    document.getElementById('cat-name').value = '';
    render();
  }

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
