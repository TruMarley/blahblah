<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peak Season — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: .45rem; }
    .month-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .55rem .4rem; text-align: center; }
    .month-name { font-size: .65rem; color: var(--muted); margin-bottom: .3rem; }
    .month-bar { width: 100%; background: var(--surface); border-radius: 3px; height: 36px; display: flex; align-items: flex-end; overflow: hidden; }
    .month-fill { width: 100%; border-radius: 3px 3px 0 0; }
    .month-idx { font-size: .6rem; font-weight: 700; margin-top: .2rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Peak Season</div>
  <p class="page-sub">Understand your annual revenue seasonality. Plan staffing, promotions, and inventory around peak months — and design slow-season strategies to lift the floor.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-rev" style="color:var(--green)">—</div><div class="stat-lbl">This Month Revenue</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-yoy" style="color:var(--accent)">—</div><div class="stat-lbl">YoY Change</div></div>
    <div class="stat-pill"><div class="stat-pill-inner"><div class="stat-val" id="h-peak" style="color:var(--yellow);font-size:.82rem">—</div><div class="stat-lbl">Peak Months</div></div></div>
  </div>
  <div class="card">
    <div class="card-title">Monthly Revenue Index (100 = average)</div>
    <div class="month-grid" id="month-grid"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/peak-season-stats').then(r => r.json());
    document.getElementById('h-rev').textContent = '$' + d.current_month_revenue.toLocaleString(undefined,{maximumFractionDigits:0});
    const yoy = d.yoy_change_pct;
    document.getElementById('h-yoy').textContent = (yoy >= 0 ? '+' : '') + yoy.toFixed(1) + '%';
    document.getElementById('h-yoy').style.color = yoy >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('h-peak').textContent = d.peak_months.join(', ');
    const mg = document.getElementById('month-grid');
    const maxI = Math.max(...d.months.map(m => m.revenue_index));
    d.months.forEach(m => {
      const h = (m.revenue_index / maxI * 36).toFixed(0);
      const isPeak = d.peak_months.includes(m.month.slice(0,3)) || d.peak_months.some(p => p.startsWith(m.month));
      const isSlow = d.slow_months.includes(m.month.slice(0,3)) || d.slow_months.some(p => p.startsWith(m.month));
      const color = isPeak ? 'var(--yellow)' : isSlow ? 'var(--muted)' : 'var(--accent)';
      mg.innerHTML += '<div class="month-cell"><div class="month-name">' + m.month + '</div><div class="month-bar"><div class="month-fill" style="height:' + h + 'px;background:' + color + '"></div></div><div class="month-idx" style="color:' + color + '">' + m.revenue_index.toFixed(0) + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
