<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Insights — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; --blue: #60a5fa; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: .4rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .refresh-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: .8rem; font-weight: 700; padding: .45rem .9rem; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; gap: .4rem; }
    .refresh-btn:hover { color: var(--text); border-color: #3e3e3e; }
    .refresh-btn.spinning .spin-icon { animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .insights-list { display: flex; flex-direction: column; gap: 1rem; }
    .insight-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; border-left: 3px solid; transition: transform .1s; }
    .insight-card:hover { transform: translateX(2px); }
    .ic-top { display: flex; align-items: center; gap: .6rem; margin-bottom: .65rem; flex-wrap: wrap; }
    .cat-chip { font-size: .68rem; font-weight: 800; padding: .18rem .55rem; border-radius: 6px; text-transform: uppercase; letter-spacing: .07em; }
    .cat-revenue   { background: rgba(52,211,153,.12); color: var(--green); }
    .cat-retention { background: rgba(248,113,113,.1);  color: var(--red); }
    .cat-operations{ background: rgba(251,191,36,.1);   color: var(--yellow); }
    .cat-growth    { background: rgba(96,165,250,.1);   color: var(--blue); }
    .pri-badge { font-size: .65rem; font-weight: 800; padding: .15rem .5rem; border-radius: 99px; margin-left: auto; }
    .pri-high   { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
    .pri-medium { background: rgba(251,191,36,.1);   color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .pri-low    { background: rgba(100,100,100,.1);  color: var(--muted); border: 1px solid var(--border); }
    .ic-title { font-size: .95rem; font-weight: 800; margin-bottom: .5rem; }
    .ic-body { font-size: .82rem; color: var(--muted); line-height: 1.7; margin-bottom: .85rem; }
    .ic-action { display: inline-block; font-size: .78rem; font-weight: 700; padding: .38rem .9rem; border-radius: 8px; text-decoration: none; border: 1px solid; transition: opacity .15s; }
    .ic-action:hover { opacity: .8; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="header-row">
    <div class="page-title">AI Insights</div>
    <button class="refresh-btn" id="refresh-btn" onclick="load()"><span class="spin-icon">↻</span> Refresh</button>
  </div>
  <p class="page-sub">Observations and recommendations generated from your shop's data.</p>
  <div class="insights-list" id="insights-list"><div style="text-align:center;color:var(--muted);padding:3rem">Loading insights…</div></div>
</div>
<script>
  const CAT_COLORS = {revenue:'#34d399', retention:'#f87171', operations:'#fbbf24', growth:'#60a5fa'};
  const PRI_ICONS = {high:'🔴', medium:'🟡', low:'⚪'};

  async function load() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    const r = await fetch('/api/insights');
    const d = await r.json();
    btn.classList.remove('spinning');
    const insights = d.insights || [];
    document.getElementById('insights-list').innerHTML = insights.map(ins => {
      const color = CAT_COLORS[ins.category] || 'var(--accent)';
      return `<div class="insight-card" style="border-left-color:${color}">
        <div class="ic-top">
          <span class="cat-chip cat-${ins.category}">${ins.category}</span>
          <span class="pri-badge pri-${ins.priority}">${PRI_ICONS[ins.priority]} ${ins.priority}</span>
        </div>
        <div class="ic-title">${esc(ins.title)}</div>
        <div class="ic-body">${esc(ins.body)}</div>
        <a class="ic-action" href="${ins.action_url}" style="color:${color};border-color:${hexToRgba(color,.3)};background:${hexToRgba(color,.08)}">${esc(ins.action_label)} →</a>
      </div>`;
    }).join('');
  }

  function hexToRgba(hex, a) {
    if (hex.startsWith('#')) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
    return hex;
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
