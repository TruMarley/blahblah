<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Monitor — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e;
      --text: #e8e8e8; --muted: #555; --accent: #a78bfa;
      --green: #34d399; --red: #f87171; --yellow: #fbbf24; --blue: #60a5fa;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 58px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.15rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a { color: var(--muted); font-size: .82rem; text-decoration: none; }
    nav a:hover { color: var(--text); }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }

    .shell { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .page-header { margin-bottom: 2rem; }
    .page-title { font-size: 1.6rem; font-weight: 900; letter-spacing: -.03em; display: flex; align-items: center; gap: .75rem; }

    /* Connection status dot */
    .conn-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .conn-dot.connected { background: var(--green); box-shadow: 0 0 0 3px rgba(52,211,153,.2); animation: pulse-dot 2s infinite; }
    .conn-dot.error { background: var(--red); }
    @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 3px rgba(52,211,153,.2); } 50% { box-shadow: 0 0 0 6px rgba(52,211,153,.08); } }

    .conn-label { font-size: .75rem; color: var(--muted); font-weight: 500; margin-top: .35rem; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
    .stat-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .4rem; }
    .stat-val { font-size: 2.6rem; font-weight: 900; letter-spacing: -.05em; color: #fff; line-height: 1; }
    .stat-val.green { color: var(--green); }
    .stat-val.accent { color: var(--accent); }

    /* Event log */
    .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
    .log-title { font-size: .85rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .btn-clear { background: none; border: 1px solid var(--border); color: var(--muted); font-size: .72rem; padding: .3rem .7rem; border-radius: 6px; cursor: pointer; }
    .btn-clear:hover { color: var(--text); border-color: var(--accent); }

    .log-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    #event-log { height: 420px; overflow-y: auto; padding: .5rem 0; font-family: "SF Mono", "Fira Code", monospace; font-size: .78rem; }
    #event-log::-webkit-scrollbar { width: 4px; }
    #event-log::-webkit-scrollbar-track { background: transparent; }
    #event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry { display: flex; align-items: flex-start; gap: .75rem; padding: .45rem 1rem; border-bottom: 1px solid rgba(30,30,30,.6); transition: background .1s; }
    .log-entry:last-child { border-bottom: none; }
    .log-entry:hover { background: var(--surface2); }
    .log-ts { color: var(--muted); white-space: nowrap; flex-shrink: 0; font-size: .72rem; margin-top: .05rem; }
    .log-icon { flex-shrink: 0; font-size: .9rem; }
    .log-msg { color: var(--text); line-height: 1.4; }
    .log-phone { color: var(--muted); font-size: .72rem; margin-top: .1rem; }

    /* Entry type color variants */
    .log-entry.call_started .log-msg { color: var(--green); }
    .log-entry.call_ended   .log-msg { color: var(--red); }
    .log-entry.booking_confirmed .log-msg { color: var(--accent); }
    .log-entry.sms_sent     .log-msg { color: var(--blue); }
    .log-entry.utterance    .log-msg { color: var(--text); }
    .log-entry.init         .log-msg { color: var(--muted); }

    /* Empty state */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 1rem; padding: 3rem; color: var(--muted); }
    .empty-dot { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--border); position: relative; }
    .empty-dot::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; background: var(--border); animation: idle-pulse 3s ease-in-out infinite; }
    @keyframes idle-pulse { 0%,100% { opacity: .3; transform: scale(.9); } 50% { opacity: 1; transform: scale(1); } }
    .empty-label { font-size: .82rem; text-align: center; line-height: 1.6; }

    /* Footer strip */
    .log-footer { background: var(--surface2); border-top: 1px solid var(--border); padding: .5rem 1rem; display: flex; align-items: center; justify-content: space-between; }
    .log-footer span { font-size: .7rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/appointments">Appointments</a>
    <a href="/live" style="color:var(--text)">Live</a>
  </div>
</nav>

<div class="shell">
  <div class="page-header">
    <div class="page-title">
      <div class="conn-dot" id="conn-dot"></div>
      Live Call Monitor
    </div>
    <div class="conn-label" id="conn-label">Connecting…</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Active Calls Now</div>
      <div class="stat-val green" id="stat-active">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Bookings This Session</div>
      <div class="stat-val accent" id="stat-bookings">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">SMS Sent This Session</div>
      <div class="stat-val" id="stat-sms">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Events Received</div>
      <div class="stat-val" id="stat-events">0</div>
    </div>
  </div>

  <div class="log-header">
    <div class="log-title">Event Stream</div>
    <button class="btn-clear" onclick="clearLog()">Clear log</button>
  </div>

  <div class="log-wrap">
    <div id="event-log">
      <div class="empty-state" id="empty-state">
        <div class="empty-dot"></div>
        <div class="empty-label">No active calls.<br>Events will appear here in real time.</div>
      </div>
    </div>
    <div class="log-footer">
      <span id="footer-status">Waiting for events…</span>
      <span id="footer-time"></span>
    </div>
  </div>
</div>

<script>
  const ICONS = {
    call_started: '📞',
    call_ended:   '🔴',
    booking_confirmed: '✅',
    sms_sent:     '📱',
    utterance:    '🎙️',
    init:         '🔗',
    keepalive:    '·',
  };

  let activeCalls = 0;
  let sessionBookings = 0;
  let sessionSms = 0;
  let totalEvents = 0;
  let hasEvents = false;
  let es = null;

  function fmt(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  }

  function addEntry(type, msg, phone, ts) {
    if (!hasEvents) {
      document.getElementById('empty-state').remove();
      hasEvents = true;
    }
    const log = document.getElementById('event-log');
    const div = document.createElement('div');
    div.className = `log-entry ${type}`;
    const icon = ICONS[type] || '•';
    div.innerHTML = `
      <span class="log-ts">${fmt(ts)}</span>
      <span class="log-icon">${icon}</span>
      <div>
        <div class="log-msg">${esc(msg)}</div>
        ${phone && phone !== 'unknown' ? `<div class="log-phone">${esc(phone)}</div>` : ''}
      </div>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    // cap at 200 entries
    while (log.children.length > 201) log.removeChild(log.children[0]);
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function updateStats() {
    document.getElementById('stat-active').textContent = activeCalls;
    document.getElementById('stat-bookings').textContent = sessionBookings;
    document.getElementById('stat-sms').textContent = sessionSms;
    document.getElementById('stat-events').textContent = totalEvents;
    document.getElementById('footer-time').textContent = new Date().toLocaleTimeString();
  }

  function clearLog() {
    const log = document.getElementById('event-log');
    log.innerHTML = '';
    hasEvents = false;
    totalEvents = 0;
    updateStats();
  }

  function connect() {
    const dot = document.getElementById('conn-dot');
    const label = document.getElementById('conn-label');
    dot.className = 'conn-dot';
    label.textContent = 'Connecting…';

    es = new EventSource('/api/live-events');

    es.onopen = () => {
      dot.className = 'conn-dot connected';
      label.textContent = 'Connected — streaming live events';
      document.getElementById('footer-status').textContent = 'Live';
    };

    es.onmessage = (e) => {
      let data;
      try { data = JSON.parse(e.data); } catch { return; }
      const { type, timestamp, message, phone, active_calls } = data;

      if (type === 'init') {
        activeCalls = active_calls || 0;
        addEntry('init', message || 'Connected', phone, timestamp);
      } else if (type === 'call_started') {
        activeCalls++;
        addEntry(type, message, phone, timestamp);
      } else if (type === 'call_ended') {
        activeCalls = Math.max(0, activeCalls - 1);
        addEntry(type, message, phone, timestamp);
      } else if (type === 'booking_confirmed') {
        sessionBookings++;
        addEntry(type, message, phone, timestamp);
      } else if (type === 'sms_sent') {
        sessionSms++;
        addEntry(type, message, phone, timestamp);
      } else {
        addEntry(type || 'utterance', message || type, phone, timestamp);
      }

      totalEvents++;
      updateStats();
    };

    es.onerror = () => {
      dot.className = 'conn-dot error';
      label.textContent = 'Disconnected — reconnecting in 5s…';
      document.getElementById('footer-status').textContent = 'Reconnecting…';
      es.close();
      setTimeout(connect, 5000);
    };
  }

  // Tick footer clock
  setInterval(() => {
    document.getElementById('footer-time').textContent = new Date().toLocaleTimeString();
  }, 1000);

  connect();
</script>
</body>
</html>
