<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stylist Revenue Share — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 1rem; }
    .hero-label { font-size: .62rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .hero-val { font-size: 1.6rem; font-weight: 900; color: var(--green); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .stylist-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: .75rem; }
    .stylist-row:last-child { margin-bottom: 0; }
    .stylist-top { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .82rem; font-weight: 900; flex-shrink: 0; }
    .stylist-name { font-size: .9rem; font-weight: 800; flex: 1; }
    .stylist-rev { font-size: 1rem; font-weight: 900; }
    .bar-track { height: 7px; background: var(--bg); border-radius: 7px; margin-bottom: .65rem; }
    .bar-fill { height: 7px; border-radius: 7px; }
    .stat-chips { display: flex; gap: .45rem; flex-wrap: wrap; }
    .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .15rem .5rem; font-size: .68rem; color: var(--muted); }
    .chip span { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Stylist Revenue Share</div>
  <p class="page-sub">See exactly how much revenue each team member generates. High performers justify rate increases or commission bumps. Underperformers can be promoted more actively by the AI during booking calls.</p>
  <div class="hero-card">
    <div>
      <div class="hero-label">Total Shop Revenue</div>
      <div class="hero-val" id="h-total">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Stylist</div>
    <div id="stylist-list"></div>
  </div>
</div>
<script>
  const COLORS = ['#a78bfa','#34d399','#60a5fa','#fbbf24','#f87171','#818cf8'];
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  async function load() {
    const d = await fetch('/api/analytics/stylist-revenue-share').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_revenue != null ? '$' + d.total_revenue.toLocaleString() : '—';
    const stylists = d.stylists || [];
    const el = document.getElementById('stylist-list');
    stylists.forEach((s, i) => {
      const color = COLORS[i % COLORS.length];
      el.innerHTML += `<div class="stylist-row">
        <div class="stylist-top">
          <div class="avatar" style="background:${color}22;color:${color}">${esc(s.name.charAt(0))}</div>
          <div class="stylist-name">${esc(s.name)}</div>
          <div class="stylist-rev" style="color:${color}">$${s.revenue.toLocaleString()}</div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${s.pct_of_total}%;background:${color}"></div></div>
        <div class="stat-chips">
          <div class="chip">Share <span style="color:${color}">${s.pct_of_total}%</span></div>
          <div class="chip">Services <span>${s.services_completed}</span></div>
          <div class="chip">Avg Ticket <span>$${s.avg_ticket}</span></div>
        </div>
      </div>`;
    });
  }
  load();
</script>
</body>
</html>
