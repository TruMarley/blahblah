<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMS Engagement Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">SMS Engagement Rate</div>
  <p class="page-sub">Open and reply rates for SMS messages sent by your AI — high reply rates signal that clients trust your texts.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Open Rate</div>
      <div class="hero-val" id="h-open" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Reply Rate</div>
      <div class="hero-val" id="h-reply" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Sent (6 wk)</div>
      <div class="hero-val" id="h-sent" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">SMS Sent / Opened / Replied by Week</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,.4)"></div>Sent</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(52,211,153,.65)"></div>Opened</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(251,191,36,.75)"></div>Replied</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/sms-engagement-rate');
    const d = await r.json();
    const weeks = d.weeks || [];
    const avgOpen = (weeks.reduce((s,w)=>s+w.open_rate_pct,0)/weeks.length).toFixed(1);
    const avgReply = (weeks.reduce((s,w)=>s+w.reply_rate_pct,0)/weeks.length).toFixed(1);
    const totalSent = weeks.reduce((s,w)=>s+w.sent,0);
    document.getElementById('h-open').textContent = avgOpen + '%';
    document.getElementById('h-reply').textContent = avgReply + '%';
    document.getElementById('h-sent').textContent = totalSent;

    const svg = document.getElementById('chart');
    const W=700,H=260,pL=44,pR=16,pT=14,pB=28;
    const cW=W-pL-pR,cH=H-pT-pB;
    const n=weeks.length,xStep=cW/n,gW=xStep*0.72,bW=gW/3;
    const maxVal=Math.max(...weeks.map(w=>w.sent))*1.2;
    const xOf=i=>pL+i*xStep+xStep/2;
    const yOf=v=>pT+cH-v/maxVal*cH;

    [20,40,60,80].filter(v=>v<maxVal).forEach(v=>{
      const y=yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">${v}</text>`;
    });

    weeks.forEach((w,i)=>{
      const cx=xOf(i);
      const left=cx-gW/2;
      const sH=cH*w.sent/maxVal, oH=cH*w.opened/maxVal, rH=cH*w.replied/maxVal;
      svg.innerHTML+=`<rect x="${left}" y="${pT+cH-sH}" width="${bW}" height="${sH}" rx="3" fill="rgba(167,139,250,.4)"/>`;
      svg.innerHTML+=`<rect x="${left+bW+2}" y="${pT+cH-oH}" width="${bW}" height="${oH}" rx="3" fill="rgba(52,211,153,.65)"/>`;
      svg.innerHTML+=`<rect x="${left+2*bW+4}" y="${pT+cH-rH}" width="${bW}" height="${rH}" rx="3" fill="rgba(251,191,36,.75)"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="8.5" fill="#555" text-anchor="middle">${esc(w.week)}</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
