<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Method Split — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .donut-wrap { display: flex; justify-content: center; }
    .bar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .85rem; }
    .bar-row:last-child { margin-bottom: 0; }
    .method-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .method-name { font-size: .8rem; font-weight: 700; flex: 1; }
    .bar-track { flex: 1.8; background: var(--surface2); border-radius: 5px; height: 9px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; opacity: .75; }
    .method-pct { font-size: .8rem; font-weight: 900; width: 38px; text-align: right; }
    .method-cnt { font-size: .72rem; color: var(--muted); width: 48px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Payment Method Split</div>
  <p class="page-sub">How your clients prefer to pay — helps you optimize checkout flow and promotions.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Transactions</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Method</div>
      <div class="hero-val" id="h-top" style="font-size:1rem;padding-top:.4rem">—</div>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="card-title">Donut</div>
      <div class="donut-wrap">
        <svg id="donut" viewBox="0 0 120 120" width="160" height="160"></svg>
      </div>
    </div>
    <div class="card">
      <div class="card-title">By Method</div>
      <div id="bar-list"></div>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/payment-method-split');
    const d = await r.json();
    document.getElementById('h-total').textContent = d.total_transactions;
    document.getElementById('h-top').textContent = d.top_method;

    const methods = d.methods || [];
    const svg = document.getElementById('donut');
    const cx=60, cy=60, R=46, r=28, circ=2*Math.PI*R;
    let off = circ*0.25;
    svg.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1e1e1e" stroke-width="${R-r}"/>`;
    methods.forEach(m => {
      const arc = (m.pct/100)*circ;
      svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${m.color}" stroke-width="${R-r}" stroke-dasharray="${arc} ${circ-arc}" stroke-dashoffset="${off}" opacity=".8"/>`;
      off -= arc;
    });
    svg.innerHTML += `<text x="${cx}" y="${cy-4}" font-size="9" fill="#888" text-anchor="middle">Total</text><text x="${cx}" y="${cy+9}" font-size="14" font-weight="900" fill="#e8e8e8" text-anchor="middle">${d.total_transactions}</text>`;

    const maxPct = Math.max(...methods.map(m => m.pct));
    document.getElementById('bar-list').innerHTML = methods.map(m => `
      <div class="bar-row">
        <div class="method-dot" style="background:${m.color}"></div>
        <div class="method-name">${esc(m.method)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(m.pct/maxPct*100).toFixed(1)}%;background:${m.color}"></div></div>
        <div class="method-pct" style="color:${m.color}">${m.pct}%</div>
        <div class="method-cnt">${m.count}</div>
      </div>`).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
