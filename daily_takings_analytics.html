<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Takings — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bar-wrap { display: flex; align-items: flex-end; gap: .6rem; height: 110px; }
    .day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .3rem; }
    .day-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); opacity: .6; transition: opacity .15s; }
    .day-bar.best { background: var(--green); opacity: 1; }
    .day-bar:hover { opacity: 1; }
    .day-val { font-size: .6rem; font-weight: 700; color: var(--accent); }
    .day-lbl { font-size: .68rem; color: var(--muted); font-weight: 700; }
    .day-appts { font-size: .58rem; color: var(--muted); }
    .day-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; margin-bottom: .4rem; display: flex; align-items: center; justify-content: space-between; }
    .day-name { font-size: .82rem; font-weight: 700; width: 40px; }
    .day-rev { font-size: .82rem; font-weight: 900; color: var(--green); }
    .day-cnt { font-size: .7rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Daily Takings</div>
  <p class="page-sub">Revenue and appointment counts by day of the week. Use this to identify slow days worth promoting and peak days worth protecting with deposits.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--green)">—</div><div class="stat-lbl">Total (7d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--accent)">—</div><div class="stat-lbl">Avg Daily</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-best" style="color:var(--yellow)">—</div><div class="stat-lbl">Best Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-appts" style="color:var(--muted)">—</div><div class="stat-lbl">Appointments</div></div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Day</div>
    <div class="bar-wrap" id="bars"></div>
    <div style="display:flex;gap:.6rem;margin-top:.5rem" id="bar-labels"></div>
  </div>
  <div class="card">
    <div class="card-title">Day Breakdown</div>
    <div id="day-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/daily-takings-stats').then(r => r.json());
    document.getElementById('h-total').textContent = '$' + d.total_7d.toLocaleString();
    document.getElementById('h-avg').textContent = '$' + d.avg_daily.toFixed(0);
    document.getElementById('h-best').textContent = d.best_day;
    document.getElementById('h-appts').textContent = d.total_appointments_7d;
    const maxR = Math.max(...d.daily.map(x => x.revenue));
    const bars = document.getElementById('bars');
    const bls = document.getElementById('bar-labels');
    const dl = document.getElementById('day-list');
    d.daily.forEach(x => {
      const h = Math.max(4, (x.revenue / maxR * 95)).toFixed(0);
      const isBest = x.day === d.best_day;
      bars.innerHTML += '<div class="day-col"><div class="day-val">$' + x.revenue.toFixed(0) + '</div><div class="day-bar' + (isBest ? ' best' : '') + '" style="height:' + h + 'px"></div></div>';
      bls.innerHTML += '<div style="flex:1;text-align:center;font-size:.68rem;color:var(--muted);font-weight:700">' + x.day + '</div>';
      dl.innerHTML += '<div class="day-row"><div class="day-name">' + x.day + '</div><div class="day-rev">$' + x.revenue.toFixed(2) + '</div><div class="day-cnt">' + x.appointments + ' appts</div></div>';
    });
  }
  load();
</script>
</body>
</html>
