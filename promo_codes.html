<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promo Codes — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    nav a.back:hover { color: var(--text); }

    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .btn { padding: .5rem 1.1rem; border-radius: 8px; font-size: .82rem; font-weight: 700; border: none; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { opacity: .85; }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { color: var(--text); }

    .add-form { background: var(--surface); border: 1px solid var(--accent); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
    .add-form.show { display: block; }
    .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .65rem; margin-bottom: .75rem; }
    .form-grid input, .form-grid select { background: #0d0d0d; border: 1px solid var(--border); color: var(--text); font-size: .85rem; padding: .55rem .8rem; border-radius: 7px; outline: none; font-family: inherit; width: 100%; }
    .form-grid input:focus, .form-grid select:focus { border-color: var(--accent); }
    .form-grid input::placeholder { color: #444; }
    .form-grid .full { grid-column: 1/-1; }
    .form-btns { display: flex; gap: .5rem; align-items: center; }
    .form-error { font-size: .75rem; color: var(--red); display: none; }
    .form-error.show { display: inline; }

    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .71rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .7rem 1.25rem; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .8rem 1.25rem; font-size: .83rem; vertical-align: middle; }
    .code-cell { font-family: monospace; font-weight: 800; font-size: .9rem; letter-spacing: .05em; color: var(--accent); }
    .disc-cell { font-weight: 700; }
    .uses-cell { color: var(--muted); }
    .exp-cell { font-size: .78rem; color: var(--muted); }
    .toggle { width: 34px; height: 19px; border-radius: 99px; background: var(--border); border: none; cursor: pointer; position: relative; transition: background .2s; }
    .toggle.on { background: var(--green); }
    .toggle::after { content:''; position:absolute; width:13px; height:13px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left .2s; }
    .toggle.on::after { left:18px; }
    .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: .78rem; padding: .2rem .45rem; border-radius: 5px; font-family: inherit; }
    .del-btn:hover { color: var(--red); background: rgba(248,113,113,.08); }
    .empty { color: var(--muted); text-align: center; padding: 3rem; font-size: .85rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="top-row">
    <div class="page-title">Promo Codes</div>
    <button class="btn btn-accent" onclick="toggleForm()">+ Create code</button>
  </div>

  <div class="add-form" id="add-form">
    <div class="form-grid">
      <input id="f-code" placeholder="CODE (e.g. SUMMER25)" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
      <select id="f-type">
        <option value="percent">Percent off (%)</option>
        <option value="flat">Flat off ($)</option>
      </select>
      <input id="f-value" type="number" min="1" placeholder="Value (e.g. 20)">
      <input id="f-uses" type="number" min="1" placeholder="Max uses" value="100">
      <input id="f-expires" type="date" placeholder="Expiry date">
      <div></div>
    </div>
    <div class="form-btns">
      <button class="btn btn-accent" onclick="create()">Create</button>
      <button class="btn btn-ghost" onclick="toggleForm()">Cancel</button>
      <span class="form-error" id="form-err"></span>
    </div>
  </div>

  <div class="table-wrap">
    <table id="promo-table" style="display:none">
      <thead><tr>
        <th>Code</th>
        <th>Discount</th>
        <th>Uses Left</th>
        <th>Expires</th>
        <th>Active</th>
        <th></th>
      </tr></thead>
      <tbody id="promo-body"></tbody>
    </table>
    <div class="empty" id="promo-empty" style="display:none">No promo codes yet. Create your first one.</div>
  </div>
</div>

<script>
  let promos = [];

  async function load() {
    const r = await fetch('/api/promo-codes');
    const d = await r.json();
    promos = d.promos || [];
    render();
  }

  function render() {
    if (!promos.length) {
      document.getElementById('promo-table').style.display = 'none';
      document.getElementById('promo-empty').style.display = '';
      return;
    }
    document.getElementById('promo-table').style.display = '';
    document.getElementById('promo-empty').style.display = 'none';
    document.getElementById('promo-body').innerHTML = promos.map(p => `
      <tr>
        <td class="code-cell">${esc(p.code)}</td>
        <td class="disc-cell">${p.discount_type === 'percent' ? p.discount_value + '%' : '$' + p.discount_value} off</td>
        <td class="uses-cell">${p.uses_remaining === null ? '∞' : p.uses_remaining}</td>
        <td class="exp-cell">${p.expires_at ? fmtDate(p.expires_at) : '—'}</td>
        <td><button class="toggle ${p.active ? 'on' : ''}" onclick="toggle('${esc(p.code)}')"></button></td>
        <td><button class="del-btn" onclick="del('${esc(p.code)}')">Remove</button></td>
      </tr>`).join('');
  }

  function toggleForm() { document.getElementById('add-form').classList.toggle('show'); }

  async function create() {
    const code = document.getElementById('f-code').value.trim();
    const errEl = document.getElementById('form-err');
    if (!/^[A-Z0-9]{2,20}$/.test(code)) {
      errEl.textContent = 'Code must be 2–20 uppercase letters/numbers.';
      errEl.classList.add('show'); return;
    }
    errEl.classList.remove('show');
    const body = {
      code,
      discount_type: document.getElementById('f-type').value,
      discount_value: parseFloat(document.getElementById('f-value').value) || 10,
      uses_remaining: parseInt(document.getElementById('f-uses').value) || 100,
      expires_at: document.getElementById('f-expires').value || '',
    };
    const r = await fetch('/api/promo-codes', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (!d.ok) { errEl.textContent = d.error || 'Error'; errEl.classList.add('show'); return; }
    promos.push(d.entry);
    render();
    document.getElementById('add-form').classList.remove('show');
    ['f-code','f-value','f-uses','f-expires'].forEach(id => document.getElementById(id).value = '');
  }

  async function toggle(code) {
    await fetch(`/api/promo-codes/${code}/toggle`, { method:'PUT' });
    const p = promos.find(x => x.code === code);
    if (p) p.active = !p.active;
    render();
  }

  async function del(code) {
    await fetch(`/api/promo-codes/${code}`, { method:'DELETE' });
    promos = promos.filter(p => p.code !== code);
    render();
  }

  function fmtDate(iso) {
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

  load();
</script>
</body>
</html>
