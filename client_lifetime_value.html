<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Lifetime Value — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.1rem; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .5rem 1rem; border-bottom: 1px solid var(--border); text-align: left; }
    thead th:not(:first-child) { text-align: center; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .7rem 1rem; font-size: .82rem; text-align: center; }
    tbody td:first-child { text-align: left; }
    .seg-badge { display: inline-flex; align-items: center; gap: .4rem; font-size: .78rem; font-weight: 800; }
    .seg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .bar-track { width: 80px; height: 7px; background: var(--surface2); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; }
    .bar-fill { height: 100%; border-radius: 3px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Lifetime Value</div>
  <p class="page-sub">Segment your clients by value tier — Champions to Lost — and understand revenue per segment.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Client LTV</div>
      <div class="hero-val" id="h-ltv" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Clients</div>
      <div class="hero-val" id="h-total">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Client Segments by Lifetime Value</div>
    <table>
      <thead>
        <tr>
          <th>Segment</th>
          <th>Clients</th>
          <th>Avg Visits</th>
          <th>Avg Spend</th>
          <th>Total Rev</th>
          <th>Share</th>
        </tr>
      </thead>
      <tbody id="ltv-tbody"></tbody>
    </table>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/client-lifetime-value');
    const d = await r.json();
    document.getElementById('h-ltv').textContent = '$' + Number(d.avg_ltv).toLocaleString();
    document.getElementById('h-total').textContent = d.total_clients;

    const segments = d.segments || [];
    const maxRev = Math.max(...segments.map(s => s.clients * s.avg_spend), 1);
    const totalRev = segments.reduce((a, s) => a + s.clients * s.avg_spend, 0);

    document.getElementById('ltv-tbody').innerHTML = segments.map(s => {
      const segRev = s.clients * s.avg_spend;
      const pct = (segRev / totalRev * 100).toFixed(0);
      return `<tr>
        <td><span class="seg-badge"><span class="seg-dot" style="background:${s.color}"></span>${esc(s.segment)}</span></td>
        <td>${s.clients}</td>
        <td>${s.avg_visits}</td>
        <td style="font-weight:800">$${Number(s.avg_spend).toLocaleString()}</td>
        <td style="font-weight:800;color:${s.color}">$${Math.round(segRev).toLocaleString()}</td>
        <td>
          <div style="display:flex;align-items:center;gap:.4rem;justify-content:center">
            <div class="bar-track"><div class="bar-fill" style="width:${(segRev/maxRev*100).toFixed(0)}%;background:${s.color}"></div></div>
            <span style="font-size:.72rem;color:var(--muted)">${pct}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
