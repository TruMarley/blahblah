<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Provider Availability — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
    .row:last-child { margin-bottom: 0; }
    .row-label { font-size: .85rem; font-weight: 600; }
    .toggle { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #2a2a2a; border-radius: 24px; cursor: pointer; transition: .2s; }
    .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #555; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(18px); background: #fff; }
    .prov-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: .9rem 1.1rem; margin-bottom: .55rem; }
    .prov-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .prov-name { font-size: .9rem; font-weight: 800; }
    .prov-hours { font-size: .75rem; font-weight: 700; color: var(--green); }
    .day-chips { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .35rem; }
    .day-chip { font-size: .65rem; font-weight: 700; background: rgba(167,139,250,.12); color: var(--accent); border: 1px solid rgba(167,139,250,.22); border-radius: 4px; padding: .12rem .45rem; }
    .prov-meta { font-size: .66rem; color: var(--muted); }
    .save-btn { width: 100%; background: var(--accent); color: #fff; font-size: .88rem; font-weight: 800; border: none; border-radius: 10px; padding: .8rem; cursor: pointer; margin-top: 1.25rem; }
    .save-btn:hover { opacity: .88; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a2a1a; border: 1px solid var(--green); color: var(--green); font-size: .8rem; font-weight: 700; padding: .6rem 1.4rem; border-radius: 8px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Provider Availability</div>
  <p class="page-sub">Set working days, hours, and daily appointment limits per provider. The AI only offers slots that fall within each provider's configured schedule.</p>
  <div class="card">
    <div class="card-title">Global Settings</div>
    <div class="row">
      <div><div class="row-label">AI Respects Availability</div></div>
      <label class="toggle"><input type="checkbox" id="ai-respects"><span class="slider"></span></label>
    </div>
    <div class="row">
      <div><div class="row-label">Block Outside Hours</div></div>
      <label class="toggle"><input type="checkbox" id="block-hours"><span class="slider"></span></label>
    </div>
    <button class="save-btn" onclick="save()">Save Availability Settings</button>
  </div>
  <div class="card">
    <div class="card-title">Provider Schedules</div>
    <div id="prov-list"></div>
  </div>
</div>
<div class="toast" id="toast">Saved!</div>
<script>
  let data = {};
  async function load() {
    data = await fetch('/api/settings/provider-availability-cfg').then(r => r.json());
    document.getElementById('ai-respects').checked = data.ai_respects_availability;
    document.getElementById('block-hours').checked = data.block_outside_hours;
    const pl = document.getElementById('prov-list');
    (data.providers || []).forEach(p => {
      const chips = p.working_days.map(d => '<span class="day-chip">' + d + '</span>').join('');
      pl.innerHTML += '<div class="prov-card"><div class="prov-top"><div class="prov-name">' + p.name + '</div><div class="prov-hours">' + p.start_time + ' – ' + p.end_time + '</div></div><div class="day-chips">' + chips + '</div><div class="prov-meta">Max ' + p.max_daily_appts + ' appts / day</div></div>';
    });
  }
  async function save() {
    const payload = { ...data,
      ai_respects_availability: document.getElementById('ai-respects').checked,
      block_outside_hours: document.getElementById('block-hours').checked,
    };
    await fetch('/api/settings/provider-availability-cfg', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const t = document.getElementById('toast');
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
  }
  load();
</script>
</body>
</html>
