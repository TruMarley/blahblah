<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    nav a.back:hover { color: var(--text); }

    .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; gap: 1rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .btn { padding: .55rem 1.1rem; border-radius: 9px; font-size: .82rem; font-weight: 700; border: none; cursor: pointer; transition: opacity .15s; font-family: inherit; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { opacity: .85; }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { color: var(--text); }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; position: relative; transition: border-color .15s; }
    .card.inactive { opacity: .5; }
    .card-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #a78bfa44, #34d39944); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: .85rem; }
    .card-name { font-size: .95rem; font-weight: 800; margin-bottom: .2rem; }
    .card-role { font-size: .75rem; color: var(--accent); font-weight: 700; margin-bottom: .2rem; }
    .card-specialty { font-size: .75rem; color: var(--muted); margin-bottom: 1rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .toggle-wrap { display: flex; align-items: center; gap: .5rem; }
    .toggle { width: 36px; height: 20px; border-radius: 99px; background: var(--border); border: none; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
    .toggle.on { background: var(--green); }
    .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: left .2s; }
    .toggle.on::after { left: 19px; }
    .toggle-label { font-size: .72rem; color: var(--muted); }
    .del-btn { font-size: .72rem; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
    .del-btn:hover { color: var(--red); }

    /* Add form */
    .add-form { background: var(--surface); border: 1px solid var(--accent); border-radius: 14px; padding: 1.25rem; margin-bottom: 1.5rem; display: none; }
    .add-form.show { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1rem; }
    .form-grid input, .form-grid select { background: #0d0d0d; border: 1px solid var(--border); color: var(--text); font-size: .85rem; padding: .6rem .85rem; border-radius: 8px; outline: none; font-family: inherit; width: 100%; }
    .form-grid input:focus, .form-grid select:focus { border-color: var(--accent); }
    .form-grid input::placeholder { color: #444; }
    .form-btns { display: flex; gap: .5rem; }

    .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(8,8,8,.96); border-top: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: flex-end; gap: .75rem; z-index: 200; display: none; }
    .save-bar.show { display: flex; }
    .save-status { font-size: .8rem; color: var(--green); display: none; }
    .save-status.show { display: block; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="top-row">
    <div class="page-title">Staff</div>
    <button class="btn btn-accent" onclick="toggleAddForm()">+ Add Staff</button>
  </div>

  <div class="add-form" id="add-form">
    <div class="form-grid">
      <input id="f-name"      placeholder="Full name" />
      <input id="f-role"      placeholder="Role (e.g. Barber, Stylist)" />
      <input id="f-specialty" placeholder="Specialty" />
      <select id="f-active">
        <option value="true">Active</option>
        <option value="false">Inactive</option>
      </select>
    </div>
    <div class="form-btns">
      <button class="btn btn-accent" onclick="addStaff()">Add</button>
      <button class="btn btn-ghost" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>
</div>

<div class="save-bar" id="save-bar">
  <span class="save-status" id="save-status">Saved!</span>
  <button class="btn btn-ghost" onclick="loadStaff()">Discard</button>
  <button class="btn btn-accent" onclick="saveStaff()">Save changes</button>
</div>

<script>
  const AVATARS = ['✂️','💅','💇','🧖','💈','🪒','🌸','⭐'];
  let staff = [];

  async function loadStaff() {
    const r = await fetch('/api/staff');
    const d = await r.json();
    staff = d.staff || [];
    render();
    hideSaveBar();
  }

  function render() {
    document.getElementById('cards').innerHTML = staff.map((s, i) => `
      <div class="card ${s.active ? '' : 'inactive'}" id="card-${i}">
        <div class="card-avatar">${AVATARS[i % AVATARS.length]}</div>
        <div class="card-name">${esc(s.name)}</div>
        <div class="card-role">${esc(s.role)}</div>
        <div class="card-specialty">${esc(s.specialty)}</div>
        <div class="card-footer">
          <div class="toggle-wrap">
            <button class="toggle ${s.active ? 'on' : ''}" onclick="toggleActive(${i})" title="${s.active ? 'Active' : 'Inactive'}"></button>
            <span class="toggle-label">${s.active ? 'Active' : 'Off'}</span>
          </div>
          <button class="del-btn" onclick="removeStaff(${i})">Remove</button>
        </div>
      </div>`).join('');
  }

  function toggleActive(i) {
    staff[i].active = !staff[i].active;
    render();
    showSaveBar();
  }

  function removeStaff(i) {
    staff.splice(i, 1);
    render();
    showSaveBar();
  }

  function toggleAddForm() {
    const f = document.getElementById('add-form');
    f.classList.toggle('show');
  }

  function addStaff() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return;
    const nextId = staff.reduce((m, s) => Math.max(m, s.id || 0), 0) + 1;
    staff.push({
      id: nextId,
      name,
      role:      document.getElementById('f-role').value.trim() || 'Staff',
      specialty: document.getElementById('f-specialty').value.trim() || '',
      active:    document.getElementById('f-active').value === 'true',
    });
    ['f-name','f-role','f-specialty'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('add-form').classList.remove('show');
    render();
    showSaveBar();
  }

  async function saveStaff() {
    await fetch('/api/staff', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({staff}) });
    const s = document.getElementById('save-status');
    s.classList.add('show');
    setTimeout(() => s.classList.remove('show'), 2000);
    hideSaveBar();
  }

  function showSaveBar() { document.getElementById('save-bar').classList.add('show'); }
  function hideSaveBar() { document.getElementById('save-bar').classList.remove('show'); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  loadStaff();
</script>
</body>
</html>
