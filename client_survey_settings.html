<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Survey — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem; }
    .row:last-child { margin-bottom: 0; }
    .row-label { font-size: .85rem; font-weight: 600; }
    .row-sub { font-size: .72rem; color: var(--muted); margin-top: .15rem; }
    select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .82rem; padding: .42rem .75rem; outline: none; }
    select:focus { border-color: var(--accent); }
    input[type=number] { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .82rem; padding: .42rem .75rem; outline: none; width: 80px; }
    input[type=number]:focus { border-color: var(--accent); }
    .question-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; }
    .q-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .35rem; }
    .q-text { font-size: .83rem; font-weight: 600; }
    .q-type-chip { font-size: .62rem; font-weight: 700; padding: .15rem .45rem; border-radius: 4px; }
    .q-type-star { background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .q-type-yes_no { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .q-type-open { background: rgba(167,139,250,.1); color: var(--accent); border: 1px solid rgba(167,139,250,.2); }
    .save-btn { width: 100%; background: var(--accent); color: #fff; font-size: .88rem; font-weight: 800; border: none; border-radius: 10px; padding: .8rem; cursor: pointer; margin-top: 1.25rem; }
    .save-btn:hover { opacity: .88; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a2a1a; border: 1px solid var(--green); color: var(--green); font-size: .8rem; font-weight: 700; padding: .6rem 1.4rem; border-radius: 8px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Survey</div>
  <p class="page-sub">Configure post-visit satisfaction surveys. The AI sends these automatically after each appointment via your chosen channel.</p>
  <div class="card">
    <div class="card-title">Delivery Settings</div>
    <div class="row">
      <div><div class="row-label">Send After Visit</div><div class="row-sub">Hours after appointment to send survey</div></div>
      <div style="display:flex;align-items:center;gap:.35rem"><input type="number" id="delay" min="0" max="72"><span style="font-size:.8rem;color:var(--muted)">hrs</span></div>
    </div>
    <div class="row">
      <div><div class="row-label">Delivery Channel</div></div>
      <select id="channel">
        <option value="sms">SMS</option>
        <option value="email">Email</option>
        <option value="both">SMS &amp; Email</option>
      </select>
    </div>
    <button class="save-btn" onclick="save()">Save Survey Settings</button>
  </div>
  <div class="card">
    <div class="card-title">Survey Questions</div>
    <div id="q-list"></div>
  </div>
</div>
<div class="toast" id="toast">Saved!</div>
<script>
  let data = {};
  async function load() {
    data = await fetch('/api/settings/client-survey-cfg').then(r => r.json());
    document.getElementById('delay').value = data.send_after_visit_hours;
    document.getElementById('channel').value = data.channel;
    const ql = document.getElementById('q-list');
    (data.questions || []).forEach(q => {
      const cls = 'q-type-' + q.type;
      const label = q.type === 'star' ? '★ Star Rating' : q.type === 'yes_no' ? 'Yes / No' : 'Open Text';
      ql.innerHTML += '<div class="question-card"><div class="q-top"><div class="q-text">' + q.text + '</div><span class="q-type-chip ' + cls + '">' + label + '</span></div></div>';
    });
  }
  async function save() {
    const payload = { ...data,
      send_after_visit_hours: parseInt(document.getElementById('delay').value) || 2,
      channel: document.getElementById('channel').value,
    };
    await fetch('/api/settings/client-survey-cfg', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const t = document.getElementById('toast');
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
  }
  load();
</script>
</body>
</html>
