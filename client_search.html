<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Search — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 1.5rem; }
    .search-wrap { position: relative; margin-bottom: 1.75rem; }
    .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 1.1rem; font-family: inherit; padding: .85rem 1rem .85rem 2.8rem; border-radius: 12px; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: rgba(167,139,250,.5); }
    .search-icon { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; pointer-events: none; }
    /* Results */
    .client-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: .65rem; display: flex; align-items: center; gap: 1rem; transition: border-color .1s; }
    .client-card:hover { border-color: #333; }
    .client-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.25); display: flex; align-items: center; justify-content: center; font-size: .9rem; font-weight: 900; color: var(--accent); flex-shrink: 0; }
    .client-info { flex: 1; }
    .client-name { font-size: .9rem; font-weight: 800; }
    .client-phone { font-size: .72rem; color: var(--muted); margin-top: .1rem; }
    .client-meta { display: flex; gap: .75rem; margin-top: .25rem; }
    .meta-chip { font-size: .65rem; color: var(--muted); }
    .view-btn { font-size: .75rem; font-weight: 700; color: var(--accent); text-decoration: none; border: 1px solid rgba(167,139,250,.25); padding: .3rem .75rem; border-radius: 7px; transition: all .15s; white-space: nowrap; flex-shrink: 0; }
    .view-btn:hover { background: rgba(167,139,250,.08); }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .empty-title { font-size: .95rem; font-weight: 700; margin-bottom: .35rem; }
    .empty-sub { font-size: .78rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Search</div>
  <p class="page-sub">Search by name or phone number.</p>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="Type a name or phone number..." autocomplete="off" oninput="onInput(this.value)">
  </div>

  <div id="results"></div>
</div>
<script>
  let debounce = null;

  function onInput(val) {
    clearTimeout(debounce);
    if (val.trim().length < 2) {
      showEmpty('pre');
      return;
    }
    debounce = setTimeout(() => search(val.trim()), 280);
  }

  async function search(q) {
    const r = await fetch(`/api/clients/search?q=${encodeURIComponent(q)}`);
    const d = await r.json();
    const clients = d.clients || [];
    if (!clients.length) { showEmpty('none', q); return; }
    document.getElementById('results').innerHTML = clients.map(c => {
      const init = c.client_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const lastVisit = c.last_visit_days_ago <= 7 ? c.last_visit_days_ago + 'd ago' : c.last_visit_days_ago <= 30 ? Math.floor(c.last_visit_days_ago/7) + 'w ago' : Math.floor(c.last_visit_days_ago/30) + 'mo ago';
      return `<div class="client-card">
        <div class="client-avatar">${init}</div>
        <div class="client-info">
          <div class="client-name">${esc(c.client_name)}</div>
          <div class="client-phone">${esc(c.phone)}</div>
          <div class="client-meta">
            <span class="meta-chip">${c.total_visits} visits</span>
            <span class="meta-chip">Last: ${lastVisit}</span>
          </div>
        </div>
        <a class="view-btn" href="/clients/history?id=${encodeURIComponent(c.id)}">View →</a>
      </div>`;
    }).join('');
  }

  function showEmpty(type, q) {
    if (type === 'pre') {
      document.getElementById('results').innerHTML = `<div class="empty-state">
        <div class="empty-icon">👥</div>
        <div class="empty-title">Search your clients</div>
        <div class="empty-sub">Type at least 2 characters to search by name or phone.</div>
      </div>`;
    } else {
      document.getElementById('results').innerHTML = `<div class="empty-state">
        <div class="empty-icon">🔎</div>
        <div class="empty-title">No results for "${esc(q)}"</div>
        <div class="empty-sub">Try a different name or phone number.</div>
      </div>`;
    }
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  showEmpty('pre');
</script>
</body>
</html>
