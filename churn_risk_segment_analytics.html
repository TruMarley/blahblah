<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Churn Risk — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .seg-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: .6rem; }
    .seg-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .seg-name { font-size: .9rem; font-weight: 800; }
    .seg-count { font-size: .9rem; font-weight: 900; }
    .seg-desc { font-size: .7rem; color: var(--muted); margin-bottom: .45rem; }
    .seg-track { background: #1a1a1a; border-radius: 3px; height: 7px; overflow: hidden; }
    .seg-fill { height: 100%; border-radius: 3px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Churn Risk Segments</div>
  <p class="page-sub">Classify clients by recency of last visit. At-risk and lapsing segments are prime targets for AI win-back outreach — reaching out before they churn is 5× cheaper than acquiring a replacement.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Clients</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-outreach" style="color:var(--green)">—</div><div class="stat-lbl">AI Outreach</div></div>
  </div>
  <div class="card">
    <div class="card-title">Client Segments</div>
    <div id="seg-list"></div>
  </div>
</div>
<script>
  const COLOR_MAP = {green: 'var(--green)', yellow: 'var(--yellow)', red: 'var(--red)', muted: 'var(--muted)'};
  async function load() {
    const d = await fetch('/api/analytics/churn-risk-segment-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_clients;
    document.getElementById('h-outreach').textContent = d.ai_outreach_enabled ? 'Enabled' : 'Disabled';
    document.getElementById('h-outreach').style.color = d.ai_outreach_enabled ? 'var(--green)' : 'var(--red)';
    const sl = document.getElementById('seg-list');
    d.segments.forEach(s => {
      const color = COLOR_MAP[s.color] || 'var(--muted)';
      sl.innerHTML += '<div class="seg-card"><div class="seg-top"><div class="seg-name" style="color:' + color + '">' + s.segment + '</div><div class="seg-count" style="color:' + color + '">' + s.count + ' clients</div></div><div class="seg-desc">' + s.description + '</div><div class="seg-track"><div class="seg-fill" style="width:' + s.pct + '%;background:' + color + '"></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
