<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Spread — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .prov-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; margin-bottom: .5rem; }
    .prov-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
    .prov-name { font-size: .9rem; font-weight: 800; }
    .prov-pct { font-size: .88rem; font-weight: 900; }
    .bar-track { background: var(--bg); border-radius: 4px; height: 9px; overflow: hidden; margin-bottom: .45rem; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .prov-meta { display: flex; gap: 1.4rem; }
    .meta-item { font-size: .68rem; color: var(--muted); }
    .meta-item span { color: var(--text); font-weight: 700; }
    .waitlist-badge { font-size: .62rem; font-weight: 700; border-radius: 4px; padding: .1rem .38rem; background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Booking Spread</div>
  <p class="page-sub">See how appointments are distributed across providers. A large spread gap means one provider is overbooked while others have capacity — consider nudging AI routing to balance demand.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Bookings (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-gap" style="color:var(--yellow)">—</div><div class="stat-lbl">Spread Gap</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--green)">—</div><div class="stat-lbl">Most Booked</div></div>
  </div>
  <div class="card">
    <div class="card-title">Provider Distribution</div>
    <div id="prov-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','var(--green)','var(--yellow)'];
  async function load() {
    const d = await fetch('/api/analytics/provider-booking-spread-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_bookings_30d;
    document.getElementById('h-gap').textContent = d.spread_gap_pct.toFixed(1) + '%';
    document.getElementById('h-top').textContent = d.most_booked;
    const pl = document.getElementById('prov-list');
    d.providers.forEach((p, i) => {
      pl.innerHTML += '<div class="prov-card"><div class="prov-top"><div class="prov-name">' + p.name + '</div><div class="prov-pct" style="color:' + COLORS[i] + '">' + p.pct.toFixed(1) + '%</div></div><div class="bar-track"><div class="bar-fill" style="width:' + p.pct + '%;background:' + COLORS[i] + '"></div></div><div class="prov-meta"><div class="meta-item">Bookings <span>' + p.bookings_30d + '</span></div><div class="meta-item">Waitlisted <span>' + p.waitlist_30d + '</span></div>' + (p.waitlist_30d > 10 ? '<span class="waitlist-badge">High demand</span>' : '') + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
