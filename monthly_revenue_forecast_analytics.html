<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue Forecast — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; text-align: left; padding-bottom: .6rem; border-bottom: 1px solid var(--border); }
    td { font-size: .8rem; padding: .55rem 0; border-bottom: 1px solid var(--border); }
    td:last-child, th:last-child { text-align: right; }
    tr:last-child td { border-bottom: none; }
    .up { color: var(--green); }
    .down { color: var(--red); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue Forecast</div>
  <p class="page-sub">Monthly revenue forecast vs. actual. Track year-over-year growth and model accuracy to plan staffing and marketing spend.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-next" style="color:var(--accent)">—</div><div class="stat-lbl">Next Month Forecast</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-yoy" style="color:var(--green)">—</div><div class="stat-lbl">YoY Growth</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-acc" style="color:var(--muted)">—</div><div class="stat-lbl">Forecast Accuracy</div></div>
  </div>
  <div class="card">
    <div class="card-title">Forecast vs. Actual by Month</div>
    <table>
      <thead><tr><th>Month</th><th>Forecast</th><th>Actual</th><th>Variance</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/monthly-revenue-forecast-stats').then(r => r.json());
    document.getElementById('h-next').textContent = '$' + d.forecast_next_month.toLocaleString();
    document.getElementById('h-yoy').textContent = '+' + d.yoy_growth_pct.toFixed(1) + '%';
    document.getElementById('h-acc').textContent = d.forecast_accuracy_pct.toFixed(1) + '%';
    const tb = document.getElementById('tbl');
    d.months.forEach(m => {
      const diff = m.actual - m.forecast;
      const cls = diff >= 0 ? 'up' : 'down';
      const sign = diff >= 0 ? '+' : '';
      tb.innerHTML += '<tr><td>' + m.month + '</td><td>$' + m.forecast.toLocaleString() + '</td><td>$' + m.actual.toLocaleString() + '</td><td class="' + cls + '">' + sign + '$' + Math.abs(diff).toLocaleString() + '</td></tr>';
    });
  }
  load();
</script>
</body>
</html>
