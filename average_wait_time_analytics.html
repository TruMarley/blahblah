<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Average Wait Time — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1rem; text-align: center; }
    .hero-label { font-size: .64rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.5rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: .5rem; }
    .day-card { background: var(--surface2); border-radius: 10px; padding: .6rem .4rem; text-align: center; }
    .day-name { font-size: .62rem; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: .35rem; }
    .day-avg { font-size: 1rem; font-weight: 900; color: var(--yellow); }
    .day-peak { font-size: .65rem; color: var(--muted); margin-top: .15rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Average Wait Time</div>
  <p class="page-sub">Track how long clients wait before being seen — by hour of day and day of week. Use this to staff up during peak windows and reduce frustrating wait times.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Overall Avg</div>
      <div class="hero-val" id="h-avg" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Peak Wait</div>
      <div class="hero-val" id="h-peak" style="color:var(--red)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Under 10 Min</div>
      <div class="hero-val" id="h-under10" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Wait Time by Hour</div>
    <svg id="chart" viewBox="0 0 680 160" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block"></svg>
  </div>
  <div class="card">
    <div class="card-title">Average Wait by Day of Week</div>
    <div class="day-grid" id="day-grid"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/average-wait-time').then(r => r.json());
    document.getElementById('h-avg').textContent = d.overall_avg_minutes != null ? d.overall_avg_minutes + ' min' : '—';
    document.getElementById('h-peak').textContent = d.peak_wait_minutes != null ? d.peak_wait_minutes + ' min' : '—';
    document.getElementById('h-under10').textContent = d.under_10_pct != null ? d.under_10_pct + '%' : '—';

    const hours = d.hours || [], waits = d.avg_waits || [];
    if (hours.length) {
      const W=680,H=160,pL=36,pR=16,pT=18,pB=28,n=hours.length;
      const cW=W-pL-pR, cH=H-pT-pB;
      const mx=Math.max(...waits,1), mn=0;
      const pts = waits.map((v,i)=>({x:pL+i*(cW/(n-1)),y:pT+cH-(v-mn)/(mx-mn)*cH,v}));
      const path = pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
      const fill = path+' L'+pts[pts.length-1].x.toFixed(1)+','+(pT+cH)+' L'+pL+','+(pT+cH)+' Z';
      let svg = `<path d="${fill}" fill="rgba(251,191,36,.08)"/>`;
      svg += `<path d="${path}" fill="none" stroke="var(--yellow)" stroke-width="2.5" stroke-linejoin="round"/>`;
      pts.forEach((p,i)=>{
        svg+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" fill="var(--yellow)"/>`;
        svg+=`<text x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}" text-anchor="middle" fill="var(--yellow)" font-size="8" font-weight="700">${p.v}</text>`;
        svg+=`<text x="${p.x.toFixed(1)}" y="${H-pB+14}" text-anchor="middle" fill="#555" font-size="8">${esc(hours[i]||'')}</text>`;
      });
      document.getElementById('chart').innerHTML=svg;
    }

    const dg = document.getElementById('day-grid');
    (d.by_day||[]).forEach(day=>{
      dg.innerHTML+=`<div class="day-card">
        <div class="day-name">${esc(day.day)}</div>
        <div class="day-avg">${day.avg_minutes}m</div>
        <div class="day-peak">peak ${day.peak_minutes}m</div>
      </div>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
