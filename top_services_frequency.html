<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Services by Frequency — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .layout { display: grid; grid-template-columns: 1fr 1.4fr; gap: 1.25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .rank-row { display: flex; align-items: center; gap: .7rem; margin-bottom: .75rem; }
    .rank-row:last-child { margin-bottom: 0; }
    .rank-num { font-size: .72rem; font-weight: 900; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
    .rank-num.gold   { color: #fbbf24; }
    .rank-num.silver { color: #94a3b8; }
    .rank-num.bronze { color: #d97706; }
    .svc-name { font-size: .8rem; font-weight: 700; flex: 1; }
    .bar-track { flex: .8; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .bk-count { font-size: .75rem; font-weight: 800; width: 32px; text-align: right; flex-shrink: 0; color: var(--muted); }
    .pct-lbl  { font-size: .72rem; width: 34px; text-align: right; flex-shrink: 0; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Top Services by Frequency</div>
  <p class="page-sub">Which services get booked most often — a demand signal for staffing and capacity planning.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Bookings</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Most Booked</div>
      <div class="hero-val" id="h-top" style="font-size:.95rem;padding-top:.4rem;color:var(--yellow)">—</div>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="card-title">Donut</div>
      <div style="display:flex;justify-content:center">
        <svg id="donut" viewBox="0 0 120 120" width="160" height="160"></svg>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Ranked List</div>
      <div id="rank-list"></div>
    </div>
  </div>
</div>
<script>
  const COLORS = ['#fbbf24','#94a3b8','#d97706','#a78bfa','#34d399','#60a5fa','#fb923c','#f87171'];
  const RANK_CLASS = i => i===0?'gold':i===1?'silver':i===2?'bronze':'';

  async function load() {
    const r = await fetch('/api/analytics/top-services-by-frequency');
    const d = await r.json();
    document.getElementById('h-total').textContent = d.total_bookings;
    document.getElementById('h-top').textContent = d.top_service;

    const svcs = d.services || [];
    const svg = document.getElementById('donut');
    const cx=60,cy=60,R=46,rIn=28,circ=2*Math.PI*R;
    svg.innerHTML = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#1e1e1e" stroke-width="${R-rIn}"/>`;
    let off = circ*0.25;
    svcs.forEach((s,i) => {
      const arc = (s.pct_of_total/100)*circ;
      svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${COLORS[i]}" stroke-width="${R-rIn}" stroke-dasharray="${arc} ${circ-arc}" stroke-dashoffset="${off}" opacity=".85"/>`;
      off -= arc;
    });
    svg.innerHTML += `<text x="${cx}" y="${cy+5}" font-size="12" font-weight="900" fill="#e8e8e8" text-anchor="middle">#1</text>`;

    const maxB = svcs[0]?.bookings || 1;
    document.getElementById('rank-list').innerHTML = svcs.map((s,i) => `
      <div class="rank-row">
        <div class="rank-num ${RANK_CLASS(i)}">#${i+1}</div>
        <div class="svc-name">${esc(s.name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(s.bookings/maxB*100).toFixed(1)}%;background:${COLORS[i]};opacity:.8"></div></div>
        <div class="bk-count">${s.bookings}</div>
        <div class="pct-lbl">${s.pct_of_total}%</div>
      </div>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
