<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Lapse Risk — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .seg-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .seg-label { font-size: .78rem; font-weight: 600; width: 110px; flex-shrink: 0; }
    .seg-days { font-size: .65rem; color: var(--muted); width: 68px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .seg-count { font-size: .72rem; font-weight: 700; width: 32px; text-align: right; }
    .seg-pct { font-size: .72rem; color: var(--muted); width: 38px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Lapse Risk</div>
  <p class="page-sub">Segment your client base by days since last visit. At-risk and lapsed clients are prime candidates for win-back SMS campaigns — target them before they're gone for good.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Active Clients</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-risk" style="color:var(--red)">—</div><div class="stat-lbl">At-Risk Count</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-riskpct" style="color:var(--red)">—</div><div class="stat-lbl">At-Risk %</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-healthy" style="color:var(--green)">—</div><div class="stat-lbl">Healthy %</div></div>
  </div>
  <div class="card">
    <div class="card-title">Risk Segments</div>
    <div id="seg-list"></div>
  </div>
</div>
<script>
  const RISK_COLORS = {'low':'var(--green)','medium':'var(--yellow)','high':'var(--red)','critical':'var(--red)'};
  async function load() {
    const d = await fetch('/api/analytics/client-lapse-risk-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_active_clients;
    document.getElementById('h-risk').textContent = d.at_risk_count;
    document.getElementById('h-riskpct').textContent = d.at_risk_pct.toFixed(1) + '%';
    document.getElementById('h-healthy').textContent = d.healthy_pct.toFixed(1) + '%';
    const maxC = Math.max(...d.segments.map(s => s.count));
    const sl = document.getElementById('seg-list');
    d.segments.forEach(s => {
      const w = (s.count / maxC * 100).toFixed(1);
      const col = RISK_COLORS[s.risk];
      sl.innerHTML += '<div class="seg-row"><div class="seg-label" style="color:' + col + '">' + s.label + '</div><div class="seg-days">' + s.days_since + '</div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:' + col + '"></div></div><div class="seg-count" style="color:' + col + '">' + s.count + '</div><div class="seg-pct">' + s.pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
