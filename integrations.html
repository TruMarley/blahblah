<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Integrations — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .category-section { margin-bottom: 2rem; }
    .category-label { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .85rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); }
    .intg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: .75rem; }
    .intg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.25rem; display: flex; align-items: center; gap: .9rem; transition: border-color .1s; }
    .intg-card.connected { border-color: rgba(52,211,153,.2); }
    .intg-icon { font-size: 1.6rem; flex-shrink: 0; }
    .intg-info { flex: 1; min-width: 0; }
    .intg-name { font-size: .88rem; font-weight: 800; }
    .intg-desc { font-size: .7rem; color: var(--muted); margin-top: .1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .intg-sync { font-size: .65rem; color: var(--green); margin-top: .2rem; display: flex; align-items: center; gap: .3rem; }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: var(--green); }
    .dot.gray { background: var(--muted); }
    .intg-btn { flex-shrink: 0; font-size: .72rem; font-weight: 700; padding: .35rem .8rem; border-radius: 7px; cursor: pointer; font-family: inherit; border: 1px solid var(--border); transition: all .15s; white-space: nowrap; }
    .intg-btn.connect { background: var(--surface2); color: var(--muted); }
    .intg-btn.connect:hover { color: var(--text); border-color: #3e3e3e; }
    .intg-btn.connected { background: rgba(52,211,153,.08); color: var(--green); border-color: rgba(52,211,153,.2); }
    .intg-btn.connected:hover { background: rgba(248,113,113,.08); color: var(--red); border-color: rgba(248,113,113,.2); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Integrations</div>
  <p class="page-sub">Connect your tools to sync bookings, payments, and reviews automatically.</p>
  <div id="container"></div>
</div>
<script>
  let integrations = [];

  function relTime(iso) {
    if (!iso) return null;
    const diff = Math.floor((new Date() - new Date(iso)) / 60000);
    if (diff < 1) return 'just now';
    if (diff < 60) return diff + 'm ago';
    if (diff < 1440) return Math.floor(diff/60) + 'h ago';
    return Math.floor(diff/1440) + 'd ago';
  }

  function render() {
    const categories = [...new Set(integrations.map(i => i.category))];
    document.getElementById('container').innerHTML = categories.map(cat => {
      const items = integrations.filter(i => i.category === cat);
      return `<div class="category-section">
        <div class="category-label">${cat}</div>
        <div class="intg-grid">
          ${items.map(intg => {
            const syncStr = intg.connected && intg.last_sync ? `<div class="intg-sync"><div class="dot green"></div>Last sync ${relTime(intg.last_sync)}</div>` : '';
            const btnCls = intg.connected ? 'connected' : 'connect';
            const btnTxt = intg.connected ? 'Connected' : 'Connect';
            return `<div class="intg-card${intg.connected?' connected':''}" id="card-${slugify(intg.name)}">
              <div class="intg-icon">${intg.icon_emoji}</div>
              <div class="intg-info">
                <div class="intg-name">${esc(intg.name)}</div>
                <div class="intg-desc">${esc(intg.description)}</div>
                ${syncStr}
              </div>
              <button class="intg-btn ${btnCls}" onclick="toggle('${slugify(intg.name)}')">${btnTxt}</button>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
  }

  async function toggle(slug) {
    const intg = integrations.find(i => slugify(i.name) === slug);
    if (!intg) return;
    const action = intg.connected ? 'disconnect' : 'connect';
    const btn = document.querySelector(`#card-${slug} .intg-btn`);
    if (btn) btn.textContent = '...';
    await fetch(`/api/settings/integrations/${encodeURIComponent(intg.name)}/${action}`, {method:'POST'});
    intg.connected = !intg.connected;
    intg.last_sync = intg.connected ? new Date().toISOString() : null;
    render();
  }

  async function load() {
    const r = await fetch('/api/settings/integrations');
    const d = await r.json();
    integrations = d.integrations || [];
    render();
  }

  function slugify(s) { return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
