<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Categories — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .cat-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; display: flex; align-items: center; justify-content: space-between; }
    .cat-row.inactive { opacity: .45; }
    .cat-name { font-size: .88rem; font-weight: 700; }
    .cat-meta { font-size: .68rem; color: var(--muted); margin-top: .15rem; }
    .cat-right { display: flex; align-items: center; gap: .75rem; }
    .cat-rev { font-size: .75rem; font-weight: 700; color: var(--green); }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #2a2a2a; border-radius: 20px; cursor: pointer; transition: .2s; }
    .slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #555; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(16px); background: #fff; }
    .save-btn { width: 100%; background: var(--accent); color: #fff; font-size: .88rem; font-weight: 800; border: none; border-radius: 10px; padding: .8rem; cursor: pointer; margin-top: 1.25rem; }
    .save-btn:hover { opacity: .88; }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a2a1a; border: 1px solid var(--green); color: var(--green); font-size: .8rem; font-weight: 700; padding: .6rem 1.4rem; border-radius: 8px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Categories</div>
  <p class="page-sub">Organise your services into categories. The AI uses categories to understand and describe your menu — inactive categories are hidden from booking.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--muted)">—</div><div class="stat-lbl">Total Categories</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-active" style="color:var(--green)">—</div><div class="stat-lbl">Active Categories</div></div>
  </div>
  <div class="card">
    <div class="card-title">Category Management</div>
    <div id="cat-list"></div>
    <button class="save-btn" onclick="save()">Save Category Settings</button>
  </div>
</div>
<div class="toast" id="toast">Saved!</div>
<script>
  let data = {};
  const toggles = {};
  async function load() {
    data = await fetch('/api/settings/service-category-cfg').then(r => r.json());
    document.getElementById('h-total').textContent = data.total_categories;
    document.getElementById('h-active').textContent = data.active_categories;
    const cl = document.getElementById('cat-list');
    data.categories.forEach((c, i) => {
      const id = 'cat-' + i;
      const revText = c.active && c.revenue_pct > 0 ? '<span class="cat-rev">' + c.revenue_pct.toFixed(1) + '% revenue</span>' : '';
      cl.innerHTML += '<div class="cat-row' + (c.active ? '' : ' inactive') + '" id="row-' + i + '"><div><div class="cat-name">' + c.name + '</div><div class="cat-meta">' + c.service_count + ' services</div></div><div class="cat-right">' + revText + '<label class="toggle"><input type="checkbox" id="' + id + '"' + (c.active ? ' checked' : '') + '><span class="slider"></span></label></div></div>';
    });
  }
  async function save() {
    const cats = data.categories.map((c, i) => ({...c, active: document.getElementById('cat-' + i).checked}));
    const payload = { ...data, categories: cats, active_categories: cats.filter(c => c.active).length };
    await fetch('/api/settings/service-category-cfg', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const t = document.getElementById('toast');
    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
  }
  load();
</script>
</body>
</html>
