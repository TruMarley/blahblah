<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Recordings — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .rec-row { border-bottom: 1px solid var(--border); padding: .9rem 0; cursor: pointer; }
    .rec-row:last-child { border-bottom: none; }
    .rec-row:hover { background: var(--surface2); margin: 0 -1.5rem; padding: .9rem 1.5rem; border-radius: 8px; }
    .rec-top { display: flex; align-items: center; gap: .75rem; margin-bottom: .3rem; }
    .caller-name { font-weight: 800; font-size: .88rem; flex: 1; }
    .duration { font-size: .72rem; color: var(--muted); background: var(--surface2); padding: .15rem .45rem; border-radius: 5px; }
    .flag { font-size: .68rem; font-weight: 800; color: var(--red); border: 1px solid rgba(248,113,113,.3); padding: .15rem .4rem; border-radius: 5px; background: rgba(248,113,113,.06); }
    .rec-meta { display: flex; gap: 1.25rem; font-size: .75rem; color: var(--muted); flex-wrap: wrap; }
    .outcome-badge { font-size: .65rem; font-weight: 800; padding: .15rem .5rem; border-radius: 99px; }
    .ob-booked { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
    .ob-other { background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--border); }
    .transcript-box { display: none; background: var(--surface2); border-radius: 8px; padding: .75rem 1rem; margin-top: .65rem; font-size: .78rem; color: var(--muted); font-style: italic; border-left: 3px solid rgba(167,139,250,.4); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Recordings</div>
  <p class="page-sub">Recent AI-handled calls — tap a row to expand the transcript preview.</p>

  <div class="card">
    <div class="card-title">Recent Calls</div>
    <div id="rec-list"></div>
  </div>
</div>
<script>
  function fmtDur(sec) {
    const m = Math.floor(sec/60), s = sec%60;
    return m + ':' + String(s).padStart(2,'0');
  }

  async function load() {
    const r = await fetch('/api/call-recordings');
    const d = await r.json();
    document.getElementById('rec-list').innerHTML = (d.recordings || []).map(rec => {
      const isBooked = rec.outcome === 'Booked' || rec.outcome === 'Rescheduled';
      return `
        <div class="rec-row" onclick="toggleTranscript('${rec.rec_id}')">
          <div class="rec-top">
            <div class="caller-name">${esc(rec.caller)}</div>
            ${rec.flagged ? '<span class="flag">⚑ Review</span>' : ''}
            <span class="duration">${fmtDur(rec.duration_sec)}</span>
          </div>
          <div class="rec-meta">
            <span>${esc(rec.date)} · ${esc(rec.time)}</span>
            <span>${esc(rec.intent)}</span>
            <span class="outcome-badge ${isBooked ? 'ob-booked' : 'ob-other'}">${esc(rec.outcome)}</span>
          </div>
          <div class="transcript-box" id="tr-${rec.rec_id}">${esc(rec.transcript_preview)}</div>
        </div>`;
    }).join('');
  }

  function toggleTranscript(id) {
    const box = document.getElementById('tr-' + id);
    box.style.display = box.style.display === 'block' ? 'none' : 'block';
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
