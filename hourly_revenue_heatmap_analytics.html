<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue Heatmap — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1rem; text-align: center; }
    .hero-label { font-size: .64rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.5rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .heatmap-wrap { overflow-x: auto; }
    .heatmap-table { border-collapse: separate; border-spacing: 3px; min-width: 560px; width: 100%; }
    .heatmap-table th { font-size: .62rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; padding: .2rem .3rem; text-align: center; }
    .heatmap-table td.hour-label { font-size: .65rem; color: var(--muted); font-weight: 600; padding-right: .5rem; white-space: nowrap; text-align: right; min-width: 52px; }
    .hm-cell { border-radius: 5px; height: 28px; min-width: 36px; transition: opacity .15s; cursor: default; position: relative; }
    .hm-cell:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--border); color: var(--text); font-size: .65rem; padding: .25rem .5rem; border-radius: 5px; white-space: nowrap; pointer-events: none; z-index: 10; }
    .legend-row { display: flex; align-items: center; gap: .5rem; margin-top: 1rem; }
    .legend-label { font-size: .65rem; color: var(--muted); }
    .legend-grad { flex: 1; height: 8px; border-radius: 4px; background: linear-gradient(to right, rgba(167,139,250,.08), rgba(167,139,250,.35), rgba(167,139,250,.7), #a78bfa); }
    .insight-box { background: rgba(167,139,250,.07); border: 1px solid rgba(167,139,250,.18); border-radius: 10px; padding: .85rem 1rem; margin-top: 1rem; font-size: .78rem; color: var(--text); line-height: 1.6; }
    .insight-box strong { color: var(--accent); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue Heatmap</div>
  <p class="page-sub">See which day-hour combinations drive the most revenue. Darker cells = more revenue. Use this to schedule promotions, staff up during peaks, and avoid over-staffing dead zones.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Peak Hour</div>
      <div class="hero-val" id="h-peak-hour" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Peak Day</div>
      <div class="hero-val" id="h-peak-day" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Cell Revenue</div>
      <div class="hero-val" id="h-top-cell" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Day &amp; Hour</div>
    <div class="heatmap-wrap">
      <table class="heatmap-table" id="heatmap-table"></table>
    </div>
    <div class="legend-row">
      <span class="legend-label">Low</span>
      <div class="legend-grad"></div>
      <span class="legend-label">High</span>
    </div>
    <div class="insight-box" id="insight-box"></div>
  </div>
</div>
<script>
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  function fmtHour(h) {
    if (h === 0) return '12 AM';
    if (h < 12) return h + ' AM';
    if (h === 12) return '12 PM';
    return (h - 12) + ' PM';
  }
  function fmtMoney(v) { return '$' + (v >= 1000 ? (v/1000).toFixed(1) + 'k' : Math.round(v)); }
  async function load() {
    const d = await fetch('/api/analytics/revenue-heatmap-data').then(r => r.json());
    document.getElementById('h-peak-hour').textContent = d.peak_hour != null ? fmtHour(d.peak_hour) : '—';
    document.getElementById('h-peak-day').textContent = d.peak_day || '—';

    const cells = d.cells || [];
    const maxRev = Math.max(...cells.map(c => c.revenue), 1);

    // find top cell value
    const topCell = cells.reduce((best, c) => c.revenue > (best ? best.revenue : 0) ? c : best, null);
    document.getElementById('h-top-cell').textContent = topCell ? fmtMoney(topCell.revenue) : '—';

    // build lookup
    const map = {};
    cells.forEach(c => { map[c.day + '_' + c.hour] = c.revenue; });

    // determine hour range from data
    const hours = [...new Set(cells.map(c => c.hour))].sort((a,b)=>a-b);

    let html = '<thead><tr><th></th>';
    DAYS.forEach(day => { html += `<th>${day}</th>`; });
    html += '</tr></thead><tbody>';

    hours.forEach(h => {
      html += `<tr><td class="hour-label">${fmtHour(h)}</td>`;
      DAYS.forEach(day => {
        const rev = map[day + '_' + h] || 0;
        const intensity = maxRev > 0 ? rev / maxRev : 0;
        const alpha = 0.05 + intensity * 0.82;
        const tip = `${day} ${fmtHour(h)}: ${fmtMoney(rev)}`;
        html += `<td class="hm-cell" style="background:rgba(167,139,250,${alpha.toFixed(2)})" data-tip="${esc(tip)}"></td>`;
      });
      html += '</tr>';
    });
    html += '</tbody>';
    document.getElementById('heatmap-table').innerHTML = html;

    // insight
    const quietCells = cells.filter(c => c.revenue < maxRev * 0.25);
    const quietPct = cells.length > 0 ? Math.round(quietCells.length / cells.length * 100) : 0;
    document.getElementById('insight-box').innerHTML =
      `<strong>${d.peak_day || 'Saturday'} at ${fmtHour(d.peak_hour || 11)}</strong> is your highest-revenue window. ` +
      `<strong>${quietPct}%</strong> of slots generate less than 25% of peak revenue — consider targeted promotions or reduced staffing during those windows to improve margin.`;
  }
  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  load();
</script>
</body>
</html>
