<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMS Response Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .sms-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; }
    .sms-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .sms-type { font-size: .82rem; font-weight: 700; }
    .sms-rate { font-size: .88rem; font-weight: 900; }
    .bar-track { background: var(--bg); border-radius: 3px; height: 7px; overflow: hidden; margin-bottom: .4rem; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .sms-meta { display: flex; gap: 1.2rem; }
    .sms-meta-item { font-size: .67rem; color: var(--muted); }
    .sms-meta-item span { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">SMS Response Rate</div>
  <p class="page-sub">Track how many clients respond to automated SMS messages by type. Low response rates signal copy or timing issues that can be addressed in your SMS templates.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-overall" style="color:var(--accent)">—</div><div class="stat-lbl">Overall Response Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-sent" style="color:var(--muted)">—</div><div class="stat-lbl">SMS Sent (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-optout" style="color:var(--red)">—</div><div class="stat-lbl">Opt-Out Rate</div></div>
  </div>
  <div class="card">
    <div class="card-title">By Message Type</div>
    <div id="sms-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','var(--green)','var(--yellow)','#60a5fa'];
  async function load() {
    const d = await fetch('/api/analytics/sms-response-rate-stats').then(r => r.json());
    document.getElementById('h-overall').textContent = d.overall_response_rate.toFixed(1) + '%';
    document.getElementById('h-sent').textContent = d.sms_sent_30d.toLocaleString();
    document.getElementById('h-optout').textContent = d.opt_out_rate_pct.toFixed(1) + '%';
    const sl = document.getElementById('sms-list');
    const maxRate = Math.max(...d.types.map(t => t.response_rate));
    d.types.forEach((t, i) => {
      const w = (t.response_rate / maxRate * 100).toFixed(1);
      sl.innerHTML += '<div class="sms-row"><div class="sms-top"><div class="sms-type">' + t.type + '</div><div class="sms-rate" style="color:' + COLORS[i] + '">' + t.response_rate.toFixed(1) + '%</div></div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:' + COLORS[i] + '"></div></div><div class="sms-meta"><div class="sms-meta-item">Sent <span>' + t.sent + '</span></div><div class="sms-meta-item">Responded <span>' + t.responded + '</span></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
