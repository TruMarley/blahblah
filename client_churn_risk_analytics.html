<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Churn Risk — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .risk-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .85rem; }
    .risk-label { font-size: .8rem; width: 90px; flex-shrink: 0; }
    .risk-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 12px; overflow: hidden; }
    .risk-fill { height: 100%; border-radius: 4px; }
    .risk-right { font-size: .75rem; font-weight: 700; width: 80px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Churn Risk</div>
  <p class="page-sub">Identify clients who haven't booked in a while and are at risk of churning. The AI proactively targets high-risk clients with personalised re-engagement offers.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-high" style="color:var(--red)">—</div><div class="stat-lbl">High Risk</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-saved" style="color:var(--green)">—</div><div class="stat-lbl">Saved (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-risk-rev" style="color:var(--yellow)">—</div><div class="stat-lbl">Revenue at Risk</div></div>
  </div>
  <div class="card">
    <div class="card-title">Risk Breakdown</div>
    <div id="risk-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/client-churn-risk-stats').then(r => r.json());
    document.getElementById('h-high').textContent = d.high_risk_count;
    document.getElementById('h-saved').textContent = d.churn_saved_30d;
    document.getElementById('h-risk-rev').textContent = '$' + d.revenue_at_risk.toLocaleString();
    const rl = document.getElementById('risk-list');
    const buckets = [
      { label: 'High Risk', count: d.high_risk_count, pct: d.high_risk_pct, color: 'var(--red)' },
      { label: 'Medium Risk', count: d.medium_risk_count, pct: d.medium_risk_pct, color: 'var(--yellow)' },
      { label: 'Low Risk', count: d.low_risk_count, pct: d.low_risk_pct, color: 'var(--green)' },
    ];
    buckets.forEach(b => {
      rl.innerHTML += '<div class="risk-row"><div class="risk-label" style="color:' + b.color + '">' + b.label + '</div><div class="risk-track"><div class="risk-fill" style="width:' + b.pct + '%;background:' + b.color + '"></div></div><div class="risk-right" style="color:' + b.color + '">' + b.count + ' (' + b.pct + '%)</div></div>';
    });
    rl.innerHTML += '<div style="font-size:.72rem;color:var(--muted);margin-top:.75rem">Avg gap (high risk): ' + d.avg_gap_days_high_risk + ' days since last visit</div>';
  }
  load();
</script>
</body>
</html>
