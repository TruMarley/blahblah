<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Revenue Mix — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .8rem; }
    .svc-label { font-size: .78rem; color: var(--text); width: 90px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .svc-pct { font-size: .75rem; font-weight: 700; width: 38px; text-align: right; }
    .svc-rev { font-size: .68rem; color: var(--muted); width: 62px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Revenue Mix</div>
  <p class="page-sub">See which services drive the most revenue. A concentrated mix signals upsell opportunity; use the AI to promote high-margin services during calls.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--green)">—</div><div class="stat-lbl">Total Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--accent)">—</div><div class="stat-lbl">Top Service</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-toppct" style="color:var(--accent)">—</div><div class="stat-lbl">Top Service Share</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ticket" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Ticket</div></div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Service</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','#60a5fa','var(--green)','var(--yellow)','var(--red)'];
  async function load() {
    const d = await fetch('/api/analytics/service-revenue-mix-stats').then(r => r.json());
    document.getElementById('h-total').textContent = '$' + d.total_revenue_30d.toLocaleString();
    document.getElementById('h-top').textContent = d.top_service;
    document.getElementById('h-toppct').textContent = d.top_service_pct.toFixed(1) + '%';
    document.getElementById('h-ticket').textContent = '$' + d.avg_ticket.toFixed(2);
    const sorted = [...d.services].sort((a, b) => b.revenue_30d - a.revenue_30d);
    const maxR = sorted[0].revenue_30d;
    const sl = document.getElementById('svc-list');
    sorted.forEach((s, i) => {
      const w = (s.revenue_30d / maxR * 100).toFixed(1);
      sl.innerHTML += '<div class="svc-row"><div class="svc-label">' + s.name + '</div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:' + COLORS[i] + '"></div></div><div class="svc-pct" style="color:' + COLORS[i] + '">' + s.pct.toFixed(1) + '%</div><div class="svc-rev">$' + s.revenue_30d.toLocaleString() + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
