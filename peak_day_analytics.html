<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peak Days — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .bar-label { font-size: .78rem; color: var(--text); width: 38px; flex-shrink: 0; }
    .bar-label-lg { font-size: .72rem; color: var(--text); width: 52px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .bar-val { font-size: .74rem; font-weight: 700; color: var(--accent); width: 38px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Peak Days &amp; Hours</div>
  <p class="page-sub">Identify your busiest days and peak hours to optimise staffing, manage AI capacity, and promote availability during slow periods.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Appointments (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-day" style="color:var(--yellow)">—</div><div class="stat-lbl">Busiest Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-hour" style="color:var(--green)">—</div><div class="stat-lbl">Peak Hour Block</div></div>
  </div>
  <div class="card">
    <div class="card-title">Appointments by Day of Week</div>
    <div id="day-list"></div>
  </div>
  <div class="card">
    <div class="card-title">Appointments by Hour</div>
    <div id="hour-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/peak-day-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_appointments_30d;
    document.getElementById('h-day').textContent = d.busiest_day;
    document.getElementById('h-hour').textContent = d.peak_hour;
    const dl = document.getElementById('day-list');
    const maxD = Math.max(...d.by_day.map(x => x.appts));
    d.by_day.forEach(x => {
      const w = (x.appts / maxD * 100).toFixed(1);
      dl.innerHTML += '<div class="bar-row"><div class="bar-label">' + x.day + '</div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%"></div></div><div class="bar-val">' + x.appts + '</div></div>';
    });
    const hl = document.getElementById('hour-list');
    const maxH = Math.max(...d.by_hour.map(x => x.appts));
    d.by_hour.forEach(x => {
      const w = (x.appts / maxH * 100).toFixed(1);
      hl.innerHTML += '<div class="bar-row"><div class="bar-label-lg">' + x.hour + '</div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:var(--green)"></div></div><div class="bar-val" style="color:var(--green)">' + x.appts + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
