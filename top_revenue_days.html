<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Revenue Days — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .hero-sub { font-size: .75rem; color: var(--muted); margin-top: .25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .day-row { display: flex; align-items: center; gap: .85rem; margin-bottom: .9rem; }
    .day-row:last-child { margin-bottom: 0; }
    .rank { font-size: .8rem; font-weight: 900; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }
    .rank.gold   { color: #fbbf24; }
    .rank.silver { color: #94a3b8; }
    .rank.bronze { color: #d97706; }
    .day-name { font-size: .8rem; font-weight: 700; width: 170px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 5px; height: 11px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; }
    .rev-label { font-size: .8rem; font-weight: 900; width: 72px; text-align: right; flex-shrink: 0; color: var(--green); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Top Revenue Days</div>
  <p class="page-sub">Your 10 highest-earning days over the past 90 days — what made them special?</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Best Day</div>
      <div class="hero-val" id="h-day" style="font-size:1rem;padding-top:.4rem">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Best Day Revenue</div>
      <div class="hero-val" id="h-rev" style="color:var(--green)">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Top 10 Revenue Days — Last 90 Days</div>
    <div id="day-list"></div>
  </div>
</div>
<script>
  const GRAD_COLORS = ['#fbbf24','#94a3b8','#d97706','#a78bfa','#a78bfa','#60a5fa','#60a5fa','#34d399','#34d399','#34d399'];
  async function load() {
    const r = await fetch('/api/analytics/top-revenue-days');
    const d = await r.json();
    document.getElementById('h-day').textContent = d.best_day_name || '—';
    document.getElementById('h-rev').textContent = '$' + Number(d.best_revenue || 0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    const days = d.days || [];
    const maxRev = Math.max(...days.map(d=>d.revenue), 1);
    const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    document.getElementById('day-list').innerHTML = days.map((day, i) => `
      <div class="day-row">
        <div class="rank ${rankClass(i)}">#${day.rank}</div>
        <div class="day-name">${esc(day.day_name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(day.revenue/maxRev*100).toFixed(1)}%;background:${GRAD_COLORS[i]};opacity:.8"></div></div>
        <div class="rev-label">$${day.revenue.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
      </div>`).join('');
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
