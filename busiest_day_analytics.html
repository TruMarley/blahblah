<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Busiest Day — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .day-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .day-label { font-size: .82rem; font-weight: 800; width: 34px; flex-shrink: 0; }
    .day-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 12px; overflow: hidden; }
    .day-fill { height: 100%; border-radius: 4px; }
    .day-appts { font-size: .75rem; font-weight: 700; width: 32px; text-align: right; }
    .day-rev { font-size: .68rem; color: var(--green); width: 52px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Busiest Day</div>
  <p class="page-sub">See which days of the week generate the most appointments and revenue. Use this to align staffing levels and promotional timing with actual demand patterns.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-busiest" style="color:var(--accent)">—</div><div class="stat-lbl">Busiest Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Daily Appts</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak-rev" style="color:var(--green)">—</div><div class="stat-lbl">Peak Day Revenue</div></div>
  </div>
  <div class="card">
    <div class="card-title">Day-by-Day Breakdown</div>
    <div id="day-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/busiest-day-stats').then(r => r.json());
    document.getElementById('h-busiest').textContent = d.busiest_day;
    document.getElementById('h-avg').textContent = d.avg_daily_appts.toFixed(1);
    document.getElementById('h-peak-rev').textContent = '$' + d.peak_day_revenue.toLocaleString();
    const dl = document.getElementById('day-list');
    const maxAppts = Math.max(...d.days.map(x => x.appts));
    d.days.forEach(x => {
      const w = (x.appts / maxAppts * 100).toFixed(1);
      const color = x.day === d.busiest_day ? 'var(--accent)' : 'var(--muted)';
      dl.innerHTML += '<div class="day-row"><div class="day-label" style="color:' + color + '">' + x.day + '</div><div class="day-track"><div class="day-fill" style="width:' + w + '%;background:' + color + '"></div></div><div class="day-appts" style="color:' + color + '">' + x.appts + '</div><div class="day-rev">$' + x.revenue.toLocaleString() + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
