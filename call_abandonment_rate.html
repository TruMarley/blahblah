<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Abandonment Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.2rem; margin-bottom: .75rem; }
    .leg-item { display: flex; align-items: center; gap: .35rem; font-size: .7rem; color: var(--muted); }
    .leg-bar { width: 10px; height: 10px; border-radius: 2px; }
    .leg-line { width: 18px; height: 2px; border-radius: 1px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Abandonment Rate</div>
  <p class="page-sub">Track how often callers hang up before the AI answers. High abandonment indicates call queue issues or slow pickup times.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Abandonment</div>
      <div class="hero-val" id="h-avg" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Worst Week</div>
      <div class="hero-val" id="h-worst" style="color:var(--red);font-size:1.2rem">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Best Week</div>
      <div class="hero-val" id="h-best" style="color:var(--green);font-size:1.2rem">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Weekly Abandonment &amp; Volume</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-bar" style="background:rgba(167,139,250,.4)"></div> Total Calls</div>
      <div class="leg-item"><div class="leg-line" style="background:var(--red)"></div> Abandonment %</div>
    </div>
    <svg id="chart" viewBox="0 0 660 240" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block"></svg>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/call-drop-rate').then(r => r.json());
    const weeks = d.weeks || [];
    if (!weeks.length) return;

    document.getElementById('h-avg').textContent = (d.avg_rate || 0) + '%';
    const worst = weeks.reduce((a,b) => b.abandonment_rate_pct > a.abandonment_rate_pct ? b : a, weeks[0]);
    const best = weeks.reduce((a,b) => b.abandonment_rate_pct < a.abandonment_rate_pct ? b : a, weeks[0]);
    document.getElementById('h-worst').textContent = worst ? `${worst.week} (${worst.abandonment_rate_pct}%)` : '—';
    document.getElementById('h-best').textContent = best ? `${best.week} (${best.abandonment_rate_pct}%)` : '—';

    const W=660, H=240, padL=40, padR=12, padT=16, padB=36;
    const chartW=W-padL-padR, chartH=H-padT-padB;
    const maxCalls=Math.max(...weeks.map(w=>w.total_calls),1);
    const maxRate=Math.max(...weeks.map(w=>w.abandonment_rate_pct),1);
    const n=weeks.length, step=chartW/(n-1);
    const barW=Math.floor(chartW/n*0.55);

    let bars='',labels='';
    weeks.forEach((w,i)=>{
      const bh=(w.total_calls/maxCalls)*chartH*0.7;
      const bx=padL+i*step-barW/2;
      bars+=`<rect x="${bx}" y="${padT+chartH-bh}" width="${barW}" height="${bh}" fill="rgba(167,139,250,.3)" rx="2"/>`;
      labels+=`<text x="${padL+i*step}" y="${H-padB+14}" text-anchor="middle" fill="#555" font-size="9">${esc(w.week)}</text>`;
    });

    const pts=weeks.map((w,i)=>({x:padL+i*step, y:padT+chartH-(w.abandonment_rate_pct/maxRate)*chartH}));
    const area=`M${pts[0].x},${pts[0].y} `+pts.slice(1).map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[n-1].x},${padT+chartH} L${pts[0].x},${padT+chartH} Z`;
    const line=`M${pts[0].x},${pts[0].y} `+pts.slice(1).map(p=>`L${p.x},${p.y}`).join(' ');
    let dots='';
    pts.forEach(p=>{ dots+=`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--red)" stroke="var(--bg)" stroke-width="1.5"/>`; });

    let yAxis='';
    for(let t=0;t<=4;t++){
      const yv=(maxRate*t/4).toFixed(1);
      const yp=padT+chartH-(t/4)*chartH;
      yAxis+=`<line x1="${padL}" x2="${W-padR}" y1="${yp}" y2="${yp}" stroke="#1e1e1e" stroke-width="1"/>`;
      yAxis+=`<text x="${padL-5}" y="${yp+4}" text-anchor="end" fill="#444" font-size="8">${yv}%</text>`;
    }

    document.getElementById('chart').innerHTML=yAxis+bars+
      `<path d="${area}" fill="rgba(248,113,113,.07)"/>`+
      `<path d="${line}" fill="none" stroke="var(--red)" stroke-width="2" stroke-linejoin="round"/>`+
      dots+labels;
  }

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
