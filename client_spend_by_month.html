<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Spend by Month — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Spend by Month</div>
  <p class="page-sub">Revenue split between new and returning clients — a growing returning share signals strong retention.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Latest Total</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">New Client Share</div>
      <div class="hero-val" id="h-new" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Returning Share</div>
      <div class="hero-val" id="h-ret" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">New vs. Returning Client Spend</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,.8)"></div>New Clients</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(52,211,153,.75)"></div>Returning Clients</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/client-spend-by-month');
    const d = await r.json();
    const months = d.months || [];
    const last = months[months.length-1] || {};
    document.getElementById('h-total').textContent = '$' + (last.total||0).toLocaleString();
    const newPct = last.total ? ((last.new_client_spend/last.total)*100).toFixed(0) : 0;
    const retPct = last.total ? ((last.returning_client_spend/last.total)*100).toFixed(0) : 0;
    document.getElementById('h-new').textContent = newPct + '%';
    document.getElementById('h-ret').textContent = retPct + '%';

    const svg = document.getElementById('chart');
    const W=700, H=260, pL=50, pR=16, pT=14, pB=30;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=months.length;
    const barW=cW/n*0.58;
    const xStep=cW/n;
    const maxTotal=Math.max(...months.map(m=>m.total))*1.15;
    const xOf=i=>pL+i*xStep+xStep/2;
    const yOf=v=>pT+cH-v/maxTotal*cH;

    // gridlines
    const step=Math.ceil(maxTotal/4/1000)*1000;
    for(let v=step;v<maxTotal;v+=step){
      const y=yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">$${(v/1000).toFixed(0)}k</text>`;
    }

    months.forEach((m,i)=>{
      const cx=xOf(i);
      const retH=cH*m.returning_client_spend/maxTotal;
      const newH=cH*m.new_client_spend/maxTotal;
      // returning (bottom)
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${pT+cH-retH}" width="${barW}" height="${retH}" rx="0" fill="rgba(52,211,153,.65)"/>`;
      // new (top)
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${pT+cH-retH-newH}" width="${barW}" height="${newH}" rx="4 4 0 0" fill="rgba(167,139,250,.75)"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="9" fill="#555" text-anchor="middle">${esc(m.month)}</text>`;
      svg.innerHTML+=`<text x="${cx}" y="${pT+cH-retH-newH-5}" font-size="8" fill="#999" text-anchor="middle">$${(m.total/1000).toFixed(0)}k</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
