<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stylist Utilization — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .staff-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; }
    .staff-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .55rem; }
    .staff-name { font-size: .88rem; font-weight: 800; }
    .staff-rev { font-size: .85rem; font-weight: 900; color: var(--green); }
    .util-track { background: var(--surface); border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: .4rem; }
    .util-fill { height: 100%; border-radius: 4px; }
    .staff-meta { display: flex; gap: 1rem; }
    .meta-item { font-size: .68rem; color: var(--muted); }
    .meta-item span { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Stylist Utilization</div>
  <p class="page-sub">Track how fully booked each team member is and how much revenue they're generating. Low utilization means unfilled capacity the AI can help fill.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--accent)">—</div><div class="stat-lbl">Avg Utilization</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-earner" style="color:var(--green)">—</div><div class="stat-lbl">Top Earner</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-booked" style="color:var(--yellow)">—</div><div class="stat-lbl">Most Booked</div></div>
  </div>
  <div class="card">
    <div class="card-title">Staff Breakdown</div>
    <div id="staff-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','var(--green)','var(--yellow)','#60a5fa','var(--red)','#fb923c'];
  async function load() {
    const d = await fetch('/api/analytics/stylist-utilization-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.avg_utilization_pct.toFixed(1) + '%';
    document.getElementById('h-earner').textContent = d.top_earner;
    document.getElementById('h-booked').textContent = d.most_booked;
    const sl = document.getElementById('staff-list');
    d.staff.forEach((s, i) => {
      const color = COLORS[i % COLORS.length];
      sl.innerHTML += '<div class="staff-row"><div class="staff-top"><div class="staff-name">' + s.name + '</div><div class="staff-rev">$' + s.revenue.toLocaleString() + '</div></div><div class="util-track"><div class="util-fill" style="width:' + s.utilization_pct + '%;background:' + color + '"></div></div><div class="staff-meta"><div class="meta-item">Utilization <span>' + s.utilization_pct.toFixed(1) + '%</span></div><div class="meta-item">Appointments <span>' + s.appointments + '</span></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
