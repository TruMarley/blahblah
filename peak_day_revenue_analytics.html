<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peak Day Revenue — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .day-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .day-name { font-size: .82rem; font-weight: 700; width: 85px; flex-shrink: 0; }
    .day-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .day-fill { height: 100%; border-radius: 4px; }
    .day-rev { font-size: .75rem; font-weight: 700; width: 58px; text-align: right; }
    .day-bk { font-size: .65rem; color: var(--muted); width: 44px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Peak Day Revenue</div>
  <p class="page-sub">Revenue and booking volume by day of week. Use this to allocate staff, set promotional days, and identify under-served weekdays with capacity to grow.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-peak" style="color:var(--green)">—</div><div class="stat-lbl">Peak Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak-rev" style="color:var(--green)">—</div><div class="stat-lbl">Peak Day Revenue</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Weekly Revenue</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--muted)">—</div><div class="stat-lbl">Avg Daily Revenue</div></div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Day of Week</div>
    <div id="day-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/peak-day-revenue-stats').then(r => r.json());
    document.getElementById('h-peak').textContent = d.peak_day;
    document.getElementById('h-peak-rev').textContent = '$' + d.peak_day_revenue.toLocaleString();
    document.getElementById('h-total').textContent = '$' + d.total_weekly_revenue.toLocaleString();
    document.getElementById('h-avg').textContent = '$' + d.avg_daily_revenue.toLocaleString();
    const dl = document.getElementById('day-list');
    const maxR = Math.max(...d.days.map(day => day.revenue));
    d.days.forEach(day => {
      const w = (day.revenue / maxR * 100).toFixed(1);
      const isPeak = day.day === d.peak_day;
      const col = isPeak ? 'var(--green)' : day.revenue >= d.avg_daily_revenue ? 'var(--accent)' : 'var(--muted)';
      dl.innerHTML += '<div class="day-row"><div class="day-name">' + day.day + '</div><div class="day-track"><div class="day-fill" style="width:' + w + '%;background:' + col + '"></div></div><div class="day-rev" style="color:' + col + '">$' + day.revenue.toLocaleString() + '</div><div class="day-bk">' + day.bookings + ' bk</div></div>';
    });
  }
  load();
</script>
</body>
</html>
