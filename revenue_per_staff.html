<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue per Staff — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .staff-row { display: flex; align-items: center; gap: .85rem; margin-bottom: 1.1rem; }
    .staff-row:last-child { margin-bottom: 0; }
    .staff-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .staff-name { font-size: .82rem; font-weight: 800; width: 110px; flex-shrink: 0; }
    .appt-count { font-size: .72rem; color: var(--muted); width: 52px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 5px; height: 12px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; opacity: .8; transition: width .4s ease; }
    .rev-label { font-size: .82rem; font-weight: 900; width: 82px; text-align: right; flex-shrink: 0; }
    .pct-label { font-size: .72rem; color: var(--muted); width: 40px; text-align: right; flex-shrink: 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .5rem 1rem; border-top: 1px solid var(--border); text-align: left; }
    tbody td { padding: .55rem 1rem; font-size: .82rem; }
    tbody tr:last-child td { padding-bottom: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue per Staff</div>
  <p class="page-sub">Revenue contribution by each staff member — last 30 days.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Revenue</div>
      <div class="hero-val" id="h-total" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Earner</div>
      <div class="hero-val" id="h-top" style="font-size:1rem;padding-top:.4rem;color:var(--yellow)">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Revenue Breakdown</div>
    <div id="staff-bars"></div>
    <table id="staff-table">
      <thead><tr><th>Staff</th><th>Appts</th><th>Revenue</th><th>Avg Ticket</th><th>Share</th></tr></thead>
      <tbody id="staff-tbody"></tbody>
    </table>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/revenue-per-staff');
    const d = await r.json();
    document.getElementById('h-total').textContent = '$' + Number(d.total_revenue).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});
    document.getElementById('h-top').textContent = d.top_earner;

    const staff = d.staff || [];
    const maxRev = Math.max(...staff.map(s => s.revenue));

    document.getElementById('staff-bars').innerHTML = staff.map(s => `
      <div class="staff-row">
        <div class="staff-dot" style="background:${s.color}"></div>
        <div class="staff-name">${esc(s.name)}</div>
        <div class="appt-count">${s.appointments} appts</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(s.revenue/maxRev*100).toFixed(1)}%;background:${s.color}"></div></div>
        <div class="rev-label" style="color:${s.color}">$${s.revenue.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
        <div class="pct-label">${s.pct}%</div>
      </div>`).join('');

    document.getElementById('staff-tbody').innerHTML = staff.map(s => `
      <tr>
        <td style="font-weight:800"><span style="color:${s.color}">● </span>${esc(s.name)}</td>
        <td style="color:var(--muted)">${s.appointments}</td>
        <td style="font-weight:800;color:var(--green)">$${s.revenue.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
        <td style="color:var(--muted)">$${s.avg_ticket}</td>
        <td style="color:var(--muted)">${s.pct}%</td>
      </tr>`).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
