<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Origins — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .src-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .src-label { font-size: .8rem; color: var(--text); width: 110px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .src-pct { font-size: .75rem; font-weight: 700; width: 40px; text-align: right; }
    .src-cnt { font-size: .68rem; color: var(--muted); width: 42px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Booking Origins</div>
  <p class="page-sub">Where are your bookings coming from? AI phone share shows how much call volume the receptionist is converting — the core ROI signal for RingDesk.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Bookings (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--text)">—</div><div class="stat-lbl">Top Source</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-toppct" style="color:var(--accent)">—</div><div class="stat-lbl">Top Source Share</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ai" style="color:var(--green)">—</div><div class="stat-lbl">AI Phone Share</div></div>
  </div>
  <div class="card">
    <div class="card-title">Bookings by Source</div>
    <div id="src-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','#60a5fa','var(--yellow)','var(--green)','var(--red)'];
  async function load() {
    const d = await fetch('/api/analytics/booking-origin-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_bookings_30d;
    document.getElementById('h-top').textContent = d.top_source;
    document.getElementById('h-toppct').textContent = d.top_source_pct.toFixed(1) + '%';
    document.getElementById('h-ai').textContent = d.ai_share_pct.toFixed(1) + '%';
    const sorted = [...d.sources].sort((a, b) => b.bookings - a.bookings);
    const maxB = sorted[0].bookings;
    const sl = document.getElementById('src-list');
    sorted.forEach((s, i) => {
      const w = (s.bookings / maxB * 100).toFixed(1);
      sl.innerHTML += '<div class="src-row"><div class="src-label">' + s.source + '</div><div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:' + COLORS[i] + '"></div></div><div class="src-pct" style="color:' + COLORS[i] + '">' + s.pct.toFixed(1) + '%</div><div class="src-cnt">' + s.bookings + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
