<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conversion Funnel — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    nav a.back:hover { color: var(--text); }
    .main { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }

    .conv-rate { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.75rem; display: flex; align-items: center; gap: 1.5rem; }
    .cr-num { font-size: 3.5rem; font-weight: 900; letter-spacing: -.06em; color: var(--accent); line-height: 1; }
    .cr-label { font-size: .82rem; color: var(--muted); margin-top: .2rem; }
    .cr-sub { font-size: .75rem; color: var(--muted); }

    /* Funnel */
    .funnel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .funnel-title { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .09em; margin-bottom: 1.5rem; }
    .stage { margin-bottom: 1.1rem; }
    .stage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .stage-name { font-size: .85rem; font-weight: 700; display: flex; align-items: center; gap: .5rem; }
    .stage-icon { font-size: 1rem; }
    .stage-count { font-size: 1rem; font-weight: 900; }
    .stage-pct { font-size: .72rem; color: var(--muted); margin-top: .05rem; }
    .bar-track { height: 28px; background: var(--surface2); border-radius: 8px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 8px; transition: width .7s ease; display: flex; align-items: center; padding-left: .75rem; font-size: .75rem; font-weight: 700; color: #fff; white-space: nowrap; }
    .drop-arrow { text-align: center; font-size: .72rem; color: var(--muted); margin: .35rem 0; display: flex; align-items: center; gap: .4rem; justify-content: center; }
    .drop-pct { font-size: .7rem; color: var(--red); font-weight: 700; }
    .drop-line { flex: 1; height: 1px; background: var(--border); }
    .stage:last-child .drop-arrow { display: none; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Conversion Funnel</div>
  <p class="page-sub">How calls turn into booked appointments — this month.</p>

  <div class="conv-rate">
    <div class="cr-num" id="cr-pct">—</div>
    <div>
      <div style="font-size:.85rem;font-weight:800;margin-bottom:.2rem">Booking Conversion Rate</div>
      <div class="cr-label" id="cr-label">calls → appointments booked</div>
      <div class="cr-sub" id="cr-sub"></div>
    </div>
  </div>

  <div class="funnel">
    <div class="funnel-title">Monthly Funnel — This Month</div>
    <div id="funnel-stages"></div>
  </div>
</div>

<script>
  const STAGES_META = [
    { key: 'calls_total',         label: 'Total Inbound Calls', icon: '📞', color: '#a78bfa' },
    { key: 'calls_answered',      label: 'Answered by AI',      icon: '🤖', color: '#818cf8' },
    { key: 'bookings_made',       label: 'Appointments Booked', icon: '📅', color: '#34d399' },
    { key: 'sms_sent',            label: 'SMS Confirmations',   icon: '💬', color: '#22d3ee' },
    { key: 'reminders_delivered', label: 'Reminders Delivered', icon: '⏰', color: '#60a5fa' },
  ];

  async function load() {
    const r = await fetch('/api/analytics/conversion');
    const d = await r.json();

    document.getElementById('cr-pct').textContent  = d.conversion_rate + '%';
    document.getElementById('cr-sub').textContent  = `${d.bookings_made} bookings from ${d.calls_total} calls`;

    const maxVal = d[STAGES_META[0].key];
    const container = document.getElementById('funnel-stages');

    container.innerHTML = STAGES_META.map((s, i) => {
      const val  = d[s.key];
      const prev = i > 0 ? d[STAGES_META[i-1].key] : val;
      const pctOfTotal = maxVal > 0 ? Math.round(val / maxVal * 100) : 0;
      const dropPct = prev > 0 ? 100 - Math.round(val / prev * 100) : 0;
      const barW = pctOfTotal;

      return `
      <div class="stage">
        <div class="stage-header">
          <div class="stage-name">
            <span class="stage-icon">${s.icon}</span>
            ${s.label}
          </div>
          <div style="text-align:right">
            <div class="stage-count">${val.toLocaleString()}</div>
            <div class="stage-pct">${pctOfTotal}% of total</div>
          </div>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${barW}%;background:${s.color}">
            ${barW > 20 ? val.toLocaleString() : ''}
          </div>
        </div>
        ${i < STAGES_META.length - 1 ? `
        <div class="drop-arrow">
          <div class="drop-line"></div>
          <span>↓</span>
          ${dropPct > 0 ? `<span class="drop-pct">−${dropPct}% drop</span>` : '<span style="color:var(--muted);font-size:.7rem">no drop</span>'}
          <div class="drop-line"></div>
        </div>` : ''}
      </div>`;
    }).join('');
  }

  load();
</script>
</body>
</html>
