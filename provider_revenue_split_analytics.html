<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Provider Revenue Split — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .prov-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; margin-bottom: .55rem; }
    .prov-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .55rem; }
    .prov-name { font-size: .9rem; font-weight: 800; }
    .prov-rev { font-size: .9rem; font-weight: 900; color: var(--green); }
    .bar-track { background: var(--bg); border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: .5rem; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .prov-meta { display: flex; gap: 1.4rem; }
    .meta-item { font-size: .68rem; color: var(--muted); }
    .meta-item span { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Provider Revenue Split</div>
  <p class="page-sub">See each provider's share of total revenue, appointment count, and average ticket. Use this to identify coaching opportunities and recognize top performers.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--green)">—</div><div class="stat-lbl">Total Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--accent)">—</div><div class="stat-lbl">Top Earner</div></div>
  </div>
  <div class="card">
    <div class="card-title">Provider Breakdown</div>
    <div id="prov-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','var(--green)','var(--yellow)'];
  async function load() {
    const d = await fetch('/api/analytics/provider-revenue-split-stats').then(r => r.json());
    document.getElementById('h-total').textContent = '$' + d.total_revenue_30d.toLocaleString();
    document.getElementById('h-top').textContent = d.top_earner;
    const pl = document.getElementById('prov-list');
    d.providers.forEach((p, i) => {
      pl.innerHTML += '<div class="prov-card"><div class="prov-top"><div class="prov-name">' + p.name + '</div><div class="prov-rev">$' + p.revenue_30d.toLocaleString() + '</div></div><div class="bar-track"><div class="bar-fill" style="width:' + p.share_pct + '%;background:' + COLORS[i] + '"></div></div><div class="prov-meta"><div class="meta-item">Share <span>' + p.share_pct.toFixed(1) + '%</span></div><div class="meta-item">Appts <span>' + p.appts_30d + '</span></div><div class="meta-item">Avg ticket <span>$' + p.avg_ticket.toFixed(2) + '</span></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
