<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Notes — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .search-bar { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: .85rem; font-family: inherit; padding: .6rem .85rem; border-radius: 8px; outline: none; margin-bottom: 1.1rem; transition: border-color .15s; }
    .search-bar:focus { border-color: rgba(167,139,250,.5); }
    .note-card { background: var(--surface2); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .65rem; border-left: 3px solid rgba(167,139,250,.4); }
    .note-card:last-child { margin-bottom: 0; }
    .note-header { display: flex; align-items: center; gap: .65rem; margin-bottom: .45rem; }
    .note-client { font-weight: 900; font-size: .85rem; color: var(--accent); }
    .note-staff { font-size: .72rem; color: var(--muted); }
    .note-date { font-size: .72rem; color: var(--muted); margin-left: auto; }
    .note-text { font-size: .82rem; color: var(--text); line-height: 1.5; }
    .empty-msg { text-align: center; color: var(--muted); font-size: .82rem; padding: 2rem; }
    .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .form-field { display: flex; flex-direction: column; gap: .3rem; }
    .form-field label { font-size: .72rem; color: var(--muted); font-weight: 700; }
    .form-field input, .form-field textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: .82rem; font-family: inherit; padding: .55rem .8rem; border-radius: 7px; outline: none; transition: border-color .15s; }
    .form-field input:focus, .form-field textarea:focus { border-color: rgba(167,139,250,.5); }
    .form-field.full { grid-column: 1/-1; }
    .form-field textarea { resize: vertical; min-height: 60px; }
    .add-btn { background: var(--accent); border: none; color: #000; font-size: .85rem; font-weight: 900; padding: .6rem 1.4rem; border-radius: 9px; cursor: pointer; font-family: inherit; grid-column: 1/-1; width: fit-content; transition: opacity .15s; }
    .add-btn:hover { opacity: .85; }
    .save-msg { font-size: .78rem; color: var(--green); font-weight: 700; display: none; }
    .save-msg.show { display: inline-block; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Notes</div>
  <p class="page-sub">Staff notes on client preferences, allergies, habits, and service history.</p>
  <div class="card">
    <div class="card-title">Add a Note</div>
    <div class="add-form">
      <div class="form-field"><label>Client Name</label><input type="text" id="f-client" placeholder="e.g. Sarah K."></div>
      <div class="form-field"><label>Staff Member</label><input type="text" id="f-staff" placeholder="e.g. Marcus"></div>
      <div class="form-field full"><label>Note</label><textarea id="f-note" placeholder="Preferences, allergies, habits…"></textarea></div>
      <button class="add-btn" onclick="addNote()">Save Note</button>
      <span class="save-msg" id="save-msg">✓ Note saved!</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">All Notes</div>
    <input class="search-bar" type="text" id="search" placeholder="Search by client, staff, or note content…" oninput="filterNotes()">
    <div id="notes-list"></div>
  </div>
</div>
<script>
  let allNotes = [];

  async function load() {
    const r = await fetch('/api/client-notes');
    const d = await r.json();
    allNotes = d.notes || [];
    renderNotes(allNotes);
  }

  function renderNotes(notes) {
    if (!notes.length) {
      document.getElementById('notes-list').innerHTML = '<div class="empty-msg">No notes found.</div>';
      return;
    }
    document.getElementById('notes-list').innerHTML = notes.map(n => `
      <div class="note-card">
        <div class="note-header">
          <div class="note-client">${esc(n.client_name)}</div>
          <div class="note-staff">by ${esc(n.staff_name)}</div>
          <div class="note-date">${esc((n.created_at||'').slice(0,10))}</div>
        </div>
        <div class="note-text">${esc(n.note)}</div>
      </div>`).join('');
  }

  function filterNotes() {
    const q = document.getElementById('search').value.toLowerCase();
    if (!q) { renderNotes(allNotes); return; }
    renderNotes(allNotes.filter(n =>
      n.client_name.toLowerCase().includes(q) ||
      n.staff_name.toLowerCase().includes(q) ||
      n.note.toLowerCase().includes(q)
    ));
  }

  async function addNote() {
    const client = document.getElementById('f-client').value.trim();
    const staff  = document.getElementById('f-staff').value.trim();
    const note   = document.getElementById('f-note').value.trim();
    if (!client || !note) return;
    const res = await fetch('/api/client-notes', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({client_id: '', client_name: client, note, staff_name: staff})
    });
    const saved = await res.json();
    allNotes.unshift(saved);
    renderNotes(allNotes);
    document.getElementById('f-client').value = '';
    document.getElementById('f-staff').value = '';
    document.getElementById('f-note').value = '';
    const msg = document.getElementById('save-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
