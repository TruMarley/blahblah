<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avg Service Duration — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.5rem; }
    .bar-row { display: flex; align-items: center; gap: .9rem; margin-bottom: 1.1rem; }
    .bar-row:last-child { margin-bottom: 0; }
    .svc-name { font-size: .84rem; font-weight: 800; width: 90px; flex-shrink: 0; }
    .bar-wrap { flex: 1; }
    .bar-track { background: var(--surface2); border-radius: 5px; height: 12px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; opacity: .8; transition: width .5s ease; }
    .min-val { font-size: .86rem; font-weight: 900; width: 52px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Avg Service Duration</div>
  <p class="page-sub">Average minutes per service type — helps optimize scheduling blocks and staff allocation.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Overall Average</div>
      <div class="hero-val" id="h-avg" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Longest Service</div>
      <div class="hero-val" id="h-top" style="font-size:1rem;padding-top:.5rem;color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Minutes by Service Type</div>
    <div id="bar-list"></div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/avg-service-duration');
    const d = await r.json();
    document.getElementById('h-avg').textContent = d.overall_avg_minutes + ' min';
    const services = d.services || [];
    const longest = services.reduce((a, b) => a.avg_minutes > b.avg_minutes ? a : b, {});
    document.getElementById('h-top').textContent = longest.service || '—';
    const maxM = Math.max(...services.map(s => s.avg_minutes), 1);
    document.getElementById('bar-list').innerHTML = services.map(s => `
      <div class="bar-row">
        <div class="svc-name">${esc(s.service)}</div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill" style="width:${(s.avg_minutes/maxM*100).toFixed(1)}%;background:${s.color}"></div></div>
        </div>
        <div class="min-val" style="color:${s.color}">${s.avg_minutes}m</div>
      </div>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
