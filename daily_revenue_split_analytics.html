<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue by Day — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .day-row { display: grid; grid-template-columns: 36px 1fr 100px; gap: .75rem; align-items: center; margin-bottom: .6rem; }
    .day-lbl { font-size: .78rem; color: var(--muted); }
    .day-bar-wrap { background: var(--surface2); border-radius: 4px; height: 9px; overflow: hidden; }
    .day-bar { height: 100%; border-radius: 4px; background: var(--accent); }
    .day-meta { text-align: right; }
    .day-rev { font-size: .78rem; font-weight: 800; color: var(--accent); }
    .day-bk { font-size: .62rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue by Day</div>
  <p class="page-sub">See which days of the week generate the most revenue and bookings. Use this to plan staffing, targeted promotions for slow days, and pricing adjustments for peak days.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-best" style="color:var(--green)">—</div><div class="stat-lbl">Best Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-worst" style="color:var(--red)">—</div><div class="stat-lbl">Slowest Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-wknd" style="color:var(--accent)">—</div><div class="stat-lbl">Weekend % of Revenue</div></div>
  </div>
  <div class="card">
    <div class="card-title">Day-by-Day Breakdown</div>
    <div id="day-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/daily-revenue-split-stats').then(r => r.json());
    document.getElementById('h-best').textContent = d.best_day;
    document.getElementById('h-worst').textContent = d.worst_day;
    document.getElementById('h-wknd').textContent = d.weekend_pct_of_revenue.toFixed(1) + '%';
    const dl = document.getElementById('day-list');
    const maxRev = Math.max(...d.days.map(d => d.revenue));
    d.days.forEach(day => {
      const w = (day.revenue / maxRev * 100).toFixed(1);
      dl.innerHTML += '<div class="day-row"><div class="day-lbl">' + day.day + '</div><div class="day-bar-wrap"><div class="day-bar" style="width:' + w + '%"></div></div><div class="day-meta"><div class="day-rev">$' + day.revenue.toLocaleString() + '</div><div class="day-bk">' + day.bookings + ' bookings</div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
