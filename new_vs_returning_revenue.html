<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New vs. Returning Revenue — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">New vs. Returning Revenue</div>
  <p class="page-sub">Compare revenue from loyal returning clients versus new client acquisition — balance growth with retention.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Returning Rev</div>
      <div class="hero-val" id="h-ret" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg New Client Rev</div>
      <div class="hero-val" id="h-new" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Stacked Revenue by Client Type</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(52,211,153,.8)"></div>Returning Clients</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,.8)"></div>New Clients</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/new-vs-returning-revenue');
    const d = await r.json();
    const months = d.months||[];
    const avgRet = months.length ? Math.round(months.reduce((s,m)=>s+m.returning_revenue,0)/months.length) : 0;
    const avgNew = months.length ? Math.round(months.reduce((s,m)=>s+m.new_client_revenue,0)/months.length) : 0;
    document.getElementById('h-ret').textContent = '$'+(avgRet/1000).toFixed(1)+'k';
    document.getElementById('h-new').textContent = '$'+(avgNew/1000).toFixed(1)+'k';

    const svg = document.getElementById('chart');
    const W=700, H=260, pL=44, pR=16, pT=14, pB=30;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=months.length;
    const barW=cW/n*0.6;
    const xStep=cW/n;
    const maxV=Math.max(...months.map(m=>m.total))*1.12;
    const yOf=v=>pT+cH-v/maxV*cH;

    [5000,10000,15000,20000].filter(v=>v<maxV).forEach(v=>{
      const y=yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8.5" fill="#555" text-anchor="end">$${(v/1000).toFixed(0)}k</text>`;
    });

    months.forEach((m,i)=>{
      const cx=pL+i*xStep+xStep/2;
      // returning (bottom)
      const bh_ret=cH*m.returning_revenue/maxV;
      const by_ret=pT+cH-bh_ret;
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${by_ret}" width="${barW}" height="${bh_ret}" rx="5" fill="rgba(52,211,153,.78)"/>`;
      // new (top of stack)
      const bh_new=cH*m.new_client_revenue/maxV;
      const by_new=by_ret-bh_new;
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${by_new}" width="${barW}" height="${bh_new}" rx="5" fill="rgba(167,139,250,.78)"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="9" fill="#666" text-anchor="middle">${esc(m.month)}</text>`;
      svg.innerHTML+=`<text x="${cx}" y="${by_new-5}" font-size="8.5" fill="#aaa" text-anchor="middle">$${(m.total/1000).toFixed(1)}k</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
