<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peak Hours Heatmap — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1rem; text-align: center; }
    .hero-label { font-size: .64rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.5rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; overflow-x: auto; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .heatmap-wrap { overflow-x: auto; }
    table.heatmap { border-collapse: collapse; min-width: 100%; }
    table.heatmap th { font-size: .62rem; color: var(--muted); font-weight: 600; padding: .25rem .3rem; text-align: center; white-space: nowrap; }
    table.heatmap td.day-label { font-size: .72rem; font-weight: 700; color: var(--muted); padding: .25rem .5rem .25rem 0; white-space: nowrap; }
    table.heatmap td.cell { width: 36px; height: 28px; border-radius: 5px; text-align: center; font-size: .62rem; font-weight: 700; color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Peak Hours Heatmap</div>
  <p class="page-sub">Visualize when your phone rings most — by day and hour — so you can staff smarter, schedule breaks, and never get caught understaffed at rush hour.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Weekly Calls</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Peak Day</div>
      <div class="hero-val" id="h-day" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Peak Hour</div>
      <div class="hero-val" id="h-hour" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Call Volume by Day &amp; Hour</div>
    <div class="heatmap-wrap">
      <table class="heatmap" id="heatmap-table"></table>
    </div>
  </div>
</div>
<script>
  function cellColor(v, mx) {
    const t = mx > 0 ? v/mx : 0;
    const r = Math.round(167 + (248-167)*t);
    const g = Math.round(139 + (113-139)*t);
    const b = Math.round(250 + (250-250)*t);
    const a = 0.12 + 0.78*t;
    return `rgba(${r},${g},${b},${a})`;
  }
  async function load() {
    const d = await fetch('/api/analytics/hourly-traffic-heatmap').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_weekly_calls || '—';
    document.getElementById('h-day').textContent = d.peak_day || '—';
    document.getElementById('h-hour').textContent = d.peak_hour || '—';
    const days = d.days || [], hours = d.hours || [], matrix = d.matrix || {};
    const allVals = days.flatMap(day => matrix[day] || []);
    const mx = Math.max(...allVals, 1);
    const tbl = document.getElementById('heatmap-table');
    let html = '<thead><tr><th></th>';
    hours.forEach(h => { html += `<th>${esc(h)}</th>`; });
    html += '</tr></thead><tbody>';
    days.forEach(day => {
      html += `<tr><td class="day-label">${esc(day)}</td>`;
      (matrix[day] || []).forEach(v => {
        html += `<td class="cell" style="background:${cellColor(v,mx)}">${v||''}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody>';
    tbl.innerHTML = html;
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
