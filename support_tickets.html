<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support Tickets — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; --blue: #60a5fa; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .tkt-row { border-bottom: 1px solid var(--border); padding: .85rem 0; }
    .tkt-row:last-child { border-bottom: none; padding-bottom: 0; }
    .tkt-top { display: flex; align-items: center; gap: .65rem; margin-bottom: .3rem; }
    .tkt-subject { font-size: .86rem; font-weight: 800; flex: 1; }
    .status-badge, .priority-badge { font-size: .62rem; font-weight: 800; padding: .13rem .44rem; border-radius: 99px; flex-shrink: 0; }
    .st-open        { background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
    .st-resolved    { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
    .st-feature_request { background: rgba(96,165,250,.1); color: var(--blue); border: 1px solid rgba(96,165,250,.25); }
    .pr-high   { background: rgba(248,113,113,.08); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
    .pr-medium { background: rgba(251,191,36,.08); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .pr-low    { background: rgba(255,255,255,.04); color: var(--muted); border: 1px solid var(--border); }
    .tkt-meta { display: flex; gap: 1rem; font-size: .74rem; color: var(--muted); }
    .tkt-notes { font-size: .76rem; color: var(--muted); font-style: italic; margin-top: .3rem; }
    .resolve-btn { font-size: .68rem; font-weight: 800; padding: .18rem .5rem; border-radius: 6px; border: 1px solid rgba(52,211,153,.3); background: rgba(52,211,153,.06); color: var(--green); cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .resolve-btn:hover { background: rgba(52,211,153,.15); }
    .add-form { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
    .add-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .83rem; padding: .45rem .75rem; font-family: inherit; }
    .add-input.subj { flex: 1; min-width: 220px; }
    .add-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .83rem; padding: .45rem .75rem; font-family: inherit; cursor: pointer; }
    .add-btn { font-size: .78rem; font-weight: 800; padding: .45rem 1rem; border-radius: 8px; border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.1); color: var(--accent); cursor: pointer; font-family: inherit; white-space: nowrap; }
    .add-btn:hover { background: rgba(167,139,250,.2); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Support Tickets</div>
  <p class="page-sub">Track issues, bugs, and feature requests with your RingDesk setup.</p>

  <div class="card">
    <div class="card-title">Tickets</div>
    <div id="tkt-list"></div>
  </div>

  <div class="card">
    <div class="card-title">Submit Ticket</div>
    <div class="add-form">
      <input class="add-input subj" id="t-subj" type="text" placeholder="Describe the issue…" maxlength="120">
      <select class="add-select" id="t-prio">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button class="add-btn" onclick="addTicket()">Submit</button>
    </div>
  </div>
</div>
<script>
  let tickets = [];
  const STATUS_LABELS = {open: 'Open', resolved: 'Resolved', feature_request: 'Feature Request'};

  async function load() {
    const r = await fetch('/api/support-tickets');
    const d = await r.json();
    tickets = d.tickets || [];
    render();
  }

  function render() {
    document.getElementById('tkt-list').innerHTML = tickets.map(t => `
      <div class="tkt-row">
        <div class="tkt-top">
          <div class="tkt-subject">${esc(t.subject)}</div>
          <span class="status-badge st-${t.status}">${STATUS_LABELS[t.status] || t.status}</span>
          <span class="priority-badge pr-${t.priority}">${t.priority}</span>
          ${t.status === 'open' ? `<button class="resolve-btn" onclick="resolve('${t.id}')">Resolve</button>` : ''}
        </div>
        <div class="tkt-meta">
          <span>${esc(t.created)}</span>
          <span>#${esc(t.id)}</span>
        </div>
        ${t.notes ? `<div class="tkt-notes">${esc(t.notes)}</div>` : ''}
      </div>`).join('');
  }

  async function resolve(id) {
    const r = await fetch(`/api/support-tickets/${id}/resolve`, {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    const d = await r.json();
    const idx = tickets.findIndex(t => t.id === id);
    if (idx >= 0) tickets[idx] = d.ticket;
    render();
  }

  async function addTicket() {
    const subject = document.getElementById('t-subj').value.trim();
    const priority = document.getElementById('t-prio').value;
    if (!subject) return;
    const r = await fetch('/api/support-tickets', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({subject, priority})});
    const d = await r.json();
    tickets.unshift(d.ticket);
    document.getElementById('t-subj').value = '';
    render();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
