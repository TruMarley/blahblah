<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promotions — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-top: .2rem; }
    .new-btn { background: var(--accent); color: #fff; border: none; font-size: .85rem; font-weight: 700; padding: .55rem 1.1rem; border-radius: 8px; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .new-btn:hover { opacity: .85; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
    .promo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; position: relative; transition: border-color .15s; }
    .promo-card.inactive { opacity: .55; }
    .promo-card:hover { border-color: #333; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem; margin-bottom: .75rem; }
    .card-title { font-size: .95rem; font-weight: 800; line-height: 1.3; }
    .discount-badge { font-size: .78rem; font-weight: 900; padding: .25rem .65rem; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .badge-percent { background: rgba(52,211,153,.12); color: var(--green); border: 1px solid rgba(52,211,153,.25); }
    .badge-fixed { background: rgba(167,139,250,.12); color: var(--accent); border: 1px solid rgba(167,139,250,.25); }
    .card-desc { font-size: .78rem; color: var(--muted); line-height: 1.5; margin-bottom: 1rem; }
    .card-dates { font-size: .72rem; color: var(--muted); margin-bottom: 1rem; }
    .card-dates strong { color: var(--text); }
    .progress-wrap { margin-bottom: 1rem; }
    .progress-label { display: flex; justify-content: space-between; font-size: .68rem; color: var(--muted); margin-bottom: .3rem; }
    .progress-track { background: var(--surface2); border-radius: 99px; height: 5px; }
    .progress-fill { height: 5px; border-radius: 99px; background: var(--green); transition: width .4s; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .toggle-wrap { display: flex; align-items: center; gap: .5rem; }
    .toggle-label { font-size: .72rem; color: var(--muted); }
    .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 99px; transition: .2s; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #666; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: rgba(52,211,153,.3); }
    input:checked + .slider:before { background: var(--green); transform: translateX(16px); }
    .status-text { font-size: .7rem; font-weight: 700; }
    .status-on { color: var(--green); }
    .status-off { color: var(--muted); }
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; width: 100%; max-width: 480px; }
    .modal-title { font-size: 1.1rem; font-weight: 900; margin-bottom: 1.5rem; }
    .form-row { margin-bottom: 1rem; }
    .form-label { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .35rem; display: block; }
    .form-input, .form-select, .form-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: .85rem; padding: .55rem .75rem; border-radius: 8px; font-family: inherit; outline: none; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 60px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.5rem; }
    .cancel-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: .85rem; font-weight: 700; padding: .5rem 1rem; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .save-btn { background: var(--accent); color: #fff; border: none; font-size: .85rem; font-weight: 700; padding: .5rem 1rem; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .empty { text-align: center; color: var(--muted); padding: 4rem; font-size: .9rem; grid-column: 1/-1; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="header-row">
    <div>
      <div class="page-title">Promotions</div>
      <div class="page-sub">Create discounts and special offers for your clients.</div>
    </div>
    <button class="new-btn" onclick="openModal()">+ New Promo</button>
  </div>
  <div class="cards-grid" id="cards-grid">
    <div class="empty">Loading promotions...</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">New Promotion</div>
    <div class="form-row">
      <label class="form-label">Title</label>
      <input class="form-input" id="f-title" placeholder="e.g. New Client Special">
    </div>
    <div class="form-row">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="f-desc" placeholder="What does this promo offer?"></textarea>
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Discount Type</label>
        <select class="form-select" id="f-type">
          <option value="percent">Percent Off (%)</option>
          <option value="fixed">Fixed Amount ($)</option>
        </select>
      </div>
      <div>
        <label class="form-label">Value</label>
        <input class="form-input" id="f-value" type="number" placeholder="20" min="1">
      </div>
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Valid From</label>
        <input class="form-input" id="f-from" type="date">
      </div>
      <div>
        <label class="form-label">Valid Until</label>
        <input class="form-input" id="f-until" type="date">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Max Uses (leave 0 for unlimited)</label>
      <input class="form-input" id="f-max" type="number" placeholder="100" min="0">
    </div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="save-btn" onclick="savePromo()">Create Promo</button>
    </div>
  </div>
</div>

<script>
  function openModal() { document.getElementById('modal').classList.add('open'); }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  async function savePromo() {
    const payload = {
      title: document.getElementById('f-title').value.trim(),
      description: document.getElementById('f-desc').value.trim(),
      discount_type: document.getElementById('f-type').value,
      discount_value: parseFloat(document.getElementById('f-value').value) || 10,
      valid_from: document.getElementById('f-from').value,
      valid_until: document.getElementById('f-until').value,
      max_uses: parseInt(document.getElementById('f-max').value) || 100,
    };
    if (!payload.title) return;
    await fetch('/api/promotions', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    closeModal();
    load();
  }

  async function togglePromo(id) {
    await fetch(`/api/promotions/${id}`, { method: 'PUT' });
    load();
  }

  async function load() {
    const r = await fetch('/api/promotions');
    const d = await r.json();
    const promos = d.promotions || [];
    if (!promos.length) {
      document.getElementById('cards-grid').innerHTML = '<div class="empty">No promotions yet. Create your first one!</div>';
      return;
    }
    document.getElementById('cards-grid').innerHTML = promos.map(p => {
      const isPercent = p.discount_type === 'percent';
      const badgeTxt = isPercent ? `${p.discount_value}% OFF` : `$${p.discount_value} OFF`;
      const badgeCls = isPercent ? 'badge-percent' : 'badge-fixed';
      const pct = p.max_uses ? Math.round(Math.min(p.uses_count / p.max_uses * 100, 100)) : 0;
      const dateRange = [p.valid_from, p.valid_until].filter(Boolean).join(' → ');
      return `<div class="promo-card${p.active ? '' : ' inactive'}">
        <div class="card-top">
          <div class="card-title">${esc(p.title)}</div>
          <div class="discount-badge ${badgeCls}">${badgeTxt}</div>
        </div>
        <div class="card-desc">${esc(p.description)}</div>
        ${dateRange ? `<div class="card-dates"><strong>Active:</strong> ${esc(dateRange)}</div>` : ''}
        ${p.max_uses ? `<div class="progress-wrap">
          <div class="progress-label"><span>${p.uses_count} uses</span><span>${p.max_uses} max</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>` : ''}
        <div class="card-footer">
          <div class="toggle-wrap">
            <label class="toggle"><input type="checkbox" ${p.active ? 'checked' : ''} onchange="togglePromo('${esc(p.id)}')"><span class="slider"></span></label>
            <span class="status-text ${p.active ? 'status-on' : 'status-off'}">${p.active ? 'Active' : 'Inactive'}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
