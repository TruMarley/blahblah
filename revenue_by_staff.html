<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue by Staff — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .staff-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.1rem; }
    .staff-row:last-child { margin-bottom: 0; }
    .staff-name { font-size: .82rem; font-weight: 800; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 6px; height: 22px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width .6s ease; }
    .staff-stats { text-align: right; flex-shrink: 0; width: 120px; }
    .stat-rev { font-size: .85rem; font-weight: 900; }
    .stat-apts { font-size: .68rem; color: var(--muted); margin-top: .1rem; }
    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .6rem 1rem; border-bottom: 1px solid var(--border); text-align: left; }
    thead th:not(:first-child) { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: .75rem 1rem; font-size: .82rem; }
    tbody td:not(:first-child) { text-align: right; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: .45rem; vertical-align: middle; }
    .rank { font-size: .7rem; font-weight: 900; color: var(--muted); width: 1.4rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue by Staff</div>
  <p class="page-sub">Booking revenue contribution per team member — current month.</p>
  <div class="card">
    <div class="card-title">Revenue Breakdown</div>
    <div id="bars"></div>
  </div>
  <div class="card">
    <div class="card-title">Full Breakdown Table</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Staff Member</th><th>Revenue</th><th>Appointments</th><th>Avg / Appt</th><th>Share</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
  const COLORS = ['#a78bfa','#34d399','#fbbf24','#f87171','#60a5fa','#fb7185','#4ade80'];

  async function load() {
    const r = await fetch('/api/analytics/revenue-by-staff');
    const d = await r.json();
    const staff = (d.staff || []).sort((a,b) => b.revenue - a.revenue);
    const maxRev = staff[0]?.revenue || 1;
    const totalRev = staff.reduce((s,m) => s + m.revenue, 0);

    document.getElementById('bars').innerHTML = staff.map((m, i) => {
      const pct = (m.revenue / maxRev * 100).toFixed(1);
      return `<div class="staff-row">
        <div class="staff-name">${esc(m.name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${COLORS[i%COLORS.length]}"></div></div>
        <div class="staff-stats">
          <div class="stat-rev" style="color:${COLORS[i%COLORS.length]}">$${m.revenue.toLocaleString()}</div>
          <div class="stat-apts">${m.appointments} appts</div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('tbody').innerHTML = staff.map((m, i) => {
      const avg = m.appointments ? Math.round(m.revenue / m.appointments) : 0;
      const share = totalRev ? ((m.revenue / totalRev) * 100).toFixed(1) : '0.0';
      return `<tr>
        <td class="rank">${i+1}</td>
        <td><span class="dot" style="background:${COLORS[i%COLORS.length]}"></span>${esc(m.name)}</td>
        <td>$${m.revenue.toLocaleString()}</td>
        <td>${m.appointments}</td>
        <td>$${avg}</td>
        <td>${share}%</td>
      </tr>`;
    }).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
