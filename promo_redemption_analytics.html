<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promo Redemption — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .promo-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .8rem 1rem; margin-bottom: .45rem; display: flex; align-items: center; justify-content: space-between; }
    .promo-code { font-size: .82rem; font-weight: 900; font-family: monospace; color: var(--accent); }
    .promo-disc { font-size: .72rem; color: var(--muted); margin-top: .1rem; }
    .promo-uses { font-size: .8rem; font-weight: 700; color: var(--green); }
    .promo-inactive { opacity: .45; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: .3rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Promo Redemption</div>
  <p class="page-sub">Track how promotional codes are performing. Redemption rate and per-code usage reveal which promos drive bookings and which are underperforming or ripe for retirement.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Redemptions (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rate" style="color:var(--yellow)">—</div><div class="stat-lbl">Redemption Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rev" style="color:var(--green)">—</div><div class="stat-lbl">Promo Revenue (30d)</div></div>
  </div>
  <div class="card">
    <div class="card-title">Active Promo Codes</div>
    <div id="promo-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/promo-redemption-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_redemptions_30d;
    document.getElementById('h-rate').textContent = d.redemption_rate_pct.toFixed(1) + '%';
    document.getElementById('h-rev').textContent = '$' + d.revenue_from_promos_30d.toFixed(0);
    const pl = document.getElementById('promo-list');
    d.promos.forEach(p => {
      const cls = p.active ? '' : ' promo-inactive';
      const dot = '<span class="status-dot" style="background:' + (p.active ? 'var(--green)' : '#444') + '"></span>';
      pl.innerHTML += '<div class="promo-card' + cls + '"><div><div class="promo-code">' + dot + p.code + '</div><div class="promo-disc">' + p.discount_pct + '% off</div></div><div class="promo-uses">' + p.uses + ' uses</div></div>';
    });
  }
  load();
</script>
</body>
</html>
