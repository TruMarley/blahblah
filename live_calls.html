<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Calls — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-top: .2rem; }
    .refresh-badge { font-size: .7rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: .2rem .65rem; display: flex; align-items: center; gap: .3rem; }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.4; transform:scale(.7); } }
    .today-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .today-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1.1rem; }
    .today-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .3rem; }
    .today-value { font-size: 1.4rem; font-weight: 900; letter-spacing: -.03em; }
    .today-value.green { color: var(--green); }
    .active-label { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .09em; margin-bottom: 1rem; }
    .calls-list { display: flex; flex-direction: column; gap: 1rem; }
    .call-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
    .call-indicator { display: flex; flex-direction: column; align-items: center; gap: .4rem; flex-shrink: 0; }
    .call-dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-active { background: var(--green); animation: pulse 1.2s infinite; }
    .dot-on_hold { background: var(--yellow); }
    .dot-transferring { background: var(--accent); animation: pulse 0.8s infinite; }
    .call-body { flex: 1; }
    .call-number { font-size: 1.05rem; font-weight: 800; letter-spacing: .03em; margin-bottom: .35rem; }
    .call-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .intent-chip { font-size: .72rem; font-weight: 700; padding: .18rem .6rem; border-radius: 6px; background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.2); color: var(--accent); }
    .call-staff { font-size: .75rem; color: var(--muted); }
    .call-right { text-align: right; flex-shrink: 0; }
    .call-duration { font-size: 1.4rem; font-weight: 900; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .status-badge { font-size: .68rem; font-weight: 800; padding: .18rem .55rem; border-radius: 99px; margin-top: .3rem; display: inline-block; }
    .s-active { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .s-on_hold { background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .s-transferring { background: rgba(167,139,250,.1); color: var(--accent); border: 1px solid rgba(167,139,250,.2); }
    .empty-state { text-align: center; padding: 5rem 2rem; }
    .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: .3; }
    .empty-title { font-size: 1.1rem; font-weight: 800; color: var(--muted); margin-bottom: .4rem; }
    .empty-sub { font-size: .82rem; color: var(--muted); opacity: .7; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="header-row">
    <div>
      <div class="page-title">Live Calls</div>
      <div class="page-sub">Real-time view of active AI calls.</div>
    </div>
    <div class="refresh-badge"><div class="pulse-dot"></div> Auto-refresh every 5s</div>
  </div>

  <div class="today-row" id="today-row">
    <div class="today-card"><div class="today-label">Calls Today</div><div class="today-value">—</div></div>
    <div class="today-card"><div class="today-label">Active Now</div><div class="today-value green">—</div></div>
    <div class="today-card"><div class="today-label">Avg Duration</div><div class="today-value">—</div></div>
  </div>

  <div class="active-label">Active Calls</div>
  <div id="calls-list"><div class="empty-state"><div class="empty-icon">📞</div><div class="empty-title">Loading...</div></div></div>
</div>

<script>
  let callTimers = {};

  function maskNumber(n) {
    if (!n) return 'Unknown';
    const digits = n.replace(/\D/g,'');
    if (digits.length >= 10) return `***-***-${digits.slice(-4)}`;
    return '***-****';
  }

  function fmtDuration(secs) {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  async function load() {
    const r = await fetch('/api/voice/calls/live');
    const d = await r.json();
    const calls = d.calls || [];

    // Update today stats
    document.getElementById('today-row').innerHTML = `
      <div class="today-card"><div class="today-label">Calls Today</div><div class="today-value">${d.total_today || 0}</div></div>
      <div class="today-card"><div class="today-label">Active Now</div><div class="today-value green">${calls.length}</div></div>
      <div class="today-card"><div class="today-label">Avg Duration</div><div class="today-value">${d.avg_duration_today ? fmtDuration(d.avg_duration_today) : '—'}</div></div>
    `;

    const list = document.getElementById('calls-list');
    if (!calls.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📞</div>
        <div class="empty-title">No active calls — all quiet</div>
        <div class="empty-sub">Your AI is standing by, ready to answer.</div>
      </div>`;
      return;
    }

    // Clear old timers
    Object.values(callTimers).forEach(clearInterval);
    callTimers = {};

    list.innerHTML = calls.map(c => {
      const dotCls = `dot-${c.status || 'active'}`;
      const sCls = `s-${c.status || 'active'}`;
      const statusLabel = (c.status || 'active').replace('_',' ');
      return `<div class="call-card" data-id="${esc(c.call_id)}">
        <div class="call-indicator">
          <div class="call-dot ${dotCls}"></div>
        </div>
        <div class="call-body">
          <div class="call-number">${maskNumber(c.caller_number)}</div>
          <div class="call-meta">
            ${c.intent_detected ? `<span class="intent-chip">${esc(c.intent_detected)}</span>` : ''}
            ${c.staff_assigned ? `<span class="call-staff">→ ${esc(c.staff_assigned)}</span>` : ''}
          </div>
        </div>
        <div class="call-right">
          <div class="call-duration" id="dur-${esc(c.call_id)}">${fmtDuration(c.duration_seconds || 0)}</div>
          <span class="status-badge ${sCls}">${statusLabel}</span>
        </div>
      </div>`;
    }).join('');

    // Start live duration counters
    calls.forEach(c => {
      let secs = c.duration_seconds || 0;
      if (c.status === 'active') {
        callTimers[c.call_id] = setInterval(() => {
          secs++;
          const el = document.getElementById(`dur-${c.call_id}`);
          if (el) el.textContent = fmtDuration(secs);
        }, 1000);
      }
    });
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  load();
  setInterval(load, 5000);
</script>
</body>
</html>
