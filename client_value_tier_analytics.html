<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Value Tiers — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .tier-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1.1rem; margin-bottom: .6rem; display: flex; align-items: center; justify-content: space-between; }
    .tier-left { display: flex; align-items: center; gap: .75rem; }
    .tier-badge { font-size: .68rem; font-weight: 800; border-radius: 5px; padding: .18rem .55rem; }
    .bronze { background: rgba(180,120,60,.15); color: #cd7f32; border: 1px solid rgba(180,120,60,.3); }
    .silver { background: rgba(160,160,160,.12); color: #b0b0b0; border: 1px solid rgba(160,160,160,.25); }
    .gold { background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.25); }
    .platinum { background: rgba(167,139,250,.12); color: var(--accent); border: 1px solid rgba(167,139,250,.25); }
    .tier-label { font-size: .72rem; color: var(--muted); }
    .tier-right { text-align: right; }
    .tier-count { font-size: .88rem; font-weight: 800; }
    .tier-avg { font-size: .68rem; color: var(--muted); margin-top: .1rem; }
    .tier-pct { font-size: .72rem; font-weight: 700; color: var(--green); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Value Tiers</div>
  <p class="page-sub">Segment clients by annual spend. Platinum and Gold clients drive disproportionate revenue — identify and prioritize them for retention efforts.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Clients</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--yellow)">—</div><div class="stat-lbl">Top Tier Revenue %</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Avg Annual Spend</div></div>
  </div>
  <div class="card">
    <div class="card-title">Spend Tier Breakdown</div>
    <div id="tier-list"></div>
  </div>
</div>
<script>
  const BADGE = {Bronze:'bronze',Silver:'silver',Gold:'gold',Platinum:'platinum'};
  async function load() {
    const d = await fetch('/api/analytics/client-value-tier-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_clients.toLocaleString();
    document.getElementById('h-top').textContent = d.top_tier_revenue_pct.toFixed(1) + '%';
    document.getElementById('h-avg').textContent = '$' + d.avg_annual_spend.toLocaleString();
    const tl = document.getElementById('tier-list');
    d.tiers.forEach(t => {
      tl.innerHTML += '<div class="tier-card"><div class="tier-left"><span class="tier-badge ' + (BADGE[t.tier]||'') + '">' + t.tier + '</span><span class="tier-label">' + t.label + '</span></div><div class="tier-right"><div class="tier-count">' + t.count + ' clients</div><div class="tier-avg">Avg $' + t.avg_spend.toLocaleString() + '/yr</div></div><div class="tier-pct">' + t.pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
