<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sentiment Trend — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.1rem; margin-bottom: .75rem; }
    .leg-item { display: flex; align-items: center; gap: .35rem; font-size: .7rem; color: var(--muted); }
    .leg-swatch { width: 10px; height: 10px; border-radius: 2px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Sentiment Trend</div>
  <p class="page-sub">Track caller sentiment over time — positive interactions signal strong AI performance; rising negative sentiment flags script or service issues.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Positive</div>
      <div class="hero-val" id="h-pos" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Negative</div>
      <div class="hero-val" id="h-neg" style="color:var(--red)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Best Week</div>
      <div class="hero-val" id="h-best" style="color:var(--accent);font-size:1.2rem">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">8-Week Sentiment Distribution</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-swatch" style="background:rgba(52,211,153,.7)"></div> Positive</div>
      <div class="leg-item"><div class="leg-swatch" style="background:rgba(100,100,100,.6)"></div> Neutral</div>
      <div class="leg-item"><div class="leg-swatch" style="background:rgba(248,113,113,.7)"></div> Negative</div>
    </div>
    <svg id="chart" viewBox="0 0 660 220" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block"></svg>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/sentiment-trend').then(r => r.json());
    const weeks = d.weeks || [];
    if (!weeks.length) return;

    // Normalize to 100%
    const normalized = weeks.map(w => {
      const total = w.positive + w.neutral + w.negative;
      return { week: w.week, pos: w.positive/total*100, neu: w.neutral/total*100, neg: w.negative/total*100 };
    });

    const avgPos = Math.round(normalized.reduce((s,w)=>s+w.pos,0)/normalized.length);
    const avgNeg = Math.round(normalized.reduce((s,w)=>s+w.neg,0)/normalized.length);
    const bestWeek = normalized.reduce((a,b)=>b.pos>a.pos?b:a,normalized[0]);

    document.getElementById('h-pos').textContent = avgPos + '%';
    document.getElementById('h-neg').textContent = avgNeg + '%';
    document.getElementById('h-best').textContent = bestWeek ? bestWeek.week : '—';

    const W=660, H=220, padL=36, padR=12, padT=16, padB=36;
    const chartW=W-padL-padR, chartH=H-padT-padB;
    const n=normalized.length, step=chartW/(n-1);

    // Build stacked area paths
    const posY = normalized.map((w,i)=>({ x: padL+i*step, y: padT+chartH-(w.pos/100)*chartH }));
    const neuY = normalized.map((w,i)=>({ x: padL+i*step, y: padT+chartH-((w.pos+w.neu)/100)*chartH }));
    const topY = normalized.map((_,i)=>({ x: padL+i*step, y: padT }));

    function pathFwd(pts) { return `M${pts[0].x},${pts[0].y} ` + pts.slice(1).map(p=>`L${p.x},${p.y}`).join(' '); }
    function pathRev(pts) { return pts.slice().reverse().map(p=>`L${p.x},${p.y}`).join(' '); }

    const baseline = `L${padL+(n-1)*step},${padT+chartH} L${padL},${padT+chartH}`;
    const posArea = pathFwd(posY) + ' ' + baseline + ' Z';
    const neuArea = pathFwd(neuY) + ' ' + pathRev(posY) + ' Z';
    const negArea = pathFwd(topY) + ' ' + pathRev(neuY) + ' Z';

    let labels='';
    normalized.forEach((w,i)=>{
      labels+=`<text x="${padL+i*step}" y="${H-padB+14}" text-anchor="middle" fill="#555" font-size="9">${esc(w.week)}</text>`;
    });

    // Y axis (percentage)
    let yAxis='';
    for(let t=0;t<=4;t++){
      const yp=padT+chartH-(t/4)*chartH;
      yAxis+=`<line x1="${padL}" x2="${W-padR}" y1="${yp}" y2="${yp}" stroke="#1e1e1e" stroke-width="1"/>`;
      yAxis+=`<text x="${padL-5}" y="${yp+4}" text-anchor="end" fill="#444" font-size="8">${t*25}%</text>`;
    }

    document.getElementById('chart').innerHTML = yAxis +
      `<path d="${negArea}" fill="rgba(248,113,113,.4)"/>` +
      `<path d="${neuArea}" fill="rgba(100,100,100,.35)"/>` +
      `<path d="${posArea}" fill="rgba(52,211,153,.5)"/>` +
      labels;
  }

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
