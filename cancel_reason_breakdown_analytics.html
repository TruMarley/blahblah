<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cancellation Reasons — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .reason-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .reason-label { font-size: .78rem; color: var(--text); width: 130px; flex-shrink: 0; }
    .reason-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .reason-fill { height: 100%; border-radius: 4px; }
    .reason-pct { font-size: .75rem; font-weight: 700; width: 40px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Cancellation Reasons</div>
  <p class="page-sub">Understand why clients cancel. The AI captures reasons during cancellation calls, giving you data to address root causes — from policy adjustments to service recovery outreach.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--red)">—</div><div class="stat-lbl">Cancellations (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--yellow)">—</div><div class="stat-lbl">Most Common Reason</div></div>
  </div>
  <div class="card">
    <div class="card-title">Reason Breakdown</div>
    <div id="reason-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--red)','var(--yellow)','var(--accent)','var(--muted)','#60a5fa','var(--green)'];
  async function load() {
    const d = await fetch('/api/analytics/cancel-reason-breakdown-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_cancellations_30d;
    document.getElementById('h-top').textContent = d.most_common;
    const rl = document.getElementById('reason-list');
    const maxP = Math.max(...d.reasons.map(r => r.pct));
    d.reasons.forEach((r, i) => {
      const w = (r.pct / maxP * 100).toFixed(1);
      const color = COLORS[i % COLORS.length];
      rl.innerHTML += '<div class="reason-row"><div class="reason-label">' + r.reason + '</div><div class="reason-track"><div class="reason-fill" style="width:' + w + '%;background:' + color + '"></div></div><div class="reason-pct" style="color:' + color + '">' + r.pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
