<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Sentiment Trend — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Sentiment Trend</div>
  <p class="page-sub">Monthly breakdown of caller sentiment — positive, neutral, and negative — detected by AI during calls.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Latest Positive</div>
      <div class="hero-val" id="h-pos" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Latest Neutral</div>
      <div class="hero-val" id="h-neu" style="color:var(--muted)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Latest Negative</div>
      <div class="hero-val" id="h-neg" style="color:var(--red)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Sentiment Distribution by Month</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(52,211,153,.7)"></div>Positive</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(100,100,100,.6)"></div>Neutral</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(248,113,113,.7)"></div>Negative</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/call-sentiment-trend');
    const d = await r.json();
    const months = d.months || [];
    const last = months[months.length - 1] || {};
    document.getElementById('h-pos').textContent = (last.positive_pct || 0) + '%';
    document.getElementById('h-neu').textContent = (last.neutral_pct || 0) + '%';
    document.getElementById('h-neg').textContent = (last.negative_pct || 0) + '%';

    const svg = document.getElementById('chart');
    const W=700, H=260, pL=8, pR=8, pT=14, pB=30;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=months.length;
    const barW=cW/n*0.62;
    const xStep=cW/n;
    const xOf=i=>pL+i*xStep+xStep/2;

    months.forEach((m,i)=>{
      const cx=xOf(i);
      const posH=cH*m.positive_pct/100;
      const neuH=cH*m.neutral_pct/100;
      const negH=cH*m.negative_pct/100;
      const yBase=pT+cH;
      // stacked: negative bottom, neutral middle, positive top
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${yBase-negH}" width="${barW}" height="${negH}" rx="0" fill="rgba(248,113,113,.7)"/>`;
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${yBase-negH-neuH}" width="${barW}" height="${neuH}" rx="0" fill="rgba(100,100,100,.55)"/>`;
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${yBase-negH-neuH-posH}" width="${barW}" height="${posH}" rx="4" fill="rgba(52,211,153,.7)"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="9" fill="#555" text-anchor="middle">${esc(m.month)}</text>`;
      svg.innerHTML+=`<text x="${cx}" y="${yBase-negH-neuH-posH-5}" font-size="8" fill="rgba(52,211,153,.9)" text-anchor="middle">${m.positive_pct}%</text>`;
    });
    // y-axis gridlines
    [25,50,75,100].forEach(v=>{
      const y=pT+cH-cH*v/100;
      svg.innerHTML=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`+svg.innerHTML;
      svg.innerHTML=`<text x="${pL+2}" y="${y-3}" font-size="8" fill="#444">${v}%</text>`+svg.innerHTML;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
