<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CLV Segments — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .seg-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; margin-bottom: .6rem; display: flex; align-items: center; gap: 1rem; }
    .seg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .seg-name { font-size: .85rem; font-weight: 800; flex: 1; }
    .seg-count { font-size: .75rem; color: var(--muted); }
    .seg-ltv { font-size: .82rem; font-weight: 700; color: var(--green); width: 72px; text-align: right; }
    .seg-visits { font-size: .75rem; color: var(--muted); width: 60px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">CLV Segments</div>
  <p class="page-sub">Client Lifetime Value segments reveal where your most valuable relationships live — and which segments need rescue. Use these tiers to target marketing and retention spend with precision.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Clients Analysed</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ltv" style="color:var(--green)">—</div><div class="stat-lbl">Avg LTV (All)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--yellow)">—</div><div class="stat-lbl">Top Segment</div></div>
  </div>
  <div class="card">
    <div class="card-title">Segment Breakdown</div>
    <div id="seg-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--green)','#60a5fa','var(--accent)','var(--yellow)','var(--red)'];
  async function load() {
    const d = await fetch('/api/analytics/clv-segment-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_clients_analysed.toLocaleString();
    document.getElementById('h-ltv').textContent = '$' + d.avg_ltv_all.toLocaleString();
    document.getElementById('h-top').textContent = d.top_segment;
    const sl = document.getElementById('seg-list');
    d.segments.forEach((s, i) => {
      const color = COLORS[i % COLORS.length];
      sl.innerHTML += '<div class="seg-card"><div class="seg-dot" style="background:' + color + '"></div><div class="seg-name" style="color:' + color + '">' + s.segment + '</div><div class="seg-count">' + s.client_count + ' clients</div><div class="seg-ltv">$' + s.avg_ltv.toLocaleString() + ' LTV</div><div class="seg-visits">' + s.avg_visits_yr + ' vis/yr</div></div>';
    });
  }
  load();
</script>
</body>
</html>
