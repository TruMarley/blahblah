<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Reviews — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .review-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .55rem; }
    .review-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .4rem; }
    .stars { color: var(--yellow); font-size: .88rem; letter-spacing: .05em; }
    .review-age { font-size: .65rem; color: var(--muted); }
    .review-text { font-size: .78rem; color: var(--text); font-style: italic; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Google Reviews</div>
  <p class="page-sub">Monitor your Google rating, review velocity, and response rate. The AI proactively requests reviews from satisfied clients at the end of calls, boosting review volume organically.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Rating</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--muted)">—</div><div class="stat-lbl">Total Reviews</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-30d" style="color:var(--accent)">—</div><div class="stat-lbl">New (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-five" style="color:var(--green)">—</div><div class="stat-lbl">5-Star %</div></div>
  </div>
  <div class="card">
    <div class="card-title">Recent Reviews</div>
    <div id="review-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/google-review-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.avg_rating.toFixed(1) + '★';
    document.getElementById('h-total').textContent = d.total_reviews;
    document.getElementById('h-30d').textContent = d.reviews_30d;
    document.getElementById('h-five').textContent = d.five_star_pct.toFixed(1) + '%';
    const rl = document.getElementById('review-list');
    d.recent.forEach(r => {
      const stars = '★'.repeat(r.stars) + '☆'.repeat(5 - r.stars);
      rl.innerHTML += '<div class="review-card"><div class="review-top"><div class="stars">' + stars + '</div><div class="review-age">' + r.days_ago + 'd ago</div></div><div class="review-text">"' + r.snippet + '"</div></div>';
    });
  }
  load();
</script>
</body>
</html>
