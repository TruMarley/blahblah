<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Churn Signals — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .seg-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1.1rem; margin-bottom: .6rem; display: flex; align-items: center; justify-content: space-between; }
    .seg-left { flex: 1; }
    .seg-label { font-size: .85rem; font-weight: 700; margin-bottom: .25rem; }
    .seg-action { font-size: .68rem; color: var(--muted); }
    .seg-count { font-size: 1rem; font-weight: 900; margin-right: .75rem; }
    .risk-badge { font-size: .62rem; font-weight: 800; border-radius: 4px; padding: .12rem .45rem; }
    .risk-medium { background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.25); }
    .risk-high { background: rgba(248,113,113,.12); color: var(--red); border: 1px solid rgba(248,113,113,.25); }
    .risk-critical { background: rgba(248,113,113,.25); color: var(--red); border: 1px solid rgba(248,113,113,.4); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Churn Signals</div>
  <p class="page-sub">Clients who haven't visited in 60+ days are churning silently. Identify them by risk tier and trigger targeted win-back actions before they're gone permanently.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-risk" style="color:var(--red)">—</div><div class="stat-lbl">At-Risk Clients</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-churn" style="color:var(--red)">—</div><div class="stat-lbl">Churn Rate (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Days Silent</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rev" style="color:var(--muted)">—</div><div class="stat-lbl">Revenue at Risk</div></div>
  </div>
  <div class="card">
    <div class="card-title">Risk Segments</div>
    <div id="seg-list"></div>
  </div>
</div>
<script>
  const RISK_CLS = {medium:'risk-medium',high:'risk-high',critical:'risk-critical'};
  async function load() {
    const d = await fetch('/api/analytics/churn-signal-stats').then(r => r.json());
    document.getElementById('h-risk').textContent = d.at_risk_clients;
    document.getElementById('h-churn').textContent = d.churn_rate_30d_pct.toFixed(1) + '%';
    document.getElementById('h-avg').textContent = d.avg_days_since_visit + 'd';
    document.getElementById('h-rev').textContent = '$' + d.revenue_at_risk.toLocaleString();
    const sl = document.getElementById('seg-list');
    d.segments.forEach(s => {
      sl.innerHTML += '<div class="seg-card"><div class="seg-left"><div class="seg-label">' + s.label + '</div><div class="seg-action">Recommended: ' + s.action + '</div></div><div class="seg-count" style="color:var(--red)">' + s.count + '</div><span class="risk-badge ' + (RISK_CLS[s.risk]||'') + '">' + s.risk + '</span></div>';
    });
  }
  load();
</script>
</body>
</html>
