<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rebook Follow-up — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .8rem; }
    .svc-name { font-size: .82rem; font-weight: 700; width: 72px; flex-shrink: 0; }
    .svc-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .svc-fill { height: 100%; border-radius: 4px; }
    .svc-pct { font-size: .75rem; font-weight: 700; width: 44px; text-align: right; }
    .svc-days { font-size: .65rem; color: var(--muted); width: 60px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Rebook Follow-up</div>
  <p class="page-sub">Track which services drive the strongest rebooking behaviour and how quickly clients return. High rebook rates compound into lifetime value.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-overall" style="color:var(--accent)">—</div><div class="stat-lbl">Overall Rebook Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-best" style="color:var(--green)">—</div><div class="stat-lbl">Best Rebook Service</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-clients" style="color:var(--yellow)">—</div><div class="stat-lbl">Clients Rebooked (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ai" style="color:var(--accent)">—</div><div class="stat-lbl">AI-Prompted Rebooks</div></div>
  </div>
  <div class="card">
    <div class="card-title">Rebook Rate by Service</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/rebook-followup-stats').then(r => r.json());
    document.getElementById('h-overall').textContent = d.overall_rebook_rate_pct.toFixed(1) + '%';
    document.getElementById('h-best').textContent = d.best_rebook_service;
    document.getElementById('h-clients').textContent = d.clients_rebooking_30d;
    document.getElementById('h-ai').textContent = d.ai_prompted_rebooks_30d;
    const sl = document.getElementById('svc-list');
    const maxR = Math.max(...d.by_service.map(s => s.rebook_rate_pct));
    d.by_service.forEach(s => {
      const w = (s.rebook_rate_pct / maxR * 100).toFixed(1);
      const col = s.rebook_rate_pct >= 75 ? 'var(--green)' : s.rebook_rate_pct >= 55 ? 'var(--accent)' : 'var(--yellow)';
      sl.innerHTML += '<div class="svc-row"><div class="svc-name">' + s.service + '</div><div class="svc-track"><div class="svc-fill" style="width:' + w + '%;background:' + col + '"></div></div><div class="svc-pct" style="color:' + col + '">' + s.rebook_rate_pct.toFixed(1) + '%</div><div class="svc-days">~' + s.avg_days_to_rebook + 'd</div></div>';
    });
  }
  load();
</script>
</body>
</html>
