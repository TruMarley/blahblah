<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hourly Call Volume — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 230px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Hourly Call Volume</div>
  <p class="page-sub">Average calls per hour of the day — use this to understand when your AI is busiest.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Peak Hour</div>
      <div class="hero-val" id="h-peak" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Peak Calls</div>
      <div class="hero-val" id="h-calls" style="color:var(--accent)">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Call Volume — 24 Hours</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 860 230" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/hourly-call-volume');
    const d = await r.json();
    document.getElementById('h-peak').textContent = d.peak_hour_label;
    document.getElementById('h-calls').textContent = d.peak_calls;

    const hours = d.hours || [];
    const svg = document.getElementById('chart');
    const W=860,H=230,pL=32,pR=8,pT=14,pB=30;
    const cW=W-pL-pR, cH=H-pT-pB;
    const maxCalls = Math.max(...hours.map(h=>h.calls), 1);
    const n = hours.length;
    const slotW = cW/n;
    const bW = slotW * 0.72;

    [0,.25,.5,.75,1].forEach(f => {
      const y = pT + cH*(1-f);
      svg.innerHTML += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      if (f > 0) svg.innerHTML += `<text x="${pL-3}" y="${y+3}" font-size="8" fill="#555" text-anchor="end">${Math.round(maxCalls*f)}</text>`;
    });

    hours.forEach((h, i) => {
      const cx = pL + i*slotW + slotW/2;
      const bH = (h.calls/maxCalls)*cH;
      const isPeak = h.label === d.peak_hour_label;
      const intensity = h.calls/maxCalls;
      const opacity = 0.18 + intensity * 0.72;
      const color = isPeak ? '#fbbf24' : '#a78bfa';
      if (bH > 0) {
        svg.innerHTML += `<rect x="${cx-bW/2}" y="${pT+cH-bH}" width="${bW}" height="${bH}" rx="2" fill="${color}" opacity="${opacity.toFixed(2)}"/>`;
      }
      // label every 3 hours
      if (i % 3 === 0) {
        svg.innerHTML += `<text x="${cx}" y="${H-2}" font-size="8" fill="#555" text-anchor="middle">${h.label}</text>`;
      }
      if (isPeak) {
        svg.innerHTML += `<text x="${cx}" y="${pT+cH-bH-5}" font-size="8" fill="#fbbf24" text-anchor="middle" font-weight="800">★</text>`;
      }
    });
  }
  load();
</script>
</body>
</html>
