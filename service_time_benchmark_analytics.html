<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Time Benchmark — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .svc-name { font-size: .84rem; font-weight: 700; flex: 1; }
    .svc-times { display: flex; gap: 1.2rem; align-items: center; }
    .time-item { font-size: .7rem; color: var(--muted); text-align: center; }
    .time-item span { display: block; font-size: .86rem; font-weight: 900; color: var(--text); }
    .variance-badge { font-size: .68rem; font-weight: 700; border-radius: 4px; padding: .12rem .4rem; }
    .over { background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
    .under { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .exact { background: rgba(167,139,250,.1); color: var(--accent); border: 1px solid rgba(167,139,250,.2); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Time Benchmark</div>
  <p class="page-sub">Compare scheduled versus actual average service durations. Services running consistently over time cause cascading delays — use this to recalibrate your booking slots.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-over" style="color:var(--red)">—</div><div class="stat-lbl">Services Running Over</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-accuracy" style="color:var(--accent)">—</div><div class="stat-lbl">Schedule Accuracy</div></div>
  </div>
  <div class="card">
    <div class="card-title">Service Breakdown</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/service-time-benchmark-stats').then(r => r.json());
    document.getElementById('h-over').textContent = d.services_running_over;
    document.getElementById('h-accuracy').textContent = d.avg_schedule_accuracy_pct.toFixed(1) + '%';
    const sl = document.getElementById('svc-list');
    d.services.forEach(s => {
      const vSign = s.variance > 0 ? '+' : '';
      const vcls = s.variance > 2 ? 'over' : s.variance < -2 ? 'under' : 'exact';
      const vLabel = s.variance > 2 ? 'Over' : s.variance < -2 ? 'Under' : 'On target';
      sl.innerHTML += '<div class="svc-row"><div class="svc-name">' + s.service + '</div><div class="svc-times"><div class="time-item"><span>' + s.scheduled_min + 'm</span>Scheduled</div><div class="time-item"><span>' + s.actual_avg_min.toFixed(1) + 'm</span>Actual avg</div><span class="variance-badge ' + vcls + '">' + vSign + s.variance.toFixed(1) + 'm · ' + vLabel + '</span></div></div>';
    });
  }
  load();
</script>
</body>
</html>
