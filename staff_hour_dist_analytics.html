<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Hour Distribution — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .hour-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .55rem; }
    .hour-label { font-size: .75rem; color: var(--muted); width: 55px; flex-shrink: 0; }
    .hour-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 9px; overflow: hidden; }
    .hour-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .hour-pct { font-size: .72rem; font-weight: 700; color: var(--accent); width: 42px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Hour Distribution</div>
  <p class="page-sub">See booking density across every hour of the day. Identify peak periods where demand is concentrated and slow hours that represent fill-rate opportunities.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-hours" style="color:var(--accent)">—</div><div class="stat-lbl">Staff Hours (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-booked" style="color:var(--green)">—</div><div class="stat-lbl">Avg Booked %</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak" style="color:var(--yellow)">—</div><div class="stat-lbl">Peak Hour</div></div>
  </div>
  <div class="card">
    <div class="card-title">Hourly Booking Density</div>
    <div id="hour-list"></div>
  </div>
</div>
<script>
  function fmt12(h) { return h === 12 ? '12pm' : h < 12 ? h + 'am' : (h-12) + 'pm'; }
  async function load() {
    const d = await fetch('/api/analytics/staff-hour-dist-stats').then(r => r.json());
    document.getElementById('h-hours').textContent = d.total_staff_hours_30d.toLocaleString();
    document.getElementById('h-booked').textContent = d.avg_booked_pct.toFixed(1) + '%';
    document.getElementById('h-peak').textContent = fmt12(d.peak_hour);
    const hl = document.getElementById('hour-list');
    const maxP = Math.max(...d.distribution.map(h => h.booked_pct));
    d.distribution.forEach(h => {
      const w = (h.booked_pct / maxP * 100).toFixed(1);
      const color = h.booked_pct >= 80 ? 'var(--yellow)' : h.booked_pct >= 60 ? 'var(--accent)' : 'var(--muted)';
      hl.innerHTML += '<div class="hour-row"><div class="hour-label">' + fmt12(h.hour) + '</div><div class="hour-track"><div class="hour-fill" style="width:' + w + '%;background:' + color + '"></div></div><div class="hour-pct" style="color:' + color + '">' + h.booked_pct.toFixed(0) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
