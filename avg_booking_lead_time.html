<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avg Booking Lead Time — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 220px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Avg Booking Lead Time</div>
  <p class="page-sub">How far in advance clients book — helps you optimize reminder timing and staffing decisions.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Overall Average</div>
      <div class="hero-val" id="h-avg" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">This Month</div>
      <div class="hero-val" id="h-cur" style="color:var(--yellow)">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Avg Days Booked in Advance — 8 Months</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 220" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/avg-booking-lead-time');
    const d = await r.json();
    document.getElementById('h-avg').textContent = d.overall_avg_days + ' days';
    const trend = d.trend || [];
    document.getElementById('h-cur').textContent = trend.length ? trend[trend.length-1].avg_days + ' days' : '—';

    const svg = document.getElementById('chart');
    const W=700,H=220,pL=44,pR=12,pT=14,pB=34;
    const cW=W-pL-pR, cH=H-pT-pB;
    const maxV = 5, n = trend.length;
    const bW = cW/n * 0.55;

    [0,1,2,3,4,5].forEach(v => {
      const y = pT + cH - (v/maxV)*cH;
      svg.innerHTML += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML += `<text x="${pL-4}" y="${y+3}" font-size="9" fill="#666" text-anchor="end">${v}d</text>`;
    });

    trend.forEach((t, i) => {
      const cx = pL + i*(cW/n) + (cW/n)/2;
      const bH = (t.avg_days/maxV)*cH;
      const isPeak = t.avg_days === Math.max(...trend.map(x => x.avg_days));
      const color = isPeak ? '#fbbf24' : '#a78bfa';
      svg.innerHTML += `<rect x="${cx-bW/2}" y="${pT+cH-bH}" width="${bW}" height="${bH}" rx="3" fill="${color}" opacity="${isPeak?'.9':'.65'}"/>`;
      svg.innerHTML += `<text x="${cx}" y="${pT+cH-bH-5}" font-size="8.5" fill="${color}" text-anchor="middle" font-weight="800">${t.avg_days}</text>`;
      svg.innerHTML += `<text x="${cx}" y="${H-4}" font-size="9" fill="#666" text-anchor="middle">${t.month}</text>`;
    });
  }
  load();
</script>
</body>
</html>
