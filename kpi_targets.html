<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KPI Targets — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .save-btn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: .55rem 1.2rem; font-size: .83rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .save-fb { font-size: .78rem; color: var(--green); margin-top: .5rem; text-align: right; min-height: 1.2em; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .85rem; }
    .kpi-name { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
    .kpi-status { font-size: .68rem; font-weight: 800; padding: .15rem .5rem; border-radius: 99px; }
    .s-met  { background: rgba(52,211,153,.12); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .s-near { background: rgba(251,191,36,.1);  color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .s-miss { background: rgba(248,113,113,.1); color: var(--red);    border: 1px solid rgba(248,113,113,.2); }
    .kpi-vals { display: flex; align-items: baseline; gap: .5rem; margin-bottom: .75rem; }
    .kpi-actual { font-size: 1.8rem; font-weight: 900; letter-spacing: -.04em; }
    .kpi-sep { font-size: 1rem; color: var(--muted); }
    .kpi-target-row { display: flex; align-items: center; gap: .5rem; }
    .kpi-target-label { font-size: .72rem; color: var(--muted); }
    .target-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: .85rem; padding: .35rem .7rem; border-radius: 7px; font-family: inherit; outline: none; width: 90px; }
    .target-input:focus { border-color: var(--accent); }
    .kpi-bar-wrap { background: var(--surface2); border-radius: 99px; height: 6px; margin-top: .75rem; overflow: hidden; }
    .kpi-bar { height: 6px; border-radius: 99px; transition: width .5s ease; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="header-row">
    <div class="page-title">KPI Targets</div>
    <button class="save-btn" onclick="save()">Save Targets</button>
  </div>
  <div class="save-fb" id="save-fb"></div>
  <div class="kpi-grid" id="kpi-grid"></div>
</div>
<script>
  const KPI_DEFS = [
    {key:'bookings', label:'Monthly Bookings', unit:'', targetKey:'bookings_target', actualKey:'bookings_actual', prefix:''},
    {key:'revenue',  label:'Monthly Revenue',  unit:'', targetKey:'revenue_target',  actualKey:'revenue_actual',  prefix:'$'},
    {key:'retention',label:'Retention Rate',   unit:'%',targetKey:'retention_target',actualKey:'retention_actual',prefix:''},
    {key:'satisfaction',label:'Avg Rating',    unit:'★',targetKey:'satisfaction_target',actualKey:'satisfaction_actual',prefix:''},
    {key:'response_time',label:'Avg Response Time',unit:'s',targetKey:'response_time_target',actualKey:'response_time_actual',prefix:''},
  ];
  let targets = {}, actuals = {};

  async function load() {
    const r = await fetch('/api/kpi-targets');
    const d = await r.json();
    targets = d.targets || {};
    actuals = d.actuals || {};
    render();
  }

  function render() {
    document.getElementById('kpi-grid').innerHTML = KPI_DEFS.map(k => {
      const t = targets[k.targetKey] || 1;
      const a = actuals[k.actualKey] || 0;
      const pct = Math.min(Math.round(a / t * 100), 100);
      const color = pct >= 100 ? 'var(--green)' : pct >= 80 ? 'var(--yellow)' : 'var(--red)';
      const sc = pct >= 100 ? 's-met' : pct >= 80 ? 's-near' : 's-miss';
      const label = pct >= 100 ? 'Met' : pct >= 80 ? 'Near' : 'Behind';
      return `<div class="kpi-card">
        <div class="kpi-header">
          <div class="kpi-name">${k.label}</div>
          <span class="kpi-status ${sc}">${label}</span>
        </div>
        <div class="kpi-vals">
          <div class="kpi-actual" style="color:${color}">${k.prefix}${a}${k.unit}</div>
          <div class="kpi-sep">/</div>
          <div style="color:var(--muted);font-size:.9rem">${k.prefix}${t}${k.unit} target</div>
        </div>
        <div class="kpi-target-row">
          <span class="kpi-target-label">Target:</span>
          <input class="target-input" id="inp-${k.key}" type="number" step="${k.unit==='%'||k.unit==='★'||k.unit==='s'?0.1:1}" value="${t}" oninput="updateBar('${k.key}', ${a})">
        </div>
        <div class="kpi-bar-wrap"><div class="kpi-bar" id="bar-${k.key}" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');
  }

  function updateBar(key, actual) {
    const inp = document.getElementById('inp-' + key);
    const t = parseFloat(inp.value) || 1;
    const pct = Math.min(Math.round(actual / t * 100), 100);
    const color = pct >= 100 ? 'var(--green)' : pct >= 80 ? 'var(--yellow)' : 'var(--red)';
    const bar = document.getElementById('bar-' + key);
    bar.style.width = pct + '%';
    bar.style.background = color;
  }

  async function save() {
    const payload = {};
    KPI_DEFS.forEach(k => {
      payload[k.targetKey] = parseFloat(document.getElementById('inp-' + k.key).value) || 0;
    });
    await fetch('/api/kpi-targets', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
    const fb = document.getElementById('save-fb');
    fb.textContent = 'Targets saved!';
    setTimeout(() => fb.textContent = '', 2000);
  }

  load();
</script>
</body>
</html>
