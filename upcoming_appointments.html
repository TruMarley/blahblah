<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upcoming Appointments — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .day-group { margin-bottom: 2rem; }
    .day-label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .85rem; display: flex; align-items: center; gap: .75rem; }
    .day-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .appt-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: .65rem; display: flex; align-items: center; gap: 1rem; transition: border-color .1s; }
    .appt-card:hover { border-color: #333; }
    .appt-time { width: 52px; flex-shrink: 0; font-size: .8rem; font-weight: 800; color: var(--muted); text-align: center; line-height: 1.2; }
    .appt-time .ampm { font-size: .62rem; font-weight: 600; display: block; }
    .divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }
    .appt-info { flex: 1; }
    .appt-name { font-size: .9rem; font-weight: 800; }
    .appt-meta { font-size: .72rem; color: var(--muted); margin-top: .15rem; }
    .appt-note { font-size: .7rem; color: var(--accent); margin-top: .1rem; }
    .status-badge { font-size: .68rem; font-weight: 800; padding: .18rem .55rem; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .s-confirmed { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .s-pending    { background: rgba(251,191,36,.1); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .s-arrived    { background: rgba(167,139,250,.1); color: var(--accent); border: 1px solid rgba(167,139,250,.2); }
    .confirm-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: .72rem; font-weight: 700; padding: .3rem .7rem; border-radius: 7px; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; flex-shrink: 0; }
    .confirm-btn:hover { color: var(--green); border-color: rgba(52,211,153,.3); }
    .empty-day { font-size: .78rem; color: var(--muted); padding: .5rem 0 .5rem .5rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Upcoming Appointments</div>
  <p class="page-sub">Next 7 days — grouped by day, sorted by time.</p>
  <div id="container"></div>
</div>
<script>
  let appts = [];

  async function load() {
    const r = await fetch('/api/appointments/upcoming');
    const d = await r.json();
    appts = d.appointments || [];
    render();
  }

  function render() {
    const today = new Date(); today.setHours(0,0,0,0);
    const groups = {};
    appts.forEach(a => {
      const dt = new Date(a.scheduled_time);
      const day = dt.toDateString();
      if (!groups[day]) groups[day] = [];
      groups[day].push(a);
    });

    let html = '';
    Object.entries(groups).forEach(([dayStr, items]) => {
      const dt = new Date(dayStr);
      const diffDays = Math.round((dt - today) / 86400000);
      const label = diffDays === 0 ? 'Today' : diffDays === 1 ? 'Tomorrow' : dt.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
      html += `<div class="day-group"><div class="day-label">${label}</div>`;
      if (!items.length) {
        html += `<div class="empty-day">No appointments</div>`;
      } else {
        items.sort((a,b) => new Date(a.scheduled_time) - new Date(b.scheduled_time));
        items.forEach(a => {
          const dt2 = new Date(a.scheduled_time);
          const h = dt2.getHours(), m = dt2.getMinutes();
          const h12 = h % 12 || 12;
          const ampm = h < 12 ? 'AM' : 'PM';
          const timeStr = `${h12}:${String(m).padStart(2,'0')}`;
          const sCls = `s-${a.status}`;
          const confirmBtn = a.status === 'pending' ? `<button class="confirm-btn" id="cb-${a.id}" onclick="confirm_appt('${esc(a.id)}')">Confirm</button>` : '';
          html += `<div class="appt-card" id="card-${a.id}">
            <div class="appt-time">${timeStr}<span class="ampm">${ampm}</span></div>
            <div class="divider"></div>
            <div class="appt-info">
              <div class="appt-name">${esc(a.client_name)}</div>
              <div class="appt-meta">${esc(a.service)} &bull; ${esc(a.staff)}</div>
              ${a.notes ? `<div class="appt-note">${esc(a.notes)}</div>` : ''}
            </div>
            <span class="status-badge ${sCls}">${a.status}</span>
            ${confirmBtn}
          </div>`;
        });
      }
      html += `</div>`;
    });
    document.getElementById('container').innerHTML = html || '<p style="color:var(--muted);padding:2rem 0">No upcoming appointments.</p>';
  }

  async function confirm_appt(id) {
    const btn = document.getElementById('cb-' + id);
    if (btn) { btn.textContent = '...'; btn.disabled = true; }
    await fetch(`/api/appointments/${id}/confirm`, { method: 'PATCH' });
    const a = appts.find(a => a.id === id);
    if (a) a.status = 'confirmed';
    render();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
