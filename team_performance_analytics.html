<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Performance — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .member-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; margin-bottom: .6rem; }
    .member-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .member-name { font-size: .92rem; font-weight: 800; }
    .member-rev { font-size: .9rem; font-weight: 900; color: var(--green); }
    .member-stats { display: flex; gap: 1.2rem; }
    .mstat { font-size: .7rem; color: var(--muted); }
    .mstat span { font-weight: 700; color: var(--text); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Team Performance</div>
  <p class="page-sub">Revenue, bookings, no-show rates, and CSAT per team member. Use this to recognize top performers and identify coaching opportunities.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-rev" style="color:var(--green)">—</div><div class="stat-lbl">Team Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--accent)">—</div><div class="stat-lbl">Top Performer</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-toprev" style="color:var(--green)">—</div><div class="stat-lbl">Top Revenue</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-csat" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Team CSAT</div></div>
  </div>
  <div class="card">
    <div class="card-title">Member Breakdown</div>
    <div id="member-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/team-performance-stats').then(r => r.json());
    document.getElementById('h-rev').textContent = '$' + d.total_team_revenue_30d.toLocaleString();
    document.getElementById('h-top').textContent = d.top_performer;
    document.getElementById('h-toprev').textContent = '$' + d.top_performer_revenue.toLocaleString();
    document.getElementById('h-csat').textContent = d.avg_team_csat.toFixed(2);
    const sorted = [...d.members].sort((a, b) => b.revenue - a.revenue);
    const ml = document.getElementById('member-list');
    sorted.forEach(m => {
      const nsColor = m.no_show_pct > 5 ? 'var(--red)' : 'var(--muted)';
      ml.innerHTML += '<div class="member-card"><div class="member-top"><div class="member-name">' + m.name + '</div><div class="member-rev">$' + m.revenue.toLocaleString() + '</div></div><div class="member-stats"><div class="mstat"><span>' + m.bookings + '</span> bookings</div><div class="mstat">Avg <span>$' + m.avg_ticket.toFixed(2) + '</span></div><div class="mstat">No-show <span style="color:' + nsColor + '">' + m.no_show_pct.toFixed(1) + '%</span></div><div class="mstat">CSAT <span style="color:var(--yellow)">' + m.csat.toFixed(2) + '</span></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
