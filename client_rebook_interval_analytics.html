<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rebook Interval — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .bar-lbl { font-size: .75rem; color: var(--muted); width: 36px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .bar-val { font-size: .72rem; font-weight: 700; color: var(--accent); width: 38px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Rebook Interval</div>
  <p class="page-sub">Track how often clients return and how long between visits. Shorter intervals mean stronger loyalty and higher LTV.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--accent)">—</div><div class="stat-lbl">Avg Gap (days)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rate" style="color:var(--green)">—</div><div class="stat-lbl">Rebook Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-median" style="color:var(--yellow)">—</div><div class="stat-lbl">Median Gap</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-clients" style="color:var(--muted)">—</div><div class="stat-lbl">Rebooked (30d)</div></div>
  </div>
  <div class="card">
    <div class="card-title">Weekly Rebookers</div>
    <div id="bar-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/client-rebook-interval-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.avg_rebook_days + 'd';
    document.getElementById('h-rate').textContent = d.rebook_rate_pct.toFixed(1) + '%';
    document.getElementById('h-median').textContent = d.median_gap_days + 'd';
    document.getElementById('h-clients').textContent = d.clients_rebooking_30d;
    const bl = document.getElementById('bar-list');
    const max = Math.max(...d.weekly.map(w => w.rebookers));
    d.weekly.forEach(w => {
      const pct = (w.rebookers / max * 100).toFixed(1);
      bl.innerHTML += '<div class="bar-row"><div class="bar-lbl">' + w.week + '</div><div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div><div class="bar-val">' + w.rebookers + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
