<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Birthdays — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .5rem 1rem; border-bottom: 1px solid var(--border); text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .65rem 1rem; font-size: .82rem; vertical-align: middle; }
    .urgent { color: var(--yellow); font-weight: 800; }
    .days-pill { display: inline-block; font-size: .65rem; font-weight: 800; padding: .15rem .5rem; border-radius: 99px; }
    .pill-soon { background: rgba(251,191,36,.12); color: var(--yellow); border: 1px solid rgba(251,191,36,.25); }
    .pill-later { background: rgba(255,255,255,.05); color: var(--muted); border: 1px solid var(--border); }
    .sms-btn { font-size: .7rem; font-weight: 800; padding: .25rem .65rem; border-radius: 7px; border: 1px solid rgba(167,139,250,.35); background: rgba(167,139,250,.08); color: var(--accent); cursor: pointer; font-family: inherit; }
    .sms-btn:hover { background: rgba(167,139,250,.18); }
    .sent { color: var(--green); font-size: .7rem; font-weight: 800; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Birthdays</div>
  <p class="page-sub">Upcoming client birthdays in the next 30 days — send a personalized birthday offer.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Upcoming</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Within 7 Days</div>
      <div class="hero-val" id="h-soon" style="color:var(--yellow)">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Birthday List — Next 30 Days</div>
    <table>
      <thead><tr><th>Client</th><th>Birthday</th><th>Days Away</th><th>Favorite Service</th><th>Action</th></tr></thead>
      <tbody id="bday-tbody"></tbody>
    </table>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/client-birthday-upcoming');
    const d = await r.json();
    document.getElementById('h-total').textContent = d.total;
    document.getElementById('h-soon').textContent = d.within_7_days;
    document.getElementById('bday-tbody').innerHTML = (d.clients || []).map(c => `
      <tr>
        <td style="font-weight:800">${esc(c.name)}</td>
        <td>${esc(c.birthday)}</td>
        <td><span class="days-pill ${c.days_until <= 7 ? 'pill-soon' : 'pill-later'}">${c.days_until} day${c.days_until === 1 ? '' : 's'}</span></td>
        <td style="color:var(--muted)">${esc(c.favorite_service)}</td>
        <td><button class="sms-btn" id="btn-${c.client_id}" onclick="sendSMS('${c.client_id}', '${esc(c.name)}')">🎂 Send SMS</button></td>
      </tr>`).join('');
  }

  function sendSMS(id, name) {
    const btn = document.getElementById('btn-' + id);
    btn.disabled = true;
    btn.textContent = 'Sending…';
    setTimeout(() => {
      btn.outerHTML = `<span class="sent">✓ Sent</span>`;
    }, 800);
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
