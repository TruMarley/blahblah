<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Revenue Heatmap — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .heatmap-wrap { overflow-x: auto; }
    .heatmap { display: grid; gap: 4px; }
    .hm-header { display: flex; gap: 4px; padding-left: 64px; margin-bottom: 2px; }
    .hm-label { font-size: .7rem; color: var(--muted); text-align: center; flex: 1; }
    .hm-row { display: flex; align-items: center; gap: 4px; }
    .hm-week { font-size: .68rem; color: var(--muted); width: 60px; flex-shrink: 0; }
    .hm-cell { flex: 1; height: 44px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 700; cursor: default; }
    .legend-row { display: flex; align-items: center; gap: .5rem; margin-top: 1.25rem; justify-content: center; }
    .legend-label { font-size: .7rem; color: var(--muted); }
    .legend-grad { width: 120px; height: 10px; border-radius: 5px; background: linear-gradient(to right, rgba(167,139,250,.1), rgba(167,139,250,1)); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Daily Revenue Heatmap</div>
  <p class="page-sub">Revenue intensity by day across 4 weeks — spot your busiest and slowest days at a glance.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Peak Day Revenue</div>
      <div class="hero-val" id="h-max" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Lowest Day Revenue</div>
      <div class="hero-val" id="h-min" style="color:var(--muted)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Day of Week — 4 Weeks</div>
    <div class="heatmap-wrap">
      <div class="hm-header" id="hm-header"></div>
      <div class="heatmap" id="heatmap"></div>
    </div>
    <div class="legend-row">
      <span class="legend-label">Low</span>
      <div class="legend-grad"></div>
      <span class="legend-label">High</span>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/daily-revenue-heatmap');
    const d = await r.json();
    document.getElementById('h-max').textContent = '$' + d.max_revenue.toLocaleString();
    document.getElementById('h-min').textContent = '$' + d.min_revenue.toLocaleString();
    const hdr = document.getElementById('hm-header');
    hdr.innerHTML = d.days.map(day => `<div class="hm-label">${day}</div>`).join('');
    const range = d.max_revenue - d.min_revenue || 1;
    document.getElementById('heatmap').innerHTML = d.grid.map(row => `
      <div class="hm-row">
        <div class="hm-week">${esc(row.week)}</div>
        ${row.days.map(v => {
          const t = (v - d.min_revenue) / range;
          const alpha = 0.08 + t * 0.82;
          const textColor = t > 0.5 ? '#e8e8e8' : '#888';
          return `<div class="hm-cell" style="background:rgba(167,139,250,${alpha.toFixed(2)});color:${textColor}" title="$${v.toLocaleString()}">$${Math.round(v/100)/10}k</div>`;
        }).join('')}
      </div>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
