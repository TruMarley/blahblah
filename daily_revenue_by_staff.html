<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Revenue by Staff — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .legend { display: flex; gap: 1.25rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .leg-item { display: flex; align-items: center; gap: .4rem; font-size: .78rem; }
    .leg-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Daily Revenue by Staff</div>
  <p class="page-sub">Each team member's revenue contribution per day of the week.</p>
  <div class="card">
    <div class="card-title">Revenue by Day — Grouped by Staff</div>
    <div class="legend" id="legend"></div>
    <svg id="chart" width="100%" style="display:block;overflow:visible"></svg>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/daily-revenue-by-staff');
    const d = await r.json();
    const days = d.days || [];
    const staff = d.staff || [];

    document.getElementById('legend').innerHTML = staff.map(s =>
      `<div class="leg-item"><div class="leg-dot" style="background:${s.color}"></div><span style="color:${s.color};font-weight:700">${esc(s.name)}</span></div>`
    ).join('');

    const W=700, H=200, PL=10, PR=10, PT=12, PB=32, cW=W-PL-PR, cH=H-PT-PB;
    const n=days.length, sn=staff.length;
    const allVals = days.flatMap(d => staff.map(s => d[s.id]||0));
    const maxVal = Math.max(...allVals, 1);
    const groupW = cW / n;
    const bw = Math.floor(groupW / (sn+1));
    const gap = bw * 0.25;

    let bars = '', labels = '';
    days.forEach((day, di) => {
      const gx = PL + di * groupW;
      staff.forEach((s, si) => {
        const val = day[s.id] || 0;
        const bh = (val / maxVal) * cH;
        const bx = gx + gap + si * (bw + 2);
        const by = PT + cH - bh;
        bars += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="${s.color}" opacity=".8" rx="2">
          <title>${s.name}: $${val}</title></rect>`;
      });
      labels += `<text x="${gx + groupW/2}" y="${H-6}" text-anchor="middle" font-size="10" fill="#555">${esc(day.day)}</text>`;
    });

    const svg = document.getElementById('chart');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('height', H);
    svg.innerHTML = bars + labels;
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
