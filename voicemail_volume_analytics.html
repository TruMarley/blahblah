<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voicemail Volume — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .day-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .day-label { font-size: .78rem; width: 36px; flex-shrink: 0; color: var(--muted); }
    .bar-group { flex: 1; display: flex; flex-direction: column; gap: .2rem; }
    .bar-track { background: var(--surface2); border-radius: 3px; height: 7px; overflow: hidden; }
    .bar-fill-total { height: 100%; border-radius: 3px; background: var(--accent); opacity: .4; }
    .bar-fill-retrieved { height: 100%; border-radius: 3px; background: var(--green); }
    .day-counts { font-size: .7rem; width: 80px; text-align: right; flex-shrink: 0; color: var(--muted); }
    .legend { display: flex; gap: 1.2rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .72rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Voicemail Volume</div>
  <p class="page-sub">Track how many voicemails arrive each day and what share are retrieved. High unretrieved rates signal after-hours gaps the AI can fill.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Voicemails (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-retrieved" style="color:var(--green)">—</div><div class="stat-lbl">Retrieved %</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg / Day</div></div>
  </div>
  <div class="card">
    <div class="card-title">By Day of Week</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);opacity:.5"></div> Total</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Retrieved</div>
    </div>
    <div id="day-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/voicemail-volume-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_voicemails_30d;
    document.getElementById('h-retrieved').textContent = d.retrieved_pct.toFixed(1) + '%';
    document.getElementById('h-avg').textContent = d.avg_per_day.toFixed(1);
    const dl = document.getElementById('day-list');
    const maxV = Math.max(...d.days.map(x => x.voicemails), 1);
    d.days.forEach(day => {
      const tw = (day.voicemails / maxV * 100).toFixed(1);
      const rw = (day.retrieved / maxV * 100).toFixed(1);
      dl.innerHTML += '<div class="day-row"><div class="day-label">' + day.day + '</div><div class="bar-group"><div class="bar-track"><div class="bar-fill-total" style="width:' + tw + '%"></div></div><div class="bar-track"><div class="bar-fill-retrieved" style="width:' + rw + '%"></div></div></div><div class="day-counts">' + day.retrieved + ' / ' + day.voicemails + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
