<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Channel Split — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; margin-bottom: 1.25rem; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; color: var(--accent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 220px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Booking Channel Split</div>
  <p class="page-sub">Where bookings are coming from — AI Phone, Online Form, Walk-In, or Staff Manual entry.</p>
  <div class="hero-card">
    <div class="hero-label">Top Channel</div>
    <div class="hero-val" id="h-top">—</div>
  </div>
  <div class="card">
    <div class="card-title">Bookings by Channel (Last 30 Days)</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 220" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  const COLORS = ['rgba(167,139,250,.8)','rgba(52,211,153,.8)','rgba(251,191,36,.8)','rgba(248,113,113,.8)'];
  async function load() {
    const r = await fetch('/api/analytics/booking-channel-split');
    const d = await r.json();
    const channels = (d.channels || []).sort((a,b)=>b.count-a.count);
    if (channels.length) document.getElementById('h-top').textContent = channels[0].channel;

    const svg = document.getElementById('chart');
    const W=700, H=220, pL=130, pR=60, pT=14, pB=14;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=channels.length;
    const barH=Math.min(36, cH/n*0.6);
    const yStep=cH/n;
    const maxCount=channels[0]?.count||1;

    channels.forEach((ch,i)=>{
      const cy=pT+i*yStep+yStep/2;
      const bw=cW*ch.count/maxCount;
      svg.innerHTML+=`<text x="${pL-8}" y="${cy+4}" font-size="11" fill="#ccc" text-anchor="end">${esc(ch.channel)}</text>`;
      svg.innerHTML+=`<rect x="${pL}" y="${cy-barH/2}" width="${bw}" height="${barH}" rx="5" fill="${COLORS[i%COLORS.length]}"/>`;
      svg.innerHTML+=`<text x="${pL+bw+6}" y="${cy+4}" font-size="10" fill="#999">${ch.count} (${ch.pct}%)</text>`;
    });
    // vertical gridlines
    [25,50,75,100].forEach(v=>{
      const x=pL+cW*v/100;
      svg.innerHTML=`<line x1="${x}" y1="${pT}" x2="${x}" y2="${pT+cH}" stroke="#1a1a1a" stroke-width="1"/>`+svg.innerHTML;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
