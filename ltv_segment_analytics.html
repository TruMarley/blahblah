<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LTV Segments — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .seg-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; margin-bottom: .55rem; }
    .seg-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .seg-tier { font-size: .92rem; font-weight: 900; }
    .seg-ltv { font-size: .9rem; font-weight: 900; color: var(--green); }
    .seg-meta { display: flex; gap: 1.4rem; }
    .meta-item { font-size: .68rem; color: var(--muted); }
    .meta-item span { color: var(--text); font-weight: 700; }
    .tier-vip { border-left: 3px solid var(--accent); }
    .tier-regular { border-left: 3px solid var(--green); }
    .tier-casual { border-left: 3px solid var(--yellow); }
    .tier-one { border-left: 3px solid var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">LTV Segments</div>
  <p class="page-sub">Client lifetime value broken down by tier. VIP and Regular clients drive the majority of revenue — understand the size and value of each segment to prioritise retention efforts.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg-ltv" style="color:var(--accent)">—</div><div class="stat-lbl">Overall Avg LTV</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-active" style="color:var(--muted)">—</div><div class="stat-lbl">Total Active Clients</div></div>
  </div>
  <div class="card">
    <div class="card-title">Tier Breakdown</div>
    <div id="seg-list"></div>
  </div>
</div>
<script>
  const TIER_CLS = {VIP:'tier-vip', Regular:'tier-regular', Casual:'tier-casual', 'One-Time':'tier-one'};
  const TIER_COLOR = {VIP:'var(--accent)', Regular:'var(--green)', Casual:'var(--yellow)', 'One-Time':'var(--muted)'};
  async function load() {
    const d = await fetch('/api/analytics/ltv-segment-stats').then(r => r.json());
    document.getElementById('h-avg-ltv').textContent = '$' + d.overall_avg_ltv.toLocaleString();
    document.getElementById('h-active').textContent = d.total_active_clients;
    const sl = document.getElementById('seg-list');
    d.segments.forEach(s => {
      const cls = TIER_CLS[s.tier] || '';
      const color = TIER_COLOR[s.tier] || 'var(--text)';
      sl.innerHTML += '<div class="seg-card ' + cls + '"><div class="seg-top"><div class="seg-tier" style="color:' + color + '">' + s.tier + '</div><div class="seg-ltv">$' + s.avg_ltv.toLocaleString() + ' avg LTV</div></div><div class="seg-meta"><div class="meta-item">Clients <span>' + s.client_count + '</span></div><div class="meta-item">Visits/yr <span>' + s.avg_visits_yr + '</span></div><div class="meta-item">Threshold <span>$' + s.threshold_annual + '/yr</span></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
