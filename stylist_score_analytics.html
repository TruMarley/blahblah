<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stylist Scores — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .stylist-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; display: grid; grid-template-columns: 1fr auto auto auto; gap: 1rem; align-items: center; }
    .stylist-name { font-size: .88rem; font-weight: 700; }
    .stylist-stat { font-size: .75rem; text-align: right; }
    .stylist-stat span { font-weight: 800; }
    .rank-badge { font-size: .6rem; font-weight: 800; background: rgba(167,139,250,.15); color: var(--accent); border: 1px solid rgba(167,139,250,.25); border-radius: 4px; padding: .1rem .35rem; margin-left: .4rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Stylist Scores</div>
  <p class="page-sub">Compare stylist performance across rating, rebooking rate, and revenue. Use this to identify coaching opportunities and reward top performers.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--accent)">—</div><div class="stat-lbl">Top Stylist</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Avg Team Rating</div></div>
  </div>
  <div class="card">
    <div class="card-title">Stylist Leaderboard</div>
    <div id="stylist-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/stylist-score-stats').then(r => r.json());
    document.getElementById('h-top').textContent = d.top_stylist;
    document.getElementById('h-avg').textContent = d.avg_team_rating + '★';
    const sl = document.getElementById('stylist-list');
    d.stylists.forEach((s, i) => {
      const badge = i === 0 ? '<span class="rank-badge">#1</span>' : '';
      sl.innerHTML += '<div class="stylist-row"><div class="stylist-name">' + s.name + badge + '</div><div class="stylist-stat" style="color:var(--accent)"><span>' + s.avg_rating + '</span>★</div><div class="stylist-stat" style="color:var(--green)"><span>' + s.rebook_rate_pct + '%</span> rebook</div><div class="stylist-stat" style="color:var(--yellow)"><span>$' + s.revenue.toLocaleString() + '</span></div></div>';
    });
  }
  load();
</script>
</body>
</html>
