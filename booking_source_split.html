<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Source Split — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 220px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Booking Source Split</div>
  <p class="page-sub">Where your bookings come from — see how much the AI phone channel captures vs. online and walk-ins.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Bookings</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">AI Phone %</div>
      <div class="hero-val" id="h-ai" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Bookings by Source</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 680 220" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  const COLORS = ['rgba(167,139,250,.85)', 'rgba(167,139,250,.4)', 'rgba(52,211,153,.75)', 'rgba(251,191,36,.7)', 'rgba(248,113,113,.65)'];
  async function load() {
    const r = await fetch('/api/analytics/booking-source-split');
    const d = await r.json();
    document.getElementById('h-total').textContent = d.total.toLocaleString();
    const ai = (d.sources || []).find(s => s.source === 'Phone (AI)');
    document.getElementById('h-ai').textContent = ai ? ai.pct + '%' : '—';

    const svg = document.getElementById('chart');
    const W=680, H=220, pL=130, pR=70, pT=14, pB=10;
    const cW=W-pL-pR, cH=H-pT-pB;
    const sources = d.sources || [];
    const n = sources.length;
    const rowH = cH / n;
    const barH = Math.min(rowH * 0.55, 30);
    const maxV = Math.max(...sources.map(s => s.count));

    sources.forEach((s, i) => {
      const y = pT + i * rowH + rowH / 2;
      const bw = cW * s.count / maxV;
      svg.innerHTML += `<text x="${pL-8}" y="${y+4}" font-size="10" fill="#bbb" text-anchor="end" font-weight="700">${esc(s.source)}</text>`;
      svg.innerHTML += `<rect x="${pL}" y="${y - barH/2}" width="${bw}" height="${barH}" rx="5" fill="${COLORS[i % COLORS.length]}"/>`;
      svg.innerHTML += `<text x="${pL + bw + 7}" y="${y+4}" font-size="10" fill="#aaa" font-weight="700">${s.count} <tspan fill="#666">(${s.pct}%)</tspan></text>`;
    });
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
