<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peak Hour Call Volume — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Peak Hour Call Volume</div>
  <p class="page-sub">When callers are most likely to ring — staff your busiest hours and let your AI handle the rest so no call gets missed.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Peak Hour</div>
      <div class="hero-val" id="h-peak" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Calls (avg day)</div>
      <div class="hero-val" id="h-total" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Busiest 3-Hr Window</div>
      <div class="hero-val" id="h-window" style="color:var(--yellow);font-size:1.1rem">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Calls by Hour (8am – 7pm)</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/peak-hour-call-volume');
    const d = await r.json();
    const hours = d.hours || [];
    const total = hours.reduce((s,h)=>s+h.call_count,0);
    const peak = hours.reduce((a,b)=>b.call_count>a.call_count?b:a, hours[0]);

    // busiest 3-hour window
    let bestWindow = 0, bestWindowLabel = '';
    for (let i=0; i<hours.length-2; i++) {
      const sum = hours[i].call_count + hours[i+1].call_count + hours[i+2].call_count;
      if (sum > bestWindow) {
        bestWindow = sum;
        bestWindowLabel = hours[i].hour + '–' + hours[i+2].hour;
      }
    }
    document.getElementById('h-peak').textContent = peak ? peak.hour : '—';
    document.getElementById('h-total').textContent = total;
    document.getElementById('h-window').textContent = bestWindowLabel || '—';

    const svg = document.getElementById('chart');
    const W=700,H=260,pL=36,pR=16,pT=14,pB=28;
    const cW=W-pL-pR,cH=H-pT-pB;
    const n=hours.length,xStep=cW/n,bW=xStep*0.65;
    const maxC=Math.max(...hours.map(h=>h.call_count))*1.2||1;
    const xOf=i=>pL+i*xStep+xStep/2;
    const yOf=v=>pT+cH-v/maxC*cH;

    [5,10,15,20,25,30].filter(v=>v<maxC).forEach(v=>{
      const y=yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-3}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">${v}</text>`;
    });

    hours.forEach((h,i)=>{
      const cx=xOf(i);
      const bH=cH*h.call_count/maxC;
      const isPeak = h.hour === peak.hour;
      const fill = isPeak ? 'var(--accent)' : 'rgba(167,139,250,.38)';
      svg.innerHTML+=`<rect x="${cx-bW/2}" y="${pT+cH-bH}" width="${bW}" height="${bH}" rx="3" fill="${fill}"/>`;
      if (isPeak) {
        svg.innerHTML+=`<text x="${cx}" y="${pT+cH-bH-6}" font-size="8.5" fill="var(--accent)" text-anchor="middle" font-weight="800">${h.call_count}</text>`;
      }
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="8" fill="#555" text-anchor="middle">${esc(h.hour)}</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
