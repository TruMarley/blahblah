<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Abandon Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.8rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Abandon Rate</div>
  <p class="page-sub">Callers who hang up before being served — high abandon rates often mean long wait times or unclear IVR prompts.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Abandon Rate</div>
      <div class="hero-val" id="h-avg" style="color:var(--red)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Worst Day</div>
      <div class="hero-val" id="h-worst" style="color:var(--accent); font-size:1.4rem">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Wait Before Abandon</div>
      <div class="hero-val" id="h-wait" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Abandon Rate &amp; Call Volume by Day</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,.45)"></div>Total Calls</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(248,113,113,.7);border-radius:50%"></div>Abandon Rate %</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/call-abandon-rate');
    const d = await r.json();
    const days = d.days || [];
    const avgRate = (days.reduce((s,d)=>s+d.abandon_rate_pct,0)/days.length).toFixed(1);
    const worst = days.reduce((a,b)=>b.abandon_rate_pct>a.abandon_rate_pct?b:a, days[0]||{});
    const avgWait = Math.round(days.reduce((s,d)=>s+d.avg_wait_seconds_before_abandon,0)/days.length);
    document.getElementById('h-avg').textContent = avgRate + '%';
    document.getElementById('h-worst').textContent = worst.day ? `${worst.day} (${worst.abandon_rate_pct}%)` : '—';
    document.getElementById('h-wait').textContent = avgWait + 's';

    const svg = document.getElementById('chart');
    const W=700, H=260, pL=44, pR=50, pT=14, pB=28;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=days.length;
    const barW=cW/n*0.52;
    const xStep=cW/n;
    const maxCalls=Math.max(...days.map(d=>d.total_calls))*1.2;
    const xOf=i=>pL+i*xStep+xStep/2;
    const yOfC=v=>pT+cH-v/maxCalls*cH;
    const yOfR=v=>pT+cH-v/100*cH;

    // left axis
    [10,20,30,40,50].filter(v=>v<maxCalls).forEach(v=>{
      const y=yOfC(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">${v}</text>`;
    });
    // right axis %
    [5,10,15,20].forEach(v=>{
      const y=yOfR(v);
      svg.innerHTML+=`<text x="${W-pR+4}" y="${y+3.5}" font-size="8" fill="#666">${v}%</text>`;
    });

    days.forEach((day,i)=>{
      const cx=xOf(i);
      const bh=cH*day.total_calls/maxCalls;
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${pT+cH-bh}" width="${barW}" height="${bh}" rx="4" fill="rgba(167,139,250,.42)"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="9" fill="#555" text-anchor="middle">${esc(day.day)}</text>`;
    });

    // abandon rate line
    const pts=days.map((day,i)=>`${xOf(i)},${yOfR(day.abandon_rate_pct)}`).join(' ');
    svg.innerHTML+=`<polyline points="${pts}" fill="none" stroke="rgba(248,113,113,.85)" stroke-width="2.5"/>`;
    days.forEach((day,i)=>{
      svg.innerHTML+=`<circle cx="${xOf(i)}" cy="${yOfR(day.abandon_rate_pct)}" r="3.5" fill="var(--red)"/>`;
      svg.innerHTML+=`<text x="${xOf(i)}" y="${yOfR(day.abandon_rate_pct)-7}" font-size="8" fill="#f87171" text-anchor="middle">${day.abandon_rate_pct}%</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
