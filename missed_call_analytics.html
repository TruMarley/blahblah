<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Missed Calls — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .hourly-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: .25rem; align-items: end; height: 70px; }
    .hour-bar { border-radius: 3px 3px 0 0; background: var(--red); opacity: .75; min-height: 3px; }
    .hour-lbl { font-size: .55rem; color: var(--muted); text-align: center; margin-top: .2rem; }
    .reason-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .reason-label { font-size: .78rem; width: 160px; flex-shrink: 0; }
    .reason-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
    .reason-fill { height: 100%; border-radius: 4px; background: var(--red); }
    .reason-pct { font-size: .73rem; font-weight: 700; color: var(--red); width: 40px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Missed Calls</div>
  <p class="page-sub">Track which calls went unanswered, why they were missed, and how many were recovered through callbacks.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-missed" style="color:var(--red)">—</div><div class="stat-lbl">Missed (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-callback" style="color:var(--yellow)">—</div><div class="stat-lbl">Callback Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-booked" style="color:var(--green)">—</div><div class="stat-lbl">Booked via Callback</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-recovery" style="color:var(--accent)">—</div><div class="stat-lbl">Recovery Rate</div></div>
  </div>
  <div class="card">
    <div class="card-title">Hourly Distribution</div>
    <div class="hourly-grid" id="hourly-grid"></div>
    <div class="hourly-grid" id="hourly-lbls" style="height:auto;margin-top:.2rem"></div>
  </div>
  <div class="card">
    <div class="card-title">Miss Reasons</div>
    <div id="reason-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/missed-call-stats').then(r => r.json());
    document.getElementById('h-missed').textContent = d.missed_calls_30d;
    document.getElementById('h-callback').textContent = d.callback_rate_pct.toFixed(1) + '%';
    document.getElementById('h-booked').textContent = d.booked_from_callback;
    document.getElementById('h-recovery').textContent = d.recovery_rate_pct.toFixed(1) + '%';
    const hg = document.getElementById('hourly-grid');
    const hl = document.getElementById('hourly-lbls');
    const maxH = Math.max(...d.hourly.map(h => h.missed));
    d.hourly.forEach(h => {
      const ht = Math.max(3, (h.missed / maxH * 60)).toFixed(0);
      hg.innerHTML += '<div class="hour-bar" style="height:' + ht + 'px" title="' + h.hour + ': ' + h.missed + '"></div>';
      hl.innerHTML += '<div class="hour-lbl">' + h.hour.replace(':00','') + '</div>';
    });
    const rl = document.getElementById('reason-list');
    const maxP = Math.max(...d.reasons.map(r => r.pct));
    d.reasons.forEach(r => {
      const w = (r.pct / maxP * 100).toFixed(1);
      rl.innerHTML += '<div class="reason-row"><div class="reason-label">' + r.reason + '</div><div class="reason-track"><div class="reason-fill" style="width:' + w + '%"></div></div><div class="reason-pct">' + r.pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
