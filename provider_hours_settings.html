<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Provider Hours — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .provider-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; margin-bottom: .65rem; }
    .prov-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .55rem; }
    .prov-name { font-size: .9rem; font-weight: 800; }
    .prov-hours { font-size: .75rem; color: var(--green); font-weight: 700; }
    .day-chips { display: flex; gap: .3rem; flex-wrap: wrap; }
    .day-chip { font-size: .65rem; font-weight: 700; padding: .15rem .45rem; border-radius: 4px; }
    .day-on { background: rgba(167,139,250,.15); color: var(--accent); border: 1px solid rgba(167,139,250,.25); }
    .day-off { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .coverage-row { display: flex; gap: .3rem; flex-wrap: wrap; margin-top: .4rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Provider Hours</div>
  <p class="page-sub">Working hours per provider. The AI only books appointments within each provider's active hours — keeping these accurate prevents invalid bookings and frustrated clients.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-hours" style="color:var(--accent)">—</div><div class="stat-lbl">Total Weekly Hours</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-closed" style="color:var(--red)">—</div><div class="stat-lbl">Closed Days</div></div>
  </div>
  <div class="card">
    <div class="card-title">Provider Schedules</div>
    <div id="prov-list"></div>
  </div>
</div>
<script>
  const ALL_DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  async function load() {
    const d = await fetch('/api/settings/provider-hours-cfg').then(r => r.json());
    document.getElementById('h-hours').textContent = d.total_weekly_hours + 'h';
    document.getElementById('h-closed').textContent = d.closed_days.join(', ');
    const pl = document.getElementById('prov-list');
    d.providers.forEach(p => {
      const chips = ALL_DAYS.map(day => {
        const on = p.days.includes(day);
        return '<span class="day-chip ' + (on ? 'day-on' : 'day-off') + '">' + day + '</span>';
      }).join('');
      pl.innerHTML += '<div class="provider-card"><div class="prov-top"><div class="prov-name">' + p.name + '</div><div class="prov-hours">' + p.start + ' – ' + p.end + '</div></div><div class="day-chips">' + chips + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
