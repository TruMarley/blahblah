<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Appointment Density — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 240px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Daily Appointment Density</div>
  <p class="page-sub">Average appointments per day of week — know your busiest days and staff accordingly.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Busiest Day</div>
      <div class="hero-val" id="h-peak" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Peak Day Avg</div>
      <div class="hero-val" id="h-count" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Avg Appointments per Day of Week</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 240" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/daily-appointment-density');
    const d = await r.json();
    document.getElementById('h-peak').textContent = d.peak_day || '—';
    document.getElementById('h-count').textContent = d.peak_count ? d.peak_count + ' appts' : '—';

    const svg = document.getElementById('chart');
    const W=700, H=240, pL=44, pR=16, pT=14, pB=34;
    const cW=W-pL-pR, cH=H-pT-pB;
    const days = d.days || [];
    const n = days.length;
    const barW = cW / n * 0.6;
    const xStep = cW / n;
    const maxV = Math.max(...days.map(d => d.avg_appointments)) * 1.15;
    const yOf = v => pT + cH - v / maxV * cH;

    [10, 20, 30].filter(v => v < maxV).forEach(v => {
      const y = yOf(v);
      svg.innerHTML += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML += `<text x="${pL-4}" y="${y+3}" font-size="8.5" fill="#555" text-anchor="end">${v}</text>`;
    });

    days.forEach((day, i) => {
      const cx = pL + i * xStep + xStep / 2;
      const val = day.avg_appointments;
      const bh = cH * val / maxV;
      const by = pT + cH - bh;
      const isPeak = day.day === d.peak_day;
      const fill = isPeak ? 'rgba(167,139,250,.9)' : 'rgba(167,139,250,.45)';
      svg.innerHTML += `<rect x="${cx - barW/2}" y="${by}" width="${barW}" height="${bh}" rx="5" fill="${fill}"/>`;
      svg.innerHTML += `<text x="${cx}" y="${by - 5}" font-size="9" fill="${isPeak ? 'rgba(167,139,250,.95)' : '#666'}" text-anchor="middle" font-weight="${isPeak ? '800' : '400'}">${val}</text>`;
      svg.innerHTML += `<text x="${cx}" y="${H-4}" font-size="9" fill="${isPeak ? '#bbb' : '#555'}" text-anchor="middle" font-weight="${isPeak ? '700' : '400'}">${day.day.slice(0,3)}</text>`;
    });
  }
  load();
</script>
</body>
</html>
