<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 58px; }
    .logo { font-size: 1.15rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    .center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; }
    .card-icon { width: 52px; height: 52px; border-radius: 14px; background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.35rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .5rem; }
    .subtitle { font-size: .82rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.75rem; }
    label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); margin-bottom: .35rem; }
    input[type="email"] { width: 100%; background: #0d0d0d; border: 1px solid var(--border); color: var(--text); font-size: .88rem; padding: .65rem .9rem; border-radius: 9px; outline: none; margin-bottom: 1.25rem; }
    input[type="email"]:focus { border-color: var(--accent); }
    input::placeholder { color: #444; }
    .btn { width: 100%; padding: .75rem; border-radius: 9px; font-size: .88rem; font-weight: 700; border: none; cursor: pointer; transition: opacity .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: .85; }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .error-msg { font-size: .78rem; color: #f87171; margin-bottom: 1rem; display: none; }
    /* Success state */
    .success-state { display: none; text-align: center; }
    .success-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .success-title { font-size: 1.1rem; font-weight: 800; margin-bottom: .5rem; }
    .success-sub { font-size: .82rem; color: var(--muted); line-height: 1.6; }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: .8rem; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--text); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .hint { font-size: .75rem; color: var(--muted); text-align: center; margin-top: 1rem; }
    .hint a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
</nav>
<div class="center">
  <div class="card">
    <!-- Form state -->
    <div id="form-state">
      <div class="card-icon">🔑</div>
      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter your account email and we'll send a reset link if the address is registered.</p>
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="hello@yourshop.com" autocomplete="email">
      <div class="error-msg" id="err-msg"></div>
      <button class="btn btn-primary" id="submit-btn" onclick="submit()">Send Reset Link</button>
      <hr class="divider">
      <div class="hint">Remember your password? <a href="/dashboard">Sign in</a></div>
    </div>
    <!-- Success state -->
    <div class="success-state" id="success-state">
      <div class="success-icon">📬</div>
      <div class="success-title">Check your inbox</div>
      <p class="success-sub">If <strong id="sent-email"></strong> is registered, you'll receive a reset link within 2 minutes. Check your spam folder if you don't see it.</p>
      <a class="back-link" href="/">← Back to RingDesk</a>
    </div>
  </div>
</div>
<script>
  async function submit() {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('err-msg');
    err.style.display = 'none';

    if (!email || !email.includes('@')) {
      err.textContent = 'Please enter a valid email address.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    try {
      const r = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email}),
      });
      const d = await r.json();
      if (d.ok) {
        document.getElementById('sent-email').textContent = email;
        document.getElementById('form-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';
      } else {
        throw new Error(d.message || 'Something went wrong.');
      }
    } catch (e) {
      err.textContent = e.message || 'Request failed. Please try again.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  }

  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
