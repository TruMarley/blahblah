<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Package Settings — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .pkg-list { display: flex; flex-direction: column; gap: .75rem; }
    .pkg-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; display: flex; align-items: flex-start; justify-content: space-between; gap: .75rem; }
    .pkg-info { flex: 1; }
    .pkg-name { font-size: .9rem; font-weight: 800; margin-bottom: .25rem; }
    .pkg-services { font-size: .73rem; color: var(--muted); margin-bottom: .35rem; }
    .pkg-meta { display: flex; gap: .75rem; }
    .pkg-price { font-size: .82rem; font-weight: 800; color: var(--green); }
    .pkg-dur { font-size: .75rem; color: var(--muted); }
    .del-btn { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.25); border-radius: 6px; color: var(--red); font-size: .72rem; font-weight: 700; padding: .28rem .55rem; cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .del-btn:hover { background: rgba(248,113,113,.2); }
    .field-group { margin-bottom: .85rem; }
    .field-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .3rem; display: block; }
    .f-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .82rem; padding: .44rem .65rem; font-family: inherit; width: 100%; outline: none; }
    .inline-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .65rem; }
    .add-btn { font-size: .78rem; font-weight: 800; padding: .48rem 1.1rem; border-radius: 8px; border: 1px solid rgba(52,211,153,.35); background: rgba(52,211,153,.1); color: var(--green); cursor: pointer; font-family: inherit; }
    .save-btn { font-size: .82rem; font-weight: 800; padding: .55rem 1.4rem; border-radius: 9px; border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.1); color: var(--accent); cursor: pointer; font-family: inherit; width: 100%; margin-top: 1rem; }
    .save-btn:hover { background: rgba(167,139,250,.2); }
    .saved-msg { font-size: .75rem; color: var(--green); font-weight: 700; text-align: center; margin-top: .5rem; min-height: 1.2em; }
    .empty { color: var(--muted); font-size: .82rem; text-align: center; padding: 1rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Package Settings</div>
  <p class="page-sub">Bundle services into packages — the AI receptionist will offer these to callers during booking.</p>
  <div class="card">
    <div class="card-title">Current Packages</div>
    <div class="pkg-list" id="pkg-list"><div class="empty">Loading...</div></div>
    <button class="save-btn" onclick="save()">Save All Packages</button>
    <div class="saved-msg" id="saved-msg"></div>
  </div>
  <div class="card">
    <div class="card-title">Add New Package</div>
    <div class="field-group">
      <label class="field-label">Package Name</label>
      <input class="f-input" type="text" id="new-name" placeholder="VIP Experience">
    </div>
    <div class="field-group">
      <label class="field-label">Included Services (comma-separated)</label>
      <input class="f-input" type="text" id="new-services" placeholder="Haircut, Beard Trim, Hot Towel">
    </div>
    <div class="inline-3">
      <div class="field-group">
        <label class="field-label">Price ($)</label>
        <input class="f-input" type="number" id="new-price" min="0" placeholder="65">
      </div>
      <div class="field-group">
        <label class="field-label">Duration (min)</label>
        <input class="f-input" type="number" id="new-dur" min="15" placeholder="75">
      </div>
      <div class="field-group" style="display:flex;align-items:flex-end;">
        <button class="add-btn" onclick="addPkg()" style="width:100%;padding:.46rem;">+ Add</button>
      </div>
    </div>
  </div>
</div>
<script>
  let data = { packages: [] };
  async function load() {
    const r = await fetch('/api/service-package-settings');
    data = await r.json();
    render();
  }
  function render() {
    const list = document.getElementById('pkg-list');
    const pkgs = data.packages || [];
    if (!pkgs.length) { list.innerHTML = '<div class="empty">No packages yet.</div>'; return; }
    list.innerHTML = pkgs.map((p, i) => `
      <div class="pkg-card">
        <div class="pkg-info">
          <div class="pkg-name">${esc(p.name)}</div>
          <div class="pkg-services">${(p.services||[]).map(s=>esc(s)).join(' · ')}</div>
          <div class="pkg-meta"><span class="pkg-price">$${p.price}</span><span class="pkg-dur">${p.duration_min} min</span></div>
        </div>
        <button class="del-btn" onclick="delPkg(${i})">Remove</button>
      </div>
    `).join('');
  }
  function addPkg() {
    const name = document.getElementById('new-name').value.trim();
    const services = document.getElementById('new-services').value.split(',').map(s=>s.trim()).filter(Boolean);
    const price = parseFloat(document.getElementById('new-price').value)||0;
    const dur = parseInt(document.getElementById('new-dur').value)||30;
    if (!name) return;
    data.packages.push({ name, services, price, duration_min: dur });
    render();
    document.getElementById('new-name').value='';
    document.getElementById('new-services').value='';
    document.getElementById('new-price').value='';
    document.getElementById('new-dur').value='';
  }
  function delPkg(i) { data.packages.splice(i,1); render(); }
  async function save() {
    await fetch('/api/service-package-settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const msg=document.getElementById('saved-msg');
    msg.textContent='✓ Saved';
    setTimeout(()=>{msg.textContent='';},2000);
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
