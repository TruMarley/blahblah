<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Revenue Breakdown — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1rem; text-align: center; }
    .hero-label { font-size: .64rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.5rem; font-weight: 900; }
    .hero-sub { font-size: .65rem; color: var(--muted); margin-top: .25rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .staff-list { display: flex; flex-direction: column; gap: .9rem; }
    .staff-row { background: var(--surface2); border-radius: 10px; padding: .85rem 1rem; }
    .staff-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .45rem; }
    .staff-name { font-size: .85rem; font-weight: 700; }
    .staff-rev { font-size: .9rem; font-weight: 900; color: var(--yellow); }
    .staff-meta { display: flex; gap: 1.2rem; }
    .staff-meta-item { font-size: .7rem; color: var(--muted); }
    .staff-meta-item span { color: var(--text); font-weight: 600; }
    .bar-wrap { margin-top: .5rem; background: #1e1e1e; border-radius: 4px; height: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Revenue Breakdown</div>
  <p class="page-sub">See exactly how much revenue each team member is generating — appointments booked, average ticket, and total contribution for the period.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Revenue</div>
      <div class="hero-val" id="h-total" style="color:var(--yellow)">—</div>
      <div class="hero-sub" id="h-period">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Earner</div>
      <div class="hero-val" id="h-top" style="color:var(--accent);font-size:1.1rem">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Staff Count</div>
      <div class="hero-val" id="h-count" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Staff Member</div>
    <div class="staff-list" id="staff-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/staff-revenue-breakdown').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_revenue ? '$'+d.total_revenue.toLocaleString() : '—';
    document.getElementById('h-top').textContent = d.top_earner || '—';
    document.getElementById('h-period').textContent = d.period || '';
    const staff = d.staff || [];
    document.getElementById('h-count').textContent = staff.length || '—';
    const maxRev = Math.max(...staff.map(s=>s.revenue), 1);
    const el = document.getElementById('staff-list');
    staff.forEach(s => {
      const pct = Math.round(s.revenue/maxRev*100);
      el.innerHTML += `<div class="staff-row">
        <div class="staff-top"><div class="staff-name">${esc(s.name)}</div><div class="staff-rev">$${s.revenue.toLocaleString()}</div></div>
        <div class="staff-meta">
          <div class="staff-meta-item">Appointments <span>${s.appointments}</span></div>
          <div class="staff-meta-item">Avg Ticket <span>$${s.avg_ticket}</span></div>
        </div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
