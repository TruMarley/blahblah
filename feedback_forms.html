<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback Forms — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .form-row { display: flex; align-items: center; gap: 1rem; padding: .85rem 0; border-bottom: 1px solid var(--border); }
    .form-row:last-child { border-bottom: none; }
    .form-question { flex: 1; }
    .question-text { font-size: .85rem; font-weight: 700; margin-bottom: .3rem; }
    .form-chips { display: flex; gap: .4rem; }
    .type-chip { font-size: .65rem; font-weight: 800; padding: .1rem .45rem; border-radius: 5px; }
    .chip-rating { background: rgba(167,139,250,.1); color: var(--accent); border: 1px solid rgba(167,139,250,.2); }
    .chip-nps    { background: rgba(96,165,250,.1);  color: #60a5fa; border: 1px solid rgba(96,165,250,.2); }
    .chip-text   { background: rgba(251,191,36,.08); color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    .resp-badge { font-size: .72rem; font-weight: 800; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: .15rem .6rem; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .toggle { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0; background: var(--surface2); border-radius:22px; transition:.2s; border:1px solid var(--border); }
    .slider:before { position:absolute; content:""; height:16px; width:16px; left:2px; bottom:2px; background:var(--muted); border-radius:50%; transition:.2s; }
    input:checked + .slider { background: rgba(52,211,153,.15); border-color: rgba(52,211,153,.35); }
    input:checked + .slider:before { transform: translateX(18px); background: var(--green); }
    .active-summary { font-size: .78rem; color: var(--muted); margin-bottom: 1rem; }
    .active-summary span { color: var(--green); font-weight: 800; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Feedback Forms</div>
  <p class="page-sub">Questions sent to clients after their visit — toggle each one on or off.</p>
  <div class="card">
    <div class="card-title">Post-Visit Questions</div>
    <div class="active-summary" id="active-summary"></div>
    <div id="form-list"></div>
  </div>
</div>
<script>
  let forms = [];

  const TYPE_LABELS = { rating: 'Star Rating', nps: 'NPS Score', text: 'Open Text' };

  async function load() {
    const r = await fetch('/api/feedback-forms');
    const d = await r.json();
    forms = d.forms || [];
    render();
  }

  function render() {
    const activeN = forms.filter(f => f.active).length;
    document.getElementById('active-summary').innerHTML = `<span>${activeN}</span> of ${forms.length} questions active`;
    document.getElementById('form-list').innerHTML = forms.map(f => `
      <div class="form-row">
        <div class="form-question">
          <div class="question-text">${esc(f.question)}</div>
          <div class="form-chips">
            <span class="type-chip chip-${f.type}">${esc(TYPE_LABELS[f.type] || f.type)}</span>
          </div>
        </div>
        <div class="resp-badge">${f.response_count} responses</div>
        <label class="toggle">
          <input type="checkbox" ${f.active ? 'checked' : ''} onchange="toggleForm('${f.id}')">
          <span class="slider"></span>
        </label>
      </div>`).join('');
  }

  async function toggleForm(id) {
    const r = await fetch(`/api/feedback-forms/${id}/toggle`, {method:'POST'});
    const updated = await r.json();
    const idx = forms.findIndex(f => f.id === id);
    if (idx >= 0) forms[idx] = updated;
    render();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
