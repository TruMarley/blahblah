<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conversations — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #555; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; --blue: #60a5fa; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 60px; flex-shrink: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    nav a.back:hover { color: var(--text); }

    .layout { display: flex; flex: 1; overflow: hidden; }

    /* Left panel */
    .list-panel { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .list-toolbar { padding: .85rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .list-title { font-size: .95rem; font-weight: 900; margin-bottom: .6rem; }
    .filter-row { display: flex; gap: .35rem; flex-wrap: wrap; }
    .filter-btn { padding: .22rem .65rem; border-radius: 99px; font-size: .7rem; font-weight: 700; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .15s; font-family: inherit; }
    .filter-btn.active { background: rgba(167,139,250,.15); border-color: var(--accent); color: var(--accent); }
    .call-list { flex: 1; overflow-y: auto; }
    .call-item { padding: .85rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .call-item:hover { background: var(--surface2); }
    .call-item.selected { background: rgba(167,139,250,.1); border-left: 3px solid var(--accent); padding-left: calc(1rem - 3px); }
    .ci-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .3rem; }
    .ci-phone { font-size: .82rem; font-weight: 700; }
    .ci-time { font-size: .7rem; color: var(--muted); }
    .ci-summary { font-size: .73rem; color: var(--muted); line-height: 1.4; margin-bottom: .4rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-footer { display: flex; align-items: center; justify-content: space-between; }
    .outcome-badge { padding: .15rem .5rem; border-radius: 99px; font-size: .65rem; font-weight: 700; }
    .ob-booked   { background: rgba(52,211,153,.12); border: 1px solid rgba(52,211,153,.25); color: var(--green); }
    .ob-callback { background: rgba(251,191,36,.12);  border: 1px solid rgba(251,191,36,.25);  color: var(--yellow); }
    .ob-hangup   { background: rgba(248,113,113,.1);  border: 1px solid rgba(248,113,113,.2);  color: var(--red); }
    .ob-question { background: rgba(96,165,250,.1);   border: 1px solid rgba(96,165,250,.2);   color: var(--blue); }
    .ci-dur { font-size: .68rem; color: var(--muted); }

    /* Right panel */
    .transcript-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .transcript-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .th-phone { font-size: .95rem; font-weight: 900; margin-bottom: .15rem; }
    .th-meta { font-size: .75rem; color: var(--muted); }
    .transcript-body { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: .75rem; }
    .bubble-wrap { display: flex; }
    .bubble-wrap.ai { justify-content: flex-start; }
    .bubble-wrap.caller { justify-content: flex-end; }
    .bubble { max-width: 72%; padding: .65rem .9rem; border-radius: 14px; font-size: .85rem; line-height: 1.55; }
    .bubble-wrap.ai .bubble { background: rgba(167,139,250,.15); border: 1px solid rgba(167,139,250,.2); color: var(--text); border-bottom-left-radius: 4px; }
    .bubble-wrap.caller .bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-bottom-right-radius: 4px; }
    .role-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: .25rem; }
    .ai .role-label { color: var(--accent); }
    .caller .role-label { color: var(--muted); text-align: right; }
    .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: .88rem; flex-direction: column; gap: .5rem; }
    .empty-state .icon { font-size: 2rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="layout">
  <!-- Left: call list -->
  <div class="list-panel">
    <div class="list-toolbar">
      <div class="list-title">Call Transcripts</div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('booked',this)">Booked</button>
        <button class="filter-btn" onclick="setFilter('callback',this)">Callback</button>
        <button class="filter-btn" onclick="setFilter('question',this)">Q&amp;A</button>
        <button class="filter-btn" onclick="setFilter('hangup',this)">Hangup</button>
      </div>
    </div>
    <div class="call-list" id="call-list"></div>
  </div>

  <!-- Right: transcript -->
  <div class="transcript-panel" id="transcript-panel">
    <div class="empty-state" id="empty-state">
      <div class="icon">📞</div>
      <div>Select a call to view transcript</div>
    </div>
    <div id="transcript-content" style="display:none;flex:1;display:none;flex-direction:column">
      <div class="transcript-header">
        <div class="th-phone" id="th-phone"></div>
        <div class="th-meta" id="th-meta"></div>
      </div>
      <div class="transcript-body" id="transcript-body"></div>
    </div>
  </div>
</div>

<script>
  let convos = [], curFilter = 'all', selectedId = null;

  async function load() {
    const r = await fetch('/api/conversations');
    const d = await r.json();
    convos = d.conversations || [];
    renderList();
    if (convos.length) selectConvo(convos[0].id);
  }

  function setFilter(f, btn) {
    curFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    const filtered = curFilter === 'all' ? convos : convos.filter(c => c.outcome === curFilter);
    document.getElementById('call-list').innerHTML = filtered.map(c => `
      <div class="call-item ${c.id === selectedId ? 'selected' : ''}" onclick="selectConvo(${c.id})">
        <div class="ci-top">
          <div class="ci-phone">${esc(c.phone)}</div>
          <div class="ci-time">${c.date.split(' ')[1] || ''}</div>
        </div>
        <div class="ci-summary">${esc(c.summary)}</div>
        <div class="ci-footer">
          <span class="outcome-badge ob-${c.outcome}">${c.outcome}</span>
          <span class="ci-dur">${fmtDur(c.duration_s)}</span>
        </div>
      </div>`).join('');
  }

  function selectConvo(id) {
    selectedId = id;
    renderList();
    const c = convos.find(x => x.id === id);
    if (!c) return;
    document.getElementById('empty-state').style.display = 'none';
    const tc = document.getElementById('transcript-content');
    tc.style.display = 'flex';
    tc.style.flexDirection = 'column';
    tc.style.flex = '1';
    document.getElementById('th-phone').textContent = c.phone;
    document.getElementById('th-meta').textContent = `${c.date} · ${fmtDur(c.duration_s)} · ${c.outcome}`;
    document.getElementById('transcript-body').innerHTML = (c.transcript || []).map(msg => `
      <div class="bubble-wrap ${msg.role}">
        <div style="max-width:72%">
          <div class="role-label">${msg.role === 'ai' ? 'AI' : 'Caller'}</div>
          <div class="bubble">${esc(msg.text)}</div>
        </div>
      </div>`).join('');
  }

  function fmtDur(s) {
    const m = Math.floor(s/60), sec = s%60;
    return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  load();
</script>
</body>
</html>
