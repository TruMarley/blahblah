<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Cancellation Breakdown — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.5rem; }
    .svc-row { display: flex; align-items: center; gap: .9rem; margin-bottom: 1.2rem; }
    .svc-row:last-child { margin-bottom: 0; }
    .svc-name { font-size: .86rem; font-weight: 800; width: 90px; flex-shrink: 0; }
    .bar-wrap { flex: 1; }
    .bar-track { background: var(--surface2); border-radius: 5px; height: 12px; overflow: hidden; margin-bottom: .3rem; }
    .bar-fill { height: 100%; border-radius: 5px; }
    .bar-sub { display: flex; justify-content: space-between; font-size: .69rem; color: var(--muted); }
    .rate-val { font-size: .88rem; font-weight: 900; width: 46px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Cancellation Breakdown</div>
  <p class="page-sub">Which services have the highest cancellation rates — focus your policy on the worst offenders.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Cancel Rate</div>
      <div class="hero-val" id="h-avg" style="color:var(--red)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Highest Rate</div>
      <div class="hero-val" id="h-top" style="font-size:1rem;padding-top:.5rem;color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Cancellation Rate by Service (sorted highest first)</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/service-cancellation-breakdown');
    const d = await r.json();
    document.getElementById('h-avg').textContent = d.avg_cancellation_rate + '%';
    const svcs = d.services || [];
    document.getElementById('h-top').textContent = svcs.length ? svcs[0].service : '—';
    const maxRate = Math.max(...svcs.map(s => s.cancellation_rate), 1);
    document.getElementById('svc-list').innerHTML = svcs.map(s => {
      const color = s.cancellation_rate > d.avg_cancellation_rate ? '#f87171' : '#34d399';
      return `<div class="svc-row">
        <div class="svc-name">${esc(s.service)}</div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill" style="width:${(s.cancellation_rate/maxRate*100).toFixed(1)}%;background:${color};opacity:.75"></div></div>
          <div class="bar-sub"><span>${s.cancellations} cancelled</span><span>of ${s.total_bookings} bookings</span></div>
        </div>
        <div class="rate-val" style="color:${color}">${s.cancellation_rate}%</div>
      </div>`;
    }).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
