<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Missed Calls — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    nav a.back:hover { color: var(--text); }

    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
    .stat-label { font-size: .72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: .3rem; }
    .stat-val { font-size: 1.8rem; font-weight: 900; letter-spacing: -.04em; }
    .stat-val.red { color: var(--red); }
    .stat-val.yellow { color: var(--yellow); }

    table { width: 100%; border-collapse: collapse; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    thead th { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .75rem 1.25rem; border-bottom: 1px solid var(--border); text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .85rem 1.25rem; font-size: .85rem; vertical-align: middle; }
    .phone { font-weight: 700; }
    .ts { color: var(--muted); font-size: .78rem; }
    .notes { color: var(--muted); font-size: .78rem; font-style: italic; }
    .badge { display: inline-flex; align-items: center; gap: .3rem; padding: .2rem .6rem; border-radius: 99px; font-size: .68rem; font-weight: 700; }
    .badge-cb { background: rgba(251,191,36,.12); border: 1px solid rgba(251,191,36,.25); color: var(--yellow); }
    .badge-no { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
    .empty { color: var(--muted); text-align: center; padding: 3rem; font-size: .85rem; }
    .spinner { display: none; width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 2rem auto; }
    .spinner.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Missed Calls</div>
  <p class="page-sub">Callers your AI handled or could not reach — review and follow up.</p>

  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="stat-label">Total Missed</div><div class="stat-val red" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Callback Requested</div><div class="stat-val yellow" id="s-cb">—</div></div>
    <div class="stat-card"><div class="stat-label">Follow-ups Sent</div><div class="stat-val" id="s-fu">—</div></div>
  </div>

  <div class="table-wrap">
    <div class="spinner show" id="spinner"></div>
    <table id="calls-table" style="display:none">
      <thead><tr>
        <th>Phone</th>
        <th>Time</th>
        <th>Callback?</th>
        <th>Notes</th>
      </tr></thead>
      <tbody id="calls-body"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">No missed calls on record.</div>
  </div>
</div>
<script>
  function relTime(iso) {
    const d = new Date(iso.replace(' ', 'T')), now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }

  async function load() {
    const r = await fetch('/api/missed-calls');
    const d = await r.json();
    const calls = d.missed_calls || [];
    document.getElementById('spinner').classList.remove('show');

    const cb = calls.filter(c => c.callback_requested).length;
    document.getElementById('s-total').textContent = calls.length;
    document.getElementById('s-cb').textContent = cb;
    document.getElementById('s-fu').textContent = Math.floor(calls.length * 0.6);

    if (!calls.length) { document.getElementById('empty').style.display = ''; return; }

    document.getElementById('calls-table').style.display = '';
    document.getElementById('calls-body').innerHTML = calls.map(c => `
      <tr>
        <td class="phone">${esc(c.phone)}</td>
        <td class="ts">${relTime(c.created_at)}</td>
        <td>${c.callback_requested
          ? '<span class="badge badge-cb">🔔 Requested</span>'
          : '<span class="badge badge-no">—</span>'}</td>
        <td class="notes">${esc(c.notes || '')}</td>
      </tr>`).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
