<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avg Service Duration — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem .9rem; text-align: center; }
    .hero-label { font-size: .6rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.15rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .svc-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .85rem; }
    .svc-row:last-child { margin-bottom: 0; }
    .svc-name { font-size: .82rem; font-weight: 700; min-width: 130px; }
    .svc-bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 8px; }
    .svc-bar-fill { height: 8px; border-radius: 8px; background: var(--accent); }
    .svc-meta { font-size: .75rem; color: var(--muted); min-width: 80px; text-align: right; }
    .svc-count { font-size: .68rem; color: var(--muted); min-width: 60px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Avg Service Duration</div>
  <p class="page-sub">See how long each service takes on average so the AI can quote accurate time windows during booking calls. Accurate time estimates prevent double-booking and reduce client wait times.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Overall Avg</div>
      <div class="hero-val" id="h-avg" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Shortest Service</div>
      <div class="hero-val" id="h-short" style="color:var(--green);font-size:.88rem">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Longest Service</div>
      <div class="hero-val" id="h-long" style="color:var(--yellow);font-size:.88rem">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Duration by Service</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  async function load() {
    const d = await fetch('/api/analytics/avg-service-duration-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.overall_avg_min != null ? d.overall_avg_min + ' min' : '—';
    document.getElementById('h-short').textContent = d.shortest_service || '—';
    document.getElementById('h-long').textContent = d.longest_service || '—';
    const services = d.services || [];
    const maxMin = services.length ? Math.max(...services.map(s => s.avg_min)) : 1;
    const el = document.getElementById('svc-list');
    services.sort((a,b) => b.avg_min - a.avg_min).forEach((s, i) => {
      const pct = Math.round(s.avg_min / maxMin * 100);
      const colors = ['var(--accent)','var(--green)','var(--yellow)','#60a5fa','var(--red)','#818cf8'];
      const color = colors[i % colors.length];
      el.innerHTML += `<div class="svc-row">
        <div class="svc-name">${esc(s.name)}</div>
        <div class="svc-bar-track"><div class="svc-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="svc-meta" style="color:${color}">${s.avg_min} min</div>
        <div class="svc-count">${s.count} appts</div>
      </div>`;
    });
  }
  load();
</script>
</body>
</html>
