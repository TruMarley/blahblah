<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client LTV Score — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .tier-row { display: flex; align-items: center; justify-content: space-between; padding: .7rem 0; border-bottom: 1px solid var(--border); }
    .tier-row:last-child { border-bottom: none; padding-bottom: 0; }
    .tier-name { font-size: .88rem; font-weight: 800; }
    .tier-count { font-size: .75rem; color: var(--muted); margin-top: .1rem; }
    .tier-spend { font-size: .9rem; font-weight: 900; color: var(--green); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client LTV Score</div>
  <p class="page-sub">Understand the lifetime value distribution across your client base. High-LTV clients drive disproportionate revenue — identify and protect them.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Clients</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Avg LTV</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--yellow)">—</div><div class="stat-lbl">Top Tier %</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-growth" style="color:var(--accent)">—</div><div class="stat-lbl">LTV Growth</div></div>
  </div>
  <div class="card">
    <div class="card-title">LTV Tier Breakdown</div>
    <div id="tier-list"></div>
  </div>
</div>
<script>
  const TIER_COLORS = ['var(--yellow)','var(--accent)','#60a5fa','var(--muted)'];
  async function load() {
    const d = await fetch('/api/analytics/client-ltv-score-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_clients;
    document.getElementById('h-avg').textContent = '$' + d.avg_ltv.toFixed(0);
    document.getElementById('h-top').textContent = d.top_tier_pct.toFixed(1) + '%';
    document.getElementById('h-growth').textContent = (d.ltv_growth_pct >= 0 ? '+' : '') + d.ltv_growth_pct.toFixed(1) + '%';
    const tl = document.getElementById('tier-list');
    d.tiers.forEach((t, i) => {
      tl.innerHTML += '<div class="tier-row"><div><div class="tier-name" style="color:' + TIER_COLORS[i] + '">' + t.label + '</div><div class="tier-count">' + t.count + ' clients · $' + t.min_ltv + '+ LTV</div></div><div class="tier-spend">$' + t.avg_spend.toFixed(0) + ' avg</div></div>';
    });
  }
  load();
</script>
</body>
</html>
