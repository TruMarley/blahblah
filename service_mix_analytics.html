<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Mix — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 700px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: .63rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; text-align: left; padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
    td { font-size: .78rem; padding: .6rem .5rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .svc-bar-track { background: var(--surface2); border-radius: 3px; height: 5px; width: 80px; overflow: hidden; }
    .svc-bar-fill { height: 100%; border-radius: 3px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Mix</div>
  <p class="page-sub">See which services are booked most and generate the most revenue. Use this to prioritise promotions and train the AI on high-value upsells.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-bookings" style="color:var(--accent)">—</div><div class="stat-lbl">Total Bookings (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-rev" style="color:var(--green)">—</div><div class="stat-lbl">Total Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--accent)">—</div><div class="stat-lbl">Most Booked</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-toprev" style="color:var(--green)">—</div><div class="stat-lbl">Top Revenue</div></div>
  </div>
  <div class="card">
    <div class="card-title">Service Breakdown</div>
    <table>
      <thead><tr><th>Service</th><th>Bookings</th><th>Share</th><th>Revenue</th></tr></thead>
      <tbody id="svc-body"></tbody>
    </table>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','var(--green)','#60a5fa','var(--yellow)','#e879f9','var(--red)','var(--muted)'];
  async function load() {
    const d = await fetch('/api/analytics/service-mix-stats').then(r => r.json());
    document.getElementById('h-bookings').textContent = d.total_bookings_30d.toLocaleString();
    document.getElementById('h-rev').textContent = '$' + d.total_revenue_30d.toLocaleString();
    document.getElementById('h-top').textContent = d.top_service;
    document.getElementById('h-toprev').textContent = d.top_revenue_service;
    const maxP = Math.max(...d.services.map(s => s.pct));
    const tbody = document.getElementById('svc-body');
    d.services.forEach((s, i) => {
      const w = (s.pct / maxP * 100).toFixed(0);
      tbody.innerHTML += '<tr><td style="font-weight:700">' + s.service + '</td><td>' + s.bookings + '</td><td><div style="display:flex;align-items:center;gap:.5rem"><div class="svc-bar-track"><div class="svc-bar-fill" style="width:' + w + '%;background:' + COLORS[i % COLORS.length] + '"></div></div><span style="font-size:.7rem;color:' + COLORS[i % COLORS.length] + '">' + s.pct.toFixed(1) + '%</span></div></td><td style="color:var(--green);font-weight:700">$' + s.revenue.toLocaleString() + '</td></tr>';
    });
  }
  load();
</script>
</body>
</html>
