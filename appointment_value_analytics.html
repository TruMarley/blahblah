<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Appointment Value — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bucket-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .7rem; }
    .bucket-label { font-size: .78rem; color: var(--text); width: 80px; flex-shrink: 0; }
    .bucket-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bucket-fill { height: 100%; border-radius: 4px; }
    .bucket-pct { font-size: .75rem; font-weight: 700; width: 40px; text-align: right; }
    .bucket-count { font-size: .68rem; color: var(--muted); width: 50px; text-align: right; }
    .trend-row { display: flex; align-items: flex-end; gap: .5rem; height: 90px; margin-top: .5rem; }
    .trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .35rem; }
    .trend-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .trend-bar { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); opacity: .75; min-height: 4px; }
    .trend-lbl { font-size: .58rem; color: var(--muted); }
    .trend-val { font-size: .62rem; font-weight: 700; color: var(--accent); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Appointment Value</div>
  <p class="page-sub">Track average ticket size, upsell impact, and value distribution across appointments to optimise pricing and service bundling.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Avg Ticket</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-med" style="color:var(--accent)">—</div><div class="stat-lbl">Median Ticket</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-max" style="color:var(--yellow)">—</div><div class="stat-lbl">Max Ticket (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-upsell" style="color:var(--green)">—</div><div class="stat-lbl">Avg w/ Upsell</div></div>
  </div>
  <div class="card">
    <div class="card-title">Ticket Value Distribution</div>
    <div id="bucket-list"></div>
  </div>
  <div class="card">
    <div class="card-title">6-Month Avg Ticket Trend</div>
    <div class="trend-row" id="trend-row"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--red)','var(--yellow)','var(--accent)','#60a5fa','var(--green)','#f472b6'];
  async function load() {
    const d = await fetch('/api/analytics/appointment-value-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = '$' + d.avg_ticket.toFixed(0);
    document.getElementById('h-med').textContent = '$' + d.median_ticket.toFixed(0);
    document.getElementById('h-max').textContent = '$' + d.max_ticket_30d.toFixed(0);
    document.getElementById('h-upsell').textContent = '$' + d.with_upsell_avg.toFixed(0);
    const bl = document.getElementById('bucket-list');
    const maxP = Math.max(...d.buckets.map(b => b.pct));
    d.buckets.forEach((b, i) => {
      const w = (b.pct / maxP * 100).toFixed(1);
      bl.innerHTML += '<div class="bucket-row"><div class="bucket-label">' + b.label + '</div><div class="bucket-track"><div class="bucket-fill" style="width:' + w + '%;background:' + COLORS[i % COLORS.length] + '"></div></div><div class="bucket-pct" style="color:' + COLORS[i % COLORS.length] + '">' + b.pct.toFixed(1) + '%</div><div class="bucket-count">' + b.count + '</div></div>';
    });
    const tr = document.getElementById('trend-row');
    const maxV = Math.max(...d.monthly.map(m => m.avg_ticket));
    d.monthly.forEach(m => {
      const h = Math.max(8, (m.avg_ticket / maxV * 80)).toFixed(1);
      tr.innerHTML += '<div class="trend-col"><div class="trend-val">$' + m.avg_ticket.toFixed(0) + '</div><div class="trend-bar-wrap"><div class="trend-bar" style="height:' + h + 'px"></div></div><div class="trend-lbl">' + m.month + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
