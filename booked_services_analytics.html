<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booked Services — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: .8rem 1rem; margin-bottom: .5rem; display: flex; align-items: center; justify-content: space-between; }
    .svc-left { flex: 1; }
    .svc-name { font-size: .88rem; font-weight: 800; margin-bottom: .3rem; }
    .svc-bar-wrap { background: #1a1a1a; border-radius: 3px; height: 5px; overflow: hidden; width: 100%; }
    .svc-bar { height: 100%; border-radius: 3px; background: var(--accent); }
    .svc-right { text-align: right; margin-left: 1rem; }
    .svc-rev { font-size: .82rem; font-weight: 900; color: var(--green); }
    .svc-cnt { font-size: .65rem; color: var(--muted); margin-top: .12rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Booked Services</div>
  <p class="page-sub">See which services are booked most and which generate the most revenue over the last 30 days. Use this to prioritize promotion and staffing for high-demand services.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Bookings (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--green)">—</div><div class="stat-lbl">Top Service</div></div>
  </div>
  <div class="card">
    <div class="card-title">Service Breakdown</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/booked-services-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_bookings_30d;
    document.getElementById('h-top').textContent = d.top_service;
    const sl = document.getElementById('svc-list');
    const maxPct = Math.max(...d.services.map(s => s.pct));
    d.services.forEach(s => {
      const w = (s.pct / maxPct * 100).toFixed(1);
      sl.innerHTML += '<div class="svc-row"><div class="svc-left"><div class="svc-name">' + s.name + '</div><div class="svc-bar-wrap"><div class="svc-bar" style="width:' + w + '%"></div></div></div><div class="svc-right"><div class="svc-rev">$' + s.revenue.toLocaleString() + '</div><div class="svc-cnt">' + s.bookings + ' bookings · ' + s.pct.toFixed(1) + '%</div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
