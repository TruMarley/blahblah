<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First-Time vs Repeat Revenue — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --blue: #60a5fa; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.1rem; }
    .leg-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .leg-dot { width: 9px; height: 9px; border-radius: 2px; }
    .chart-wrap { height: 230px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">First-Time vs Repeat Revenue</div>
  <p class="page-sub">Average ticket size comparison — returning clients typically spend more per visit.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg First-Time Ticket</div>
      <div class="hero-val" id="h-first" style="color:#60a5fa">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Repeat Ticket</div>
      <div class="hero-val" id="h-repeat" style="color:var(--green)">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Avg Ticket by Client Type — 6 Months</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#60a5fa"></div>First-Time</div>
      <div class="leg-item"><div class="leg-dot" style="background:#34d399"></div>Repeat</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 230" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/first-time-vs-repeat-revenue');
    const d = await r.json();
    document.getElementById('h-first').textContent  = '$' + d.overall_first_avg.toFixed(2);
    document.getElementById('h-repeat').textContent = '$' + d.overall_repeat_avg.toFixed(2);

    const months = d.months || [];
    const svg = document.getElementById('chart');
    const W=700,H=230,pL=44,pR=12,pT=14,pB=34;
    const cW=W-pL-pR, cH=H-pT-pB;
    const allVals = months.flatMap(m => [m.first_time_avg, m.repeat_avg]);
    const maxV = Math.max(...allVals, 1);
    const n = months.length;
    const slotW = cW/n;
    const bW = slotW * 0.3;
    const gap = slotW * 0.06;

    [0,.25,.5,.75,1].forEach(f => {
      const y = pT + cH*(1-f);
      svg.innerHTML += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML += `<text x="${pL-4}" y="${y+3}" font-size="9" fill="#666" text-anchor="end">$${Math.round(maxV*f)}</text>`;
    });

    months.forEach((m, i) => {
      const cx = pL + i*slotW + slotW/2;
      // first-time bar (left)
      const bH1 = (m.first_time_avg/maxV)*cH;
      svg.innerHTML += `<rect x="${cx-bW-gap/2}" y="${pT+cH-bH1}" width="${bW}" height="${bH1}" rx="2" fill="#60a5fa" opacity=".75"/>`;
      // repeat bar (right)
      const bH2 = (m.repeat_avg/maxV)*cH;
      svg.innerHTML += `<rect x="${cx+gap/2}" y="${pT+cH-bH2}" width="${bW}" height="${bH2}" rx="2" fill="#34d399" opacity=".75"/>`;
      // month label
      svg.innerHTML += `<text x="${cx}" y="${H-4}" font-size="9" fill="#666" text-anchor="middle">${m.month}</text>`;
    });
  }
  load();
</script>
</body>
</html>
