<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Satisfaction Score — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .chart-wrap { height: 240px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
    .star-row { display: flex; align-items: center; gap: .65rem; margin-bottom: .5rem; }
    .star-label { font-size: .75rem; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
    .star-bar-bg { flex: 1; background: #1e1e1e; border-radius: 4px; height: 9px; overflow: hidden; }
    .star-bar-fill { height: 100%; border-radius: 4px; }
    .star-pct { font-size: .72rem; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Satisfaction Score</div>
  <p class="page-sub">Average star rating from post-call surveys — a low score means your AI needs script tuning or faster escalation to staff.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Rating</div>
      <div class="hero-val" id="h-avg" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Ratings (8 wk)</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">5-Star Rate</div>
      <div class="hero-val" id="h-five" style="color:var(--green)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Weekly Avg Rating Trend</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 240" preserveAspectRatio="none"></svg>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Star Distribution (Latest Week)</div>
    <div id="star-dist"></div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/client-rating-trend');
    const d = await r.json();
    const weeks = d.weeks || [];
    const avgScore = (weeks.reduce((s,w)=>s+w.avg_score,0)/weeks.length).toFixed(2);
    const totalRatings = weeks.reduce((s,w)=>s+w.total_ratings,0);
    const avgFive = (weeks.reduce((s,w)=>s+w.pct_5_star,0)/weeks.length).toFixed(1);
    document.getElementById('h-avg').textContent = avgScore + ' ★';
    document.getElementById('h-total').textContent = totalRatings;
    document.getElementById('h-five').textContent = avgFive + '%';

    const latest = weeks[weeks.length-1];
    const pct5 = latest.pct_5_star;
    const pct4 = Math.min(30, 100-pct5-15);
    const pct3 = Math.min(12, 100-pct5-pct4-8);
    const pct2 = Math.min(5, 100-pct5-pct4-pct3-3);
    const pct1 = 100-pct5-pct4-pct3-pct2;
    const colors = ['var(--green)','rgba(52,211,153,.6)','var(--yellow)','rgba(251,191,36,.5)','var(--red)'];
    const starData = [[5,pct5],[4,pct4],[3,pct3],[2,pct2],[1,Math.max(0,pct1)]];
    document.getElementById('star-dist').innerHTML = starData.map(([star,pct],i)=>`
      <div class="star-row">
        <div class="star-label">${star}★</div>
        <div class="star-bar-bg"><div class="star-bar-fill" style="width:${Math.max(2,pct)}%;background:${colors[i]}"></div></div>
        <div class="star-pct">${pct}%</div>
      </div>`).join('');

    const svg = document.getElementById('chart');
    const W=700,H=240,pL=44,pR=16,pT=14,pB=28;
    const cW=W-pL-pR,cH=H-pT-pB;
    const n=weeks.length,xStep=cW/n;
    const minS=3.0,maxS=5.0;
    const xOf=i=>pL+i*xStep+xStep/2;
    const yOf=v=>pT+cH-((v-minS)/(maxS-minS))*cH;

    [3.5,4.0,4.5,5.0].forEach(v=>{
      const y=yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">${v}</text>`;
    });
    const pts=weeks.map((w,i)=>`${xOf(i)},${yOf(w.avg_score)}`).join(' ');
    const first=xOf(0),last=xOf(weeks.length-1),bot=pT+cH;
    svg.innerHTML+=`<polygon points="${first},${bot} ${pts} ${last},${bot}" fill="rgba(251,191,36,.1)"/>`;
    svg.innerHTML+=`<polyline points="${pts}" fill="none" stroke="rgba(251,191,36,.85)" stroke-width="2.5"/>`;
    weeks.forEach((w,i)=>{
      const cy=yOf(w.avg_score);
      svg.innerHTML+=`<circle cx="${xOf(i)}" cy="${cy}" r="3.5" fill="var(--yellow)"/>`;
      svg.innerHTML+=`<text x="${xOf(i)}" y="${cy-8}" font-size="8" fill="var(--yellow)" text-anchor="middle">${w.avg_score}</text>`;
      svg.innerHTML+=`<text x="${xOf(i)}" y="${H-4}" font-size="8.5" fill="#555" text-anchor="middle">${esc(w.week)}</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
