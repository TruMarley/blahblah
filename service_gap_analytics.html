<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Gap — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(1, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .8rem 1rem; margin-bottom: .45rem; display: grid; grid-template-columns: 1fr auto auto auto; gap: .75rem; align-items: center; }
    .svc-name { font-size: .85rem; font-weight: 700; }
    .svc-stat { font-size: .75rem; text-align: right; }
    .svc-stat span { font-weight: 800; }
    .overdue-badge { font-size: .6rem; font-weight: 700; background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.2); border-radius: 4px; padding: .1rem .35rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Gap</div>
  <p class="page-sub">Average days between bookings, broken down by service type. Services with long gaps and high overdue rates are the best targets for proactive AI re-engagement campaigns.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--accent)">—</div><div class="stat-lbl">Overall Avg Gap (days)</div></div>
  </div>
  <div class="card">
    <div class="card-title">Gap by Service</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/service-gap-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.overall_avg_gap_days + ' days';
    const sl = document.getElementById('svc-list');
    d.services.forEach(s => {
      const isHigh = s.overdue_pct > 28;
      const col = isHigh ? 'var(--red)' : 'var(--yellow)';
      const badge = isHigh ? '<span class="overdue-badge">' + s.overdue_pct.toFixed(0) + '% overdue</span>' : '';
      sl.innerHTML += '<div class="svc-row"><div class="svc-name">' + s.service + ' ' + badge + '</div><div class="svc-stat" style="color:var(--accent)"><span>' + s.avg_gap_days + '</span>d avg</div><div class="svc-stat" style="color:var(--muted)"><span>' + s.bookings_30d + '</span> bkgs</div><div class="svc-stat" style="color:' + col + '"><span>' + s.overdue_pct.toFixed(1) + '%</span> due</div></div>';
    });
  }
  load();
</script>
</body>
</html>
