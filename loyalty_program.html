<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loyalty Program — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.4rem; }
    .field-group { margin-bottom: 1.1rem; }
    .field-label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem; display: block; }
    .f-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .85rem; padding: .5rem .75rem; font-family: inherit; width: 100%; outline: none; }
    .f-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .85rem; padding: .5rem .75rem; font-family: inherit; width: 100%; outline: none; cursor: pointer; }
    .inline-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
    .toggle-info .toggle-name { font-size: .85rem; font-weight: 700; }
    .toggle-info .toggle-desc { font-size: .74rem; color: var(--muted); margin-top: .1rem; }
    .tog { width: 36px; height: 20px; background: var(--border); border-radius: 99px; position: relative; cursor: pointer; flex-shrink: 0; transition: background .2s; }
    .tog.on { background: rgba(167,139,250,.6); }
    .tog::after { content:''; position:absolute; top:3px; left:3px; width:14px; height:14px; background:#fff; border-radius:50%; transition:transform .2s; }
    .tog.on::after { transform: translateX(16px); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }
    .tier-list { display: flex; flex-direction: column; gap: .6rem; }
    .tier-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; display: flex; align-items: center; gap: 1rem; }
    .tier-name { font-size: .82rem; font-weight: 800; color: var(--yellow); min-width: 60px; }
    .tier-pts { font-size: .75rem; color: var(--muted); flex: 1; }
    .tier-perk { font-size: .78rem; color: var(--text); }
    .save-row { display: flex; align-items: center; gap: 1rem; margin-top: 1.4rem; }
    .save-btn { font-size: .82rem; font-weight: 800; padding: .55rem 1.5rem; border-radius: 9px; border: 1px solid rgba(52,211,153,.4); background: rgba(52,211,153,.1); color: var(--green); cursor: pointer; font-family: inherit; }
    .save-btn:hover { background: rgba(52,211,153,.2); }
    .saved-msg { font-size: .78rem; color: var(--green); font-weight: 700; opacity: 0; transition: opacity .3s; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Loyalty Program</div>
  <p class="page-sub">Configure points-based rewards to keep clients coming back — the AI mentions their points balance automatically.</p>
  <div class="card">
    <div class="card-title">Program Settings</div>
    <div class="toggle-row">
      <div class="toggle-info">
        <div class="toggle-name">Enable Loyalty Program</div>
        <div class="toggle-desc">AI mentions points on every booking call</div>
      </div>
      <div class="tog" id="tog-enabled" onclick="toggleEnabled()"></div>
    </div>
    <hr class="divider">
    <div class="inline-row field-group">
      <div>
        <label class="field-label" for="ppd">Points per Dollar</label>
        <input class="f-input" type="number" id="ppd" step="0.5" min="0.5">
      </div>
      <div>
        <label class="field-label" for="ptr">Points to Redeem</label>
        <input class="f-input" type="number" id="ptr" step="50" min="50">
      </div>
    </div>
    <div class="field-group">
      <label class="field-label" for="rvd">Reward Value ($)</label>
      <input class="f-input" type="number" id="rvd" step="1" min="1" style="max-width:200px">
    </div>
    <div class="save-row">
      <button class="save-btn" onclick="save()">Save Settings</button>
      <span class="saved-msg" id="saved-msg">✓ Saved</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Membership Tiers</div>
    <div class="tier-list" id="tier-list"></div>
  </div>
</div>
<script>
  let config = {};
  async function load() {
    const r = await fetch('/api/loyalty-program');
    config = await r.json();
    document.getElementById('ppd').value = config.points_per_dollar || 1;
    document.getElementById('ptr').value = config.points_to_redeem || 500;
    document.getElementById('rvd').value = config.reward_value_dollars || 10;
    setTog(config.enabled);
    renderTiers();
  }
  function setTog(val) { document.getElementById('tog-enabled').classList.toggle('on', !!val); }
  function toggleEnabled() { config.enabled = !config.enabled; setTog(config.enabled); }
  function renderTiers() {
    document.getElementById('tier-list').innerHTML = (config.tiers || []).map(t =>
      `<div class="tier-card">
        <div class="tier-name">${esc(t.name)}</div>
        <div class="tier-pts">${t.min_points.toLocaleString()}+ pts</div>
        <div class="tier-perk">${esc(t.perk)}</div>
      </div>`
    ).join('');
  }
  async function save() {
    config.points_per_dollar = parseFloat(document.getElementById('ppd').value) || 1;
    config.points_to_redeem = parseInt(document.getElementById('ptr').value) || 500;
    config.reward_value_dollars = parseFloat(document.getElementById('rvd').value) || 10;
    await fetch('/api/loyalty-program', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config)});
    const msg = document.getElementById('saved-msg');
    msg.style.opacity = '1';
    setTimeout(() => { msg.style.opacity = '0'; }, 2000);
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
