<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #555; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    nav a.back:hover { color: var(--text); }

    .layout { display: flex; min-height: calc(100vh - 60px); }
    .cal-main { flex: 1; padding: 1.75rem 1.5rem; max-width: 820px; }
    .side-panel { width: 320px; flex-shrink: 0; border-left: 1px solid var(--border); padding: 1.5rem; display: none; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
    .side-panel.show { display: block; }

    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .month-label { font-size: 1.3rem; font-weight: 900; letter-spacing: -.03em; }
    .nav-btns { display: flex; gap: .4rem; }
    .nav-btn { width: 34px; height: 34px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s; }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .dow-header { text-align: center; font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .35rem 0; }
    .cal-cell { min-height: 80px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .5rem .55rem; cursor: pointer; transition: border-color .15s; position: relative; }
    .cal-cell:hover { border-color: rgba(167,139,250,.4); }
    .cal-cell.other-month { opacity: .3; cursor: default; }
    .cal-cell.today { border-color: var(--accent); }
    .cal-cell.selected { border-color: var(--accent); background: rgba(167,139,250,.08); }
    .day-num { font-size: .78rem; font-weight: 700; margin-bottom: .35rem; }
    .today .day-num { color: var(--accent); }
    .appt-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; font-size: .65rem; font-weight: 800; position: absolute; top: .4rem; right: .4rem; }
    .appt-dot { display: block; font-size: .65rem; color: var(--muted); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Side panel */
    .side-date { font-size: 1rem; font-weight: 900; margin-bottom: 1.25rem; letter-spacing: -.02em; }
    .side-empty { font-size: .82rem; color: var(--muted); }
    .appt-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; margin-bottom: .6rem; }
    .ar-time { font-size: .72rem; color: var(--accent); font-weight: 700; margin-bottom: .2rem; }
    .ar-service { font-size: .85rem; font-weight: 800; margin-bottom: .15rem; }
    .ar-name { font-size: .75rem; color: var(--muted); }
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: .4rem; }
    .s-confirmed { background: var(--green); }
    .s-pending { background: #fbbf24; }
    .s-noshow { background: var(--red); }

    .today-btn { font-size: .75rem; font-weight: 700; color: var(--accent); background: none; border: 1px solid rgba(167,139,250,.3); border-radius: 7px; padding: .3rem .8rem; cursor: pointer; font-family: inherit; }
    .today-btn:hover { background: rgba(167,139,250,.08); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="layout">
  <div class="cal-main">
    <div class="month-nav">
      <div class="month-label" id="month-label"></div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <button class="today-btn" onclick="goToday()">Today</button>
        <div class="nav-btns">
          <button class="nav-btn" onclick="prevMonth()">‹</button>
          <button class="nav-btn" onclick="nextMonth()">›</button>
        </div>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="dow-header">Mon</div>
      <div class="dow-header">Tue</div>
      <div class="dow-header">Wed</div>
      <div class="dow-header">Thu</div>
      <div class="dow-header">Fri</div>
      <div class="dow-header">Sat</div>
      <div class="dow-header">Sun</div>
    </div>
  </div>
  <div class="side-panel" id="side-panel">
    <div class="side-date" id="side-date"></div>
    <div id="side-content"></div>
  </div>
</div>

<script>
  const today = new Date();
  let curYear = today.getFullYear(), curMonth = today.getMonth();
  let dayData = {}, selectedDate = null;

  async function loadMonth() {
    const ym = `${curYear}-${String(curMonth+1).padStart(2,'0')}`;
    document.getElementById('month-label').textContent =
      new Date(curYear, curMonth, 1).toLocaleDateString('en-US', {month:'long', year:'numeric'});
    const r = await fetch(`/api/appointments/calendar?month=${ym}`);
    const d = await r.json();
    dayData = d.days || {};
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('cal-grid');
    // Remove old cells (keep 7 DOW headers)
    while (grid.children.length > 7) grid.removeChild(grid.lastChild);

    const first = new Date(curYear, curMonth, 1);
    // Monday-based: 0=Mon ... 6=Sun
    let startDow = (first.getDay() + 6) % 7;
    const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
    const prevDays = new Date(curYear, curMonth, 0).getDate();
    const todayISO = today.toISOString().slice(0,10);

    // Previous month filler
    for (let i = startDow - 1; i >= 0; i--) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell other-month';
      cell.innerHTML = `<div class="day-num">${prevDays - i}</div>`;
      grid.appendChild(cell);
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const appts = dayData[iso] || [];
      const isToday = iso === todayISO;
      const isSelected = iso === selectedDate;
      const cell = document.createElement('div');
      cell.className = `cal-cell${isToday?' today':''}${isSelected?' selected':''}`;
      cell.dataset.date = iso;
      let inner = `<div class="day-num">${d}</div>`;
      if (appts.length) {
        inner += `<span class="appt-badge">${appts.length}</span>`;
        appts.slice(0,2).forEach(a => {
          inner += `<span class="appt-dot">${fmtTime(a.time)} ${esc(a.service)}</span>`;
        });
      }
      cell.innerHTML = inner;
      cell.onclick = () => selectDay(iso, appts);
      grid.appendChild(cell);
    }

    // Next month filler
    const total = startDow + daysInMonth;
    const remainder = (7 - (total % 7)) % 7;
    for (let i = 1; i <= remainder; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell other-month';
      cell.innerHTML = `<div class="day-num">${i}</div>`;
      grid.appendChild(cell);
    }
  }

  function selectDay(iso, appts) {
    selectedDate = iso;
    renderGrid();
    const panel = document.getElementById('side-panel');
    panel.classList.add('show');
    document.getElementById('side-date').textContent =
      new Date(iso + 'T00:00:00').toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
    if (!appts.length) {
      document.getElementById('side-content').innerHTML = '<div class="side-empty">No appointments this day.</div>';
      return;
    }
    document.getElementById('side-content').innerHTML = appts.map(a => {
      const sc = a.status === 'confirmed' ? 's-confirmed' : a.status === 'no-show' ? 's-noshow' : 's-pending';
      return `
      <div class="appt-row">
        <div class="ar-time"><span class="status-dot ${sc}"></span>${fmtTime(a.time)}</div>
        <div class="ar-service">${esc(a.service)}</div>
        <div class="ar-name">${esc(a.name || a.phone || '—')}</div>
      </div>`;
    }).join('');
  }

  function prevMonth() { curMonth--; if (curMonth < 0) { curMonth = 11; curYear--; } loadMonth(); }
  function nextMonth() { curMonth++; if (curMonth > 11) { curMonth = 0; curYear++; } loadMonth(); }
  function goToday() { curYear = today.getFullYear(); curMonth = today.getMonth(); loadMonth(); }

  function fmtTime(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  loadMonth();
</script>
</body>
</html>
