<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LTV Cohorts — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .cohort-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .8rem; }
    .cohort-label { font-size: .78rem; color: var(--text); width: 95px; flex-shrink: 0; }
    .cohort-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 12px; overflow: hidden; }
    .cohort-fill { height: 100%; border-radius: 4px; }
    .cohort-ltv { font-size: .75rem; font-weight: 700; width: 60px; text-align: right; }
    .cohort-clients { font-size: .68rem; color: var(--muted); width: 52px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">LTV Cohorts</div>
  <p class="page-sub">Understand lifetime value by client tenure cohort. Long-tenured clients generate exponentially higher LTV — these analytics quantify the compounding value of retention.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Avg Client LTV</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-med" style="color:var(--accent)">—</div><div class="stat-lbl">Median LTV</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--yellow)">—</div><div class="stat-lbl">Top 10% LTV</div></div>
  </div>
  <div class="card">
    <div class="card-title">LTV by Client Tenure</div>
    <div id="cohort-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--red)','var(--yellow)','var(--accent)','#60a5fa','var(--green)'];
  async function load() {
    const d = await fetch('/api/analytics/ltv-cohort-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = '$' + d.avg_ltv.toLocaleString(undefined, {maximumFractionDigits:0});
    document.getElementById('h-med').textContent = '$' + d.median_ltv.toLocaleString(undefined, {maximumFractionDigits:0});
    document.getElementById('h-top').textContent = '$' + d.top_decile_ltv.toLocaleString(undefined, {maximumFractionDigits:0});
    const cl = document.getElementById('cohort-list');
    const maxL = Math.max(...d.cohorts.map(c => c.avg_ltv));
    d.cohorts.forEach((c, i) => {
      const w = (c.avg_ltv / maxL * 100).toFixed(1);
      cl.innerHTML += '<div class="cohort-row"><div class="cohort-label">' + c.label + '</div><div class="cohort-track"><div class="cohort-fill" style="width:' + w + '%;background:' + COLORS[i % COLORS.length] + '"></div></div><div class="cohort-ltv" style="color:' + COLORS[i % COLORS.length] + '">$' + c.avg_ltv.toLocaleString(undefined, {maximumFractionDigits:0}) + '</div><div class="cohort-clients">' + c.clients + ' clients</div></div>';
    });
  }
  load();
</script>
</body>
</html>
