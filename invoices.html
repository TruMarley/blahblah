<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoices — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 1.5rem; }
    .summary { display: grid; grid-template-columns: repeat(3,1fr); gap: .75rem; margin-bottom: 1.5rem; }
    .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
    .sum-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .3rem; }
    .sum-val { font-size: 1.5rem; font-weight: 900; }
    .sum-sub { font-size: .7rem; color: var(--muted); margin-top: .15rem; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .7rem 1.25rem; border-bottom: 1px solid var(--border); text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .85rem 1.25rem; font-size: .82rem; vertical-align: middle; }
    .name-cell { font-weight: 800; }
    .amount-cell { font-weight: 900; font-size: .9rem; }
    .status-badge { font-size: .68rem; font-weight: 800; padding: .18rem .55rem; border-radius: 99px; white-space: nowrap; }
    .s-paid    { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .s-pending { background: rgba(167,139,250,.1); color: var(--accent); border: 1px solid rgba(167,139,250,.2); }
    .s-overdue { background: rgba(248,113,113,.1); color: var(--red); border: 1px solid rgba(248,113,113,.2); }
    .pay-btn { background: var(--surface2); border: 1px solid rgba(52,211,153,.25); color: var(--green); font-size: .72rem; font-weight: 700; padding: .32rem .75rem; border-radius: 7px; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
    .pay-btn:hover { background: rgba(52,211,153,.08); }
    .pay-btn:disabled { color: var(--muted); border-color: var(--border); cursor: default; background: transparent; }
    .date-cell { font-size: .72rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Invoices</div>
  <p class="page-sub">Track outstanding and collected payments.</p>
  <div class="summary" id="summary"></div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Client</th><th>Service</th><th>Amount</th><th>Due</th><th>Status</th><th></th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<script>
  let invoices = [];

  async function load() {
    const r = await fetch('/api/invoices');
    const d = await r.json();
    invoices = d.invoices || [];
    render();
  }

  function render() {
    const paid    = invoices.filter(i => i.status === 'paid');
    const pending = invoices.filter(i => i.status === 'pending');
    const overdue = invoices.filter(i => i.status === 'overdue');
    const sum = arr => arr.reduce((s,i) => s + i.amount, 0);

    document.getElementById('summary').innerHTML = [
      { label:'Paid',    val:'$'+sum(paid),    sub:paid.length+' invoices',    color:'var(--green)' },
      { label:'Pending', val:'$'+sum(pending),  sub:pending.length+' pending', color:'var(--accent)' },
      { label:'Overdue', val:'$'+sum(overdue),  sub:overdue.length+' overdue', color:'var(--red)' },
    ].map(c=>`<div class="sum-card"><div class="sum-label">${c.label}</div><div class="sum-val" style="color:${c.color}">${c.val}</div><div class="sum-sub">${c.sub}</div></div>`).join('');

    document.getElementById('tbody').innerHTML = invoices.map(inv => {
      const canPay = inv.status !== 'paid';
      return `<tr>
        <td class="name-cell">${esc(inv.client_name)}</td>
        <td>${esc(inv.service)}</td>
        <td class="amount-cell">$${inv.amount}</td>
        <td class="date-cell">${esc(inv.due_date)}</td>
        <td><span class="status-badge s-${inv.status}">${inv.status}</span></td>
        <td>${canPay
          ? `<button class="pay-btn" id="pb-${esc(inv.id)}" onclick="markPaid('${esc(inv.id)}')">✓ Mark Paid</button>`
          : `<button class="pay-btn" disabled>Paid</button>`
        }</td>
      </tr>`;
    }).join('');
  }

  async function markPaid(id) {
    const btn = document.getElementById('pb-' + id);
    if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }
    await fetch(`/api/invoices/${id}/mark-paid`, { method: 'POST' });
    const inv = invoices.find(i => i.id === id);
    if (inv) inv.status = 'paid';
    render();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
