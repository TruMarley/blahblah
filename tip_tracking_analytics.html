<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tip Tracking — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1rem; text-align: center; }
    .hero-label { font-size: .64rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.5rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .staff-list { display: flex; flex-direction: column; gap: .7rem; }
    .staff-row { background: var(--surface2); border-radius: 10px; padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; }
    .staff-name { font-size: .85rem; font-weight: 700; width: 90px; flex-shrink: 0; }
    .staff-bar-wrap { flex: 1; background: #1e1e1e; border-radius: 4px; height: 8px; overflow: hidden; }
    .staff-bar { height: 100%; border-radius: 4px; background: var(--yellow); }
    .staff-meta { font-size: .75rem; color: var(--muted); flex-shrink: 0; text-align: right; min-width: 100px; }
    .staff-meta span { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Tip Tracking</div>
  <p class="page-sub">Monitor tip totals by month and see which staff members are earning the most gratuity — a direct signal of client satisfaction and service quality.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">This Month Tips</div>
      <div class="hero-val" id="h-tips" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Tip %</div>
      <div class="hero-val" id="h-pct" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Tipped</div>
      <div class="hero-val" id="h-top" style="color:var(--accent);font-size:1.1rem">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Monthly Tip Volume</div>
    <svg id="chart" viewBox="0 0 680 160" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block"></svg>
  </div>
  <div class="card">
    <div class="card-title">Tips by Staff Member</div>
    <div class="staff-list" id="staff-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/tip-tracking').then(r => r.json());
    document.getElementById('h-tips').textContent = d.current_month_tips ? '$'+d.current_month_tips : '—';
    document.getElementById('h-pct').textContent = d.current_avg_tip_pct != null ? d.current_avg_tip_pct+'%' : '—';
    document.getElementById('h-top').textContent = d.top_tipped_staff || '—';

    const months = d.months || [], tips = d.total_tips || [];
    if (months.length) {
      const W=680,H=160,pL=44,pR=16,pT=20,pB=28,n=months.length;
      const cW=W-pL-pR, cH=H-pT-pB, mx=Math.max(...tips,1);
      const bW=Math.floor(cW/n)-6;
      let bars='',lbls='';
      tips.forEach((v,i)=>{
        const x=pL+i*(cW/n)+(cW/n-bW)/2, bH=(v/mx)*cH, y=pT+cH-bH;
        const alpha=0.3+0.6*(v/mx);
        bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bW}" height="${bH.toFixed(1)}" fill="rgba(251,191,36,${alpha.toFixed(2)})" rx="3"/>`;
        bars+=`<text x="${(x+bW/2).toFixed(1)}" y="${(y-5).toFixed(1)}" text-anchor="middle" fill="var(--yellow)" font-size="9" font-weight="700">$${v}</text>`;
        lbls+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-pB+14}" text-anchor="middle" fill="#555" font-size="9">${esc(months[i])}</text>`;
      });
      document.getElementById('chart').innerHTML = bars+lbls;
    }

    const staff = d.staff_breakdown || [];
    const maxTip = Math.max(...staff.map(s=>s.tips_received),1);
    const el = document.getElementById('staff-list');
    staff.forEach(s => {
      const pct = Math.round(s.tips_received/maxTip*100);
      el.innerHTML += `<div class="staff-row">
        <div class="staff-name">${esc(s.name)}</div>
        <div class="staff-bar-wrap"><div class="staff-bar" style="width:${pct}%"></div></div>
        <div class="staff-meta">$${s.tips_received} &nbsp; <span>${s.avg_tip_pct}%</span> avg</div>
      </div>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
