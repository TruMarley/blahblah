<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .add-btn { background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.3); color: var(--accent); font-size: .8rem; font-weight: 700; padding: .45rem 1rem; border-radius: 9px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .add-btn:hover { background: rgba(167,139,250,.18); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .staff-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; display: flex; align-items: center; gap: 1rem; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.25); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; color: var(--accent); flex-shrink: 0; position: relative; }
    .status-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--surface); }
    .dot-active { background: var(--green); }
    .dot-inactive { background: var(--muted); }
    .staff-info { flex: 1; }
    .staff-name { font-size: .92rem; font-weight: 800; }
    .staff-role { font-size: .72rem; color: var(--muted); margin-top: .1rem; }
    .staff-phone { font-size: .7rem; color: var(--muted); margin-top: .15rem; }
    /* Add form */
    .add-form { background: var(--surface); border: 1px solid rgba(167,139,250,.2); border-radius: 14px; padding: 1.5rem; display: none; }
    .add-form.open { display: block; }
    .form-title { font-size: .85rem; font-weight: 800; margin-bottom: 1rem; color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }
    .form-group { display: flex; flex-direction: column; gap: .3rem; }
    label { font-size: .72rem; color: var(--muted); font-weight: 700; }
    input, select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: .82rem; font-family: inherit; padding: .5rem .75rem; border-radius: 8px; outline: none; transition: border-color .15s; }
    input:focus, select:focus { border-color: rgba(167,139,250,.5); }
    .form-actions { display: flex; gap: .75rem; margin-top: 1rem; }
    .btn-save { background: var(--accent); border: none; color: #000; font-size: .8rem; font-weight: 900; padding: .5rem 1.25rem; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); font-size: .8rem; font-weight: 700; padding: .5rem 1rem; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .empty-state { text-align: center; color: var(--muted); padding: 3rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-header">
    <div class="page-title">Staff</div>
    <button class="add-btn" onclick="toggleForm()">+ Add Staff</button>
  </div>

  <div class="add-form" id="add-form">
    <div class="form-title">New Staff Member</div>
    <div class="form-row">
      <div class="form-group"><label>Full Name</label><input id="f-name" placeholder="Jordan Lee" /></div>
      <div class="form-group"><label>Role / Title</label><input id="f-role" placeholder="Master Barber" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input id="f-phone" placeholder="(555) 000-0000" /></div>
      <div class="form-group"><label>Status</label>
        <select id="f-status"><option value="active">Active</option><option value="inactive">Inactive</option></select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="addStaff()">Save</button>
      <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>
<script>
  let staff = [];

  async function load() {
    const r = await fetch('/api/staff');
    const d = await r.json();
    staff = d.staff || [];
    render();
  }

  function render() {
    document.getElementById('grid').innerHTML = staff.length ? staff.map(m => {
      const init = m.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      return `<div class="staff-card">
        <div class="avatar">${init}<span class="status-dot dot-${m.status}"></span></div>
        <div class="staff-info">
          <div class="staff-name">${esc(m.name)}</div>
          <div class="staff-role">${esc(m.role)}</div>
          <div class="staff-phone">${esc(m.phone)}</div>
        </div>
      </div>`;
    }).join('') : '<div class="empty-state">No staff members yet. Add one above.</div>';
  }

  function toggleForm() {
    const f = document.getElementById('add-form');
    f.classList.toggle('open');
  }

  async function addStaff() {
    const name = document.getElementById('f-name').value.trim();
    const role = document.getElementById('f-role').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const status = document.getElementById('f-status').value;
    if (!name) return;
    await fetch('/api/staff', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name,role,phone,status}) });
    document.getElementById('f-name').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('add-form').classList.remove('open');
    load();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
