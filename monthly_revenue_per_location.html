<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monthly Revenue per Location — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; text-align: center; }
    .hero-label { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .3rem; }
    .hero-val { font-size: 1.5rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
    .legend { display: flex; gap: 1.5rem; justify-content: center; margin-top: .75rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Monthly Revenue per Location</div>
  <p class="page-sub">Compare revenue across all locations — identify top performers and locations that need operational support.</p>
  <div class="hero-row" id="hero-row"></div>
  <div class="card">
    <div class="card-title">Revenue by Location — 6 Months</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 860 260" preserveAspectRatio="none"></svg>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>
<script>
  const COLORS = ['rgba(167,139,250,.8)', 'rgba(52,211,153,.75)', 'rgba(251,191,36,.75)'];
  async function load() {
    const r = await fetch('/api/analytics/monthly-revenue-per-location');
    const d = await r.json();
    const locs = d.locations || [];
    const months = d.months || [];

    document.getElementById('hero-row').innerHTML = locs.map((loc, i) =>
      `<div class="hero-card">
        <div class="hero-label">${esc(loc)}</div>
        <div class="hero-val" style="color:${COLORS[i].replace(/,.+\)/, ',1)')}">$${((d.avg_monthly[loc]||0)/1000).toFixed(1)}k</div>
      </div>`
    ).join('');

    document.getElementById('legend').innerHTML = locs.map((loc, i) =>
      `<div class="legend-item"><div class="legend-dot" style="background:${COLORS[i]}"></div>${esc(loc)}</div>`
    ).join('');

    const svg = document.getElementById('chart');
    const W=860, H=260, pL=52, pR=16, pT=14, pB=34;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n = months.length;
    const groupW = cW / n;
    const barW = Math.min(groupW / (locs.length + 1), 32);
    const maxV = 25000;
    const yOf = v => pT + cH - v / maxV * cH;

    [5000, 10000, 15000, 20000].forEach(v => {
      const y = yOf(v);
      svg.innerHTML += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML += `<text x="${pL-4}" y="${y+3}" font-size="8" fill="#555" text-anchor="end">$${(v/1000).toFixed(0)}k</text>`;
    });

    months.forEach((m, mi) => {
      const gx = pL + mi * groupW + groupW / 2;
      const totalW = locs.length * barW + (locs.length - 1) * 3;
      const startX = gx - totalW / 2;
      locs.forEach((loc, li) => {
        const val = m[loc] || 0;
        const bh = cH * val / maxV;
        const bx = startX + li * (barW + 3);
        const by = pT + cH - bh;
        svg.innerHTML += `<rect x="${bx}" y="${by}" width="${barW}" height="${bh}" rx="3" fill="${COLORS[li]}"/>`;
      });
      svg.innerHTML += `<text x="${gx}" y="${H-4}" font-size="9" fill="#555" text-anchor="middle">${m.month}</text>`;
    });
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
