<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visit Cadence — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bucket-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .bucket-label { font-size: .82rem; font-weight: 600; width: 115px; flex-shrink: 0; }
    .bucket-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bucket-fill { height: 100%; border-radius: 4px; }
    .bucket-pct { font-size: .75rem; font-weight: 700; width: 44px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Visit Cadence</div>
  <p class="page-sub">How frequently clients return. Understanding the modal cadence lets you time SMS re-engagement campaigns and pre-booking prompts for maximum conversion.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-modal" style="color:var(--accent)">—</div><div class="stat-lbl">Modal Cadence</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg-days" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Days Between Visits</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-active" style="color:var(--green)">—</div><div class="stat-lbl">Active Clients (30d)</div></div>
  </div>
  <div class="card">
    <div class="card-title">Client Distribution by Visit Frequency</div>
    <div id="bucket-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--green)','var(--accent)','var(--yellow)','#60a5fa','var(--red)','var(--muted)'];
  async function load() {
    const d = await fetch('/api/analytics/visit-cadence-stats').then(r => r.json());
    document.getElementById('h-modal').textContent = d.modal_cadence;
    document.getElementById('h-avg-days').textContent = d.avg_days_between_visits + 'd';
    document.getElementById('h-active').textContent = d.active_clients_30d;
    const bl = document.getElementById('bucket-list');
    const maxP = Math.max(...d.cadence_buckets.map(b => b.client_pct));
    d.cadence_buckets.forEach((b, i) => {
      const w = (b.client_pct / maxP * 100).toFixed(1);
      const col = COLORS[i % COLORS.length];
      bl.innerHTML += '<div class="bucket-row"><div class="bucket-label">' + b.label + '</div><div class="bucket-track"><div class="bucket-fill" style="width:' + w + '%;background:' + col + '"></div></div><div class="bucket-pct" style="color:' + col + '">' + b.client_pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
