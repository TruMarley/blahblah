<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Referral Tracking — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .src-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .src-label { font-size: .8rem; color: var(--text); width: 120px; flex-shrink: 0; }
    .src-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .src-fill { height: 100%; border-radius: 4px; }
    .src-meta { font-size: .72rem; color: var(--muted); width: 80px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Referral Tracking</div>
  <p class="page-sub">Understand where new clients come from. Use this data to double down on high-performing channels and cut spend on underperforming ones.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">New Clients (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--green)">—</div><div class="stat-lbl">Top Source</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-prog" style="color:var(--yellow)">—</div><div class="stat-lbl">Referral Program</div></div>
  </div>
  <div class="card">
    <div class="card-title">Source Breakdown</div>
    <div id="src-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','var(--green)','var(--yellow)','#60a5fa','var(--red)'];
  async function load() {
    const d = await fetch('/api/analytics/referral-tracking-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_new_clients_30d;
    document.getElementById('h-top').textContent = d.top_source;
    document.getElementById('h-prog').textContent = d.referral_program_active ? 'Active' : 'Off';
    const sl = document.getElementById('src-list');
    const maxP = Math.max(...d.sources.map(s => s.pct));
    d.sources.forEach((s, i) => {
      const w = (s.pct / maxP * 100).toFixed(1);
      sl.innerHTML += '<div class="src-row"><div class="src-label">' + s.source + '</div><div class="src-track"><div class="src-fill" style="width:' + w + '%;background:' + COLORS[i] + '"></div></div><div class="src-meta" style="color:' + COLORS[i] + '">' + s.pct.toFixed(1) + '% · ' + s.new_clients + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
