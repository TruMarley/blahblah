<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Booking Fill Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .staff-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .9rem 1rem; margin-bottom: .65rem; }
    .staff-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .55rem; }
    .staff-name { font-size: .9rem; font-weight: 800; }
    .fill-pct { font-size: 1.1rem; font-weight: 900; }
    .staff-meta { font-size: .7rem; color: var(--muted); margin-top: .08rem; }
    .bar-bg { width: 100%; height: 8px; background: var(--border); border-radius: 4px; }
    .bar-fill { height: 8px; border-radius: 4px; transition: width .5s; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Booking Fill Rate</div>
  <p class="page-sub">What percentage of each team member's available slots are filled — find capacity gaps at a glance.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Top Fill Rate</div>
      <div class="hero-val" id="h-top" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Fill Rate</div>
      <div class="hero-val" id="h-avg" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Fill Rate by Staff Member</div>
    <div id="staff-list"></div>
  </div>
</div>
<script>
  function fillColor(pct) {
    if (pct >= 85) return 'var(--green)';
    if (pct >= 60) return 'var(--accent)';
    if (pct >= 40) return 'var(--yellow)';
    return 'var(--red)';
  }
  async function load() {
    const r = await fetch('/api/analytics/staff-booking-fill-rate');
    const d = await r.json();
    const staff = d.staff || [];
    if (staff.length) {
      document.getElementById('h-top').textContent = staff[0].fill_rate_pct + '%';
      const avg = (staff.reduce((s,m)=>s+m.fill_rate_pct,0)/staff.length).toFixed(1);
      document.getElementById('h-avg').textContent = avg + '%';
    }
    const list = document.getElementById('staff-list');
    staff.forEach(s=>{
      const color = fillColor(s.fill_rate_pct);
      list.innerHTML += `
        <div class="staff-row">
          <div class="staff-top">
            <div>
              <div class="staff-name">${esc(s.name)}</div>
              <div class="staff-meta">${s.booked_slots} booked / ${s.available_slots} available</div>
            </div>
            <div class="fill-pct" style="color:${color}">${s.fill_rate_pct}%</div>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" style="width:${s.fill_rate_pct}%;background:${color}"></div>
          </div>
        </div>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
