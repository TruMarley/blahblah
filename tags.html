<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tags — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-top: .25rem; }
    /* New tag form */
    .new-form { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.4rem; display: flex; gap: .75rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
    .new-form input[type=text] { flex: 1; min-width: 140px; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: .85rem; padding: .55rem .9rem; border-radius: 8px; font-family: inherit; outline: none; }
    .new-form input[type=text]:focus { border-color: var(--accent); }
    .new-form input[type=color] { width: 38px; height: 36px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; padding: 2px; }
    .add-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: .52rem 1.1rem; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
    /* Tag grid */
    .tag-grid { display: flex; flex-wrap: wrap; gap: .75rem; }
    .tag-chip { display: flex; align-items: center; gap: .5rem; padding: .5rem .9rem; border-radius: 10px; border: 1px solid; cursor: pointer; transition: transform .1s; position: relative; }
    .tag-chip:hover { transform: scale(1.03); }
    .tag-name { font-size: .88rem; font-weight: 800; }
    .tag-count { font-size: .72rem; opacity: .75; }
    .tag-delete { opacity: 0; position: absolute; top: -6px; right: -6px; background: var(--red); color: #fff; border: none; width: 18px; height: 18px; border-radius: 50%; font-size: .7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity .15s; }
    .tag-chip:hover .tag-delete { opacity: 1; }
    /* Edit overlay */
    .edit-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
    .edit-overlay.open { display: flex; }
    .edit-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; width: 320px; }
    .edit-title { font-size: .9rem; font-weight: 800; margin-bottom: 1.25rem; }
    .edit-field { margin-bottom: 1rem; }
    .edit-label { font-size: .7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .edit-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: .85rem; padding: .6rem .9rem; border-radius: 8px; font-family: inherit; outline: none; }
    .edit-input:focus { border-color: var(--accent); }
    .edit-color-row { display: flex; align-items: center; gap: .75rem; }
    .edit-color-input { width: 42px; height: 36px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; padding: 2px; }
    .edit-footer { display: flex; justify-content: flex-end; gap: .6rem; margin-top: 1.25rem; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .45rem .9rem; font-size: .8rem; cursor: pointer; font-family: inherit; }
    .btn-save { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: .45rem 1rem; font-size: .8rem; font-weight: 700; cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="header-row">
    <div>
      <div class="page-title">Client Tags</div>
      <div class="page-sub">Label and organize clients. Click any tag to edit.</div>
    </div>
  </div>

  <div class="new-form">
    <input type="text" id="new-name" placeholder="Tag name…" maxlength="24">
    <input type="color" id="new-color" value="#a78bfa">
    <button class="add-btn" onclick="addTag()">+ Add Tag</button>
  </div>

  <div class="tag-grid" id="tag-grid"></div>
</div>

<!-- Edit overlay -->
<div class="edit-overlay" id="edit-overlay">
  <div class="edit-box">
    <div class="edit-title">Edit Tag</div>
    <div class="edit-field">
      <div class="edit-label">Name</div>
      <input class="edit-input" id="edit-name" maxlength="24">
    </div>
    <div class="edit-field">
      <div class="edit-label">Color</div>
      <div class="edit-color-row">
        <input type="color" class="edit-color-input" id="edit-color">
        <input class="edit-input" id="edit-color-hex" placeholder="#a78bfa" style="flex:1">
      </div>
    </div>
    <div class="edit-footer">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
  let tags = [], editingId = null;

  async function load() {
    const r = await fetch('/api/tags');
    const d = await r.json();
    tags = d.tags || [];
    render();
  }

  function render() {
    document.getElementById('tag-grid').innerHTML = tags.map(t => {
      const bg = hexToRgba(t.color, 0.15);
      const border = hexToRgba(t.color, 0.3);
      return `<div class="tag-chip" style="background:${bg};border-color:${border}" onclick="openEdit('${t.id}')">
        <button class="tag-delete" onclick="event.stopPropagation();deleteTag('${t.id}')">×</button>
        <span class="tag-name" style="color:${t.color}">${esc(t.name)}</span>
        <span class="tag-count" style="color:${t.color}">${t.appointment_count} appts</span>
      </div>`;
    }).join('');
  }

  async function addTag() {
    const name = document.getElementById('new-name').value.trim();
    if (!name) return;
    const color = document.getElementById('new-color').value;
    await fetch('/api/tags', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, color})});
    document.getElementById('new-name').value = '';
    load();
  }

  async function deleteTag(id) {
    if (!confirm('Delete this tag?')) return;
    await fetch('/api/tags/' + id, {method:'DELETE'});
    tags = tags.filter(t => t.id !== id);
    render();
  }

  function openEdit(id) {
    editingId = id;
    const t = tags.find(x => x.id === id);
    if (!t) return;
    document.getElementById('edit-name').value = t.name;
    document.getElementById('edit-color').value = t.color;
    document.getElementById('edit-color-hex').value = t.color;
    document.getElementById('edit-overlay').classList.add('open');
  }

  function closeEdit() { document.getElementById('edit-overlay').classList.remove('open'); editingId = null; }

  async function saveEdit() {
    if (!editingId) return;
    const name = document.getElementById('edit-name').value.trim();
    const color = document.getElementById('edit-color').value;
    await fetch('/api/tags/' + editingId, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, color})});
    const t = tags.find(x => x.id === editingId);
    if (t) { t.name = name; t.color = color; }
    closeEdit();
    render();
  }

  document.getElementById('edit-color').addEventListener('input', e => { document.getElementById('edit-color-hex').value = e.target.value; });
  document.getElementById('edit-color-hex').addEventListener('input', e => { if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) document.getElementById('edit-color').value = e.target.value; });

  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
