<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Walk-In vs Booked — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.1rem; }
    .legend { display: flex; gap: 1.5rem; margin-bottom: .75rem; font-size: .75rem; }
    .leg-item { display: flex; align-items: center; gap: .4rem; font-weight: 700; }
    .leg-box { width: 14px; height: 10px; border-radius: 3px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Walk-In vs Booked</div>
  <p class="page-sub">Daily breakdown of walk-in clients vs pre-booked appointments — last 14 days.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Walk-In %</div>
      <div class="hero-val" style="color:var(--yellow)" id="h-wi">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Pre-Booked %</div>
      <div class="hero-val" style="color:var(--accent)" id="h-bk">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Walk-Ins</div>
      <div class="hero-val" id="h-total-wi">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">14-Day Stacked Chart</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-box" style="background:#fbbf24;opacity:.8"></div><span style="color:#fbbf24">Walk-Ins</span></div>
      <div class="leg-item"><div class="leg-box" style="background:#a78bfa;opacity:.8"></div><span style="color:#a78bfa">Pre-Booked</span></div>
    </div>
    <svg id="chart" width="100%" style="display:block;overflow:visible"></svg>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/walk-in-vs-booked');
    const d = await r.json();
    document.getElementById('h-wi').textContent       = d.walk_in_pct + '%';
    document.getElementById('h-bk').textContent       = d.booked_pct + '%';
    document.getElementById('h-total-wi').textContent = d.total_walk_ins;

    const days = d.days || [];
    const W=720, H=180, PL=6, PR=6, PT=12, PB=32, cW=W-PL-PR, cH=H-PT-PB, n=days.length;
    const maxStack = Math.max(...days.map(d=>d.walk_ins+d.booked), 1);
    const barW = Math.floor(cW/n*0.6);
    const xOf  = i => PL + i*cW/n + (cW/n-barW)/2;

    let bars = '', labels = '';
    days.forEach((day, i) => {
      const bkH = (day.booked   / maxStack) * cH;
      const wiH = (day.walk_ins / maxStack) * cH;
      const bkY = PT + cH - bkH;
      const wiY = bkY - wiH;
      bars += `<rect x="${xOf(i)}" y="${bkY}" width="${barW}" height="${bkH}" fill="#a78bfa" opacity=".75" rx="2"/>`;
      bars += `<rect x="${xOf(i)}" y="${wiY}" width="${barW}" height="${wiH}" fill="#fbbf24" opacity=".75" rx="2 2 0 0"/>`;
      labels += `<text x="${xOf(i)+barW/2}" y="${H-8}" text-anchor="middle" font-size="8" fill="#444">${esc(day.date)}</text>`;
    });

    const svg = document.getElementById('chart');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('height', H);
    svg.innerHTML = bars + labels;
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
