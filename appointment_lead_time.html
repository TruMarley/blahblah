<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Appointment Lead Time — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; text-align: center; margin-bottom: 1.5rem; }
    .hero-val { font-size: 3rem; font-weight: 900; color: var(--accent); }
    .hero-sub { font-size: .82rem; color: var(--muted); margin-top: .35rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.1rem; }
    .hbar-row { display: flex; align-items: center; gap: .85rem; margin-bottom: .7rem; }
    .hbar-row:last-child { margin-bottom: 0; }
    .hbar-label { font-size: .78rem; font-weight: 700; width: 100px; flex-shrink: 0; }
    .hbar-track { flex: 1; background: var(--surface2); border-radius: 5px; height: 20px; overflow: hidden; }
    .hbar-fill { height: 100%; border-radius: 5px; background: var(--accent); opacity: .8; transition: width .5s ease; }
    .hbar-count { font-size: .75rem; font-weight: 800; color: var(--accent); width: 40px; text-align: right; flex-shrink: 0; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .55rem 1rem; border-bottom: 1px solid var(--border); text-align: left; }
    thead th:last-child { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .75rem 1rem; font-size: .82rem; }
    tbody td:last-child { text-align: right; font-weight: 800; color: var(--accent); }
    .fast-chip { display: inline-block; font-size: .65rem; font-weight: 700; padding: .1rem .4rem; border-radius: 5px; background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); margin-left: .4rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Appointment Lead Time</div>
  <p class="page-sub">How far in advance clients book — from same-day walk-ins to planned appointments.</p>
  <div class="hero">
    <div class="hero-val" id="h-avg">—</div>
    <div class="hero-sub">average days booked in advance</div>
  </div>
  <div class="card">
    <div class="card-title">Booking Distribution</div>
    <div id="dist-bars"></div>
  </div>
  <div class="card">
    <div class="card-title">By Service — Fastest to Slowest</div>
    <table>
      <thead><tr><th>Service</th><th>Avg Lead Time</th></tr></thead>
      <tbody id="svc-tbody"></tbody>
    </table>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/appointment-lead-time');
    const d = await r.json();

    document.getElementById('h-avg').textContent = d.avg_days + ' days';

    const dist = d.distribution || [];
    const maxCnt = Math.max(...dist.map(b => b.count), 1);
    document.getElementById('dist-bars').innerHTML = dist.map(b => `
      <div class="hbar-row">
        <div class="hbar-label">${esc(b.bucket)}</div>
        <div class="hbar-track"><div class="hbar-fill" style="width:${(b.count/maxCnt*100).toFixed(1)}%"></div></div>
        <div class="hbar-count">${b.count}</div>
      </div>`).join('');

    document.getElementById('svc-tbody').innerHTML = (d.by_service||[]).map((s,i) => `
      <tr>
        <td>${esc(s.service)}${i===0?'<span class="fast-chip">fastest</span>':''}</td>
        <td>${s.avg_days < 1 ? '<1 day' : s.avg_days + ' days'}</td>
      </tr>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
