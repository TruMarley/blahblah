<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First-Time Conversion Analytics — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">First-Time Conversion Analytics</div>
  <p class="page-sub">What percentage of first-time callers book an appointment? This is your AI's most important KPI — track it monthly.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Avg Conversion Rate</div>
      <div class="hero-val" id="h-avg" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total First-Time Callers</div>
      <div class="hero-val" id="h-callers" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Total Converted</div>
      <div class="hero-val" id="h-converted" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Monthly First-Time Conversion Rate (%)</div>
    <svg id="chart" viewBox="0 0 680 240" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block"></svg>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/first-time-conversion').then(r => r.json());
    const months = d.months || [];
    const pcts = d.conversion_pct || [];

    document.getElementById('h-avg').textContent = d.avg_conversion_pct ? d.avg_conversion_pct + '%' : '—';
    document.getElementById('h-callers').textContent = d.total_first_time_callers || '—';
    document.getElementById('h-converted').textContent = d.total_converted || '—';

    if (!months.length) return;
    const W=680, H=240, padL=44, padR=16, padT=16, padB=36;
    const chartW=W-padL-padR, chartH=H-padT-padB;
    const n=months.length, step=n>1?chartW/(n-1):chartW;
    const maxVal=Math.max(...pcts,1), minVal=Math.max(Math.min(...pcts)-5,0), range=maxVal-minVal||1;

    const pts=pcts.map((v,i)=>({x:padL+i*step, y:padT+chartH-(v-minVal)/range*chartH}));
    const linePath='M'+pts[0].x+','+pts[0].y+' '+pts.slice(1).map(p=>`L${p.x},${p.y}`).join(' ');
    const areaPath=linePath+` L${pts[n-1].x},${padT+chartH} L${pts[0].x},${padT+chartH} Z`;

    let dots='', labels='';
    pts.forEach((p,i)=>{
      dots+=`<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="var(--green)" stroke="var(--bg)" stroke-width="2"/>`;
      dots+=`<text x="${p.x}" y="${p.y-9}" text-anchor="middle" fill="var(--green)" font-size="9" font-weight="700">${pcts[i]}%</text>`;
      labels+=`<text x="${p.x}" y="${H-padB+14}" text-anchor="middle" fill="#555" font-size="9">${esc(months[i])}</text>`;
    });

    let yAxis='';
    for(let t=0;t<=4;t++){
      const yv=(minVal+range*t/4).toFixed(1)+'%';
      const yp=padT+chartH-(t/4)*chartH;
      yAxis+=`<line x1="${padL}" x2="${W-padR}" y1="${yp}" y2="${yp}" stroke="#1e1e1e" stroke-width="1"/>`;
      yAxis+=`<text x="${padL-5}" y="${yp+4}" text-anchor="end" fill="#444" font-size="8">${yv}</text>`;
    }

    document.getElementById('chart').innerHTML=yAxis+
      `<path d="${areaPath}" fill="rgba(52,211,153,.08)"/>`+
      `<path d="${linePath}" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linejoin="round"/>`+
      dots+labels;
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
