<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First-Call Resolution — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .intent-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .7rem; }
    .intent-label { font-size: .76rem; width: 145px; flex-shrink: 0; }
    .intent-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .intent-fill { height: 100%; border-radius: 4px; }
    .intent-right { font-size: .72rem; font-weight: 700; width: 55px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">First-Call Resolution</div>
  <p class="page-sub">FCR measures how often the AI resolves a caller's intent without escalation or callback. Low FCR on specific intents flags where the AI script needs improvement.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-fcr" style="color:var(--green)">—</div><div class="stat-lbl">Overall FCR</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Calls (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-escalation" style="color:var(--red)">—</div><div class="stat-lbl">Escalation Rate</div></div>
  </div>
  <div class="card">
    <div class="card-title">FCR by Intent</div>
    <div id="intent-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/first-call-resolution-stats').then(r => r.json());
    document.getElementById('h-fcr').textContent = d.overall_fcr_pct.toFixed(1) + '%';
    document.getElementById('h-total').textContent = d.total_calls_30d;
    document.getElementById('h-escalation').textContent = d.escalation_rate_pct.toFixed(1) + '%';
    const il = document.getElementById('intent-list');
    d.intents.forEach(intent => {
      const color = intent.fcr_pct >= 80 ? 'var(--green)' : intent.fcr_pct >= 60 ? 'var(--yellow)' : 'var(--red)';
      il.innerHTML += '<div class="intent-row"><div class="intent-label">' + intent.intent + '</div><div class="intent-track"><div class="intent-fill" style="width:' + intent.fcr_pct + '%;background:' + color + '"></div></div><div class="intent-right" style="color:' + color + '">' + intent.fcr_pct.toFixed(0) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
