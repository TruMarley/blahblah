<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMS Delivery Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1rem; }
    .leg-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .leg-dot { width: 9px; height: 9px; border-radius: 2px; }
    .chart-wrap { height: 230px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">SMS Delivery Rate</div>
  <p class="page-sub">Track how many appointment SMS messages are successfully delivered each week.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">8-Week Avg Delivery</div>
      <div class="hero-val" id="h-avg" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Latest Week</div>
      <div class="hero-val" id="h-cur" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">8-Week SMS Delivery Trend</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div>Sent</div>
      <div class="leg-item"><div class="leg-dot" style="background:#34d399"></div>Delivered</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f87171"></div>Failed</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 740 230" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/sms-delivery-rate');
    const d = await r.json();
    document.getElementById('h-avg').textContent = d.avg_delivery_rate + '%';
    const weeks = d.weeks || [];
    const last = weeks[weeks.length-1];
    document.getElementById('h-cur').textContent = last ? last.delivery_rate + '%' : '—';

    const svg = document.getElementById('chart');
    const W=740, H=230, pL=40, pR=16, pT=14, pB=34;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n = weeks.length;
    const slotW = cW/n;
    const bW = slotW * 0.22;
    const maxV = Math.max(...weeks.map(w=>w.sms_sent), 1);

    [0,.25,.5,.75,1].forEach(f => {
      const y = pT + cH*(1-f);
      svg.innerHTML += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML += `<text x="${pL-4}" y="${y+3}" font-size="8.5" fill="#555" text-anchor="end">${Math.round(maxV*f)}</text>`;
    });

    weeks.forEach((w,i) => {
      const cx = pL + i*slotW + slotW/2;
      const sentH = (w.sms_sent/maxV)*cH;
      const delivH = (w.delivered/maxV)*cH;
      const failH = (w.failed/maxV)*cH;
      svg.innerHTML += `<rect x="${cx-bW*1.6}" y="${pT+cH-sentH}" width="${bW}" height="${sentH}" rx="2" fill="#a78bfa" opacity=".5"/>`;
      svg.innerHTML += `<rect x="${cx-bW*0.4}" y="${pT+cH-delivH}" width="${bW}" height="${delivH}" rx="2" fill="#34d399" opacity=".7"/>`;
      svg.innerHTML += `<rect x="${cx+bW*0.8}" y="${pT+cH-failH}" width="${bW}" height="${failH}" rx="2" fill="#f87171" opacity=".7"/>`;
      svg.innerHTML += `<text x="${cx}" y="${H-14}" font-size="7.5" fill="#34d399" text-anchor="middle">${w.delivery_rate}%</text>`;
      svg.innerHTML += `<text x="${cx}" y="${H-4}" font-size="8.5" fill="#555" text-anchor="middle">${w.week}</text>`;
    });
  }
  load();
</script>
</body>
</html>
