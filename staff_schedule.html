<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Schedule — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-top: .2rem; }
    .staff-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: .85rem; font-family: inherit; padding: .55rem 1rem; border-radius: 8px; outline: none; cursor: pointer; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: .5rem; }
    .day-col { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-height: 200px; }
    .day-col.today { border-color: rgba(167,139,250,.4); }
    .day-header { padding: .55rem .6rem; border-bottom: 1px solid var(--border); font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
    .day-col.today .day-header { color: var(--accent); }
    .day-date { font-size: .72rem; color: var(--muted); font-weight: 400; letter-spacing: 0; text-transform: none; margin-top: .1rem; }
    .day-body { padding: .4rem; }
    .off-label { font-size: .72rem; color: var(--muted); text-align: center; padding: 1.5rem .5rem; }
    .appt-block { background: var(--surface2); border-radius: 6px; padding: .35rem .5rem; margin-bottom: .35rem; border-left: 3px solid var(--accent); }
    .appt-block.status-completed { border-left-color: var(--green); opacity: .75; }
    .appt-block.status-pending { border-left-color: var(--yellow); }
    .appt-block.status-arrived { border-left-color: var(--accent); }
    .appt-time { font-size: .62rem; font-weight: 700; color: var(--muted); }
    .appt-client { font-size: .72rem; font-weight: 800; }
    .appt-service { font-size: .65rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="header-row">
    <div>
      <div class="page-title" id="page-title">Staff Schedule</div>
      <div class="page-sub">This week's appointments by staff member.</div>
    </div>
    <select class="staff-select" id="staff-select" onchange="loadStaff(this.value)">
      <option value="1">Marcus J.</option>
      <option value="2">Destiny R.</option>
      <option value="3">Carlos M.</option>
      <option value="4">Aisha T.</option>
    </select>
  </div>
  <div class="week-grid" id="week-grid"></div>
</div>
<script>
  const todayStr = new Date().toDateString();

  async function loadStaff(id) {
    const r = await fetch(`/api/staff/${id}/schedule`);
    const d = await r.json();
    document.getElementById('page-title').textContent = d.staff_name + "'s Schedule";
    const grid = document.getElementById('week-grid');
    grid.innerHTML = (d.days || []).map(day => {
      const dt = new Date(day.date + 'T00:00:00');
      const isToday = dt.toDateString() === todayStr;
      const dateLabel = dt.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      let body = '';
      if (day.is_off) {
        body = `<div class="off-label">Off</div>`;
      } else if (!day.appointments.length) {
        body = `<div class="off-label" style="padding:.75rem .5rem">Free</div>`;
      } else {
        body = day.appointments.map(a => `<div class="appt-block status-${a.status}">
          <div class="appt-time">${a.time}</div>
          <div class="appt-client">${esc(a.client)}</div>
          <div class="appt-service">${esc(a.service)}</div>
        </div>`).join('');
      }
      return `<div class="day-col${isToday?' today':''}">
        <div class="day-header">${day.day_name}<div class="day-date">${dateLabel}</div></div>
        <div class="day-body">${body}</div>
      </div>`;
    }).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  loadStaff('1');
</script>
</body>
</html>
