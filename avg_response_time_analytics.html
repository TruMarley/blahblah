<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Response Time — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bucket-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .bucket-label { font-size: .78rem; width: 90px; flex-shrink: 0; }
    .bucket-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .bucket-fill { height: 100%; border-radius: 4px; }
    .bucket-pct { font-size: .75rem; font-weight: 700; width: 40px; text-align: right; }
    .trend-row { display: flex; align-items: flex-end; gap: .35rem; height: 64px; }
    .trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .2rem; }
    .trend-bar { width: 100%; border-radius: 3px 3px 0 0; }
    .trend-lbl { font-size: .58rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">AI Response Time</div>
  <p class="page-sub">Track how quickly the AI responds on calls. Responses under 800ms feel instantaneous to callers — monitor for any latency regressions.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--accent)">—</div><div class="stat-lbl">Avg Response</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-p50" style="color:var(--green)">—</div><div class="stat-lbl">p50</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-p95" style="color:var(--yellow)">—</div><div class="stat-lbl">p95</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-fast" style="color:var(--green)">—</div><div class="stat-lbl">Under 800ms</div></div>
  </div>
  <div class="card">
    <div class="card-title">Response Time Distribution</div>
    <div id="bucket-list"></div>
  </div>
  <div class="card">
    <div class="card-title">8-Week Avg Trend</div>
    <div class="trend-row" id="trend-row"></div>
    <div class="trend-row" id="trend-lbls" style="height:auto;margin-top:.2rem"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--green)','#60a5fa','var(--accent)','var(--yellow)','var(--red)'];
  async function load() {
    const d = await fetch('/api/analytics/avg-response-time-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.avg_response_ms + 'ms';
    document.getElementById('h-p50').textContent = d.p50_ms + 'ms';
    document.getElementById('h-p95').textContent = d.p95_ms + 'ms';
    document.getElementById('h-fast').textContent = d.pct_under_800ms.toFixed(1) + '%';
    const bl = document.getElementById('bucket-list');
    const maxP = Math.max(...d.buckets.map(b => b.pct));
    d.buckets.forEach((b, i) => {
      const w = (b.pct / maxP * 100).toFixed(1);
      bl.innerHTML += '<div class="bucket-row"><div class="bucket-label">' + b.label + '</div><div class="bucket-track"><div class="bucket-fill" style="width:' + w + '%;background:' + COLORS[i] + '"></div></div><div class="bucket-pct" style="color:' + COLORS[i] + '">' + b.pct.toFixed(1) + '%</div></div>';
    });
    const maxMs = Math.max(...d.weekly.map(w => w.avg_ms));
    const tr = document.getElementById('trend-row');
    const tl = document.getElementById('trend-lbls');
    d.weekly.forEach(w => {
      const h = Math.max(4, (w.avg_ms / maxMs * 58)).toFixed(0);
      const col = w.avg_ms < 600 ? 'var(--green)' : w.avg_ms < 900 ? 'var(--yellow)' : 'var(--red)';
      tr.innerHTML += '<div class="trend-col"><div class="trend-bar" style="height:' + h + 'px;background:' + col + ';opacity:.8"></div></div>';
      tl.innerHTML += '<div class="trend-col"><div class="trend-lbl">' + w.week + '</div><div class="trend-lbl" style="color:var(--text)">' + w.avg_ms + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
