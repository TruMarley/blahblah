<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lead Time by Channel — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .channel-row { display: flex; align-items: center; gap: .9rem; margin-bottom: 1.1rem; padding-bottom: 1.1rem; border-bottom: 1px solid var(--border); }
    .channel-row:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .ch-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .ch-name { font-size: .86rem; font-weight: 800; width: 120px; flex-shrink: 0; }
    .bar-wrap { flex: 1; }
    .bar-track { background: var(--surface2); border-radius: 5px; height: 10px; overflow: hidden; margin-bottom: .25rem; }
    .bar-fill { height: 100%; border-radius: 5px; opacity: .8; }
    .bar-sub { display: flex; justify-content: space-between; font-size: .7rem; color: var(--muted); }
    .days-val { font-size: .88rem; font-weight: 900; width: 55px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Lead Time by Channel</div>
  <p class="page-sub">How far ahead clients book depending on how they booked — walk-ins vs. planned appointments.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Overall Avg</div>
      <div class="hero-val" id="h-avg" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Most Advance</div>
      <div class="hero-val" id="h-top" style="font-size:1rem;padding-top:.4rem;color:var(--yellow)">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Avg Days Booked in Advance — by Channel</div>
    <div id="channel-list"></div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/appointment-lead-time-by-channel');
    const d = await r.json();
    document.getElementById('h-avg').textContent = d.overall_avg_days + ' days';
    const channels = d.channels || [];
    document.getElementById('h-top').textContent = channels.length ? channels[0].channel : '—';

    const maxDays = Math.max(...channels.map(c => c.avg_days), 1);
    document.getElementById('channel-list').innerHTML = channels.map(c => `
      <div class="channel-row">
        <div class="ch-dot" style="background:${c.color}"></div>
        <div class="ch-name">${esc(c.channel)}</div>
        <div class="bar-wrap">
          <div class="bar-track"><div class="bar-fill" style="width:${(c.avg_days/maxDays*100).toFixed(1)}%;background:${c.color}"></div></div>
          <div class="bar-sub"><span>${c.count} bookings</span><span>avg ${c.avg_days} days ahead</span></div>
        </div>
        <div class="days-val" style="color:${c.color}">${c.avg_days}d</div>
      </div>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
