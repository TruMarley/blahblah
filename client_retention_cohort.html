<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Retention Cohort — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; text-align: center; margin-bottom: 1.25rem; }
    .hero-val { font-size: 3rem; font-weight: 900; color: var(--accent); }
    .hero-sub { font-size: .82rem; color: var(--muted); margin-top: .35rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.1rem; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .55rem 1rem; border-bottom: 1px solid var(--border); text-align: center; }
    thead th:first-child { text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .65rem 1rem; font-size: .82rem; text-align: center; }
    tbody td:first-child { text-align: left; }
    .cohort-label { font-weight: 800; font-size: .82rem; }
    .cohort-size { font-size: .7rem; color: var(--muted); }
    .ret-cell { border-radius: 7px; padding: .3rem .5rem; font-weight: 800; font-size: .82rem; display: inline-block; min-width: 48px; }
    .legend-row { display: flex; align-items: center; gap: 1.5rem; margin-top: 1rem; font-size: .72rem; color: var(--muted); }
    .leg-item { display: flex; align-items: center; gap: .4rem; }
    .leg-swatch { width: 14px; height: 14px; border-radius: 4px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Retention Cohort</div>
  <p class="page-sub">How well each monthly cohort of new clients returns over subsequent months.</p>
  <div class="hero">
    <div class="hero-val" id="h-avg">—</div>
    <div class="hero-sub">average retention after Month 1</div>
  </div>
  <div class="card">
    <div class="card-title">Cohort Retention Table</div>
    <table>
      <thead>
        <tr>
          <th>Cohort</th>
          <th>Size</th>
          <th id="m0-head">Month 0</th>
          <th id="m1-head">Month 1</th>
          <th id="m2-head">Month 2</th>
          <th id="m3-head">Month 3</th>
        </tr>
      </thead>
      <tbody id="cohort-tbody"></tbody>
    </table>
    <div class="legend-row">
      <div class="leg-item"><div class="leg-swatch" style="background:rgba(52,211,153,.5)"></div>80%+</div>
      <div class="leg-item"><div class="leg-swatch" style="background:rgba(167,139,250,.4)"></div>60–79%</div>
      <div class="leg-item"><div class="leg-swatch" style="background:rgba(251,191,36,.35)"></div>40–59%</div>
      <div class="leg-item"><div class="leg-swatch" style="background:rgba(248,113,113,.35)"></div>&lt;40%</div>
    </div>
  </div>
</div>
<script>
  function retColor(pct) {
    if (pct >= 80) return 'rgba(52,211,153,.5)';
    if (pct >= 60) return 'rgba(167,139,250,.4)';
    if (pct >= 40) return 'rgba(251,191,36,.35)';
    return 'rgba(248,113,113,.35)';
  }
  function retText(pct) {
    if (pct >= 80) return '#34d399';
    if (pct >= 60) return '#a78bfa';
    if (pct >= 40) return '#fbbf24';
    return '#f87171';
  }

  async function load() {
    const r = await fetch('/api/analytics/client-retention-cohort');
    const d = await r.json();
    document.getElementById('h-avg').textContent = d.avg_retention + '%';
    const labels = d.months_label || ['Month 0','Month 1','Month 2','Month 3'];
    labels.forEach((l, i) => {
      const el = document.getElementById(`m${i}-head`);
      if (el) el.textContent = l;
    });
    document.getElementById('cohort-tbody').innerHTML = (d.cohorts || []).map(c => {
      const cells = c.retention.map((v, i) => {
        if (i === 0) return `<td><span class="ret-cell" style="background:rgba(52,211,153,.15);color:#34d399">100%</span></td>`;
        return `<td><span class="ret-cell" style="background:${retColor(v)};color:${retText(v)}">${v}%</span></td>`;
      }).join('');
      return `<tr>
        <td><div class="cohort-label">${esc(c.cohort)}</div></td>
        <td><span class="cohort-size">${c.size} clients</span></td>
        ${cells}
      </tr>`;
    }).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
