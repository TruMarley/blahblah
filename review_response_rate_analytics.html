<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Response Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1rem; text-align: center; }
    .hero-label { font-size: .64rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.5rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .platform-list { display: flex; flex-direction: column; gap: .75rem; }
    .platform-row { background: var(--surface2); border-radius: 10px; padding: .8rem 1rem; }
    .plat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
    .plat-name { font-size: .85rem; font-weight: 700; }
    .plat-rate { font-size: .85rem; font-weight: 900; color: var(--green); }
    .plat-meta { font-size: .7rem; color: var(--muted); margin-bottom: .45rem; }
    .bar-wrap { background: #1e1e1e; border-radius: 4px; height: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Review Response Rate</div>
  <p class="page-sub">See how well you're responding to client reviews across Google, Yelp, Facebook, and Booksy. Faster responses drive higher star ratings and trust.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Reviews</div>
      <div class="hero-val" id="h-total" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Responded</div>
      <div class="hero-val" id="h-responded" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Response Rate</div>
      <div class="hero-val" id="h-rate" style="color:var(--yellow)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Response Time</div>
      <div class="hero-val" id="h-time" style="color:var(--text);font-size:1.1rem">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">By Platform</div>
    <div class="platform-list" id="platforms"></div>
  </div>
</div>
<script>
  const COLORS = { Google: '#4ade80', Yelp: '#f87171', Facebook: '#60a5fa', Booksy: '#a78bfa' };
  async function load() {
    const d = await fetch('/api/analytics/review-response-rate').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_reviews || '—';
    document.getElementById('h-responded').textContent = d.total_responded || '—';
    document.getElementById('h-rate').textContent = d.overall_rate_pct != null ? d.overall_rate_pct+'%' : '—';
    document.getElementById('h-time').textContent = d.avg_response_time_hours ? d.avg_response_time_hours+'h avg' : '—';
    const el = document.getElementById('platforms');
    (d.breakdown || []).forEach(b => {
      const color = COLORS[b.platform] || 'var(--accent)';
      el.innerHTML += `<div class="platform-row">
        <div class="plat-top"><div class="plat-name">${esc(b.platform)}</div><div class="plat-rate" style="color:${color}">${b.rate_pct}%</div></div>
        <div class="plat-meta">${b.responded} of ${b.reviews} reviews responded</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${b.rate_pct}%;background:${color}"></div></div>
      </div>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
