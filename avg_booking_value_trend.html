<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avg Booking Value Trend — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .legend { display: flex; gap: 1.25rem; margin-bottom: 1.25rem; }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .75rem; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .chart-wrap { height: 260px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Avg Booking Value Trend</div>
  <p class="page-sub">Average revenue per booking over time — a rising trend means upsells and premium services are gaining traction.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Latest Avg Value</div>
      <div class="hero-val" id="h-latest" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">8-Week High</div>
      <div class="hero-val" id="h-high" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">8-Week Change</div>
      <div class="hero-val" id="h-change" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Avg Booking Value by Week</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(167,139,250,.45)"></div>Bookings</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent);border-radius:50%"></div>Avg Value</div>
    </div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 260" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/avg-booking-value-trend');
    const d = await r.json();
    const weeks = d.weeks || [];
    const last = weeks[weeks.length-1] || {};
    const first = weeks[0] || {};
    const high = weeks.reduce((a,b)=>b.avg_booking_value_cents>a.avg_booking_value_cents?b:a, weeks[0]||{});
    const fmt = c => '$' + (c/100).toFixed(2);
    document.getElementById('h-latest').textContent = fmt(last.avg_booking_value_cents||0);
    document.getElementById('h-high').textContent = fmt(high.avg_booking_value_cents||0);
    const diff = (last.avg_booking_value_cents||0) - (first.avg_booking_value_cents||0);
    document.getElementById('h-change').textContent = (diff>=0?'+':'') + fmt(diff);
    document.getElementById('h-change').style.color = diff >= 0 ? 'var(--green)' : 'var(--red,#f87171)';

    const svg = document.getElementById('chart');
    const W=700,H=260,pL=54,pR=50,pT=14,pB=28;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n=weeks.length;
    const barW=cW/n*0.45;
    const xStep=cW/n;
    const maxC=Math.max(...weeks.map(w=>w.total_bookings))*1.25;
    const minV=Math.min(...weeks.map(w=>w.avg_booking_value_cents))*0.92;
    const maxV=Math.max(...weeks.map(w=>w.avg_booking_value_cents))*1.08;
    const xOf=i=>pL+i*xStep+xStep/2;
    const yOfC=v=>pT+cH-v/maxC*cH;
    const yOfV=v=>pT+cH-(v-minV)/(maxV-minV)*cH;

    // gridlines left
    [10,20,30,40,50].filter(v=>v<maxC).forEach(v=>{
      const y=yOfC(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8" fill="#555" text-anchor="end">${v}</text>`;
    });
    // right axis value
    const vStep=Math.ceil((maxV-minV)/3/500)*500;
    for(let v=Math.ceil(minV/500)*500;v<=maxV;v+=vStep){
      const y=yOfV(v);
      svg.innerHTML+=`<text x="${W-pR+4}" y="${y+3.5}" font-size="8" fill="#666">$${(v/100).toFixed(0)}</text>`;
    }

    weeks.forEach((w,i)=>{
      const cx=xOf(i);
      const bh=cH*w.total_bookings/maxC;
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${pT+cH-bh}" width="${barW}" height="${bh}" rx="3" fill="rgba(167,139,250,.42)"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-4}" font-size="8.5" fill="#555" text-anchor="middle">${esc(w.week)}</text>`;
    });

    // value area + line
    const pts=weeks.map((w,i)=>`${xOf(i)},${yOfV(w.avg_booking_value_cents)}`).join(' ');
    const first0=xOf(0), last0=xOf(weeks.length-1);
    const firstY=yOfV(weeks[0].avg_booking_value_cents), lastY=yOfV(weeks[weeks.length-1].avg_booking_value_cents);
    svg.innerHTML+=`<polygon points="${first0},${pT+cH} ${pts} ${last0},${pT+cH}" fill="rgba(167,139,250,.1)"/>`;
    svg.innerHTML+=`<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5"/>`;
    weeks.forEach((w,i)=>{
      svg.innerHTML+=`<circle cx="${xOf(i)}" cy="${yOfV(w.avg_booking_value_cents)}" r="3.5" fill="var(--accent)"/>`;
      svg.innerHTML+=`<text x="${xOf(i)}" y="${yOfV(w.avg_booking_value_cents)-7}" font-size="8" fill="#a78bfa" text-anchor="middle">$${(w.avg_booking_value_cents/100).toFixed(0)}</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
