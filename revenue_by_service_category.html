<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue by Service Category — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 280px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue by Service Category</div>
  <p class="page-sub">See which service categories drive the most revenue — optimize scheduling and pricing accordingly.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Revenue</div>
      <div class="hero-val" id="h-total" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Top Category</div>
      <div class="hero-val" id="h-top" style="color:var(--accent)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Revenue by Service Category</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 280" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  const COLORS = ['rgba(167,139,250,.85)','rgba(52,211,153,.8)','rgba(251,191,36,.78)','rgba(248,113,113,.75)','rgba(96,165,250,.8)','rgba(251,146,60,.8)'];
  async function load() {
    const r = await fetch('/api/analytics/revenue-by-service-category');
    const d = await r.json();
    const cats = d.categories || [];
    document.getElementById('h-total').textContent = '$' + (d.total_revenue/1000).toFixed(1) + 'k';
    const top = cats.reduce((a,b) => a.revenue > b.revenue ? a : b, cats[0] || {});
    document.getElementById('h-top').textContent = top.category || '—';

    const svg = document.getElementById('chart');
    const W=700, H=280, pL=44, pR=16, pT=14, pB=50;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n = cats.length;
    const barW = cW/n*0.62;
    const xStep = cW/n;
    const maxV = Math.max(...cats.map(c=>c.revenue))*1.15;
    const yOf = v => pT+cH - v/maxV*cH;

    [5000,10000,15000].filter(v=>v<maxV).forEach(v=>{
      const y=yOf(v);
      svg.innerHTML+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML+=`<text x="${pL-4}" y="${y+3.5}" font-size="8.5" fill="#555" text-anchor="end">$${(v/1000).toFixed(0)}k</text>`;
    });

    cats.forEach((cat, i) => {
      const cx = pL + i*xStep + xStep/2;
      const bh = cH*cat.revenue/maxV;
      const by = pT+cH-bh;
      svg.innerHTML+=`<rect x="${cx-barW/2}" y="${by}" width="${barW}" height="${bh}" rx="5" fill="${COLORS[i%COLORS.length]}"/>`;
      svg.innerHTML+=`<text x="${cx}" y="${by-6}" font-size="8.5" fill="#aaa" text-anchor="middle">$${(cat.revenue/1000).toFixed(1)}k</text>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-pB+14}" font-size="9" fill="#888" text-anchor="middle" font-weight="700">${esc(cat.category)}</text>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-pB+26}" font-size="8" fill="#555" text-anchor="middle">${cat.booking_count} bookings</text>`;
      svg.innerHTML+=`<text x="${cx}" y="${H-pB+37}" font-size="8" fill="#555" text-anchor="middle">${cat.pct}%</text>`;
    });
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
