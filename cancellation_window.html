<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cancellation Window — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.9rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.5rem; }
    .bar-row { display: flex; align-items: center; gap: .85rem; margin-bottom: 1.1rem; }
    .bar-row:last-child { margin-bottom: 0; }
    .bucket-label { font-size: .8rem; font-weight: 700; width: 130px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 5px; height: 12px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; }
    .bar-stat { font-size: .78rem; font-weight: 900; width: 80px; text-align: right; flex-shrink: 0; color: var(--muted); }
    .pct-label { font-size: .72rem; color: var(--muted); width: 38px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Cancellation Window</div>
  <p class="page-sub">When clients cancel relative to their appointment — identifies last-minute patterns.</p>

  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Total Cancellations</div>
      <div class="hero-val" id="h-total">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Same-Day %</div>
      <div class="hero-val" style="color:var(--red)" id="h-sameday">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">24h+ Notice</div>
      <div class="hero-val" style="color:var(--green)" id="h-notice">—</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Cancellations by Window</div>
    <div id="bar-list"></div>
  </div>
</div>
<script>
  const BUCKET_COLORS = ['#f87171','#fbbf24','#fb923c','#a78bfa','#34d399'];

  async function load() {
    const r = await fetch('/api/analytics/cancellation-window');
    const d = await r.json();
    document.getElementById('h-total').textContent = d.total || '—';
    document.getElementById('h-sameday').textContent = (d.same_day_pct || 0) + '%';

    const noticePct = d.buckets
      ? d.buckets.filter(b => b.window !== 'same_day').reduce((s, b) => s + (b.pct || 0), 0).toFixed(0) + '%'
      : '—';
    document.getElementById('h-notice').textContent = noticePct;

    const buckets = d.buckets || [];
    const maxCount = Math.max(...buckets.map(b => b.count), 1);
    document.getElementById('bar-list').innerHTML = buckets.map((b, i) => `
      <div class="bar-row">
        <div class="bucket-label">${esc(b.label)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(b.count / maxCount * 100).toFixed(1)}%;background:${BUCKET_COLORS[i % BUCKET_COLORS.length]};opacity:.75"></div>
        </div>
        <div class="bar-stat">${b.count} cancellations</div>
        <div class="pct-label">${b.pct}%</div>
      </div>`).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
