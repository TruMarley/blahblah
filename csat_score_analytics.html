<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSAT Score — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .star-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .65rem; }
    .star-lbl { font-size: .78rem; color: var(--text); width: 55px; flex-shrink: 0; }
    .star-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .star-fill { height: 100%; border-radius: 4px; }
    .star-pct { font-size: .75rem; font-weight: 700; width: 42px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">CSAT Score</div>
  <p class="page-sub">Client satisfaction scores collected via post-visit surveys sent automatically by the AI. Track your average rating and promoter percentage over the last 30 days.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--accent)">—</div><div class="stat-lbl">Avg CSAT</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-sent" style="color:var(--muted)">—</div><div class="stat-lbl">Surveys Sent</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-resp" style="color:var(--yellow)">—</div><div class="stat-lbl">Response Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-promo" style="color:var(--green)">—</div><div class="stat-lbl">Promoters</div></div>
  </div>
  <div class="card">
    <div class="card-title">Rating Breakdown</div>
    <div id="star-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--green)','var(--accent)','var(--yellow)','var(--red)','#ef4444'];
  async function load() {
    const d = await fetch('/api/analytics/csat-score-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.avg_csat.toFixed(2) + '★';
    document.getElementById('h-sent').textContent = d.surveys_sent_30d;
    document.getElementById('h-resp').textContent = d.response_rate_pct.toFixed(1) + '%';
    document.getElementById('h-promo').textContent = d.promoters_pct.toFixed(1) + '%';
    const sl = document.getElementById('star-list');
    const maxP = Math.max(...d.breakdown.map(b => b.pct));
    d.breakdown.forEach((b, i) => {
      const w = (b.pct / maxP * 100).toFixed(1);
      sl.innerHTML += '<div class="star-row"><div class="star-lbl">' + b.label + '</div><div class="star-track"><div class="star-fill" style="width:' + w + '%;background:' + COLORS[i] + '"></div></div><div class="star-pct" style="color:' + COLORS[i] + '">' + b.pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
