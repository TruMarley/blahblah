<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blocked Times — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .top-bar { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
    .add-btn { font-size: .8rem; font-weight: 800; padding: .45rem 1.1rem; border-radius: 8px; border: 1px solid rgba(248,113,113,.35); background: rgba(248,113,113,.08); color: var(--red); cursor: pointer; font-family: inherit; }
    .add-btn:hover { background: rgba(248,113,113,.18); }
    .blocks-list { display: flex; flex-direction: column; gap: .85rem; }
    .block-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .block-left { flex: 1; }
    .block-title { font-size: .9rem; font-weight: 900; margin-bottom: .2rem; }
    .block-meta { font-size: .75rem; color: var(--muted); }
    .block-meta span { margin-right: .6rem; }
    .staff-tag { font-size: .65rem; font-weight: 800; padding: .12rem .38rem; border-radius: 4px; background: rgba(167,139,250,.12); color: var(--accent); }
    .recurring-tag { font-size: .65rem; font-weight: 800; padding: .12rem .38rem; border-radius: 4px; background: rgba(251,191,36,.1); color: var(--yellow); }
    .del-btn { font-size: .62rem; font-weight: 800; padding: .18rem .48rem; border-radius: 5px; border: 1px solid rgba(248,113,113,.3); background: rgba(248,113,113,.07); color: var(--red); cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .del-btn:hover { background: rgba(248,113,113,.18); }
    .empty { color: var(--muted); font-size: .84rem; text-align: center; padding: 2rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Blocked Times</div>
  <p class="page-sub">Prevent bookings during training, deep cleans, personal appointments, and other off-limit times.</p>
  <div class="top-bar">
    <button class="add-btn" onclick="showAdd()">+ Block Time</button>
  </div>
  <div class="blocks-list" id="blocks-list"></div>
</div>
<script>
  let data = {blocks:[]};
  async function load() {
    const r = await fetch('/api/blocked-times');
    data = await r.json();
    render();
  }
  function render() {
    const list = document.getElementById('blocks-list');
    if (!data.blocks || !data.blocks.length) { list.innerHTML = '<div class="empty">No blocked times — schedule is fully open.</div>'; return; }
    list.innerHTML = data.blocks.map(b => `
      <div class="block-card">
        <div class="block-left">
          <div class="block-title">${esc(b.title)}</div>
          <div class="block-meta">
            <span>${esc(b.date)}</span>
            <span>${esc(b.start_time)} – ${esc(b.end_time)}</span>
            <span class="staff-tag">${b.staff_id === 'all' ? 'All Staff' : esc(b.staff_id)}</span>
            ${b.recurring ? '<span class="recurring-tag">Recurring</span>' : ''}
          </div>
        </div>
        <button class="del-btn" onclick="del('${b.block_id}')">Remove</button>
      </div>`).join('');
  }
  async function del(id) {
    await fetch(`/api/blocked-times/${id}`, {method:'DELETE'});
    load();
  }
  function showAdd() {
    const title = prompt('Block title (e.g. Staff Training):');
    if (!title) return;
    const date = prompt('Date (YYYY-MM-DD):', new Date().toISOString().slice(0,10));
    const start = prompt('Start time (HH:MM):', '09:00');
    const end = prompt('End time (HH:MM):', '10:00');
    const staff = prompt('Staff ID (name or "all"):', 'all');
    const rec = confirm('Recurring block?');
    fetch('/api/blocked-times', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({title, date: date||'', start_time: start||'09:00', end_time: end||'10:00', staff_id: staff||'all', recurring: rec})
    }).then(() => load());
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
