<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule Gaps — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .provider-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; display: flex; align-items: center; gap: 1rem; }
    .prov-name { font-size: .85rem; font-weight: 700; width: 70px; flex-shrink: 0; }
    .gap-bars { flex: 1; }
    .gap-track { background: #1a1a1a; border-radius: 3px; height: 8px; overflow: hidden; margin-bottom: .25rem; }
    .gap-fill { height: 100%; border-radius: 3px; background: var(--yellow); }
    .prov-meta { font-size: .68rem; color: var(--muted); text-align: right; width: 90px; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Schedule Gaps</div>
  <p class="page-sub">Idle time between appointments is revenue left on the table. Track per-provider gap patterns to find scheduling inefficiencies the AI can fill with smarter booking.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--yellow)">—</div><div class="stat-lbl">Total Gap Hours (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--muted)">—</div><div class="stat-lbl">Avg Gap % of Day</div></div>
  </div>
  <div class="card">
    <div class="card-title">Per-Provider Gap Analysis</div>
    <div id="provider-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/staff-schedule-gap-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_gap_hours_30d + 'h';
    document.getElementById('h-avg').textContent = d.avg_gap_pct.toFixed(1) + '%';
    const pl = document.getElementById('provider-list');
    const maxGap = Math.max(...d.providers.map(p => p.gap_pct_of_day), 1);
    d.providers.forEach(p => {
      const w = (p.gap_pct_of_day / maxGap * 100).toFixed(1);
      pl.innerHTML += '<div class="provider-row"><div class="prov-name">' + p.name + '</div><div class="gap-bars"><div class="gap-track"><div class="gap-fill" style="width:' + w + '%"></div></div></div><div class="prov-meta">' + p.avg_gap_hrs + 'h avg · ' + p.idle_slots + ' slots</div></div>';
    });
  }
  load();
</script>
</body>
</html>
