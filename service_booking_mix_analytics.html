<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Mix — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .8rem 1rem; margin-bottom: .45rem; }
    .svc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .4rem; }
    .svc-name { font-size: .85rem; font-weight: 800; }
    .svc-ticket { font-size: .8rem; font-weight: 900; color: var(--green); }
    .svc-track { background: var(--surface); border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: .35rem; }
    .svc-fill { height: 100%; border-radius: 4px; }
    .svc-meta { display: flex; gap: 1rem; }
    .svc-meta-item { font-size: .68rem; color: var(--muted); }
    .svc-meta-item span { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Service Booking Mix</div>
  <p class="page-sub">Which services are clients booking most, and which drive the highest ticket? Use this to focus the AI's upsell prompts on the highest-value opportunities.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Bookings (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--yellow)">—</div><div class="stat-lbl">Most Booked</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-ticket" style="color:var(--green)">—</div><div class="stat-lbl">Highest Ticket</div></div>
  </div>
  <div class="card">
    <div class="card-title">Service Breakdown</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','var(--green)','var(--yellow)','#60a5fa','#fb923c','var(--muted)'];
  async function load() {
    const d = await fetch('/api/analytics/service-booking-mix-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_bookings_30d;
    document.getElementById('h-top').textContent = d.top_service;
    document.getElementById('h-ticket').textContent = d.highest_ticket_service;
    const sl = document.getElementById('svc-list');
    const maxB = Math.max(...d.services.map(s => s.bookings));
    d.services.forEach((s, i) => {
      const color = COLORS[i % COLORS.length];
      const w = (s.bookings / maxB * 100).toFixed(1);
      sl.innerHTML += '<div class="svc-card"><div class="svc-top"><div class="svc-name">' + s.service + '</div><div class="svc-ticket">$' + s.avg_ticket.toFixed(2) + ' avg</div></div><div class="svc-track"><div class="svc-fill" style="width:' + w + '%;background:' + color + '"></div></div><div class="svc-meta"><div class="svc-meta-item">Bookings <span>' + s.bookings + '</span></div><div class="svc-meta-item">Share <span style="color:' + color + '">' + s.pct.toFixed(1) + '%</span></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
