<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Channel Split — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .ch-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .8rem; }
    .ch-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .ch-label { font-size: .82rem; font-weight: 600; flex: 1; }
    .ch-track { width: 140px; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; flex-shrink: 0; }
    .ch-fill { height: 100%; border-radius: 4px; }
    .ch-pct { font-size: .75rem; font-weight: 700; width: 38px; text-align: right; }
    .ch-appts { font-size: .7rem; color: var(--muted); width: 52px; text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Booking Channel Split</div>
  <p class="page-sub">See how clients are booking — AI phone, online widget, walk-in, manual staff entry, or SMS. Channel mix reveals where to invest for growth and where friction is occurring.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Bookings (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--green)">—</div><div class="stat-lbl">Top Channel</div></div>
  </div>
  <div class="card">
    <div class="card-title">Channel Breakdown</div>
    <div id="ch-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--accent)','var(--green)','var(--yellow)','#60a5fa','var(--red)'];
  async function load() {
    const d = await fetch('/api/analytics/booking-channel-split-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_bookings_30d.toLocaleString();
    document.getElementById('h-top').textContent = d.top_channel;
    const cl = document.getElementById('ch-list');
    const maxP = Math.max(...d.channels.map(c => c.pct));
    d.channels.forEach((c, i) => {
      const w = (c.pct / maxP * 100).toFixed(1);
      const color = COLORS[i % COLORS.length];
      cl.innerHTML += '<div class="ch-row"><div class="ch-dot" style="background:' + color + '"></div><div class="ch-label">' + c.channel + '</div><div class="ch-track"><div class="ch-fill" style="width:' + w + '%;background:' + color + '"></div></div><div class="ch-pct" style="color:' + color + '">' + c.pct.toFixed(1) + '%</div><div class="ch-appts">' + c.appts + ' appts</div></div>';
    });
  }
  load();
</script>
</body>
</html>
