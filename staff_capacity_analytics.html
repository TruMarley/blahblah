<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Capacity — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .staff-row { margin-bottom: 1.1rem; }
    .staff-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .35rem; }
    .staff-name { font-size: .85rem; font-weight: 700; }
    .staff-pct { font-size: .82rem; font-weight: 900; }
    .staff-meta { font-size: .68rem; color: var(--muted); }
    .bar-track { background: var(--surface2); border-radius: 6px; height: 12px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 6px; transition: width .3s; }
    .bar-idle { position: absolute; top: 0; right: 0; height: 100%; background: rgba(248,113,113,.15); border-radius: 0 6px 6px 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Capacity</div>
  <p class="page-sub">See how fully booked each stylist is relative to their available hours. Identify over- and under-utilized staff to optimize scheduling and AI routing.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--accent)">—</div><div class="stat-lbl">Avg Utilization</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-most" style="color:var(--red)">—</div><div class="stat-lbl">Most Booked</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-least" style="color:var(--green)">—</div><div class="stat-lbl">Most Available</div></div>
  </div>
  <div class="card">
    <div class="card-title">Utilization by Stylist</div>
    <div id="staff-list"></div>
  </div>
</div>
<script>
  function utilColor(pct) {
    if (pct >= 85) return 'var(--red)';
    if (pct >= 60) return 'var(--green)';
    return 'var(--yellow)';
  }
  async function load() {
    const d = await fetch('/api/analytics/staff-capacity-stats').then(r => r.json());
    document.getElementById('h-avg').textContent = d.avg_utilization_pct.toFixed(1) + '%';
    document.getElementById('h-most').textContent = d.most_booked;
    document.getElementById('h-least').textContent = d.least_booked;
    const sl = document.getElementById('staff-list');
    d.staff.forEach(s => {
      const color = utilColor(s.utilized_pct);
      sl.innerHTML += `<div class="staff-row">
        <div class="staff-header">
          <div><div class="staff-name">${s.name}</div><div class="staff-meta">${s.appointments_30d} appts · ${s.idle_slots_30d} idle slots</div></div>
          <div class="staff-pct" style="color:${color}">${s.utilized_pct.toFixed(1)}%</div>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${s.utilized_pct}%;background:${color}"></div>
        </div>
      </div>`;
    });
  }
  load();
</script>
</body>
</html>
