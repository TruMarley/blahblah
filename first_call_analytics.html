<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First-Call Analytics — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .7rem; }
    .bar-label { font-size: .78rem; color: var(--muted); width: 160px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: var(--red); }
    .bar-pct { font-size: .75rem; font-weight: 700; color: var(--text); width: 36px; text-align: right; }
    .month-row { display: flex; align-items: flex-end; gap: .4rem; margin-top: .5rem; }
    .month-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .3rem; }
    .month-bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--accent); }
    .month-lbl { font-size: .6rem; color: var(--muted); }
    .month-val { font-size: .65rem; font-weight: 700; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">First-Call Analytics</div>
  <p class="page-sub">How well the AI converts first-time callers into booked appointments. Track conversion rates, call durations, and drop-off reasons.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-callers" style="color:var(--accent)">—</div><div class="stat-lbl">First Callers (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-conv" style="color:var(--green)">—</div><div class="stat-lbl">Conversion Rate</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-dur" style="color:var(--yellow)">—</div><div class="stat-lbl">Avg Call Duration</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-repeat" style="color:var(--accent)">—</div><div class="stat-lbl">Repeat in 30d</div></div>
  </div>
  <div class="card">
    <div class="card-title">Drop-Off Reasons</div>
    <div id="drop-list"></div>
  </div>
  <div class="card">
    <div class="card-title">Monthly First Callers</div>
    <div class="month-row" id="month-chart" style="height:120px;align-items:flex-end"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/first-call-stats').then(r => r.json());
    document.getElementById('h-callers').textContent = d.first_callers_30d;
    document.getElementById('h-conv').textContent = d.first_call_conversion_pct.toFixed(1) + '%';
    const mins = Math.floor(d.avg_call_duration_sec / 60);
    const secs = d.avg_call_duration_sec % 60;
    document.getElementById('h-dur').textContent = mins + 'm ' + secs + 's';
    document.getElementById('h-repeat').textContent = d.repeat_within_30d_pct.toFixed(1) + '%';
    const dl = document.getElementById('drop-list');
    const max = Math.max(...d.drop_reasons.map(x => x.pct));
    d.drop_reasons.forEach(r => {
      dl.innerHTML += '<div class="bar-row"><div class="bar-label">' + r.reason + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (r.pct/max*100).toFixed(1) + '%"></div></div><div class="bar-pct">' + r.pct + '%</div></div>';
    });
    const mc = document.getElementById('month-chart');
    const maxV = Math.max(...d.monthly.map(x => x.first_callers));
    d.monthly.forEach(m => {
      const h = Math.round((m.first_callers / maxV) * 90) + 10;
      mc.innerHTML += '<div class="month-col"><div class="month-val">' + m.first_callers + '</div><div class="month-bar" style="height:' + h + 'px"></div><div class="month-lbl">' + m.month + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
