<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monthly Revenue Target — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 660px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .month-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .8rem; }
    .month-label { font-size: .78rem; font-weight: 700; width: 36px; flex-shrink: 0; }
    .month-bars { flex: 1; display: flex; flex-direction: column; gap: .25rem; }
    .bar-row { display: flex; align-items: center; gap: .5rem; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 3px; height: 7px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-lbl { font-size: .6rem; color: var(--muted); width: 28px; text-align: right; }
    .month-pct { font-size: .78rem; font-weight: 900; width: 46px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Monthly Revenue Target</div>
  <p class="page-sub">Compare actual monthly revenue against targets. Green months hit the goal; yellow months are close; red months missed significantly.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-actual" style="color:var(--accent)">—</div><div class="stat-lbl">This Month (Actual)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-target" style="color:var(--muted)">—</div><div class="stat-lbl">This Month (Target)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-track" style="color:var(--green)">—</div><div class="stat-lbl">On Track</div></div>
  </div>
  <div class="card">
    <div class="card-title">Monthly Breakdown</div>
    <div id="month-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/monthly-revenue-target-stats').then(r => r.json());
    document.getElementById('h-actual').textContent = '$' + d.current_month_actual.toLocaleString();
    document.getElementById('h-target').textContent = '$' + d.current_month_target.toLocaleString();
    const trackEl = document.getElementById('h-track');
    trackEl.textContent = d.on_track ? 'Yes' : 'No';
    trackEl.style.color = d.on_track ? 'var(--green)' : 'var(--red)';
    const ml = document.getElementById('month-list');
    const maxVal = Math.max(...d.months.map(m => Math.max(m.actual, m.target)));
    d.months.forEach(m => {
      const color = m.pct >= 100 ? 'var(--green)' : m.pct >= 90 ? 'var(--yellow)' : 'var(--red)';
      const wa = (m.actual / maxVal * 100).toFixed(1);
      const wt = (m.target / maxVal * 100).toFixed(1);
      ml.innerHTML += '<div class="month-row"><div class="month-label">' + m.month + '</div><div class="month-bars"><div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:' + wa + '%;background:' + color + '"></div></div><div class="bar-lbl" style="color:' + color + '">$' + (m.actual/1000).toFixed(1) + 'k</div></div><div class="bar-row"><div class="bar-track"><div class="bar-fill" style="width:' + wt + '%;background:var(--border)"></div></div><div class="bar-lbl">$' + (m.target/1000).toFixed(1) + 'k</div></div></div><div class="month-pct" style="color:' + color + '">' + m.pct.toFixed(1) + '%</div></div>';
    });
  }
  load();
</script>
</body>
</html>
