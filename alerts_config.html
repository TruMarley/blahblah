<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alert Settings — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .alert-row { display: flex; align-items: flex-start; gap: 1rem; padding: .95rem 0; border-bottom: 1px solid var(--border); }
    .alert-row:last-child { border-bottom: none; }
    .alert-body { flex: 1; }
    .alert-name { font-size: .88rem; font-weight: 800; margin-bottom: .2rem; }
    .alert-desc { font-size: .75rem; color: var(--muted); line-height: 1.4; margin-bottom: .4rem; }
    .channel-badge { display: inline-block; font-size: .62rem; font-weight: 700; padding: .1rem .4rem; border-radius: 99px; text-transform: uppercase; letter-spacing: .05em; }
    .ch-sms   { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .ch-email { background: rgba(167,139,250,.1); color: var(--accent); border: 1px solid rgba(167,139,250,.2); }
    .ch-push  { background: rgba(251,191,36,.1);  color: var(--yellow); border: 1px solid rgba(251,191,36,.2); }
    /* Toggle switch */
    .toggle-wrap { flex-shrink: 0; padding-top: .15rem; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 22px; transition: .2s; }
    .slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #666; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: rgba(167,139,250,.3); }
    input:checked + .slider::before { transform: translateX(18px); background: var(--accent); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Alert Settings</div>
  <p class="page-sub">Configure which events trigger notifications and how they are delivered.</p>

  <div class="card">
    <div class="card-title">Notification Alerts</div>
    <div id="alerts-list"></div>
  </div>
</div>
<script>
  let alerts = [];

  async function load() {
    const r = await fetch('/api/alerts-config');
    const d = await r.json();
    alerts = d.alerts || [];
    render();
  }

  function render() {
    document.getElementById('alerts-list').innerHTML = alerts.map(a => `
      <div class="alert-row">
        <div class="alert-body">
          <div class="alert-name">${esc(a.name)}</div>
          <div class="alert-desc">${esc(a.description)}</div>
          <span class="channel-badge ch-${a.channel}">${a.channel}</span>
        </div>
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="tog-${a.id}" ${a.enabled ? 'checked' : ''} onchange="toggle('${a.id}')">
            <span class="slider"></span>
          </label>
        </div>
      </div>`).join('');
  }

  async function toggle(id) {
    const r = await fetch(`/api/alerts-config/${id}/toggle`, {method:'POST'});
    const d = await r.json();
    const idx = alerts.findIndex(a => a.id === id);
    if (idx >= 0) alerts[idx] = d.alert;
  }

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
