<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue by Weekday — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { display: flex; align-items: flex-end; gap: 8px; height: 130px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .bar-body { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; }
    .bar-val { font-size: .6rem; color: var(--muted); }
    .bar-label { font-size: .65rem; color: var(--muted); }
    .bar-appts { font-size: .58rem; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue by Weekday</div>
  <p class="page-sub">Which days of the week generate the most revenue? Use this to calibrate staffing levels, set day-specific promotions, and decide when surge or off-peak pricing makes sense.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Revenue (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak" style="color:var(--yellow)">—</div><div class="stat-lbl">Peak Day</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-slow" style="color:var(--muted)">—</div><div class="stat-lbl">Slowest Day</div></div>
  </div>
  <div class="card">
    <div class="card-title">Revenue per Weekday (avg week)</div>
    <div class="chart-wrap" id="chart"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/revenue-by-weekday-stats').then(r => r.json());
    document.getElementById('h-total').textContent = '$' + d.total_revenue_30d.toLocaleString();
    document.getElementById('h-peak').textContent = d.peak_day;
    document.getElementById('h-slow').textContent = d.slowest_day;
    const chart = document.getElementById('chart');
    const maxR = Math.max(...d.days.map(x => x.revenue));
    d.days.forEach(day => {
      const h = (day.revenue / maxR * 100).toFixed(1);
      const isPeak = day.day === d.peak_day;
      const isSlow = day.day === d.slowest_day;
      const color = isPeak ? 'var(--yellow)' : isSlow ? 'var(--red)' : 'var(--accent)';
      const opacity = isPeak || isSlow ? 1 : 0.55;
      chart.innerHTML += '<div class="bar-col"><div class="bar-val">$' + day.revenue.toFixed(0) + '</div><div class="bar-body" style="height:' + h + '%;background:' + color + ';opacity:' + opacity + '"></div><div class="bar-label">' + day.day.slice(0,3) + '</div><div class="bar-appts">' + day.appts + ' appts</div></div>';
    });
  }
  load();
</script>
</body>
</html>
