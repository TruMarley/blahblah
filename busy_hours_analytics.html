<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Busy Hours — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: .35rem; height: 80px; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .2rem; }
    .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; }
    .bar-lbl { font-size: .55rem; color: var(--muted); }
    .day-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .6rem; }
    .day-label { font-size: .78rem; width: 35px; flex-shrink: 0; }
    .day-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 9px; overflow: hidden; }
    .day-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .day-val { font-size: .73rem; font-weight: 700; color: var(--accent); width: 35px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Busy Hours</div>
  <p class="page-sub">Understand when calls and bookings peak so you can staff accordingly and coach the AI to handle surge periods.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-peak" style="color:var(--accent)">—</div><div class="stat-lbl">Peak Hour</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peakcalls" style="color:var(--yellow)">—</div><div class="stat-lbl">Peak Calls</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-slow" style="color:var(--muted)">—</div><div class="stat-lbl">Slowest Hour</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avgday" style="color:var(--green)">—</div><div class="stat-lbl">Avg Daily Calls</div></div>
  </div>
  <div class="card">
    <div class="card-title">Hourly Call Volume</div>
    <div class="bar-chart" id="hourly-chart"></div>
    <div class="bar-chart" id="hourly-lbls" style="height:auto;margin-top:.2rem"></div>
  </div>
  <div class="card">
    <div class="card-title">Day-of-Week Volume</div>
    <div id="day-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/busy-hours-stats').then(r => r.json());
    document.getElementById('h-peak').textContent = d.peak_hour;
    document.getElementById('h-peakcalls').textContent = d.peak_calls;
    document.getElementById('h-slow').textContent = d.slowest_hour;
    document.getElementById('h-avgday').textContent = d.avg_daily_calls.toFixed(0);
    const hc = document.getElementById('hourly-chart');
    const hl = document.getElementById('hourly-lbls');
    const maxC = Math.max(...d.hours.map(h => h.calls));
    d.hours.forEach(h => {
      const ht = Math.max(3, (h.calls / maxC * 74)).toFixed(0);
      const col = h.hour === d.peak_hour ? 'var(--accent)' : 'rgba(167,139,250,.35)';
      hc.innerHTML += '<div class="bar-wrap"><div class="bar" style="height:' + ht + 'px;background:' + col + '"></div></div>';
      hl.innerHTML += '<div class="bar-wrap"><div class="bar-lbl">' + h.hour.replace(':00','') + '</div></div>';
    });
    const dl = document.getElementById('day-list');
    const maxD = Math.max(...d.days.map(x => x.calls));
    d.days.forEach(day => {
      const w = (day.calls / maxD * 100).toFixed(1);
      dl.innerHTML += '<div class="day-row"><div class="day-label">' + day.day + '</div><div class="day-track"><div class="day-fill" style="width:' + w + '%"></div></div><div class="day-val">' + day.calls + '</div></div>';
    });
  }
  load();
</script>
</body>
</html>
