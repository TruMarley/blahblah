<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Appointment Completion Trend — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.9rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { height: 250px; }
    svg.chart { width: 100%; height: 100%; overflow: visible; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Appointment Completion Trend</div>
  <p class="page-sub">Weekly completion rate — track how consistently clients show up for their booked appointments.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Latest Week</div>
      <div class="hero-val" id="h-latest" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">8-Week Avg</div>
      <div class="hero-val" id="h-avg" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Best Week</div>
      <div class="hero-val" id="h-best" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Weekly Completion Rate (%)</div>
    <div class="chart-wrap">
      <svg class="chart" id="chart" viewBox="0 0 700 250" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/appointment-completion-trend');
    const d = await r.json();
    const weeks = d.weeks || [];
    const rates = weeks.map(w => w.completion_rate);
    const latest = rates[rates.length - 1] || 0;
    const avg = rates.length ? (rates.reduce((a, b) => a + b, 0) / rates.length).toFixed(1) : 0;
    const best = Math.max(...rates);
    document.getElementById('h-latest').textContent = latest + '%';
    document.getElementById('h-avg').textContent = avg + '%';
    document.getElementById('h-best').textContent = best + '%';

    const svg = document.getElementById('chart');
    const W=700, H=250, pL=44, pR=16, pT=14, pB=30;
    const cW=W-pL-pR, cH=H-pT-pB;
    const n = weeks.length;
    const minV = 60, maxV = 100;
    const xOf = i => pL + i / (n-1) * cW;
    const yOf = v => pT + cH - (v - minV) / (maxV - minV) * cH;

    // Grid lines
    [70, 80, 90, 100].forEach(v => {
      const y = yOf(v);
      svg.innerHTML += `<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;
      svg.innerHTML += `<text x="${pL-5}" y="${y+3.5}" font-size="8.5" fill="#555" text-anchor="end">${v}%</text>`;
    });

    // Target line at 90%
    const targetY = yOf(90);
    svg.innerHTML += `<line x1="${pL}" y1="${targetY}" x2="${W-pR}" y2="${targetY}" stroke="rgba(251,191,36,.35)" stroke-width="1.5" stroke-dasharray="6,4"/>`;
    svg.innerHTML += `<text x="${W-pR+4}" y="${targetY+3.5}" font-size="8" fill="rgba(251,191,36,.6)">Goal</text>`;

    // Area
    const pts = weeks.map((w, i) => `${xOf(i)},${yOf(w.completion_rate)}`).join(' ');
    const fill = `${xOf(0)},${pT+cH} ` + pts + ` ${xOf(n-1)},${pT+cH}`;
    svg.innerHTML += `<polygon points="${fill}" fill="rgba(52,211,153,.07)"/>`;
    svg.innerHTML += `<polyline points="${pts}" fill="none" stroke="rgba(52,211,153,.85)" stroke-width="2.5"/>`;

    // Dots + labels
    weeks.forEach((w, i) => {
      const cx = xOf(i), cy = yOf(w.completion_rate);
      const isGood = w.completion_rate >= 90;
      svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="3.5" fill="${isGood ? 'var(--green)' : 'var(--yellow)'}"/>`;
      svg.innerHTML += `<text x="${cx}" y="${cy - 8}" font-size="8.5" fill="${isGood ? 'rgba(52,211,153,.8)' : 'rgba(251,191,36,.8)'}" text-anchor="middle">${w.completion_rate}%</text>`;
      svg.innerHTML += `<text x="${cx}" y="${H-4}" font-size="8.5" fill="#555" text-anchor="middle">${esc(w.week)}</text>`;
    });
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
