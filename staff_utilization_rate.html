<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Utilization Rate — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 2rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.5rem; }
    .staff-row { display: flex; align-items: center; gap: .9rem; margin-bottom: 1.3rem; }
    .staff-row:last-child { margin-bottom: 0; }
    .staff-name { font-size: .88rem; font-weight: 800; width: 70px; flex-shrink: 0; }
    .bar-wrap { flex: 1; position: relative; }
    .bar-track { background: var(--surface2); border-radius: 6px; height: 14px; overflow: visible; position: relative; }
    .bar-fill { height: 100%; border-radius: 6px; opacity: .8; }
    .target-line { position: absolute; top: -3px; height: 20px; width: 2px; background: rgba(251,191,36,.7); border-radius: 1px; }
    .bar-sub { font-size: .7rem; color: var(--muted); margin-top: .3rem; }
    .pct-val { font-size: .9rem; font-weight: 900; width: 50px; text-align: right; flex-shrink: 0; }
    .target-note { font-size: .7rem; color: rgba(251,191,36,.7); margin-top: 1rem; display: flex; align-items: center; gap: .4rem; }
    .target-pip { width: 14px; height: 2px; background: rgba(251,191,36,.7); border-radius: 1px; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Utilization Rate</div>
  <p class="page-sub">Booked hours as a percentage of available hours — 80% is the healthy target.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Team Average</div>
      <div class="hero-val" id="h-avg" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Target</div>
      <div class="hero-val" style="color:var(--yellow)">80%</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Utilization by Staff Member</div>
    <div id="staff-list"></div>
    <div class="target-note"><div class="target-pip"></div>80% target</div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/staff-utilization-rate');
    const d = await r.json();
    document.getElementById('h-avg').textContent = d.avg_utilization_pct + '%';
    const target = d.target_pct || 80;
    document.getElementById('staff-list').innerHTML = (d.staff||[]).map(s => {
      const color = s.utilization_pct >= target ? '#34d399' : s.utilization_pct >= target*0.8 ? '#fbbf24' : '#f87171';
      const targetLeft = target.toFixed(1) + '%';
      return `<div class="staff-row">
        <div class="staff-name">${esc(s.name)}</div>
        <div class="bar-wrap">
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.min(100,s.utilization_pct)}%;background:${s.color||color}"></div>
            <div class="target-line" style="left:${targetLeft}"></div>
          </div>
          <div class="bar-sub">${s.booked_hours}h booked / ${s.available_hours}h available</div>
        </div>
        <div class="pct-val" style="color:${color}">${s.utilization_pct}%</div>
      </div>`;
    }).join('');
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
