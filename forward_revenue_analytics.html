<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revenue Forecast — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .week-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; }
    .week-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .5rem; }
    .week-label { font-size: .85rem; font-weight: 700; }
    .week-proj { font-size: .88rem; font-weight: 900; color: var(--muted); }
    .week-bars { display: flex; flex-direction: column; gap: .25rem; }
    .w-bar-row { display: flex; align-items: center; gap: .5rem; font-size: .65rem; color: var(--muted); }
    .w-track { flex: 1; background: #1a1a1a; border-radius: 2px; height: 6px; overflow: hidden; }
    .w-fill { height: 100%; border-radius: 2px; }
    .w-val { width: 55px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Revenue Forecast</div>
  <p class="page-sub">Forward-looking revenue based on confirmed bookings versus projected capacity. Pipeline fill rate shows how much of potential revenue is already locked in for the coming weeks.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-proj" style="color:var(--muted)">—</div><div class="stat-lbl">Projected (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-conf" style="color:var(--green)">—</div><div class="stat-lbl">Confirmed</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-fill" style="color:var(--accent)">—</div><div class="stat-lbl">Pipeline Fill</div></div>
  </div>
  <div class="card">
    <div class="card-title">4-Week Forward Pipeline</div>
    <div id="week-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/forward-revenue-stats').then(r => r.json());
    document.getElementById('h-proj').textContent = '$' + d.projected_30d_revenue.toLocaleString();
    document.getElementById('h-conf').textContent = '$' + d.confirmed_revenue.toLocaleString();
    document.getElementById('h-fill').textContent = d.pipeline_fill_pct.toFixed(1) + '%';
    const wl = document.getElementById('week-list');
    d.weeks.forEach(w => {
      const confW = (w.confirmed / w.projected * 100).toFixed(1);
      wl.innerHTML += '<div class="week-row"><div class="week-top"><div class="week-label">' + w.week + '</div><div class="week-proj">$' + w.projected.toLocaleString() + ' projected</div></div><div class="week-bars"><div class="w-bar-row"><span style="width:70px">Projected</span><div class="w-track"><div class="w-fill" style="width:100%;background:rgba(255,255,255,.08)"></div></div><div class="w-val">$' + w.projected.toLocaleString() + '</div></div><div class="w-bar-row"><span style="width:70px">Confirmed</span><div class="w-track"><div class="w-fill" style="width:' + confW + '%;background:var(--green)"></div></div><div class="w-val" style="color:var(--green)">$' + w.confirmed.toLocaleString() + '</div></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
