<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Lifetime Visits — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .hero-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; text-align: center; }
    .hero-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-val { font-size: 1.7rem; font-weight: 900; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .client-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .85rem; }
    .client-rank { font-size: .7rem; font-weight: 800; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
    .client-name { font-size: .82rem; font-weight: 700; width: 72px; flex-shrink: 0; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; gap: .2rem; }
    .bar-bg { background: #1a1a1a; border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .bar-meta { display: flex; gap: .6rem; font-size: .63rem; color: var(--muted); }
    .visit-count { font-size: .82rem; font-weight: 800; color: var(--accent); width: 28px; text-align: right; flex-shrink: 0; }
    .recency-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Client Lifetime Visits</div>
  <p class="page-sub">Your most loyal clients ranked by total visits — these are the relationships worth protecting with personalized service and loyalty rewards.</p>
  <div class="hero-row">
    <div class="hero-card">
      <div class="hero-label">Top Client Visits</div>
      <div class="hero-val" id="h-top" style="color:var(--accent)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Visits</div>
      <div class="hero-val" id="h-avg" style="color:var(--green)">—</div>
    </div>
    <div class="hero-card">
      <div class="hero-label">Avg Lifetime Spend</div>
      <div class="hero-val" id="h-spend" style="color:var(--yellow)">—</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Top 10 Clients by Visit Count</div>
    <div id="client-list"></div>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/client-lifetime-visits');
    const d = await r.json();
    const clients = d.clients || [];
    const topVisits = clients[0] ? clients[0].visit_count : 0;
    const avgVisits = (clients.reduce((s,c)=>s+c.visit_count,0)/clients.length).toFixed(1);
    const avgSpend = Math.round(clients.reduce((s,c)=>s+c.total_spend,0)/clients.length);
    document.getElementById('h-top').textContent = topVisits;
    document.getElementById('h-avg').textContent = avgVisits;
    document.getElementById('h-spend').textContent = '$'+avgSpend.toLocaleString();

    const maxVisits = clients[0] ? clients[0].visit_count : 1;
    const COLORS = ['rgba(167,139,250,.8)','rgba(167,139,250,.7)','rgba(52,211,153,.7)','rgba(52,211,153,.6)','rgba(251,191,36,.7)','rgba(251,191,36,.6)','rgba(52,211,153,.5)','rgba(167,139,250,.5)','rgba(248,113,113,.5)','rgba(167,139,250,.4)'];
    document.getElementById('client-list').innerHTML = clients.map((c,i)=>{
      const pct = (c.visit_count/maxVisits)*100;
      const recencyColor = c.last_visit_days_ago<=14 ? 'var(--green)' : c.last_visit_days_ago<=30 ? 'var(--yellow)' : 'var(--red)';
      return `<div class="client-row">
        <div class="client-rank">${i+1}</div>
        <div class="client-name">${esc(c.name)}</div>
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${COLORS[i]}"></div></div>
          <div class="bar-meta">
            <span>$${c.total_spend.toLocaleString()} lifetime</span>
            <span style="color:${recencyColor}">${c.last_visit_days_ago}d ago</span>
          </div>
        </div>
        <div class="visit-count">${c.visit_count}</div>
        <div class="recency-dot" style="background:${recencyColor}"></div>
      </div>`;
    }).join('');
  }
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  load();
</script>
</body>
</html>
