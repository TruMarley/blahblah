<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staff Efficiency — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .heroes { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; margin-bottom: 1.25rem; }
    .hero { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; }
    .hero-label { font-size: .67rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
    .hero-value { font-size: 1.7rem; font-weight: 900; letter-spacing: -.03em; }
    .hero-sub { font-size: .72rem; color: var(--muted); margin-top: .2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .staff-row { display: flex; align-items: center; gap: 1rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }
    .staff-row:last-child { border-bottom: none; }
    .staff-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 800; color: #fff; flex-shrink: 0; }
    .staff-info { flex: 1; min-width: 0; }
    .staff-name { font-size: .85rem; font-weight: 700; }
    .staff-meta { font-size: .7rem; color: var(--muted); margin-top: .1rem; }
    .util-bar-wrap { flex: 2; }
    .util-bar-bg { background: var(--surface2); border-radius: 6px; height: 8px; overflow: hidden; }
    .util-bar-fill { height: 100%; border-radius: 6px; transition: width .4s; }
    .util-pct { font-size: .75rem; font-weight: 700; margin-top: .25rem; }
    .staff-stats { display: flex; gap: 1rem; flex-shrink: 0; text-align: right; }
    .stat-item { }
    .stat-val { font-size: .82rem; font-weight: 700; }
    .stat-lbl { font-size: .65rem; color: var(--muted); }
    .trend-wrap { display: grid; gap: .35rem; }
    .trend-row { display: flex; align-items: center; gap: .5rem; }
    .trend-label { font-size: .72rem; color: var(--muted); width: 60px; text-align: right; flex-shrink: 0; }
    .trend-bar-bg { flex: 1; background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
    .trend-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .trend-val { font-size: .7rem; color: var(--muted); width: 40px; text-align: right; flex-shrink: 0; }
    .insight { background: rgba(167,139,250,.07); border: 1px solid rgba(167,139,250,.2); border-radius: 10px; padding: .9rem 1.1rem; margin-top: 1rem; font-size: .8rem; color: var(--accent); }
    @media (max-width: 600px) { .heroes { grid-template-columns: 1fr 1fr; } .staff-stats { display: none; } }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Staff Efficiency</div>
  <p class="page-sub">Utilization rates, idle time, and booking density per staff member over the last 30 days.</p>

  <div class="heroes">
    <div class="hero">
      <div class="hero-label">Avg Utilization</div>
      <div class="hero-value" id="h-util">—</div>
      <div class="hero-sub">across all staff</div>
    </div>
    <div class="hero">
      <div class="hero-label">Top Performer</div>
      <div class="hero-value" id="h-top" style="font-size:1.2rem">—</div>
      <div class="hero-sub">highest utilization</div>
    </div>
    <div class="hero">
      <div class="hero-label">Idle Hours (30d)</div>
      <div class="hero-value" id="h-idle" style="color:var(--yellow)">—</div>
      <div class="hero-sub">recoverable capacity</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Staff Utilization Breakdown</div>
    <div id="staff-list"></div>
    <div class="insight" id="insight-box" style="display:none"></div>
  </div>

  <div class="card">
    <div class="card-title">Monthly Avg Utilization Trend</div>
    <div class="trend-wrap" id="trend-chart"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/staff-efficiency-stats').then(r => r.json());
    document.getElementById('h-util').textContent = d.avg_utilization_pct.toFixed(1) + '%';
    document.getElementById('h-top').textContent = d.top_performer;
    document.getElementById('h-idle').textContent = d.idle_hours_30d.toFixed(1) + 'h';

    const list = document.getElementById('staff-list');
    const maxRev = Math.max(...d.staff.map(s => s.revenue));
    d.staff.forEach(s => {
      const initials = s.name.split(' ').map(w => w[0]).join('').toUpperCase();
      const row = document.createElement('div');
      row.className = 'staff-row';
      row.innerHTML = `
        <div class="staff-avatar" style="background:${s.color}">${initials}</div>
        <div class="staff-info">
          <div class="staff-name">${s.name}</div>
          <div class="staff-meta">${s.appointments} appts · avg gap ${s.avg_gap_min}min</div>
        </div>
        <div class="util-bar-wrap">
          <div class="util-bar-bg"><div class="util-bar-fill" style="width:${s.utilization_pct}%;background:${s.color}"></div></div>
          <div class="util-pct" style="color:${s.color}">${s.utilization_pct.toFixed(1)}%</div>
        </div>
        <div class="staff-stats">
          <div class="stat-item"><div class="stat-val">${s.hours_booked.toFixed(1)}h</div><div class="stat-lbl">booked</div></div>
          <div class="stat-item"><div class="stat-val">$${s.revenue.toLocaleString()}</div><div class="stat-lbl">revenue</div></div>
        </div>
      `;
      list.appendChild(row);
    });

    const topStaff = d.staff.reduce((a, b) => a.utilization_pct > b.utilization_pct ? a : b);
    const ib = document.getElementById('insight-box');
    ib.style.display = 'block';
    ib.textContent = `${topStaff.name} leads with ${topStaff.utilization_pct.toFixed(1)}% utilization and $${topStaff.revenue.toLocaleString()} in revenue. Team idle hours of ${d.idle_hours_30d.toFixed(1)}h represent significant booking opportunity.`;

    const maxUtil = Math.max(...d.monthly.map(m => m.avg_utilization_pct));
    const chart = document.getElementById('trend-chart');
    d.monthly.forEach(m => {
      const row = document.createElement('div');
      row.className = 'trend-row';
      const pct = maxUtil > 0 ? (m.avg_utilization_pct / maxUtil * 100) : 0;
      row.innerHTML = `
        <div class="trend-label">${m.month}</div>
        <div class="trend-bar-bg"><div class="trend-bar-fill" style="width:${pct}%"></div></div>
        <div class="trend-val">${m.avg_utilization_pct.toFixed(1)}%</div>
      `;
      chart.appendChild(row);
    });
  }
  load();
</script>
</body>
</html>
