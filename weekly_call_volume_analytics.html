<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weekly Call Volume — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .week-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .85rem 1rem; margin-bottom: .5rem; }
    .week-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .55rem; }
    .week-label { font-size: .82rem; font-weight: 700; }
    .week-rate { font-size: .78rem; font-weight: 900; color: var(--green); }
    .bars { display: flex; flex-direction: column; gap: .3rem; }
    .bar-row { display: flex; align-items: center; gap: .5rem; }
    .bar-lbl { font-size: .62rem; color: var(--muted); width: 52px; }
    .bar-track { flex: 1; background: var(--bg); border-radius: 3px; height: 7px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-val { font-size: .68rem; font-weight: 700; width: 30px; text-align: right; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Weekly Call Volume</div>
  <p class="page-sub">Track inbound call trends week-over-week alongside booking conversion. Rising call volume with flat bookings signals a scripting or availability issue.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Calls (30d)</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--muted)">—</div><div class="stat-lbl">Avg / Week</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-trend" style="color:var(--green)">—</div><div class="stat-lbl">Trend vs Prior Period</div></div>
  </div>
  <div class="card">
    <div class="card-title">4-Week Breakdown</div>
    <div id="week-list"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/weekly-call-volume-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_calls_30d;
    document.getElementById('h-avg').textContent = d.avg_weekly_calls.toFixed(0);
    const tEl = document.getElementById('h-trend');
    const sign = d.trend_pct >= 0 ? '+' : '';
    tEl.textContent = sign + d.trend_pct.toFixed(1) + '%';
    tEl.style.color = d.trend_pct >= 0 ? 'var(--green)' : 'var(--red)';
    const wl = document.getElementById('week-list');
    const maxCalls = Math.max(...d.weeks.map(w => w.calls));
    d.weeks.forEach(w => {
      const wc = (w.calls / maxCalls * 100).toFixed(1);
      const wb = (w.bookings / maxCalls * 100).toFixed(1);
      wl.innerHTML += '<div class="week-row"><div class="week-top"><div class="week-label">' + w.week + '</div><div class="week-rate">' + w.booking_rate.toFixed(1) + '% booked</div></div><div class="bars"><div class="bar-row"><div class="bar-lbl">Calls</div><div class="bar-track"><div class="bar-fill" style="width:' + wc + '%;background:var(--accent)"></div></div><div class="bar-val" style="color:var(--accent)">' + w.calls + '</div></div><div class="bar-row"><div class="bar-lbl">Booked</div><div class="bar-track"><div class="bar-fill" style="width:' + wb + '%;background:var(--green)"></div></div><div class="bar-val" style="color:var(--green)">' + w.bookings + '</div></div></div></div>';
    });
  }
  load();
</script>
</body>
</html>
