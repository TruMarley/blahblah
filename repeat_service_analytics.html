<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repeat Services — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .svc-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .7rem; }
    .svc-label { font-size: .78rem; width: 120px; flex-shrink: 0; }
    .svc-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
    .svc-fill { height: 100%; border-radius: 4px; }
    .svc-right { font-size: .72rem; font-weight: 700; width: 110px; text-align: right; flex-shrink: 0; color: var(--muted); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Repeat Services</div>
  <p class="page-sub">Which services bring clients back, and how quickly? High repeat rate services are retention anchors — they should be featured prominently in the AI's rebooking prompts.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-top" style="color:var(--accent)">—</div><div class="stat-lbl">Most Repeated Service</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--green)">—</div><div class="stat-lbl">Shop Avg Repeat Rate</div></div>
  </div>
  <div class="card">
    <div class="card-title">Repeat Rate by Service</div>
    <div id="svc-list"></div>
  </div>
</div>
<script>
  const COLORS = ['var(--green)','var(--accent)','var(--yellow)','#60a5fa','var(--red)','#f472b6'];
  async function load() {
    const d = await fetch('/api/analytics/repeat-service-stats').then(r => r.json());
    document.getElementById('h-top').textContent = d.most_repeated_service;
    document.getElementById('h-avg').textContent = d.shop_avg_repeat_rate_pct.toFixed(1) + '%';
    const sl = document.getElementById('svc-list');
    d.services.forEach((s, i) => {
      const color = COLORS[i % COLORS.length];
      sl.innerHTML += '<div class="svc-row"><div class="svc-label">' + s.service + '</div><div class="svc-track"><div class="svc-fill" style="width:' + s.repeat_rate_pct + '%;background:' + color + '"></div></div><div class="svc-right" style="color:' + color + '">' + s.repeat_rate_pct.toFixed(1) + '% · ' + s.avg_return_days.toFixed(0) + 'd</div></div>';
    });
  }
  load();
</script>
</body>
</html>
