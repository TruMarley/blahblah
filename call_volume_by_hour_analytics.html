<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Call Volume by Hour — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --yellow: #fbbf24; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: .6rem; margin-bottom: 1.25rem; }
    .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .75rem .9rem; }
    .stat-val { font-size: 1.1rem; font-weight: 900; }
    .stat-lbl { font-size: .63rem; color: var(--muted); margin-top: .1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    .chart-wrap { display: flex; align-items: flex-end; gap: 3px; height: 120px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--accent); opacity: .55; transition: opacity .15s; min-height: 2px; }
    .bar.peak { opacity: 1; background: var(--green); }
    .bar:hover { opacity: 1; }
    .bar-lbl { font-size: .52rem; color: var(--muted); }
    .bar-val { font-size: .55rem; font-weight: 700; color: var(--accent); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Call Volume by Hour</div>
  <p class="page-sub">See when your phone is busiest throughout the day. Staff your peak hours and let the AI handle the rest — no missed calls, no overwhelmed receptionists.</p>
  <div class="stats-row">
    <div class="stat-pill"><div class="stat-val" id="h-total" style="color:var(--accent)">—</div><div class="stat-lbl">Total Calls Today</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak-hour" style="color:var(--green)">—</div><div class="stat-lbl">Peak Hour</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-peak-calls" style="color:var(--yellow)">—</div><div class="stat-lbl">Peak Hour Calls</div></div>
    <div class="stat-pill"><div class="stat-val" id="h-avg" style="color:var(--muted)">—</div><div class="stat-lbl">Avg Calls / Hour</div></div>
  </div>
  <div class="card">
    <div class="card-title">Calls by Hour — Today</div>
    <div class="chart-wrap" id="chart"></div>
    <div style="display:flex;gap:3px;margin-top:.3rem;" id="labels"></div>
  </div>
</div>
<script>
  async function load() {
    const d = await fetch('/api/analytics/call-volume-by-hour-stats').then(r => r.json());
    document.getElementById('h-total').textContent = d.total_calls_today;
    document.getElementById('h-peak-hour').textContent = d.peak_hour;
    document.getElementById('h-peak-calls').textContent = d.peak_calls;
    document.getElementById('h-avg').textContent = d.avg_calls_per_hour;
    const maxCalls = Math.max(...d.hours.map(h => h.calls), 1);
    const chart = document.getElementById('chart');
    const labels = document.getElementById('labels');
    d.hours.forEach(h => {
      const pct = (h.calls / maxCalls * 110).toFixed(0);
      const isPeak = h.label === d.peak_hour;
      chart.innerHTML += '<div class="bar-col"><div class="bar-val">' + (h.calls || '') + '</div><div class="bar' + (isPeak ? ' peak' : '') + '" style="height:' + pct + 'px"></div></div>';
      labels.innerHTML += '<div style="flex:1;text-align:center;font-size:.5rem;color:var(--muted)">' + (h.hour % 3 === 0 ? h.label : '') + '</div>';
    });
  }
  load();
</script>
</body>
</html>
