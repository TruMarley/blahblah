<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cancellation Reasons — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; --yellow: #fbbf24; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1.25rem; }
    /* Reason bars */
    .reason-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .85rem; }
    .reason-label { width: 155px; flex-shrink: 0; font-size: .8rem; font-weight: 600; color: var(--text); }
    .reason-track { flex: 1; background: var(--surface2); border-radius: 99px; height: 18px; overflow: hidden; }
    .reason-fill { height: 18px; border-radius: 99px; background: var(--accent); opacity: .75; transition: width .7s ease; }
    .reason-meta { width: 80px; flex-shrink: 0; text-align: right; font-size: .78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    /* Trend table */
    .trend-table { width: 100%; border-collapse: collapse; }
    .trend-table th { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .5rem .75rem; border-bottom: 1px solid var(--border); text-align: left; }
    .trend-table th.right, .trend-table td.right { text-align: right; }
    .trend-table td { padding: .65rem .75rem; font-size: .82rem; border-bottom: 1px solid var(--border); }
    .trend-table tr:last-child td { border-bottom: none; }
    .rate-high { color: var(--red); font-weight: 800; }
    .rate-mid  { color: var(--yellow); font-weight: 800; }
    .rate-low  { color: var(--green); font-weight: 800; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Cancellation Reasons</div>
  <p class="page-sub">Why clients cancel, ranked by frequency, with a 3-month trend.</p>

  <div class="card">
    <div class="card-title">Top Reasons</div>
    <div id="reasons-list"></div>
  </div>

  <div class="card">
    <div class="card-title">3-Month Cancellation Rate Trend</div>
    <table class="trend-table">
      <thead><tr><th>Month</th><th class="right">Cancellation Rate</th></tr></thead>
      <tbody id="trend-body"></tbody>
    </table>
  </div>
</div>
<script>
  async function load() {
    const r = await fetch('/api/analytics/cancellation-reasons');
    const d = await r.json();
    const reasons = d.reasons || [];
    const trend = d.trend || [];

    const maxCount = Math.max(...reasons.map(r => r.count), 1);

    document.getElementById('reasons-list').innerHTML = reasons.map(r => {
      const pct = Math.round((r.count / maxCount) * 100);
      return `<div class="reason-row">
        <div class="reason-label">${esc(r.reason)}</div>
        <div class="reason-track"><div class="reason-fill" style="width:0%" data-w="${pct}"></div></div>
        <div class="reason-meta">${r.count} &bull; ${r.pct_of_total}%</div>
      </div>`;
    }).join('');

    setTimeout(() => {
      document.querySelectorAll('.reason-fill').forEach(el => { el.style.width = el.dataset.w + '%'; });
    }, 100);

    document.getElementById('trend-body').innerHTML = trend.map(t => {
      const rate = t.cancellation_rate_pct;
      const cls = rate >= 18 ? 'rate-high' : rate >= 13 ? 'rate-mid' : 'rate-low';
      return `<tr>
        <td>${esc(t.month)}</td>
        <td class="right"><span class="${cls}">${rate}%</span></td>
      </tr>`;
    }).join('');
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
