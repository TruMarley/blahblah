<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blocked Numbers — RingDesk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080808; --surface: #111; --surface2: #161616; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #a78bfa; --green: #34d399; --red: #f87171; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    nav { background: rgba(8,8,8,.96); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; }
    .logo span { color: var(--accent); }
    nav a.back { color: var(--muted); font-size: .85rem; text-decoration: none; }
    .main { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
    .page-title { font-size: 1.5rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: .3rem; }
    .page-sub { font-size: .83rem; color: var(--muted); margin-bottom: 2rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .card-title { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .add-row { display: flex; gap: .75rem; align-items: flex-end; flex-wrap: wrap; }
    .form-field { display: flex; flex-direction: column; gap: .3rem; flex: 1; min-width: 160px; }
    .form-field label { font-size: .72rem; color: var(--muted); font-weight: 700; }
    .form-field input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: .85rem; font-family: inherit; padding: .6rem .85rem; border-radius: 8px; outline: none; transition: border-color .15s; }
    .form-field input:focus { border-color: rgba(248,113,113,.5); }
    .block-btn { background: var(--red); border: none; color: #fff; font-size: .85rem; font-weight: 900; padding: .6rem 1.4rem; border-radius: 9px; cursor: pointer; font-family: inherit; transition: opacity .15s; white-space: nowrap; }
    .block-btn:hover { opacity: .85; }
    .add-msg { font-size: .78rem; color: var(--green); font-weight: 700; display: none; }
    .add-msg.show { display: inline-block; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; padding: .55rem 1rem; border-bottom: 1px solid var(--border); text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .7rem 1rem; font-size: .82rem; }
    .phone-cell { font-family: monospace; font-weight: 800; color: var(--red); }
    .unblock-btn { font-size: .72rem; font-weight: 800; padding: .25rem .75rem; border-radius: 7px; border: 1px solid rgba(248,113,113,.3); background: rgba(248,113,113,.07); color: var(--red); cursor: pointer; font-family: inherit; transition: all .15s; }
    .unblock-btn:hover { background: rgba(248,113,113,.15); }
    .empty-msg { text-align: center; color: var(--muted); font-size: .82rem; padding: 2rem; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Ring<span>Desk</span></a>
  <a href="/dashboard" class="back">← Dashboard</a>
</nav>
<div class="main">
  <div class="page-title">Blocked Numbers</div>
  <p class="page-sub">Phone numbers that are blocked from booking — AI will politely decline their calls.</p>
  <div class="card">
    <div class="card-title">Block a Number</div>
    <div class="add-row">
      <div class="form-field"><label>Phone Number</label><input type="tel" id="f-phone" placeholder="+1 (555) 000-0000"></div>
      <div class="form-field"><label>Reason</label><input type="text" id="f-reason" placeholder="e.g. Repeated no-shows"></div>
      <button class="block-btn" onclick="blockNumber()">Block Number</button>
      <span class="add-msg" id="add-msg">✓ Number blocked!</span>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Blocked Numbers <span id="count-badge" style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;font-size:.78rem"></span></div>
    <div id="table-wrap">
      <table>
        <thead><tr><th>Phone Number</th><th>Reason</th><th>Blocked On</th><th></th></tr></thead>
        <tbody id="bn-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
  let blocked = [];

  async function load() {
    const r = await fetch('/api/blocked-numbers');
    const d = await r.json();
    blocked = d.blocked || [];
    render();
  }

  function render() {
    document.getElementById('count-badge').textContent = `(${blocked.length})`;
    if (!blocked.length) {
      document.getElementById('table-wrap').innerHTML = '<div class="empty-msg">No blocked numbers.</div>';
      return;
    }
    document.getElementById('table-wrap').innerHTML = `<table>
      <thead><tr><th>Phone Number</th><th>Reason</th><th>Blocked On</th><th></th></tr></thead>
      <tbody>${blocked.map(n => `
        <tr>
          <td class="phone-cell">${esc(n.phone)}</td>
          <td style="color:var(--muted)">${esc(n.reason)}</td>
          <td style="color:var(--muted)">${esc(n.blocked_at)}</td>
          <td><button class="unblock-btn" onclick="unblock('${n.id}')">Unblock</button></td>
        </tr>`).join('')}
      </tbody></table>`;
  }

  async function blockNumber() {
    const phone  = document.getElementById('f-phone').value.trim();
    const reason = document.getElementById('f-reason').value.trim();
    if (!phone) return;
    const res = await fetch('/api/blocked-numbers', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone, reason})
    });
    const entry = await res.json();
    blocked.unshift(entry);
    render();
    document.getElementById('f-phone').value = '';
    document.getElementById('f-reason').value = '';
    const msg = document.getElementById('add-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  }

  async function unblock(id) {
    await fetch(`/api/blocked-numbers/${id}`, {method:'DELETE'});
    blocked = blocked.filter(n => n.id !== id);
    render();
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  load();
</script>
</body>
</html>
